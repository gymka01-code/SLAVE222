<!DOCTYPE html>
<html lang="ru">
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  --bg:        #050505;
  --bg2:       #0a0a0a;
  --bg3:       #121212;
  --bg4:       #1a1a1a;
  --border:    rgba(255,255,255,0.06);
  --border2:   rgba(255,255,255,0.12);
  --gold:      #E8C547;
  --gold-glow: rgba(232,197,71,0.15);
  --red:       #E84040;
  --green:     #27C264;
  --blue:      #1A7FE8;
  --text:      #F0EDE8;
  --text2:     rgba(240,237,232,0.68);
  --text3:     rgba(240,237,232,0.36);
  --r:         20px;
  --r2:        14px;
  --font:      'Inter', sans-serif;
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body, #root { height:100%; width:100%; overflow:hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.5; overscroll-behavior: none; -webkit-font-smoothing: antialiased; }

.app { display:flex; flex-direction:column; height:100vh; height:100dvh; }

.content { flex:1; overflow-y:auto; padding:0 0 24px; }
.content::-webkit-scrollbar { width: 0; }

/* ── HEADER & BURGER ── */
.hdr { padding: 16px 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(5,5,5,0.85); backdrop-filter: blur(12px); z-index: 10; }
.hdr-title { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
.hdr-sub { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
.burger-btn { background: none; border: none; color: var(--text); font-size: 28px; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; }
.burger-btn:active { opacity: 0.6; }

/* ── SIDEBAR MENU ── */
.sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; display: flex; justify-content: flex-end; animation: fadeIn 0.2s ease; }
.sidebar { width: 280px; height: 100%; background: var(--bg2); border-left: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; gap: 8px; animation: slideLeft 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: -10px 0 40px rgba(0,0,0,0.5); }
@keyframes slideLeft { from { transform: translateX(100%); } to { transform: translateX(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.menu-btn { width: 100%; text-align: left; background: transparent; border: none; padding: 14px 16px; color: var(--text); font-size: 16px; font-weight: 600; font-family: var(--font); border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.2s; }
.menu-btn:active { background: var(--border); }
.menu-btn.active { background: rgba(232,197,71,0.1); color: var(--gold); }

/* ── PREMIUM TABS ── */
.tabs-wrap { padding: 12px 16px; background: var(--bg); position: sticky; top: 0; z-index: 5; }
.tabs { display: flex; background: rgba(255,255,255,0.06); border-radius: 14px; padding: 4px; gap: 4px; overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex: 1; padding: 10px 16px; text-align: center; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--text3); border: none; background: transparent; border-radius: 10px; transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); white-space: nowrap; outline: none; -webkit-tap-highlight-color: transparent; }

/* ── CARDS & HERO ── */

.hero { margin: 16px 16px 0; background: linear-gradient(145deg, #141414 0%, #1a1a1a 100%); border: 1px solid rgba(232,197,71,0.15); border-radius: 20px; padding: 22px; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

.avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }

/* ── AVATAR FRAMES ── */
.frame-gold { border: 2.5px solid #FFD700 !important; box-shadow: 0 0 10px rgba(255,215,0,0.5); }
.frame-fire { border: 2.5px solid #FF4500 !important; box-shadow: 0 0 15px rgba(255,69,0,0.6); animation: pulseFire 2s infinite alternate; }
.frame-diamond { border: 2.5px solid #00FFFF !important; box-shadow: 0 0 15px rgba(0,255,255,0.6); }
.frame-rainbow { border: 2.5px solid transparent !important; background-origin: border-box; background-clip: content-box, border-box; background-image: linear-gradient(#141414, #141414), linear-gradient(90deg, red, orange, yellow, green, blue, purple); animation: spinRainbow 3s linear infinite; }
@keyframes pulseFire { from { box-shadow: 0 0 5px #FF4500; } to { box-shadow: 0 0 20px #FF4500; } }

.vip-badge { position: absolute; bottom: -2px; right: -2px; background: var(--bg); border-radius: 50%; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 13px; border: 1px solid rgba(232,197,71,0.2); z-index: 2; }

/* ── EFFECTS ── */

.effect-chip.gold { background: rgba(255,214,10,0.1); border-color: rgba(255,214,10,0.3); color: var(--gold); }
.effect-chip.green { background: rgba(48,209,88,0.1); border-color: rgba(48,209,88,0.3); color: var(--green); }

/* ── BUTTONS ── */
.btn { display: flex; align-items: center; justify-content: center; gap: 8px; border: none; border-radius: var(--r2); cursor: pointer; font-family: var(--font); font-weight: 600; transition: opacity .15s, transform .15s; padding: 14px 20px; width: 100%; font-size: 15px; }
.btn:active { opacity: 0.75; transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; filter: grayscale(1); }
.btn-primary { background: linear-gradient(135deg, #F3D250 0%, #E8C547 100%); color: #000; box-shadow: 0 4px 15px rgba(232,197,71,0.2); }
.btn-danger { background: var(--red); color: #fff; }
.btn-ghost { background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid var(--border2); }

/* ── UI ELEMENTS ── */
.section { padding: 0 16px; margin-top: 20px; }

.list-item:last-child { border-bottom: none; }
.input { width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r2); color: var(--text); font-family: var(--font); font-size: 15px; padding: 14px 16px; outline: none; transition: 0.2s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
.input:focus { border-color: var(--gold); }

/* ── PREMIUM SHOP ── */
.shop-item { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r); padding: 18px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); transition: transform 0.2s; }
.si-ico { font-size: 36px; line-height: 1; }

.si-price { font-size: 15px; font-weight: 800; color: var(--gold); }

/* ── PLAYER CARD ── */
.player-card { display: flex; align-items: center; gap: 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r); padding: 16px; cursor: pointer; transition: all .15s; }
.player-card:active { opacity: 0.7; transform: scale(0.98); }
.pc-meta { flex: 1; min-width: 0; }
.pc-name { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pc-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }
.pc-price { font-size: 16px; font-weight: 800; color: var(--gold); }

/* ── PREMIUM TOASTS ── */
.toast-container { position: fixed; top: max(20px, env(safe-area-inset-top)); left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 9999; pointer-events: none; }
.toast { background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 14px 24px; font-size: 14px; font-weight: 600; color: #fff; box-shadow: 0 12px 40px rgba(0,0,0,0.6); animation: slideDown 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); display: flex; align-items: center; gap: 8px; }
@keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ── MODALS ── */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: flex; align-items: flex-end; backdrop-filter: blur(8px); }
.modal { background: var(--bg2); border-top-left-radius: 28px; border-top-right-radius: 28px; border-top: 1px solid rgba(232,197,71,0.15); padding: 24px 20px max(24px, env(safe-area-inset-bottom)); width: 100%; max-height: 88vh; overflow-y: auto; animation: slideUp .3s cubic-bezier(.32,0,.15,1); }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:40px; height:4px; border-radius:2px; background:var(--border2); margin:0 auto 20px; }
.modal-title { font-size:22px; font-weight:800; margin-bottom:16px; letter-spacing: -0.5px; }

/* ── UTILS ── */
.row { display:flex; align-items:center; gap:8px; } .row-sb { display:flex; align-items:center; justify-content:space-between; }
.gap6 { display:flex; flex-direction:column; gap:6px; } .gap8 { display:flex; flex-direction:column; gap:8px; } .gap12 { display:flex; flex-direction:column; gap:12px; }
.mt4 { margin-top:4px; } .mt8 { margin-top:8px; } .mt12 { margin-top:12px; } .mt16 { margin-top:16px; } .mb16 { margin-bottom:16px; } .mt20 { margin-top:20px; }
.text-gold { color:var(--gold); } .text-red { color:var(--red); } .text-green { color:var(--green); } .text-muted { color:var(--text3); }
.fw6 { font-weight:600; } .fw7 { font-weight:700; } .fw8 { font-weight:800; }
.f11 { font-size:11px; } .f12 { font-size:12px; } .f13 { font-size:13px; }
.divider { height:1px; background:var(--border); margin:16px 0; }
.text-center { text-align:center; }

/* ── CHAT & REPLY ── */
.chat-area { display: flex; flex-direction: column; padding: 16px; min-height: 100%; gap: 12px; }
.msg-wrap { display: flex; flex-direction: column; cursor: pointer; transition: 0.2s; }
.msg-wrap:active { opacity: 0.7; }
.msg-wrap.me { align-items: flex-end; } .msg-wrap.them { align-items: flex-start; }
.msg-bubble { max-width: 82%; padding: 12px 16px; border-radius: 20px; font-size: 14.5px; line-height: 1.4; position: relative; word-wrap: break-word; }
.msg-bubble.me { background: var(--gold); color: #000; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(232,197,71,0.15); }
.msg-bubble.them { background: var(--bg3); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
.msg-reply-box { font-size: 12px; background: rgba(0,0,0,0.1); padding: 8px 10px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid rgba(255,255,255,0.4); color: inherit; opacity: 0.85; font-weight: 500; }
.msg-img { max-width: 100%; border-radius: 12px; margin-bottom: 8px; border: 1px solid rgba(0,0,0,0.1); }
.msg-time { font-size: 10px; opacity: 0.5; margin-top: 4px; font-weight: 500; padding: 0 4px; }
.msg-sender { font-size: 11px; font-weight: 700; margin-bottom: 4px; color: var(--gold); padding: 0 4px; }
.chat-input-wrap { padding: 12px 16px max(12px, env(safe-area-inset-bottom)); background: rgba(5,5,5,0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.reply-preview-bar { display: flex; justify-content: space-between; align-items: center; background: var(--bg4); padding: 10px 14px; border-radius: 12px; border-left: 3px solid var(--gold); font-size: 13px; font-weight: 500; }
.file-btn { background: none; border: none; color: var(--text3); font-size: 24px; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; }
.chat-input { flex: 1; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; color: var(--text); padding: 12px 16px; outline: none; resize: none; max-height: 100px; font-family: var(--font); font-size: 15px; }

/* ── STORIES CTA ── */
.stories-card { margin: 16px; background: linear-gradient(135deg, #111111, #1a1a1a); border: 1px solid rgba(232,197,71,0.2); border-radius: 22px; padding: 24px; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.stories-card::before { content:''; position:absolute; bottom:-40px; right:-40px; width:150px; height:150px; background: radial-gradient(circle, rgba(232,197,71,0.1) 0%, transparent 70%); border-radius:50%; }
.stories-ico { font-size:36px; margin-bottom:12px; }
.stories-title { font-size:19px; font-weight:800; letter-spacing: -0.3px; }
.stories-sub { font-size:13px; color:var(--text3); margin-top:6px; line-height:1.5; font-weight: 500; }
.stories-timer { font-size:24px; font-weight:800; color:var(--gold); margin-top:8px; }

/* ── ADMIN & COLORS ── */
.clr-ruby { color:#FF453A; } .clr-gold { color:#FFD60A; } .clr-neon { color:#30D158; }
.admin-gradient-name { background: linear-gradient(90deg, #FFD60A, #FF9F0A, #FF6B6B, #BF5AF2, #0A84FF, #30D158, #FFD60A); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: adminShimmer 2.5s linear infinite; font-weight: 800; }
@keyframes adminShimmer { to { background-position: 200% center; } }
.spinner { width:28px; height:28px; border:3px solid var(--bg4); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.admin-stat { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--r); padding: 16px; }

/* ── BAN & SPONSOR BLOCKER ── */
.sponsor-block { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
.sponsor-icon { font-size: 64px; margin-bottom: 20px; }
.sponsor-title { font-size: 28px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
.sponsor-sub { font-size: 15px; color: var(--text2); margin-bottom: 40px; line-height: 1.6; max-width: 300px; }
.ban-reason-box { background: rgba(232,64,64,0.08); border: 1px solid rgba(232,64,64,0.25); border-radius: 14px; padding: 14px 18px; margin-bottom: 32px; font-size: 13px; color: var(--text2); line-height: 1.5; max-width: 280px; }

/* ── PROTECTION BADGE ── */
.protection-badge { font-size: 10px; font-weight: 600; color: var(--blue); background: rgba(10,132,255,0.12); border: 1px solid rgba(10,132,255,0.3); border-radius: 6px; padding: 2px 6px; display: inline-flex; align-items: center; gap: 3px; }

/* ── BACK BTN ── */
.back-btn { display:flex; align-items:center; gap:6px; background:none; border:none; color:var(--text3); font-size:15px; font-weight:600; cursor:pointer; padding:8px; border-radius:12px; background: rgba(255,255,255,0.05); }
.back-btn:active { opacity:0.6; }

.rank-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); }

.rank-meta { flex: 1; min-width: 0; }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const BASE = '';
let _initData = '';
let _botUsername = 'YourBot';

function getHeaders() { return { 'Content-Type':'application/json', 'x-init-data': _initData }; }
async function api(method, path, body) {
  const opts = { method, headers: getHeaders() };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || `Error ${r.status}`);
  return data;
}
const get  = (path)       => api('GET',  path);
const post = (path, body) => api('POST', path, body);

// ── TOAST PROVIDER ──
let toastIdCount = 0;
function ToastContainer({ toasts }) {
  return (
    <div className="toast-container">
      {toasts.map(t => <div key={t.id} className="toast">{t.msg}</div>)}
    </div>
  );
}

function useToast(setToasts) {
  return useCallback((msg) => {
    const id = ++toastIdCount;
    setToasts(prev => [...prev, {id, msg}]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, [setToasts]);
}

// ── IMAGE COMPRESSOR ──
function compressImage(file, callback) {
  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = event => {
    const img = new Image();
    img.src = event.target.result;
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX_WIDTH = 800;
      let width = img.width; let height = img.height;
      if (width > MAX_WIDTH) { height = Math.round(height * (MAX_WIDTH / width)); width = MAX_WIDTH; }
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      callback(canvas.toDataURL('image/jpeg', 0.7));
    }
  }
}

// ── COMPONENTS ──
function Avatar({ user, size=44 }) {
  const [err, setErr] = useState(false);
  const initial = (user?.first_name || user?.username || '?')[0].toUpperCase();
  const cls = size >= 60 ? 'avatar' : 'avatar-sm';
  const frameClass = user?.avatar_frame && user.avatar_frame !== 'none' ? `frame-${user.avatar_frame}` : '';
  const style = size !== 44 && size !== 68 ? { width: size, height: size, fontSize: size * 0.4 } : {};
  return (
    <div className={`${cls} ${frameClass}`} style={style}>
      {user?.photo_url && !err ? <img src={user.photo_url} alt="" onError={()=>setErr(true)} /> : initial}
    </div>
  );
}

function PlayerName({ user, style }) {
  const isAdmin = user.is_admin || user.is_admin_flag;
  const clr = user.name_color && user.name_color !== 'default' ? `clr-${user.name_color}` : '';
  const emoji = isAdmin ? '⚜️ ' : (user.emoji_status ? user.emoji_status + ' ' : '');
  const name = user.custom_name ? `${user.custom_name} (${user.first_name || user.username || `#${user.id}`})` : (user.first_name || user.username || `#${user.id}`);
  if (isAdmin) return <span className="admin-gradient-name" style={style}>{emoji}{name}{user.vip_level >= 3 && ' 👑'}{user.vip_level === 2 && ' 🥈'}{user.vip_level === 1 && ' 🥉'}</span>;
  return <span className={clr} style={style}>{emoji}{name}{user.vip_level >= 3 && ' 👑'}{user.vip_level === 2 && ' 🥈'}{user.vip_level === 1 && ' 🥉'}</span>;
}

function useCountdown(targetIso) {
  const [secs, setSecs] = useState(0);
  useEffect(() => {
    if (!targetIso) { setSecs(0); return; }
    function tick() { const diff = Math.max(0, Math.round((new Date(targetIso) - Date.now()) / 1000)); setSecs(diff); }
    tick(); const id = setInterval(tick, 1000); return () => clearInterval(id);
  }, [targetIso]);
  return secs;
}
function fmtCountdown(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

// ── STORIES NATIVE GENERATOR ──
async function generateAndShareStory(user, showToast, onSetPending) {
  const tg = window.Telegram?.WebApp;
  if (!tg || !tg.shareToStory) { showToast('❌ Ваш Telegram не поддерживает публикацию Stories'); return; }

  const canvas = document.createElement('canvas');
  canvas.width = 1080; canvas.height = 1920;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, 1080, 1920);
  const grad = ctx.createRadialGradient(540, 500, 100, 540, 500, 600);
  grad.addColorStop(0, 'rgba(232,197,71,0.15)'); grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 1080, 1920);

  ctx.textAlign = 'center';
  ctx.fillStyle = '#E8C547'; ctx.font = '800 45px Inter'; ctx.fillText('⛓ РАБСТВО · СЕЗОН 1', 540, 300);

  ctx.beginPath(); ctx.arc(540, 600, 160, 0, Math.PI * 2);
  ctx.lineWidth = 12; ctx.strokeStyle = '#E8C547'; ctx.stroke();
  ctx.fillStyle = '#1e1e1e'; ctx.fill();
  ctx.fillStyle = '#E8C547'; ctx.font = '800 130px Inter';
  ctx.fillText((user.first_name || user.username || '?')[0].toUpperCase(), 540, 645);

  ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 75px Inter'; ctx.fillText(user.first_name || user.username || 'Игрок', 540, 950);
  ctx.fillStyle = 'rgba(232,197,71,0.7)'; ctx.font = '600 35px Inter'; ctx.letterSpacing = '4px'; ctx.fillText('МОЯ СТОИМОСТЬ', 540, 1100);
  ctx.fillStyle = '#E8C547'; ctx.font = '800 130px Inter'; ctx.letterSpacing = '0px'; ctx.fillText(`${user.price.toFixed(0)} RC`, 540, 1220);

  ctx.fillStyle = '#E8C547'; ctx.roundRect(240, 1420, 600, 100, 28); ctx.fill();
  ctx.fillStyle = '#000000'; ctx.font = '800 38px Inter'; ctx.fillText('🔗 ИГРАТЬ ПО ССЫЛКЕ', 540, 1485);

  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '600 48px Inter'; ctx.fillText('Проверь, у кого ты в рабстве!', 540, 1720);

  try {
    showToast('⏳ Подготовка Story...');
    const b64 = canvas.toDataURL('image/png');
    const r = await post('/api/stories/upload', { b64_data: b64 });
    const refLink = `https://t.me/${_botUsername}?start=ref_${user.id}`;
    
    tg.shareToStory(r.url, {
      text: `💰 Моя цена в РАБСТВО: ${user.price.toFixed(0)} RC!\nПроверь у кого ты в рабстве 👇\n\n${refLink}`,
      widget_link: { url: refLink, name: "Играть" }
    });
    
    setTimeout(() => onSetPending(true), 2500);
  } catch(e) { showToast('❌ Ошибка генерации: ' + e.message); }
}

            </div>
          ))}
          <div ref={bottomRef}/>
        </div>
      </div>
      <div className="chat-input-wrap">

        {fileB64 && <div className="reply-preview-bar"><div>🖼 Изображение прикреплено</div><button className="file-btn" onClick={()=>setFileB64(null)}>✕</button></div>}
        <div className="row">
          <label className="file-btn">📎<input type="file" style={{display:'none'}} accept="image/*" onChange={handleFile}/></label>
          <textarea className="chat-input" placeholder="Сообщение..." value={text} onChange={e => setText(e.target.value)} rows={1} onKeyDown={e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }}/>

  const [cIdent, setCIdent] = useState(''); const [cField, setCField] = useState('name_color'); const [cVal, setCVal] = useState('');
  const [spId, setSpId] = useState(''); const [spTitle, setSpTitle] = useState(''); const [spUrl, setSpUrl] = useState(''); const [spRc, setSpRc] = useState('250');
  const [newAdminId, setNewAdminId] = useState(''); const [broadcast, setBroadcast] = useState(''); const [seasonPass, setSeasonPass] = useState('');
  const [promoCode, setPromoCode] = useState(''); const [promoRc, setPromoRc] = useState(''); const [promoMax, setPromoMax] = useState('1');

  const showToast = useToast(setToasts);

  async function init() {
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    let initData = tg?.initData || '';
    let refId    = null;
    let photoUrl = tg?.initDataUnsafe?.user?.photo_url || null;

    const sp = tg?.initDataUnsafe?.start_param;
    if (sp && sp.startsWith('ref_')) { try { refId = parseInt(sp.split('_')[1]); } catch {} }

    if (!initData) {
      initData = 'dev:' + (Math.floor(Math.random()*100000) + 100000);
      console.warn('[DEV] fake initData:', initData);
    }
    _initData = initData;

    try {
      const cfg = await get('/api/config');
      _botUsername = cfg.bot_username || _botUsername;
      const data = await post('/api/init', { init_data: initData, ref_id: refId, photo_url: photoUrl });
      setUser(data);
      if (data.bot_username) _botUsername = data.bot_username;
      
      const spData = await get('/api/sponsors/status');
      setSponsorsData(spData);
    } catch(e) { setError(e.message); }
  }

  async function refreshUser() {
    try { setUser(await get('/api/profile')); setSponsorsData(await get('/api/sponsors/status')); } catch {}
  }

  useEffect(() => { init(); }, []);

  if (error) return <div className="loading-screen"><div style={{fontSize:40}}>❌</div><div style={{color:'var(--red)',fontWeight:700}}>{error}</div><button className="btn btn-ghost" style={{width:140}} onClick={() => {setError(null);init();}}>Повтор</button></div>;
  if (!user || !sponsorsData) return <div className="loading-screen"><div className="loading-logo">⛓</div><div className="spinner"/><div className="text-muted f13">Загружаем...</div></div>;

  if (user.is_banned) {
    if (banSupportMode) return <div className="app"><SupportScreen user={user} showToast={showToast}/><div className="tabs-wrap" style={{padding:8}}><button className="btn btn-ghost" onClick={()=>setBanSupportMode(false)}>Вернуться</button></div></div>;
    return <div className="ban-screen"><div className="ban-icon">🚫</div><div className="ban-title">Доступ ограничен</div><div className="ban-sub">Ваш аккаунт заблокирован администрацией.</div><button className="ban-support-btn" onClick={() => setBanSupportMode(true)}>💬 Написать в поддержку</button></div>;
  }

  // ── SPONSOR BLOCKER (MAIN SPONSOR) ──
  if (sponsorsData.main_sponsor && !sponsorsData.main_subscribed) {
    return (
      <div className="sponsor-block">
        <div className="sponsor-icon">📢</div>
        <div className="sponsor-title">Доступ ограничен</div>
        <div className="sponsor-sub">Для участия в игре необходимо подписаться на канал нашего главного спонсора.</div>
        <button className="btn btn-primary" style={{marginBottom:12, width:'100%', maxWidth:'300px'}} onClick={() => window.Telegram.WebApp.openTelegramLink(sponsorsData.main_sponsor.channel_url)}>
          Подписаться
        </button>
        <button className="btn btn-ghost" style={{width:'100%', maxWidth:'300px'}} onClick={() => init()}>Проверить подписку</button>
      </div>
    );
  }

  if (viewingUid && viewingUid !== user.id) {
    return <div className="app"><UserProfileScreen uid={viewingUid} currentUserId={user.id} onBack={() => setViewingUid(null)} onBuy={refreshUser} showToast={showToast}/></div>;
  }

  const handleNav = (t) => { setTab(t); setMenuOpen(false); if(t==='admin') { setAdminTab('dash'); loadAdminTab('dash'); } }
  
  async function loadAdminTab(t) {
    if(t==='dash') { get('/api/admin/dashboard').then(setDash).catch(()=>{}); }
    if(t==='users') { get('/api/admin/users').then(setUsers).catch(()=>{}); }
    if(t==='tickets') { get('/api/admin/tickets').then(setTickets).catch(()=>{}); }
    if(t==='stories') { get('/api/admin/stories').then(setStories).catch(()=>{}); }
    if(t==='sponsors') { get('/api/admin/sponsors').then(setSponsors).catch(()=>{}); }
    if(t==='admins') { get('/api/admin/admins_list').then(setAdminsData).catch(()=>{}); }
  }

  const adminTitles = { 'dash':'📊 Дашборд', 'users':'👥 Юзеры', 'tickets':'💬 Тикеты', 'stories':'📸 Заявки Stories', 'sponsors':'📢 Спонсоры', 'system':'⚙️ Система', 'admins':'👑 Супер Админ' };

  return (
    <div className="app">
      <ToastContainer toasts={toasts}/>

      <div className="hdr">
        <div><div className="hdr-title">⛓ РАБСТВО</div><div className="hdr-sub">Социальная стратегия</div></div>
        <button className="burger-btn" onClick={()=>setMenuOpen(true)}>☰</button>
      </div>

      {menuOpen && (
        <div className="sidebar-overlay" onClick={()=>setMenuOpen(false)}>
          <div className="sidebar" onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
              <div className="fw8" style={{fontSize:22}}>Меню</div>
              <button className="file-btn" onClick={()=>setMenuOpen(false)}>✕</button>
            </div>
            <button className={`menu-btn ${tab==='profile'?'active':''}`} onClick={()=>handleNav('profile')}><span className="menu-ico">👤</span> Мой профиль</button>
            <button className={`menu-btn ${tab==='search'?'active':''}`} onClick={()=>handleNav('search')}><span className="menu-ico">🔍</span> Поиск рабов</button>
            <button className={`menu-btn ${tab==='top'?'active':''}`} onClick={()=>handleNav('top')}><span className="menu-ico">🏆</span> Рейтинги</button>
            <button className={`menu-btn ${tab==='shop'?'active':''}`} onClick={()=>handleNav('shop')}><span className="menu-ico">🛒</span> Магазин</button>
            <button className={`menu-btn ${tab==='support'?'active':''}`} onClick={()=>handleNav('support')}><span className="menu-ico">💬</span> Поддержка</button>
            {user.is_admin && <div className="divider" style={{margin:'8px 0'}}/>}
            {user.is_admin && <button className={`menu-btn ${tab==='admin'?'active':''}`} onClick={()=>handleNav('admin')}><span className="menu-ico">⚙️</span> Панель Админа</button>}
          </div>
        </div>
      )}

      {/* ── ROUTING ── */}
      {tab==='profile' && <ProfileScreen user={user} sponsors={sponsorsData.tasks} onRefresh={refreshUser} onViewProfile={(uid)=>setViewingUid(uid)} showToast={showToast}/>}
      {tab==='search'  && <SearchScreen user={user} onBuy={refreshUser} onViewProfile={(uid)=>setViewingUid(uid)} showToast={showToast}/>}
      {tab==='top'     && <TopScreen onViewProfile={(uid)=>setViewingUid(uid)}/>}
      {tab==='shop'    && <ShopScreen user={user} onRefresh={refreshUser} showToast={showToast}/>}
      {tab==='support' && <SupportScreen user={user} showToast={showToast}/>}
      
      {/* ── ADMIN ROUTING ── */}
      {tab==='admin' && user.is_admin && !openConv && (
        <div className="content">
          <div className="tabs-wrap" style={{marginBottom:16}}>
            <select className="input" style={{border:'none', borderRadius:16, fontWeight:700, fontSize:15, padding:'16px', background:'var(--bg3)', boxShadow:'0 4px 15px rgba(0,0,0,0.3)'}} value={adminTab} onChange={e=>{setAdminTab(e.target.value); loadAdminTab(e.target.value);}}>
              {Object.entries(adminTitles).map(([k,v]) => { if(k==='admins' && !user.is_super_admin) return null; return <option key={k} value={k}>{v}</option>; })}
            </select>
          </div>
          
          <div style={{padding:'0 16px'}}>
            {adminTab==='dash' && dash && (
              <div className="gap8">
                <div className="stat-grid">{[['👥','Всего игроков', dash.total_users],['🆕','Новых сегодня', dash.new_today],['💰','RC в игре', parseFloat(dash.total_rc||0).toFixed(0)],['💬','Новых тикетов', dash.tickets],['📸','Сторис ждут', dash.stories_pending]].map(([ico,lbl,val]) => <div className="card text-center" key={lbl}><div style={{fontSize:28, marginBottom:8}}>{ico}</div><div className="fw8" style={{fontSize:24}}>{val}</div><div className="f12 text-muted mt4">{lbl}</div></div>)}</div>
                <button className="btn btn-ghost mt12" onClick={()=>loadAdminTab('dash')}>🔄 Обновить данные</button>
              </div>
            )}

            {adminTab==='users' && (
              <div className="gap12">
                <div className="card gap12" style={{borderColor:'var(--gold)'}}>
                  <div className="fw8 text-gold" style={{fontSize:16}}>🎨 Выдать косметику</div>
                  <input className="input" placeholder="ID / @username" value={cIdent} onChange={e=>setCIdent(e.target.value)}/>
                  <select className="input" value={cField} onChange={e=>{setCField(e.target.value); setCVal('');}}><option value="name_color">Цвет ника</option><option value="avatar_frame">Рамка аватара</option><option value="emoji_status">Эмодзи</option></select>
                  {cField==='name_color' && <div className="row" style={{flexWrap:'wrap'}}>{[['default','Стандарт'],['ruby','Рубин'],['gold','Золото'],['neon','Неон'],['blue','Синий'],['purple','Фиолет']].map(([v,l])=><button key={v} className="btn btn-ghost btn-sm" style={{borderColor:cVal===v?'var(--gold)':''}} onClick={()=>setCVal(v)}>{l}</button>)}</div>}
                  {cField==='avatar_frame' && <div className="row" style={{flexWrap:'wrap'}}>{[['none','Нет'],['gold','Золотая'],['fire','Огонь 🔥'],['diamond','Алмаз 💎'],['rainbow','Радуга 🌈']].map(([v,l])=><button key={v} className="btn btn-ghost btn-sm" style={{borderColor:cVal===v?'var(--gold)':''}} onClick={()=>setCVal(v)}>{l}</button>)}</div>}
                  {cField==='emoji_status' && <div className="row" style={{flexWrap:'wrap'}}>{['','💎','👑','🔥','⚡','🌟','💀','🏆'].map((e,i)=><button key={i} className="btn btn-ghost btn-sm" style={{borderColor:cVal===e?'var(--gold)':''}} onClick={()=>setCVal(e)}>{e||'✕'}</button>)}</div>}
                  <button className="btn btn-primary mt8" onClick={async ()=>{ try{ await post('/api/admin/users/cosmetic',{identifier:cIdent, field:cField, value:cVal}); showToast('✅ Выдано'); setCIdent(''); }catch(e){showToast('❌ '+e.message);} }}>🎁 Выдать</button>
                </div>
                <div className="row mt8"><input className="input" placeholder="Поиск юзера..." value={searchQ} onChange={e=>setSearchQ(e.target.value)} onKeyDown={e=>e.key==='Enter' && get('/api/admin/users?q='+searchQ).then(setUsers)}/><button className="btn btn-primary btn-sm" style={{height:48, width:48}} onClick={()=>get('/api/admin/users?q='+searchQ).then(setUsers)}>🔍</button></div>
                <div className="gap8">{users.map(u => <div className="card row-sb" key={u.id}><div><div className="fw7">{u.first_name}</div><div className="f12 text-muted">ID: {u.id}</div></div><button className={`btn btn-sm ${u.is_banned?'btn-green':'btn-danger'}`} onClick={async ()=>{ try{ await post('/api/admin/users/edit',{user_id:u.id, is_banned:!u.is_banned}); loadAdminTab('users'); }catch(e){showToast('❌ '+e.message);} }}>{u.is_banned?'Разбан':'Бан'}</button></div>)}</div>
              </div>
            )}

            {adminTab==='tickets' && (
              <div className="gap8">
                {tickets.length===0 && <div className="text-center text-muted p20">Нет тикетов</div>}
                {tickets.map(t => (
                  <div className="card row-sb" key={t.user_id} onClick={()=>setOpenConv(t)} style={{cursor:'pointer'}}>
                    <div><div className="fw7">{t.first_name} {t.unread > 0 && <span className="text-red">({t.unread})</span>}</div><div className="f12 text-muted mt4">{t.last_msg?.substring(0,30)||'Фото...'}</div></div>
                    <div className="fw7 text-muted" style={{fontSize:20}}>›</div>
                  </div>
                ))}
              </div>
            )}

            {adminTab==='stories' && (
              <div className="gap8">
                {stories.length===0 && <div className="text-center text-muted p20">Нет заявок</div>}
                {stories.map(s => (
                  <div className="card row-sb" key={s.id}>
                    <div><div className="fw7">@{s.username||s.first_name||s.user_id}</div><div className="f12 text-muted mt4">{new Date(s.created_at).toLocaleString('ru')}</div></div>
                    <button className="btn btn-green btn-sm" onClick={async ()=>{ try{ await post(`/api/admin/stories/approve?claim_id=${s.id}`,''); showToast('✅ Одобрено'); loadAdminTab('stories'); }catch(e){showToast('❌ '+e.message);} }}>✅ Одобрить</button>
                  </div>
                ))}
              </div>
            )}

            {adminTab==='sponsors' && (
              <div className="gap16">
                <div className="card gap8">
                  <div className="fw8" style={{fontSize:16}}>Добавить Спонсора</div>
                  <div className="f12 text-muted mb8">Бот должен быть админом в канале!</div>
                  <input className="input" placeholder="ID Канала (-100123...)" value={spId} onChange={e=>setSpId(e.target.value)}/>
                  <input className="input" placeholder="Название (Для кнопки)" value={spTitle} onChange={e=>setSpTitle(e.target.value)}/>
                  <input className="input" placeholder="Ссылка (https://t.me/...)" value={spUrl} onChange={e=>setSpUrl(e.target.value)}/>
                  <input className="input" type="number" placeholder="Награда RC" value={spRc} onChange={e=>setSpRc(e.target.value)}/>
                  <div className="row mt12"><button className="btn btn-ghost" style={{flex:1}} onClick={async ()=>{ try{ await post('/api/admin/sponsors/add',{channel_id:spId,channel_title:spTitle,channel_url:spUrl,reward_rc:parseFloat(spRc),is_main:false}); showToast('✅ Добавлен'); loadAdminTab('sponsors'); }catch(e){showToast('❌ '+e.message);} }}>Обычный</button><button className="btn btn-primary" style={{flex:1}} onClick={async ()=>{ try{ await post('/api/admin/sponsors/add',{channel_id:spId,channel_title:spTitle,channel_url:spUrl,reward_rc:parseFloat(spRc),is_main:true}); showToast('✅ Добавлен'); loadAdminTab('sponsors'); }catch(e){showToast('❌ '+e.message);} }}>Главный (Обяз.)</button></div>
                </div>
                {sponsors.map(s => (
                  <div className="card row-sb" key={s.id}>
                    <div><div className="fw7">{s.is_main && '👑 '} {s.channel_title}</div><div className="f12 text-muted mt4">{s.channel_id} • {s.reward_rc} RC</div></div>
                    <button className="btn btn-danger btn-sm" onClick={async ()=>{ try{ await post('/api/admin/sponsors/delete',{sponsor_id:s.id}); showToast('✅ Удален'); loadAdminTab('sponsors'); }catch(e){showToast('❌ '+e.message);} }}>🗑</button>
                  </div>
                ))}
              </div>
            )}

            {adminTab==='admins' && adminsData && (
              <div className="gap16">
                <div className="card gap8">
                  <div className="fw8" style={{fontSize:16}}>Добавить Админа</div>
                  <input className="input" placeholder="Telegram ID пользователя" value={newAdminId} onChange={e=>setNewAdminId(e.target.value)}/>
                  <button className="btn btn-primary mt8" onClick={async ()=>{ try{ await post('/api/admin/admins_list/add',{user_id:parseInt(newAdminId)}); showToast('✅ Назначен'); loadAdminTab('admins'); }catch(e){showToast('❌ '+e.message);} }}>Назначить</button>
                </div>
                <div className="gap8">
                  {adminsData.db_admins.map(a => (
                    <div className="card row-sb" key={a.user_id}>
                      <div><div className="fw7">{a.first_name||a.username||a.user_id}</div><div className="f12 text-muted mt4">ID: {a.user_id}</div></div>
                      <button className="btn btn-danger btn-sm" onClick={async ()=>{ try{ await post('/api/admin/admins_list/remove',{user_id:a.user_id}); showToast('✅ Снят'); loadAdminTab('admins'); }catch(e){showToast('❌ '+e.message);} }}>Снять</button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {adminTab==='system' && (
              <div className="gap16">
                <div className="card gap8"><div className="fw8" style={{fontSize:16}}>📢 Рассылка всем</div><textarea className="input" rows={3} placeholder="Текст (HTML)..." value={broadcast} onChange={e=>setBroadcast(e.target.value)}/><button className="btn btn-primary mt8" onClick={async ()=>{ try{ const r = await post('/api/admin/broadcast',{text:broadcast}); showToast(`📤 Разослано ${r.count} чел`); setBroadcast(''); }catch(e){showToast('❌ '+e.message);} }}>Разослать</button></div>
                <div className="card gap8"><div className="fw8" style={{fontSize:16}}>🎫 Создать промокод</div><input className="input" placeholder="КОД" value={promoCode} onChange={e=>setPromoCode(e.target.value.toUpperCase())}/><input className="input" type="number" placeholder="Награда RC" value={promoRc} onChange={e=>setPromoRc(e.target.value)}/><input className="input" type="number" placeholder="Кол-во использований" value={promoMax} onChange={e=>setPromoMax(e.target.value)}/><button className="btn btn-primary mt8" onClick={async ()=>{ if(!promoCode||!promoRc)return; try{ await post('/api/admin/promo/create',{code:promoCode,reward_rc:parseFloat(promoRc),max_uses:parseInt(promoMax)}); showToast('✅ Создан'); setPromoCode(''); setPromoRc(''); }catch(e){showToast('❌ '+e.message);} }}>Создать код</button></div>
                <div className="card gap8"><div className="fw8 text-red" style={{fontSize:16}}>💀 Новый сезон</div><div className="f13 text-muted">Сброс балансов, рабов, цен. VIP и косметика остаются.</div><input className="input" type="password" placeholder="Пароль" value={seasonPass} onChange={e=>setSeasonPass(e.target.value)}/><button className="btn btn-danger mt8" onClick={async ()=>{ if(!confirm('Точно начать новый сезон?'))return; try{ await post('/api/admin/season/start',{password:seasonPass}); showToast('🔥 Сезон начат'); setSeasonPass(''); }catch(e){showToast('❌ '+e.message);} }}>Начать сезон</button></div>
                <div className="card gap8"><div className="fw8 text-red" style={{fontSize:16}}>💀 Полный Wipe</div><div className="f13 text-muted">Полное удаление базы данных.</div><button className="btn btn-danger mt8" onClick={async ()=>{ if(!confirm('УДАЛИТЬ ВСЮ БАЗУ ДАННЫХ? Безвозвратно.'))return; try{ await post('/api/admin/db/clear'); showToast('💀 Очищено'); }catch(e){showToast('❌ '+e.message);} }}>Очистить базу</button></div>
              </div>
            )}
          </div>
        </div>
      )}

      {tab==='admin' && openConv && <AdminChatScreen conv={openConv} onBack={()=>{setOpenConv(null); get('/api/admin/tickets').then(setTickets).catch(()=>{}); }} showToast={showToast}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
