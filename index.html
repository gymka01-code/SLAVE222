@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root { --bg:#000000; --bg1:#050505; --bg2:#0a0a0a; --bg3:#111111; --bg4:#1a1a1a; --surface:#141414; --surface2:#1e1e1e; --surface3:#252525; --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12); --gold:#E8C547; --gold-dim:rgba(232,197,71,0.15); --red:#ef4444; --red-dim:rgba(239,68,68,0.15); --green:#22c55e; --green-dim:rgba(34,197,94,0.15); --blue:#3b82f6; --blue-dim:rgba(59,130,246,0.15); --text:#f1f5f9; --text-2:#94a3b8; --text-3:#475569; --r:16px; --r2:10px; --font:'Inter', sans-serif; }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const BASE = ''; let _initData = ''; let _botUsername = 'YourBot';
function getHeaders() { return { 'Content-Type':'application/json', 'x-init-data': _initData }; }
async function api(method, path, body) {
  const opts = { method, headers: getHeaders() };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || `Error ${r.status}`);
  return data;
}
const get = (path) => api('GET', path); const post = (path, body) => api('POST', path, body);

let toastIdCount = 0;
function ToastContainer({ toasts }) { return <div className="toast-container">{toasts.map(t => <div key={t.id} className="toast">{t.msg}</div>)}</div>; }
function useToast(setToasts) { return useCallback((msg) => { const id = ++toastIdCount; setToasts(p => [...p, {id, msg}]); setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3000); }, [setToasts]); }

function compressImage(file, callback) {
  const reader = new FileReader(); reader.readAsDataURL(file);
  reader.onload = event => {
    const img = new Image(); img.src = event.target.result;
    img.onload = () => {
      const canvas = document.createElement('canvas'); const MAX_WIDTH = 800;
      let width = img.width; let height = img.height;
      if (width > MAX_WIDTH) { height = Math.round(height * (MAX_WIDTH / width)); width = MAX_WIDTH; }
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
      callback(canvas.toDataURL('image/jpeg', 0.7));
    }
  }
}

function Avatar({ user, size=44 }) {
  const [err, setErr] = useState(false);
  const initial = (user?.first_name || user?.name || user?.username || '?')[0].toUpperCase();
  const cls = size >= 60 ? 'avatar' : 'avatar-sm';
  const frameClass = user?.avatar_frame && user.avatar_frame !== 'none' ? `frame-${user.avatar_frame}` : '';
  const style = size !== 44 && size !== 68 ? { width: size, height: size, fontSize: size * 0.4 } : {};
  return <div className={`${cls} ${frameClass}`} style={style}>{user?.photo_url && !err ? <img src={user.photo_url} alt="" onError={()=>setErr(true)} /> : initial}</div>;
}

function PlayerName({ user, style }) {

  const name = user.custom_name ? `${user.custom_name} (${user.first_name || user.username || `#${user.uid||user.id}`})` : (user.first_name || user.username || `#${user.uid||user.id}`);
  if (isAdmin) return <span className="admin-gradient-name" style={style}>{emoji}{name}{user.vip_level >= 3 && ' 👑'}{user.vip_level === 2 && ' 🥈'}{user.vip_level === 1 && ' 🥉'}</span>;
  return <span className={clr} style={style}>{emoji}{name}{user.vip_level >= 3 && ' 👑'}{user.vip_level === 2 && ' 🥈'}{user.vip_level === 1 && ' 🥉'}</span>;
}

function useCountdown(targetIso) {
  const [secs, setSecs] = useState(0);
  useEffect(() => {
    if (!targetIso) { setSecs(0); return; }
    function tick() { const diff = Math.max(0, Math.round((new Date(targetIso) - Date.now()) / 1000)); setSecs(diff); }
    tick(); const id = setInterval(tick, 1000); return () => clearInterval(id);
  }, [targetIso]);
  return secs;
}
function fmtCountdown(s) { const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`; }

async function generateAndShareStory(user, showToast, onSetPending) {
  const tg = window.Telegram?.WebApp;
  if (!tg || !tg.shareToStory) { showToast('❌ Ваш Telegram не поддерживает публикацию Stories'); return; }
  const canvas = document.createElement('canvas'); canvas.width = 1080; canvas.height = 1920; const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, 1080, 1920);
  const grad = ctx.createRadialGradient(540, 500, 100, 540, 500, 600); grad.addColorStop(0, 'rgba(232,197,71,0.15)'); grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 1080, 1920);
  ctx.textAlign = 'center'; ctx.fillStyle = '#E8C547'; ctx.font = '800 45px Inter'; ctx.fillText('⛓ РАБСТВО · СЕЗОН 1', 540, 300);
  
  ctx.fillStyle = '#E8C547'; ctx.font = '800 150px Inter'; ctx.fillText('⛓️', 540, 645);
  ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 75px Inter'; ctx.fillText(user.first_name || user.username || 'Игрок', 540, 950);
  ctx.fillStyle = 'rgba(232,197,71,0.7)'; ctx.font = '600 35px Inter'; ctx.letterSpacing = '4px'; ctx.fillText('МОЯ СТОИМОСТЬ', 540, 1100);
  ctx.fillStyle = '#E8C547'; ctx.font = '800 130px Inter'; ctx.letterSpacing = '0px'; ctx.fillText(`${user.price.toFixed(0)} RC`, 540, 1220);
  ctx.fillStyle = '#E8C547'; ctx.roundRect(240, 1420, 600, 100, 28); ctx.fill(); ctx.fillStyle = '#000000'; ctx.font = '800 38px Inter'; ctx.fillText('🔗 ИГРАТЬ ПО ССЫЛКЕ', 540, 1485);
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '600 48px Inter'; ctx.fillText('Проверь, у кого ты в рабстве!', 540, 1720);
  try {
    showToast('⏳ Подготовка Story...'); const b64 = canvas.toDataURL('image/png'); const r = await post('/api/stories/upload', { b64_data: b64 });
    const refLink = `https://t.me/${_botUsername}?start=ref_${user.uid}`;
    tg.shareToStory(r.url, { text: `💰 Моя цена в РАБСТВО: ${user.price.toFixed(0)} RC!\nПроверь у кого ты в рабстве 👇\n\n${refLink}`, widget_link: { url: refLink, name: "Играть" } });
    setTimeout(() => onSetPending(true), 2500);
  } catch(e) { showToast('❌ Ошибка генерации: ' + e.message); }
}

function SettingsScreen({ user, onRefresh, showToast, onBack }) {
  const [prefs, setPrefs] = useState(user.notify_prefs || {all:true, trade:true, jobs:true, messages:true, support:true});
  const [saving, setSaving] = useState(false);
  async function toggle(key) {
    const newPrefs = { ...prefs, [key]: !prefs[key] };
    setPrefs(newPrefs); setSaving(true);
    try { await post('/api/settings/notifications', { prefs: newPrefs }); onRefresh(); } 
    catch(e) { showToast('❌ Ошибка: ' + e.message); setPrefs(prefs); }
    setSaving(false);
  }
  async function toggleGodMode() {
    setSaving(true);
    try { await post('/api/admin/god_mode', { hidden: !user.admin_god_mode }); showToast('✅ Режим сохранен'); onRefresh(); } 
    catch(e) { showToast('❌ Ошибка: ' + e.message); }
    setSaving(false);
  }

  return (
    <div className="screen">
      <div className="hdr"><button className="back-btn" onClick={onBack}>‹ Назад</button><div className="hdr-title">Настройки</div><div style={{width:60}}></div></div>
      <div className="content">
        <div className="card mx16 mt16 gap12" style={{margin: '16px 16px 0'}}>
          <div className="row-sb pb12" style={{borderBottom: '1px solid var(--border)'}}>

            <div className={`toggle-switch ${prefs.all ? 'on' : ''}`} onClick={() => !saving && toggle('all')}/>
          </div>

            <div className="row-sb"><div><div className="fw6 f13">💰 Покупки и ограбления</div></div><div className={`toggle-switch ${prefs.trade ? 'on' : ''}`} onClick={() => !saving && toggle('trade')}/></div>
            <div className="row-sb"><div><div className="fw6 f13">💼 Работа и доход</div></div><div className={`toggle-switch ${prefs.jobs ? 'on' : ''}`} onClick={() => !saving && toggle('jobs')}/></div>
            <div className="row-sb"><div><div className="fw6 f13">✉️ Личные сообщения</div></div><div className={`toggle-switch ${prefs.messages ? 'on' : ''}`} onClick={() => !saving && toggle('messages')}/></div>
            <div className="row-sb"><div><div className="fw6 f13">💬 Ответы поддержки</div></div><div className={`toggle-switch ${prefs.support ? 'on' : ''}`} onClick={() => !saving && toggle('support')}/></div>
          </div>
        </div>
        {user.is_admin && (

              <div className={`toggle-switch ${user.admin_god_mode ? 'on' : ''}`} onClick={() => !saving && toggleGodMode()}/>
            </div>
          </div>
        )}
        <div className="section mt20 text-center">
          <div className="f13 text-muted mb4">Ваш игровой UID:</div>
          <div className="fw8 text-gold" style={{fontSize: 24}}>{user.uid}</div>
          {user.is_admin && <div className="f11 text-red mt8">Telegram ID: {user.id}</div>}
        </div>
      </div>
    </div>
  );
}

function RobberyGameModal({ targetId, onClose, onFinish }) {
  const [timeLeft, setTimeLeft] = useState(10); 
  const [score, setScore] = useState(0); 
  const [items, setItems] = useState([]);
  
  useEffect(() => {
    const tId = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
    const iId = setInterval(() => {
      const isBomb = Math.random() < 0.25;
      const newItem = { id: Date.now() + Math.random(), type: isBomb ? 'bomb' : 'coin', x: Math.floor(Math.random() * 80) + 10, dur: isBomb ? 1.5 : (Math.random() * 1 + 1.5) };
      setItems(p => [...p, newItem]); 
      setTimeout(() => setItems(p => p.filter(i => i.id !== newItem.id)), newItem.dur * 1000);
    }, 400);
    return () => { clearInterval(tId); clearInterval(iId); };
  }, []);
  
  useEffect(() => { 
      if (timeLeft === 0) { 
          onFinish("success", score); 
          setTimeLeft(-1); // Опускаем таймер ниже нуля, чтобы хук не сработал дважды
      } 
  }, [timeLeft, score, onFinish]);
  
  const tap = (e, item) => { 
    e.stopPropagation(); 
    setItems(p => p.filter(i => i.id !== item.id)); 
    if (item.type === 'bomb') {
      onFinish("caught", 0); 
    } else {
      setScore(p => Math.min(5, p + 0.5)); 
    }
  };
  
  return (
    <div className="overlay">
      <div className="modal" style={{textAlign:'center'}}>
        <div className="modal-title">🥷 Ограбление!</div>
        <div className="f13 text-muted mb8">Каждый мешок = 0.5% казны (макс 5%). Не трогай полицию!</div>
        <div className="row-sb mb8">
          <div className="fw8 text-gold">Собрано: {score.toFixed(1)}%</div>
          <div className="fw8 text-red">⏳ {timeLeft}с</div>
        </div>
        <div className="robbery-area">
          {items.map(item => (
            <div key={item.id} className="robbery-item" style={{left: `${item.x}%`, animationDuration: `${item.dur}s`}} onPointerDown={(e) => tap(e, item)}>
              {item.type === 'coin' ? '💰' : '👮'}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function RiotModal({ onClose, onSuppress }) {
  const [clicks, setClicks] = useState(0); const target = 150;
  const handleTap = () => { if (clicks + 1 >= target) onSuppress(); else setClicks(c => c + 1); };

function TaxBanner({ user, onRefresh, showToast }) {
   const count = user.slaves_count;
   if (count <= 3) return null;
   let tax = count <= 10 ? (count - 3) * 100 : 700 + (count - 10) * 200;
   if (user.last_tax_date === user.current_date_str) return null; 
   
   const payTax = async () => {
       try { const r = await post('/api/tax/pay'); showToast(r.msg); onRefresh(); }
       catch(e) { showToast('❌ ' + e.message); }
   };
   
   return (
     <div className="card row-sb" style={{borderColor: 'var(--red)', background: 'rgba(239,68,68,0.1)', margin: '16px 16px 0'}}>
        <div>
           <div className="fw8 text-red">⚠️ Налог на рабов</div>
           <div className="f12 mt4">К оплате: {tax} RC до 00:00 МСК</div>
        </div>
        <button className="btn btn-danger btn-sm" onClick={payTax}>Оплатить</button>
     </div>
   )
}

function EscapeGameComp({ user, onRefresh, showToast }) {
  const [state, setState] = useState({ status: 'waiting', mult: 1.00, timeLeft: 10, history: [], bets: {}, startTime: 0 });
  const [betAmount, setBetAmount] = useState(''); 
  const [autoCashout, setAutoCashout] = useState(''); 
  const wsRef = useRef(null); const reqRef = useRef(null); const multRef = useRef(1.00);

  const animate = useCallback(() => {
    if (state.status === 'running' && state.startTime > 0) {
      const elapsed = (Date.now() - state.startTime) / 1000;
      if (elapsed > 0) {
        const currentMult = Math.max(1.0, Math.exp(0.08 * elapsed));
        multRef.current = currentMult;
        const multEl = document.getElementById('esc-mult'); if (multEl) multEl.innerText = `x${currentMult.toFixed(2)}`;
        const runnerEl = document.getElementById('esc-runner');
        if (runnerEl) { const x = Math.min(90, (currentMult - 1) * 15); const y = Math.min(80, Math.pow(currentMult - 1, 1.2) * 5); runnerEl.style.left = `${x}%`; runnerEl.style.bottom = `${20 + y}%`; }
        const pathEl = document.getElementById('esc-path'); const areaEl = document.getElementById('esc-area');
        if (pathEl && areaEl) { const w = areaEl.clientWidth; const h = areaEl.clientHeight; const px = Math.min(w * 0.9, (currentMult - 1) * 0.15 * w); const py = h - 20 - Math.min(h * 0.8, Math.pow(currentMult - 1, 1.2) * 0.05 * h); pathEl.setAttribute('d', `M 0 ${h-20} Q ${px*0.5} ${h-20} ${px} ${py}`); }
      }
    }
    reqRef.current = requestAnimationFrame(animate);
  }, [state.status, state.startTime]);

  useEffect(() => { reqRef.current = requestAnimationFrame(animate); return () => cancelAnimationFrame(reqRef.current); }, [animate]);

  useEffect(() => {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${window.location.host}/api/escape/ws`);
    ws.onmessage = (e) => {
      try {
        const d = JSON.parse(e.data);
        if (d.type === 'state') {
          setState(p => ({...p, status: d.status, timeLeft: d.time_left, history: d.history, bets: d.bets, startTime: d.start_time * 1000 || 0}));
          if (d.status !== 'running') { const multEl = document.getElementById('esc-mult'); if (multEl) multEl.innerText = d.status === 'crashed' ? `ПОЙМАН!` : `x1.00`; const pathEl = document.getElementById('esc-path'); if (pathEl) pathEl.setAttribute('d', ''); }
        } else if (d.type === 'start') { setState(p => ({...p, status: 'running', startTime: d.start_time * 1000}));
        } else if (d.type === 'tick') { setState(p => ({...p, bets: d.bets}));
        } else if (d.type === 'crash') { setState(p => ({...p, status: 'crashed', history: d.history, bets: d.bets})); const multEl = document.getElementById('esc-mult'); if (multEl) multEl.innerText = `x${d.mult.toFixed(2)}`; multRef.current = d.mult;
        } else if (d.type === 'bets_update') { setState(p => ({...p, bets: d.bets})); }
      } catch(err) {}
    };
    wsRef.current = ws; return () => ws.close();
  }, []);

  const doEscBet = async () => { 
    if (!betAmount || isNaN(betAmount)) return; 
    let payload = { amount: parseFloat(betAmount) };
    if (autoCashout && !isNaN(autoCashout)) {
        let ac = parseFloat(autoCashout);

            <input type="number" placeholder="0" value={betAmount} onChange={e => setBetAmount(e.target.value)} disabled={myBet != null} />
            <button className="bet-input-clear" onClick={() => setBetAmount('')}>✕</button>
        </div>
        <div className="bet-input-wrapper" style={{ opacity: myBet ? 0.6 : 1, pointerEvents: myBet ? 'none' : 'auto' }}>
            <div className="bet-input-currency" style={{color: 'var(--gold)'}}>Авто x</div>
            <input type="number" placeholder="Без автовывода" value={autoCashout} onChange={e => setAutoCashout(e.target.value)} disabled={myBet != null} step="0.01" />
            <button className="bet-input-clear" onClick={() => setAutoCashout('')}>✕</button>
        </div>
        <div className="quick-bets"><button className="btn-quick" onClick={() => setBetAmount('10')} disabled={myBet != null}>+10</button><button className="btn-quick" onClick={() => setBetAmount('50')} disabled={myBet != null}>+50</button><button className="btn-quick" onClick={() => setBetAmount(Math.floor(user.balance/2).toString())} disabled={myBet != null}>1/2</button><button className="btn-quick" onClick={() => setBetAmount(Math.floor(user.balance).toString())} disabled={myBet != null}>MAX</button></div>
        <div>{state.status === 'waiting' && !myBet && (<button className="escape-action-btn bet" onClick={doEscBet}>🚀 ПОСТАВИТЬ</button>)}{state.status === 'waiting' && myBet && (<button className="escape-action-btn wait" disabled>✅ ОЖИДАЕМ ({myBet.amount} RC)</button>)}{state.status === 'running' && myBet && !myBet.cashed_out && (<button className="escape-action-btn cashout" onClick={doEscCashout}>💰 ЗАБРАТЬ</button>)}{state.status === 'running' && myBet && myBet.cashed_out && (<button className="escape-action-btn disabled" style={{color:'var(--green)', borderColor:'rgba(34,197,94,0.3)'}}>🏆 ВЫВЕЛИ: {myBet.win.toFixed(0)} RC!</button>)}{state.status === 'running' && !myBet && (<button className="escape-action-btn disabled">🏃‍♂️ ИДЕТ ПОБЕГ...</button>)}{state.status === 'crashed' && (<button className="escape-action-btn disabled" style={{color:'var(--red)', borderColor:'rgba(239,68,68,0.3)'}}>💥 РАУНД ЗАВЕРШЕН</button>)}</div>
      </div>
      <div className="live-bets-container">{Object.values(state.bets).map((b, i) => (<div key={i} className="live-bet-item"><div className="row"><div className="avatar-sm" style={{width: 24, height: 24, fontSize: 10}}>{b.avatar ? <img src={b.avatar}/> : b.name[0]}</div><div className="fw6">{b.name.substring(0, 10)}</div></div><div style={{textAlign:'right'}}><div className="fw7">{b.amount} RC {b.auto_cashout ? <span className="f11 text-muted"> (Авто x{b.auto_cashout})</span> : null}</div>{b.cashed_out ? <div className="f11 text-green">Вывел {b.win.toFixed(0)} (x{b.mult.toFixed(2)})</div> : state.status === 'crashed' ? <div className="f11 text-red">Пойман</div> : <div className="f11 text-muted">В побеге...</div>}</div></div>))}</div>
    </div>
  );
}

            <div className="mine-rock" onPointerDown={handleMineTap}>🪨{floats.map(f => (<div key={f.id} className="floating-number" style={{left: f.x, top: f.y}}>+{(user.click_power * 0.5).toFixed(1)}</div>))}</div>
            <div className="mt20"><div className="row-sb mb8"><span className="fw7 f12 text-muted">Энергия</span><span className="fw8 f13">{Math.floor(localEnergy)} / {user.max_energy}</span></div><div className="energy-bar-wrap"><div className="energy-bar-fill" style={{width: `${(localEnergy/user.max_energy)*100}%`}}></div></div></div>
            <div className="section-title mt20">Прокачка кирки</div>

            <div className="card row-sb" style={{margin:0}}><div><div className="fw7">Запас энергии ({user.max_energy})</div><div className="f12 text-muted mt4">+100 макс. энергии</div></div><button className="btn btn-primary btn-sm" onClick={() => buyUpgrade('energy')}>1500 RC</button></div>
          </div>

              <Avatar user={profile} size={68}/>
              {profile.vip_level > 0 && <div className="vip-badge">{profile.vip_level===3?'👑':profile.vip_level===2?'🥈':'🥉'}</div>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div className="hero-name"><PlayerName user={profile}/></div>
              <div className="hero-handle">UID: {profile.uid}</div>

                {profile.owner ? (
                  <span className="text-red">⛓ Раб — <span style={{textDecoration:'underline', cursor:'pointer'}} onClick={() => onViewProfile(profile.owner.id)}>{profile.owner.first_name || 'Владелец'}</span></span>

                  <span className="text-green">✅ Свободен</span>

          <div className="hero-stats">
            <div className="stat"><div className="stat-val">{profile.price.toFixed(0)}</div><div className="stat-lbl">🏷 Цена</div></div>
            <div className="stat"><div className="stat-val">{profile.slaves_count}<span className="text-muted f12">/{profile.max_slaves}</span></div><div className="stat-lbl">⛓ Рабов</div></div>
            <div className="stat"><div className="stat-val">{profile.vip_level || '—'}</div><div className="stat-lbl">⭐ VIP</div></div>
          </div>
        </div>
        
        {uid !== currentUserId && (
          <div className="section gap8">

              <button className="btn btn-ghost" disabled>{protectLabel}: {fmtCountdown(activeProtectTime)}</button>

               <div>
                 <button className="btn" style={{background:'var(--surface2)', border:'1px solid var(--red)', color:'var(--red)'}} onClick={() => { if(currentUser.robberies_left <= 0) showToast('Лимит ограблений исчерпан!'); else setRobbing(true); }}>🥷 Ограбить (Осталось: {currentUser.robberies_left})</button>
                 <div className="f11 text-muted mt4" style={{textAlign:'center'}}>Успех: {robChance}%. {robDesc}</div>
               </div>

        {profile.slaves.length > 0 && (

        )}
      </div>
      {robbing && <RobberyGameModal targetId={uid} onClose={() => setRobbing(false)} onFinish={finishRobbery} />}
    </div>

function SearchScreen({ user, onBuy, onViewProfile, showToast, onBack }) {

  async function doBuy() { if (!selected) return; try { await post('/api/buy', { target_id: selected.id }); showToast('✅ Куплен!'); setSelected(null); doSearch(); onBuy(); } catch(e) { showToast('❌ ' + e.message); } }
  useEffect(() => { doSearch(false, true); }, []);
  return (
    <div className="screen">
      <div className="hdr"><button className="back-btn" onClick={onBack}>‹ Назад</button><div className="hdr-title">Поиск рабов</div><div style={{width:60}}></div></div>

        <div className="section" style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
          <input className="input" placeholder="Поиск по имени или UID" value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key==='Enter' && doSearch()}/>

          <div className="row" style={{ gap: '12px' }}><button className="btn btn-primary" style={{flex:1}} onClick={() => doSearch()}>{loading ? <div className="spinner" style={{width:18,height:18,borderWidth:2,margin:'auto'}}/> : '🔍 Найти'}</button><button className="btn btn-ghost" style={{flex:1}} onClick={() => doSearch(true)}>🎲 Случайные</button></div>
          <button className="btn btn-ghost" onClick={() => doSearch(false,true)}>🆕 Новые игроки</button>
        </div>
        <div className="section mt20"><div className="section-title">Результаты ({results.length})</div><div className="gap12">{results.map(p => (<div className="player-card" key={p.id}><div onClick={() => onViewProfile(p.id)} style={{cursor:'pointer'}}><Avatar user={p} size={48}/></div><div className="pc-meta" onClick={() => p.owner_id !== user.id && setSelected(p)} style={{cursor:'pointer'}}><div className="pc-name"><PlayerName user={p}/></div><div className="pc-sub">UID: {p.uid}</div></div><div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}><div className="pc-price">{parseFloat(p.current_price).toFixed(0)} RC</div>{p.owner_id === user.id ? <span className="f11 fw7" style={{padding:'6px 12px',background:'var(--surface3)',borderRadius:8,color:'var(--text-3)'}}>⛓ Ваш</span> : <button className="btn btn-primary btn-sm" onClick={() => setSelected(p)}>⛓ Купить</button>}</div></div>))}{results.length===0 && !loading && <div className="text-center text-muted" style={{padding:'40px 0'}}>Никого не найдено.</div>}</div></div>
        {selected && (<div className="overlay" onClick={() => setSelected(null)}><div className="modal" onClick={e => e.stopPropagation()}><div className="modal-handle"/><div className="modal-title">⛓ Купить игрока</div><div className="row mb16"><Avatar user={selected} size={56}/><div><div className="fw8 f13">{selected.first_name || selected.username || `#${selected.uid||selected.id}`}</div><div className="text-muted f12">@{selected.username || selected.uid}</div></div></div><div className="card mb20" style={{margin:0}}><div className="row-sb"><span className="text-muted f13">Текущая цена</span><span className="fw8 text-gold">{parseFloat(selected.current_price).toFixed(0)} RC</span></div><div className="row-sb mt12"><span className="text-muted f13">Ваш баланс</span><span className={`fw8 f13 ${user.balance >= parseFloat(selected.current_price) ? 'text-green' : 'text-red'}`}>{user.balance.toFixed(0)} RC</span></div><div className="row-sb mt12"><span className="text-muted f13">Налог системы</span><span className="text-red f13">10%</span></div><div className="row-sb mt12"><span className="text-muted f13">Цена после покупки</span><span className="text-muted f13">+50%</span></div></div><div className="mt16">{user.balance < parseFloat(selected.current_price) ? <button className="btn btn-ghost" disabled>❌ Недостаточно RC</button> : <button className="btn btn-primary" onClick={doBuy}>⛓ Купить за {parseFloat(selected.current_price).toFixed(0)} RC</button>}</div></div></div>)}

function SyndicatesScreen({ user, onRefresh, showToast, onViewProfile }) {
    const [tab, setTab] = useState('list');
    const [clans, setClans] = useState([]);
    const [myClan, setMyClan] = useState(null);
    const [loading, setLoading] = useState(false);
    const [createName, setCreateName] = useState('');
    const [createDesc, setCreateDesc] = useState('');
    const [donateAmt, setDonateAmt] = useState('');
    const [warTargets, setWarTargets] = useState([]);
    const [showWarModal, setShowWarModal] = useState(false);
    const [warDonateAmt, setWarDonateAmt] = useState('');
    const [activeWarDonateId, setActiveWarDonateId] = useState(null);

    async function loadAll() {
        setLoading(true);
        try {
            if (user.syndicate_id) {
                setTab('my');
                setMyClan(await get('/api/syndicates/my'));
            } else {
                setTab('list');
                setClans(await get('/api/syndicates'));
            }
        } catch(e) {}
        setLoading(false);
    }
    useEffect(() => { loadAll(); }, [user.syndicate_id]);

    async function doCreate() {
        if (!createName.trim()) return;
        try {
            await post('/api/syndicates/create', { name: createName, description: createDesc });
            showToast('✅ Клан создан!');
            onRefresh();
        } catch(e) { showToast('❌ ' + e.message); }
    }

    async function doJoin(id) {
        try {
            const r = await post('/api/syndicates/join', { syndicate_id: id });
            showToast(r.msg);
        } catch(e) { showToast('❌ ' + e.message); }
    }

    async function doLeave() {
        if(!confirm('Покинуть клан?')) return;
        try {
            await post('/api/syndicates/leave');
            showToast('🚪 Вы покинули клан');
            onRefresh();
        } catch(e) { showToast('❌ ' + e.message); }
    }

    async function doResolve(reqId, action) {
        try {
            await post('/api/syndicates/requests/resolve', { request_id: reqId, action });
            setMyClan(await get('/api/syndicates/my'));
            showToast('✅ Готово');
        } catch(e) { showToast('❌ ' + e.message); }
    }

    async function doKick(uid) {
        if(!confirm('Исключить?')) return;
        try {
            await post('/api/syndicates/members/kick', { user_id: uid });
            setMyClan(await get('/api/syndicates/my'));
            showToast('👢 Исключен');
        } catch(e) { showToast('❌ ' + e.message); }
    }

    async function doPromote(uid) {
        try {
            await post('/api/syndicates/members/promote', { user_id: uid });
            setMyClan(await get('/api/syndicates/my'));
            showToast('👑 Роль изменена');
        } catch(e) { showToast('❌ ' + e.message); }
    }

    async function doDonate() {
        if(!donateAmt) return;
        try {
            await post('/api/syndicates/donate', { amount: parseFloat(donateAmt) });
            setDonateAmt('');
            onRefresh();
            setMyClan(await get('/api/syndicates/my'));
            showToast('💰 Взнос в Общак сделан!');
        } catch(e) { showToast('❌ ' + e.message); }
    }

    async function doUpgrade() {
        if(!confirm('Улучшить клан за счет Общака?')) return;
        try {
            await post('/api/syndicates/upgrade');
            setMyClan(await get('/api/syndicates/my'));
            showToast('⬆️ Клан улучшен!');
        } catch(e) { showToast('❌ ' + e.message); }
    }

    async function openWarTargets() {
        try {
            setWarTargets(await get('/api/syndicates/wars/targets'));
            setShowWarModal(true);
        } catch(e) { showToast('❌ ' + e.message); }
    }

    async function doDeclareWar(targetId) {
        try {
            await post('/api/syndicates/wars/declare', { target_id: targetId });
            setShowWarModal(false);
            setMyClan(await get('/api/syndicates/my'));
            showToast('⚔️ Вызов отправлен!');
        } catch(e) { showToast('❌ ' + e.message); }
    }

    async function doResolveWar(warId, action) {
        if (action === 'reject' && !confirm('Точно отказаться? Все в клане узнают об этом!')) return;
        try {
            const r = await post('/api/syndicates/wars/resolve', { war_id: warId, action });
            setMyClan(await get('/api/syndicates/my'));
            showToast('✅ ' + r.msg);
        } catch(e) { showToast('❌ ' + e.message); }
    }

    async function doWarDonate() {
        if(!warDonateAmt || !activeWarDonateId) return;
        try {
            await post('/api/syndicates/wars/donate', { war_id: activeWarDonateId, amount: parseFloat(warDonateAmt) });
            setWarDonateAmt('');
            setActiveWarDonateId(null);
            onRefresh();
            setMyClan(await get('/api/syndicates/my'));
            showToast('💰 Фонд войны пополнен!');
        } catch(e) { showToast('❌ ' + e.message); }
    }

    const limits = {1:5, 2:10, 3:20, 4:30};
    const upgCosts = {1:100000, 2:500000, 3:1000000};
    const roleColors = { 'don': 'var(--red)', 'deputy': 'var(--blue)', 'member': 'var(--text-3)' };
    const roleNames = { 'don': 'Дон', 'deputy': 'Зам', 'member': 'Участник' };

    return (
        <div className="screen">
            <div className="hdr">
                <div className="hdr-title">🛡 Синдикаты</div>
                {user.syndicate_id && <button className="btn btn-danger btn-sm" onClick={doLeave}>Выйти</button>}
            </div>
            
            <div className="content" style={{padding:0}}>
                <div className="tabs-wrap">
                    <div className="tabs">
                        <button className={`tab${tab==='list'?' active':''}`} onClick={() => {setTab('list'); loadAll();}}>Все Кланы</button>
                        <button className={`tab${tab==='my'?' active':''}`} onClick={() => {if(user.syndicate_id){setTab('my'); loadAll();}else{setTab('create');}}}>Мой Клан</button>
                    </div>
                </div>

                {loading ? <div style={{display:'flex',justifyContent:'center',padding:40}}><div className="spinner"/></div> : null}

                {!loading && tab === 'list' && (
                    <div style={{padding: '16px'}}>
                        <div className="f12 text-muted mb12">Вступайте в кланы, чтобы получать баффы к доходу и участвовать в войнах.</div>
                        <div className="gap12">
                            {clans.map(c => (
                                <div className="card" key={c.id} style={{margin:0, padding:'16px'}}>
                                    <div className="row-sb mb8">
                                        <div className="fw8" style={{fontSize:18}}>{c.name}</div>
                                        <div className="f12 fw7 text-gold">Ур. {c.level}</div>
                                    </div>
                                    <div className="f13 text-muted mb12">{c.description || 'Нет описания'}</div>
                                    <div className="row-sb mb12">
                                        <div className="f12">Дон: <span className="text-gold fw6">{c.owner_name||c.owner_username||c.owner_id}</span></div>
                                        <div className="f12">Участники: {c.members_count}/{limits[c.level]}</div>
                                    </div>
                                    <div className="row-sb">
                                        <div className="f12">Общак: <span className="fw7">{parseFloat(c.treasury).toFixed(0)} RC</span></div>
                                        {!user.syndicate_id && <button className="btn btn-primary btn-sm" onClick={()=>doJoin(c.id)}>Вступить</button>}
                                    </div>
                                </div>
                            ))}
                            {clans.length === 0 && <div className="text-center p20 text-muted">Нет созданных кланов.</div>}
                        </div>
                    </div>
                )}

                {!loading && tab === 'create' && !user.syndicate_id && (
                    <div style={{padding: '16px'}}>
                        <div className="card gap12">
                            <div className="fw8" style={{fontSize:18}}>Создать свой клан</div>
                            <div className="f13 text-muted">Стоимость создания: 20,000 RC.</div>
                            <input className="input" placeholder="Название клана (до 32 симв.)" value={createName} onChange={e=>setCreateName(e.target.value)} maxLength={32}/>
                            <textarea className="input" placeholder="Описание..." value={createDesc} onChange={e=>setCreateDesc(e.target.value)} rows={3}/>
                            <button className="btn btn-primary mt8" onClick={doCreate} disabled={user.balance < 20000}>Создать (20,000 RC)</button>
                        </div>
                    </div>
                )}

                {!loading && tab === 'my' && myClan && (
                    <div style={{padding: '16px'}}>
                        {/* HERO КЛАНА */}
                        <div className="card" style={{background:'linear-gradient(135deg, #1e1e1e, #111)', border:'1px solid var(--gold)', margin:0, marginBottom:16}}>
                            <div className="row-sb mb8">
                                <div className="fw8" style={{fontSize:22}}>{myClan.clan.name}</div>
                                <div className="f13 fw8 text-gold" style={{background:'var(--gold-dim)', padding:'4px 10px', borderRadius:12}}>Ур. {myClan.clan.level}</div>
                            </div>
                            <div className="f13 text-muted mb16" style={{lineHeight:1.4}}>{myClan.clan.description}</div>
                            
                            <div className="row-sb pt12" style={{borderTop:'1px solid var(--border)'}}>
                                <div>
                                    <div className="f11 text-muted text-uppercase mb4">Общак</div>
                                    <div className="fw8 text-gold" style={{fontSize:18}}>{parseFloat(myClan.clan.treasury).toFixed(0)} RC</div>
                                </div>
                                <div>
                                    <div className="f11 text-muted text-uppercase mb4">Участники</div>
                                    <div className="fw8" style={{fontSize:18}}>{myClan.members.length} <span className="f12 text-muted">/ {limits[myClan.clan.level]}</span></div>
                                </div>
                            </div>
                            
                            <div className="mt16 gap8">
                                <div className="row">
                                    <input className="input" type="number" placeholder="Сумма взноса..." value={donateAmt} onChange={e=>setDonateAmt(e.target.value)} style={{flex:1}}/>
                                    <button className="btn btn-primary" onClick={doDonate}>Вкинуть</button>
                                </div>
                                {user.syndicate_role === 'don' && myClan.clan.level < 4 && (
                                    <button className="btn btn-ghost mt8" onClick={doUpgrade}>
                                        ⬆️ Улучшить до {myClan.clan.level + 1} ур. ({upgCosts[myClan.clan.level]} RC из Общака)
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* КЛАНОВЫЕ ВОЙНЫ */}
                        <div className="section-title">⚔️ Войны</div>
                        {['don', 'deputy'].includes(user.syndicate_role) && myClan.wars.active.length === 0 && myClan.wars.pending.length === 0 && (
                            <button className="btn btn-danger mb12" style={{width:'100%'}} onClick={openWarTargets}>🔪 ОБЪЯВИТЬ ВОЙНУ</button>
                        )}
                        <div className="gap8 mb16">
                            {myClan.wars.pending.map(w => {
                                const isAttacker = w.attacker_id === myClan.clan.id;
                                const enemyName = isAttacker ? w.defender_name : w.attacker_name;
                                return (
                                    <div className="card" key={w.id} style={{borderColor:'var(--red)', margin:0}}>
                                        <div className="fw8 text-red mb8">⏳ Ожидание ответа...</div>
                                        <div className="f13">Враг: <span className="fw7">{enemyName}</span></div>
                                        {!isAttacker && ['don', 'deputy'].includes(user.syndicate_role) && (
                                            <div className="row mt12">
                                                <button className="btn btn-danger" style={{flex:1}} onClick={()=>doResolveWar(w.id, 'accept')}>Принять бой</button>
                                                <button className="btn btn-ghost" style={{flex:1}} onClick={()=>doResolveWar(w.id, 'reject')}>Струсить</button>
                                            </div>
                                        )}
                                        {isAttacker && <div className="f12 text-muted mt8">Ждем, пока они примут вызов...</div>}
                                    </div>
                                )
                            })}
                            
                            {myClan.wars.active.map(w => {
                                const isAttacker = w.attacker_id === myClan.clan.id;
                                const enemyName = isAttacker ? w.defender_name : w.attacker_name;
                                const myFund = isAttacker ? parseFloat(w.fund_attacker) : parseFloat(w.fund_defender);
                                const enemyFund = isAttacker ? parseFloat(w.fund_defender) : parseFloat(w.fund_attacker);
                                const total = myFund + enemyFund || 1;
                                const myPerc = (myFund / total) * 100;
                                const timeLeft = Math.max(0, Math.floor((new Date(w.expires_at) - new Date()) / 1000));
                                
                                return (
                                    <div className="card" key={w.id} style={{background:'linear-gradient(135deg, #3a0000, #111)', borderColor:'var(--red)', margin:0}}>
                                        <div className="row-sb mb8">
                                            <div className="fw8 text-red" style={{fontSize:18}}>⚔️ ВОЙНА!</div>
                                            <div className="fw8 text-gold">⏳ {fmtCountdown(timeLeft)}</div>
                                        </div>
                                        <div className="f13 mb12">Цель: победить клан <span className="fw7">{enemyName}</span></div>
                                        
                                        <div className="row-sb mb4 f12 fw7">
                                            <span style={{color:'var(--green)'}}>Мы: {myFund.toFixed(0)}</span>
                                            <span style={{color:'var(--red)'}}>Враг: {enemyFund.toFixed(0)}</span>
                                        </div>
                                        <div className="energy-bar-wrap mb12" style={{height:16, borderRadius:8, background:'var(--red)'}}>
                                            <div className="energy-bar-fill" style={{width:`${myPerc}%`, background:'var(--green)'}} />
                                        </div>
                                        
                                        {activeWarDonateId === w.id ? (
                                            <div className="row">
                                                <input className="input" type="number" placeholder="RC на войну..." value={warDonateAmt} onChange={e=>setWarDonateAmt(e.target.value)} style={{flex:1}}/>
                                                <button className="btn btn-green" onClick={doWarDonate}>Внести</button>
                                                <button className="btn btn-ghost" onClick={()=>setActiveWarDonateId(null)}>✕</button>
                                            </div>
                                        ) : (
                                            <button className="btn btn-danger" style={{width:'100%'}} onClick={()=>setActiveWarDonateId(w.id)}>💰 Влить деньги в Фонд</button>
                                        )}
                                        <div className="f11 text-muted text-center mt8">Победитель заберет все свои деньги обратно + 50% от фонда проигравших!</div>
                                    </div>
                                )
                            })}
                        </div>

                        {/* ЗАЯВКИ */}
                        {myClan.requests.length > 0 && (
                            <div className="mb20">
                                <div className="section-title">Заявки ({myClan.requests.length})</div>
                                <div className="gap8">
                                    {myClan.requests.map(r => (
                                        <div className="card row-sb" key={r.req_id} style={{margin:0, padding:'12px'}}>
                                            <div className="row" onClick={()=>onViewProfile(r.id)} style={{cursor:'pointer'}}>
                                                <Avatar user={r} size={36}/>
                                                <div><div className="fw7 f13">{r.first_name||r.username}</div><div className="f11 text-gold">{parseFloat(r.balance).toFixed(0)} RC</div></div>
                                            </div>
                                            <div className="row">
                                                <button className="btn btn-green btn-sm" onClick={()=>doResolve(r.req_id, 'accept')}>✓</button>
                                                <button className="btn btn-danger btn-sm" onClick={()=>doResolve(r.req_id, 'reject')}>✕</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* СОСТАВ */}
                        <div className="section-title">Состав ({myClan.members.length})</div>
                        <div className="card" style={{padding:0, margin:0}}>
                            {myClan.members.map((m, idx) => (
                                <div className="list-item" key={m.id} style={{padding:'12px 16px', borderBottom: idx===myClan.members.length-1?'none':'1px solid var(--border)'}}>
                                    <div onClick={()=>onViewProfile(m.id)} style={{cursor:'pointer'}}><Avatar user={m} size={40}/></div>
                                    <div className="li-info" onClick={()=>onViewProfile(m.id)} style={{cursor:'pointer'}}>
                                        <div className="row"><div className="li-name">{m.first_name||m.username||m.id}</div></div>
                                        <div className="f11 mt4" style={{color: roleColors[m.syndicate_role], fontWeight:800}}>{roleNames[m.syndicate_role]}</div>
                                    </div>
                                    <div className="row gap8">
                                        <div className="f13 fw7 text-gold" style={{textAlign:'right'}}>{parseFloat(m.balance).toFixed(0)}<span className="f10 text-muted" style={{display:'block'}}>RC</span></div>
                                        {user.syndicate_role === 'don' && m.id !== user.id && (
                                            <div className="gap6">
                                                <button className="btn btn-ghost btn-sm" style={{padding:'4px 8px'}} onClick={()=>doPromote(m.id)}>👑</button>
                                                <button className="btn btn-danger btn-sm" style={{padding:'4px 8px'}} onClick={()=>doKick(m.id)}>👢</button>
                                            </div>
                                        )}
                                        {user.syndicate_role === 'deputy' && m.syndicate_role === 'member' && (
                                            <button className="btn btn-danger btn-sm" style={{padding:'4px 8px'}} onClick={()=>doKick(m.id)}>👢</button>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>

            {/* МОДАЛКА ВЫБОРА ЦЕЛИ ДЛЯ ВОЙНЫ */}
            {showWarModal && (
                <div className="overlay" onClick={()=>setShowWarModal(false)}>
                    <div className="modal" onClick={e=>e.stopPropagation()} style={{maxHeight:'80vh'}}>
                        <div className="modal-handle"/>
                        <div className="modal-title text-red">🔪 Выбор жертвы</div>
                        <div className="f13 text-muted mb16">Выберите клан, которому хотите бросить вызов. Если они примут, начнется 24-часовая гонка кошельков.</div>
                        <div className="gap8" style={{overflowY:'auto'}}>
                            {warTargets.map(t => (
                                <div className="card row-sb" key={t.id} style={{margin:0, padding:'12px'}}>
                                    <div>
                                        <div className="fw8" style={{fontSize:16}}>{t.name} <span className="f12 text-gold">(Ур. {t.level})</span></div>
                                        <div className="f12 text-muted mt4">Общак: {parseFloat(t.treasury).toFixed(0)} RC</div>
                                    </div>
                                    <button className="btn btn-danger btn-sm" onClick={()=>doDeclareWar(t.id)}>Вызвать</button>
                                </div>
                            ))}
                            {warTargets.length === 0 && <div className="text-center p20 text-muted">Нет доступных кланов для атаки.</div>}
                        </div>
                    </div>
                </div>
            )}
        </div>
    )
}

function App() {
  const [user, setUser] = useState(null); const [tasksData, setTasksData] = useState(null); 
  const [mainTab, setMainTab] = useState('profile'); 
  const [subTab, setSubTab] = useState(null); 
  const [error, setError] = useState(null); const [viewingUid, setViewingUid] = useState(null); const [banSupportMode, setBanSupportMode] = useState(false); const [toasts, setToasts] = useState([]); const [maintenanceMode, setMaintenanceMode] = useState(false);
  const [adminTab, setAdminTab] = useState('dash'); const [tickets, setTickets] = useState([]); const [openConv, setOpenConv] = useState(null); const [dash, setDash] = useState(null); const [users, setUsers] = useState([]); const [searchQ, setSearchQ] = useState(''); const [stories, setStories] = useState([]); const [sponsors, setSponsors] = useState([]); const [adminsData, setAdminsData] = useState(null); const [cIdent, setCIdent] = useState(''); const [cField, setCField] = useState('name_color'); const [cVal, setCVal] = useState(''); const [spId, setSpId] = useState(''); const [spTitle, setSpTitle] = useState(''); const [spUrl, setSpUrl] = useState(''); const [spRc, setSpRc] = useState('250'); const [newAdminId, setNewAdminId] = useState(''); const [broadcast, setBroadcast] = useState(''); const [seasonPass, setSeasonPass] = useState(''); const [promoCode, setPromoCode] = useState(''); const [promoRc, setPromoRc] = useState(''); const [promoMax, setPromoMax] = useState('1'); const [sysMaint, setSysMaint] = useState(false);
  const showToast = useToast(setToasts);
  
  const [directChatUid, setDirectChatUid] = useState(null);
  const [directChatName, setDirectChatName] = useState('');
  const [adminEditingUser, setAdminEditingUser] = useState(null);
  const [suppressingRiot, setSuppressingRiot] = useState(false);

  useEffect(() => {
    let touchStartX = 0; let touchStartY = 0;
    const handleTouchStart = (e) => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; };
    const handleTouchEnd = (e) => {
      const touchEndX = e.changedTouches[0].screenX; const touchEndY = e.changedTouches[0].screenY; 
      const dx = touchEndX - touchStartX; const dy = Math.abs(touchEndY - touchStartY);
      if (touchStartX <= 40 && dx > 70 && dx > dy) { 
        setViewingUid(null); 
        setDirectChatUid(null); 
        setOpenConv(null); 
        setBanSupportMode(false); 
        setSubTab(null);
      }
    };
    window.addEventListener('touchstart', handleTouchStart, { passive: true });
    window.addEventListener('touchend', handleTouchEnd, { passive: true });
    return () => { window.removeEventListener('touchstart', handleTouchStart); window.removeEventListener('touchend', handleTouchEnd); };
  }, []);

  window.openDirectChat = (uid, name) => { setDirectChatUid(uid); setDirectChatName(name); setViewingUid(null); };

  async function init() {
    const tg = window.Telegram?.WebApp; if (tg) { tg.ready(); tg.expand(); }
    let initData = tg?.initData || ''; let refId = null; let photoUrl = tg?.initDataUnsafe?.user?.photo_url || null;
    const sp = tg?.initDataUnsafe?.start_param; if (sp && sp.startsWith('ref_')) { try { refId = parseInt(sp.split('_')[1]); } catch {} }
    if (!initData) { initData = 'dev:' + (Math.floor(Math.random()*100000) + 100000); }
    _initData = initData;
    try { 
      const cfg = await get('/api/config'); _botUsername = cfg.bot_username || _botUsername; 
      const data = await post('/api/init', { init_data: initData, ref_id: refId, photo_url: photoUrl }); 
      setUser(data); setMaintenanceMode(data.maintenance || false); setSysMaint(data.maintenance || false); if (data.bot_username) _botUsername = data.bot_username; 
      const tData = await get('/api/tasks/status'); setTasksData(tData); 
    } catch(e) { setError(e.message); }
  }
  async function refreshUser() { try { const u = await get('/api/profile'); setUser(u); setMaintenanceMode(u.maintenance || false); setTasksData(await get('/api/tasks/status')); } catch {} }
  useEffect(() => { init(); }, []);

  const handleSuppressRiot = async () => { try { const r = await post('/api/riot/suppress'); showToast(r.msg); setSuppressingRiot(false); refreshUser(); } catch(e) { showToast('❌ ' + e.message); setSuppressingRiot(false); } };

  if (error) return <div className="overlay-full"><div className="overlay-icon">❌</div><div className="overlay-title red">Ошибка</div><div className="overlay-desc">{error}</div><button className="btn btn-ghost" onClick={() => {setError(null);init();}}>Повтор</button></div>;
  if (!user || !tasksData) return <div className="overlay-full"><div className="spinner"/><div className="f13 text-muted mt16">Загружаем...</div></div>;

  if (maintenanceMode && !user.is_admin && !user.is_admin_flag) return (<div className="overlay-full"><div className="overlay-icon" style={{animation: 'spin 4s linear infinite'}}>🛠</div><div className="overlay-title amber">Технические работы</div><div className="overlay-desc">Платформа обновляется. Мы скоро вернемся! Пожалуйста, зайдите позже.</div><button className="btn btn-ghost" style={{width: 200}} onClick={init}>🔄 Обновить</button></div>);
  if (user.is_banned) { if (banSupportMode) { return (<div className="app"><div className="screen"><div className="hdr"><button className="back-btn" onClick={() => setBanSupportMode(false)}>‹ Назад</button></div><div className="content" style={{padding:0}}><SupportScreen user={user} showToast={showToast}/></div></div></div>); } return (<div className="overlay-full"><div className="overlay-icon">🚫</div><div className="overlay-title red">Аккаунт Заблокирован</div><div className="overlay-desc">Ваш аккаунт был заблокирован за нарушение правил. Если вы считаете, что это ошибка, обратитесь в поддержку.</div>{user.ban_reason && <div className="ban-reason-box">Причина: {user.ban_reason}</div>}<button className="btn btn-primary" style={{width: '100%', maxWidth: '300px'}} onClick={() => setBanSupportMode(true)}>💬 Написать в поддержку</button></div>); }
  
  if (tasksData.missing_main_sponsors && tasksData.missing_main_sponsors.length > 0) {
    return (
      <div className="overlay-full">
        <div className="overlay-icon">📢</div>
        <div className="overlay-title">Доступ ограничен</div>
        <div className="overlay-desc">Для участия в игре необходимо подписаться на все наши генеральные каналы.</div>
        <div className="gap12" style={{width:'100%', maxWidth:'300px', marginBottom:16}}>
          {tasksData.missing_main_sponsors.map((s, idx) => (<button key={idx} className="btn btn-primary" onClick={() => window.Telegram.WebApp.openTelegramLink(s.channel_url)}>{s.channel_title}</button>))}
        </div>
        <button className="btn btn-ghost" style={{width:'100%', maxWidth:'300px'}} onClick={() => init()}>Проверить подписку</button>
      </div>
    );
  }

  if (viewingUid && viewingUid !== user.id) return <div className="app"><UserProfileScreen uid={viewingUid} currentUserId={user.id} onBack={() => setViewingUid(null)} onBuy={refreshUser} showToast={showToast} onViewProfile={setViewingUid} currentUser={user}/></div>;

  async function loadAdminTab(t) { if(t==='dash') { get('/api/admin/dashboard').then(setDash).catch(()=>{}); } if(t==='users') { get('/api/admin/users').then(setUsers).catch(()=>{}); } if(t==='tickets') { get('/api/admin/tickets').then(setTickets).catch(()=>{}); } if(t==='stories') { get('/api/admin/stories').then(setStories).catch(()=>{}); } if(t==='sponsors') { get('/api/admin/sponsors').then(setSponsors).catch(()=>{}); } if(t==='admins') { get('/api/admin/admins_list').then(setAdminsData).catch(()=>{}); } }
  async function toggleMaint(state) { try { await post('/api/admin/maintenance', { state }); setSysMaint(state); showToast(`Тех. работы ${state ? 'ВКЛЮЧЕНЫ' : 'ВЫКЛЮЧЕНЫ'}`); } catch(e) { showToast('❌ Ошибка', 'error'); } }
  const adminTitles = { 'dash':'📊 Дашборд', 'users':'👥 Юзеры', 'tickets':'💬 Тикеты', 'stories':'📸 Заявки Stories', 'sponsors':'📢 Спонсоры', 'system':'⚙️ Система', 'admins':'👑 Супер Админ' };

  return (
    <div className="app">
      <ToastContainer toasts={toasts}/>
      
      {user.riot_active && !suppressingRiot && (<div className="riot-banner" onClick={() => setSuppressingRiot(true)}><span>🚨 ВАШИ РАБЫ БУНТУЮТ!</span><span style={{fontSize: 12, background:'rgba(0,0,0,0.3)', padding:'4px 8px', borderRadius:8}}>ПОДАВИТЬ ›</span></div>)}
      {suppressingRiot && <RiotModal onSuppress={handleSuppressRiot} />}

      {/* Main Content Router */}
      {!subTab && !directChatUid && !openConv && (
        <>
          {mainTab==='profile' && <ProfileScreen user={user} onRefresh={refreshUser} onViewProfile={(uid)=>setViewingUid(uid)} onNavSub={setSubTab} showToast={showToast}/>}
          {mainTab==='games'   && <GamesScreen user={user} tasksData={tasksData} onRefresh={refreshUser} showToast={showToast}/>}
          {mainTab==='syndicates' && <SyndicatesScreen user={user} onRefresh={refreshUser} showToast={showToast} onViewProfile={(uid)=>setViewingUid(uid)}/>}
          {mainTab==='shop'    && <ShopInventoryScreen user={user} onRefresh={refreshUser} showToast={showToast}/>}
          {mainTab==='top'     && <TopScreen onViewProfile={(uid)=>setViewingUid(uid)} onNavSearch={() => setSubTab('search')}/>}

          {/* Bottom Navigation */}
          <div className="bottom-nav">
            <button className={`nav-item ${mainTab==='profile' ? 'active' : ''}`} onClick={() => setMainTab('profile')}>
              <span className="nav-item-ico">👤</span><span>Профиль</span>
            </button>
            <button className={`nav-item ${mainTab==='games' ? 'active' : ''}`} onClick={() => setMainTab('games')}>
              <span className="nav-item-ico">🎮</span><span>Активности</span>
            </button>
            <button className={`nav-item ${mainTab==='syndicates' ? 'active' : ''}`} onClick={() => setMainTab('syndicates')}>
              <span className="nav-item-ico">🛡</span><span>Кланы</span>
            </button>
            <button className={`nav-item ${mainTab==='shop' ? 'active' : ''}`} onClick={() => setMainTab('shop')}>
              <span className="nav-item-ico">🎒</span><span>Склад</span>
            </button>
            <button className={`nav-item ${mainTab==='top' ? 'active' : ''}`} onClick={() => setMainTab('top')}>
              <span className="nav-item-ico">🏆</span><span>Рейтинги</span>
            </button>
          </div>
        </>
      )}

      {/* Sub Screens (Modals overlaid) */}
      {subTab==='settings' && !directChatUid && <SettingsScreen user={user} onRefresh={refreshUser} showToast={showToast} onBack={() => setSubTab(null)}/>}
      {subTab==='messages' && !directChatUid && <MessagesScreen user={user} onViewProfile={(uid)=>setViewingUid(uid)} onOpenChat={window.openDirectChat} onBack={() => setSubTab(null)} showToast={showToast}/>}
      {subTab==='search' && !directChatUid && <SearchScreen user={user} onBuy={refreshUser} onViewProfile={(uid)=>setViewingUid(uid)} showToast={showToast} onBack={() => setSubTab(null)}/>}
      
      {directChatUid && <DirectChatScreen targetUid={directChatUid} targetName={directChatName} currentUid={user.id} onBack={() => setDirectChatUid(null)} />}

      {user.is_admin && mainTab === 'profile' && !subTab && !directChatUid && (
        <div style={{position: 'absolute', top: 60, right: 16, zIndex: 100}}>
           <button className="btn btn-danger btn-sm" onClick={() => { setSubTab('admin'); loadAdminTab('dash'); }}>Админ Панель</button>
        </div>
      )}

      {subTab==='admin' && user.is_admin && !openConv && (
        <div className="screen" style={{background: 'var(--bg)', zIndex: 1000}}>
          <div className="hdr"><button className="back-btn" onClick={() => setSubTab(null)}>‹ Назад</button><div className="hdr-title">Админ Панель</div><div style={{width:60}}></div></div>
          <div className="content">
            <div className="tabs-wrap" style={{marginBottom:16}}><select className="input" style={{border:'none', borderRadius:16, fontWeight:700, fontSize:15, padding:'16px', background:'var(--bg3)', boxShadow:'0 4px 15px rgba(0,0,0,0.3)'}} value={adminTab} onChange={e=>{setAdminTab(e.target.value); loadAdminTab(e.target.value);}}>{Object.entries(adminTitles).map(([k,v]) => { if(k==='admins' && !user.is_super_admin) return null; return <option key={k} value={k}>{v}</option>; })}</select></div>
            <div style={{padding:'0 16px'}}>
              {adminTab==='dash' && dash && (<div className="gap8"><div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>{[['👥','Игроков', dash.total_users],['🆕','За сегодня', dash.new_today],['💰','RC в игре', parseFloat(dash.total_rc||0).toFixed(0)],['💬','Тикеты', dash.tickets],['📸','Сторис', dash.stories_pending]].map(([ico,lbl,val]) => <div className="admin-stat" key={lbl}><div style={{fontSize:28, marginBottom:8}}>{ico}</div><div className="fw8" style={{fontSize:24}}>{val}</div><div className="f12 text-muted mt4">{lbl}</div></div>)}</div><button className="btn btn-ghost mt12" onClick={()=>loadAdminTab('dash')}>🔄 Обновить данные</button></div>)}
              {adminTab==='users' && (<div className="gap12"><div className="card gap12" style={{borderColor:'var(--gold)'}}><div className="fw8 text-gold" style={{fontSize:16}}>🎨 Выдать косметику</div><input className="input" placeholder="ID / @username" value={cIdent} onChange={e=>setCIdent(e.target.value)}/><select className="input" value={cField} onChange={e=>{setCField(e.target.value); setCVal('');}}><option value="name_color">Цвет ника</option><option value="avatar_frame">Рамка аватара</option><option value="emoji_status">Эмодзи</option></select>{cField==='name_color' && <div className="row" style={{flexWrap:'wrap'}}>{[['default','Стандарт'],['ruby','Рубин'],['gold','Золото'],['neon','Неон'],['blue','Синий'],['purple','Фиолет']].map(([v,l])=><button key={v} className="btn btn-ghost btn-sm" style={{borderColor:cVal===v?'var(--gold)':''}} onClick={()=>setCVal(v)}>{l}</button>)}</div>}{cField==='avatar_frame' && <div className="row" style={{flexWrap:'wrap'}}>{[['none','Нет'],['gold','Золотая'],['fire','Огонь 🔥'],['diamond','Алмаз 💎'],['rainbow','Радуга 🌈']].map(([v,l])=><button key={v} className="btn btn-ghost btn-sm" style={{borderColor:cVal===v?'var(--gold)':''}} onClick={()=>setCVal(v)}>{l}</button>)}</div>}{cField==='emoji_status' && <div className="row" style={{flexWrap:'wrap'}}>{['','💎','👑','🔥','⚡','🌟','💀','🏆'].map((e,i)=><button key={i} className="btn btn-ghost btn-sm" style={{borderColor:cVal===e?'var(--gold)':''}} onClick={()=>setCVal(e)}>{e||'✕'}</button>)}</div>}<button className="btn btn-primary mt8" onClick={async ()=>{ try{ await post('/api/admin/users/cosmetic',{identifier:cIdent, field:cField, value:cVal}); showToast('✅ Выдано'); setCIdent(''); }catch(e){showToast('❌ '+e.message);} }}>🎁 Выдать</button></div><div className="row mt8"><input className="input" placeholder="Поиск юзера..." value={searchQ} onChange={e=>setSearchQ(e.target.value)} onKeyDown={e=>e.key==='Enter' && get('/api/admin/users?q='+searchQ).then(setUsers)}/><button className="btn btn-primary btn-sm" style={{height:48, width:48}} onClick={()=>get('/api/admin/users?q='+searchQ).then(setUsers)}>🔍</button></div><div className="gap8">{users.map(u => <div className="card row-sb" key={u.id} style={{margin:0}}><div><div className="fw7">{u.first_name}</div><div className="f12 text-muted">ID: {u.id} | UID: {u.uid}</div></div><button className="btn btn-ghost btn-sm" onClick={() => setAdminEditingUser(u)}>✏️ Изменить</button></div>)}</div></div>)}
              {adminTab==='tickets' && (<div className="gap8">{tickets.length===0 && <div className="text-center text-muted p20">Нет тикетов</div>}{tickets.map(t => (<div className="card row-sb" key={t.user_id} onClick={()=>setOpenConv(t)} style={{cursor:'pointer', margin:0}}><div><div className="fw7">{t.first_name} {t.unread > 0 && <span className="text-red">({t.unread})</span>}</div><div className="f12 text-muted mt4">{t.last_msg?.substring(0,30)||'Фото...'}</div></div><div className="fw7 text-muted" style={{fontSize:20}}>›</div></div>))}</div>)}
              {adminTab==='stories' && (<div className="gap8">{stories.length===0 && <div className="text-center text-muted p20">Нет заявок</div>}{stories.map(s => (<div className="card row-sb" key={s.id} style={{margin:0}}><div><div className="fw7">@{s.username||s.first_name||s.user_id}</div><div className="f12 text-muted mt4">{new Date(s.created_at).toLocaleString('ru')}</div></div><div className="row"><button className="btn btn-green btn-sm" onClick={async ()=>{ try{ await post(`/api/admin/stories/approve?claim_id=${s.id}`,''); showToast('✅ Одобрено'); loadAdminTab('stories'); }catch(e){showToast('❌ '+e.message);} }}>✅</button><button className="btn btn-danger btn-sm" onClick={async ()=>{ if(!confirm('Отклонить заявку?'))return; try{ await post(`/api/admin/stories/reject?claim_id=${s.id}`,''); showToast('🗑 Отклонено'); loadAdminTab('stories'); }catch(e){showToast('❌ '+e.message);} }}>❌</button></div></div>))}</div>)}
              {adminTab==='sponsors' && (<div className="gap16"><div className="card gap8"><div className="fw8" style={{fontSize:16}}>Добавить Спонсора</div><div className="f12 text-muted mb8">Бот должен быть админом в канале!</div><input className="input" placeholder="ID Канала (-100123...)" value={spId} onChange={e=>setSpId(e.target.value)}/><input className="input" placeholder="Название (Для кнопки)" value={spTitle} onChange={e=>setSpTitle(e.target.value)}/><input className="input" placeholder="Ссылка (https://t.me/...)" value={spUrl} onChange={e=>setSpUrl(e.target.value)}/><input className="input" type="number" placeholder="Награда RC" value={spRc} onChange={e=>setSpRc(e.target.value)}/><button className="btn btn-primary mt8" onClick={async ()=>{ if(!spId||!spTitle||!spUrl||!spRc) return showToast('Заполните все поля'); try{ await post('/api/admin/sponsors/add',{channel_id:spId,channel_title:spTitle,channel_url:spUrl,reward_rc:parseFloat(spRc),is_main:false}); showToast('✅ Добавлен'); loadAdminTab('sponsors'); setSpId(''); setSpTitle(''); setSpUrl(''); setSpRc('250'); }catch(e){showToast('❌ '+e.message);} }}>Добавить</button></div>{sponsors.map(s => (<div className="card row-sb" key={s.id} style={{margin:0}}><div><div className="fw7">{s.is_main ? '👑 Генеральный' : '📢 Обычный'}</div><div className="fw8 mt4" style={{fontSize:15}}>{s.channel_title}</div><div className="f12 text-muted mt4">{s.channel_id} • {s.reward_rc} RC</div></div><div className="gap6"><button className="btn btn-ghost btn-sm" style={{borderColor: s.is_main ? 'var(--gold)' : 'var(--border2)'}} onClick={async ()=>{ try{ await post('/api/admin/sponsors/toggle_main',{sponsor_id:s.id}); showToast('✅ Статус изменен'); loadAdminTab('sponsors'); }catch(e){showToast('❌ '+e.message);} }}>{s.is_main ? 'Сделать обычным' : 'Сделать генеральным'}</button><button className="btn btn-danger btn-sm" onClick={async ()=>{ if(!confirm('Удалить спонсора?'))return; try{ await post('/api/admin/sponsors/delete',{sponsor_id:s.id}); showToast('✅ Удален'); loadAdminTab('sponsors'); }catch(e){showToast('❌ '+e.message);} }}>🗑 Удалить</button></div></div>))}</div>)}
              {adminTab==='admins' && adminsData && (<div className="gap16"><div className="card gap8"><div className="fw8" style={{fontSize:16}}>Добавить Админа</div><input className="input" placeholder="Telegram ID пользователя" value={newAdminId} onChange={e=>setNewAdminId(e.target.value)}/><button className="btn btn-primary mt8" onClick={async ()=>{ try{ await post('/api/admin/admins_list/add',{user_id:parseInt(newAdminId)}); showToast('✅ Назначен'); loadAdminTab('admins'); }catch(e){showToast('❌ '+e.message);} }}>Назначить</button></div><div className="gap8">{adminsData.db_admins.map(a => (<div className="card row-sb" key={a.user_id} style={{margin:0}}><div><div className="fw7">{a.first_name||a.username||a.user_id}</div><div className="f12 text-muted mt4">ID: {a.user_id}</div></div><button className="btn btn-danger btn-sm" onClick={async ()=>{ try{ await post('/api/admin/admins_list/remove',{user_id:a.user_id}); showToast('✅ Снят'); loadAdminTab('admins'); }catch(e){showToast('❌ '+e.message);} }}>Снять</button></div>))}</div></div>)}
              {adminTab==='system' && (<div className="gap16"><div className="card gap8"><div className="fw8 text-amber" style={{fontSize:16}}>🛠 Технические работы</div><div className="f13 text-muted">Закрывает доступ всем игрокам кроме админов.</div><div className="row mt8"><button className={`btn ${sysMaint ? 'btn-danger' : 'btn-ghost'}`} onClick={() => toggleMaint(true)}>ВКЛЮЧИТЬ</button><button className={`btn ${!sysMaint ? 'btn-green' : 'btn-ghost'}`} onClick={() => toggleMaint(false)}>ВЫКЛЮЧИТЬ</button></div></div><div className="card gap8"><div className="fw8" style={{fontSize:16}}>📢 Рассылка всем</div><textarea className="input" rows={3} placeholder="Текст (HTML)..." value={broadcast} onChange={e=>setBroadcast(e.target.value)}/><button className="btn btn-primary mt8" onClick={async ()=>{ try{ const r = await post('/api/admin/broadcast',{text:broadcast}); showToast(`📤 Разослано ${r.count} чел`); setBroadcast(''); }catch(e){showToast('❌ '+e.message);} }}>Разослать</button></div><div className="card gap8"><div className="fw8" style={{fontSize:16}}>🎫 Создать промокод</div><input className="input" placeholder="КОД" value={promoCode} onChange={e=>setPromoCode(e.target.value.toUpperCase())}/><input className="input" type="number" placeholder="Награда RC" value={promoRc} onChange={e=>setPromoRc(e.target.value)}/><input className="input" type="number" placeholder="Кол-во использований" value={promoMax} onChange={e=>setPromoMax(e.target.value)}/><button className="btn btn-primary mt8" onClick={async ()=>{ if(!promoCode||!promoRc)return; try{ await post('/api/admin/promo/create',{code:promoCode,reward_rc:parseFloat(promoRc),max_uses:parseInt(promoMax)}); showToast('✅ Создан'); setPromoCode(''); setPromoRc(''); }catch(e){showToast('❌ '+e.message);} }}>Создать код</button></div><div className="card gap8"><div className="fw8 text-red" style={{fontSize:16}}>💀 Новый сезон</div><div className="f13 text-muted">Сброс балансов, рабов, цен. VIP и косметика остаются. Топ будет обнулен.</div><input className="input" type="password" placeholder="Пароль" value={seasonPass} onChange={e=>setSeasonPass(e.target.value)}/><button className="btn btn-danger mt8" onClick={async ()=>{ if(!confirm('Точно начать новый сезон?'))return; try{ await post('/api/admin/season/start',{password:seasonPass}); showToast('🔥 Сезон начат'); setSeasonPass(''); }catch(e){showToast('❌ '+e.message);} }}>Начать сезон</button></div><div className="card gap8"><div className="fw8 text-red" style={{fontSize:16}}>💀 Полный Wipe</div><div className="f13 text-muted">Полное удаление базы данных. Топ будет обнулен.</div><button className="btn btn-danger mt8" onClick={async ()=>{ if(!confirm('УДАЛИТЬ ВСЮ БАЗУ ДАННЫХ? Безвозвратно.'))return; try{ await post('/api/admin/db/clear'); showToast('💀 Очищено'); }catch(e){showToast('❌ '+e.message);} }}>Очистить базу</button></div></div>)}
            </div>
          </div>
        </div>
      )}
      
      {adminEditingUser && (
        <div className="overlay" onClick={() => setAdminEditingUser(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"/><div className="modal-title">⚙️ Редактирование: {adminEditingUser.first_name}</div>
            <div className="gap12">
               <div><div className="f12 text-muted mb4">Баланс RC</div><input className="input" type="number" defaultValue={adminEditingUser.balance} id="adm_bal"/></div>
               <div><div className="f12 text-muted mb4">Цена (RC)</div><input className="input" type="number" defaultValue={adminEditingUser.current_price} id="adm_price"/></div>
               <div><div className="f12 text-muted mb4">VIP Уровень (0-3)</div><input className="input" type="number" defaultValue={adminEditingUser.vip_level} id="adm_vip"/></div>
               <div><div className="f12 text-muted mb4">Слоты рабов (-1 = по умолчанию)</div><input className="input" type="number" defaultValue={adminEditingUser.max_slaves_override !== null ? adminEditingUser.max_slaves_override : -1} id="adm_slots"/></div>
               <div className="row mt8">
                  <button className="btn btn-primary" onClick={async () => {
                    const b = parseFloat(document.getElementById('adm_bal').value); const p = parseFloat(document.getElementById('adm_price').value); const v = parseInt(document.getElementById('adm_vip').value); const s = parseInt(document.getElementById('adm_slots').value);
                    try { await post('/api/admin/users/edit', { user_id: adminEditingUser.id, balance: isNaN(b) ? null : b, price: isNaN(p) ? null : p, vip_level: isNaN(v) ? null : v, max_slaves_override: isNaN(s) || s < 0 ? -1 : s }); showToast('✅ Сохранено'); setAdminEditingUser(null); loadAdminTab('users'); } catch(e) { showToast('❌ ' + e.message); }
                  }}>Сохранить</button>
                  <button className={`btn ${adminEditingUser.is_banned ? 'btn-green' : 'btn-danger'}`} onClick={async () => {
                    try { await post('/api/admin/users/edit', { user_id: adminEditingUser.id, is_banned: !adminEditingUser.is_banned }); setAdminEditingUser(null); loadAdminTab('users'); } catch(e) { showToast('❌ ' + e.message); }
                  }}>{adminEditingUser.is_banned ? 'Разбанить' : 'Выдать БАН'}</button>
               </div>
            </div>
          </div>
        </div>
      )}

      {subTab==='admin' && openConv && <AdminChatScreen conv={openConv} onBack={()=>{setOpenConv(null); get('/api/admin/tickets').then(setTickets).catch(()=>{}); }} showToast={showToast}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
