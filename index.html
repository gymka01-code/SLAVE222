        <div style={{width: 60}}></div>
      </div>
      <div className="content p0">
        <div className="tabs-wrap">
          <div className="tabs">
            <button className={`tab${tab==='shop'?' active':''}`} onClick={()=>setTab('shop')}>🛒 Магазин</button>
            <button className={`tab${tab==='inv'?' active':''}`} onClick={()=>setTab('inv')}>🎒 Мой Склад</button>
          </div>
        </div>

        <div className="p16 gap12">
          {loading && <div className="spinner mt20"/>}
          
          {/* МАГАЗИН */}
          {!loading && tab === 'shop' && (
            <>
              <div className="section-title">Расходники и VIP</div>
              {shopData.items.map(i => (
                <div className="card row-sb" key={i.id} style={{margin:0}}>
                  <div>
                    <div className="fw7">{i.name}</div>
                    <div className="f11 text-muted mt4">{i.desc}</div>
                  </div>
                  <button className="btn btn-primary btn-sm" onClick={()=>buyItem(i.id)}>
                    {i.price_rc ? `${i.price_rc} RC` : `${i.price_stars} ⭐️`}
                  </button>
                </div>
              ))}
              <div className="section-title mt20">Косметика (Навсегда)</div>
              {shopData.cosmetics.map(c => (
                <div className="card row-sb" key={c.id} style={{margin:0}}>
                  <div>
                    <div className="fw7">{c.name}</div>
                    <div className="f11 text-muted mt4">Тип: {c.type}</div>
                  </div>
                  {c.owned ? <span className="f12 fw7 text-green">Куплено</span> : 
                  <button className="btn btn-ghost btn-sm" style={{color: 'var(--gold)', borderColor: 'var(--gold)'}} onClick={()=>buyItem('cosmetic', true, c.id)}>
                    {c.price_stars} ⭐️
                  </button>}
                </div>
              ))}
            </>
          )}

          {/* ИНВЕНТАРЬ */}
          {!loading && tab === 'inv' && (
            <>
              <div className="section-title">Мои предметы</div>
              {invData.items.length === 0 && <div className="text-muted text-center">Пусто</div>}
              {invData.items.map(i => (
                <div className="card row-sb" key={i.item_id} style={{margin:0}}>
                  <div><div className="fw7">{i.item_id}</div><div className="f11 text-muted mt4">Кол-во: {i.quantity} шт.</div></div>
                  <button className="btn btn-green btn-sm" onClick={()=>useItem(i.item_id)}>Использовать</button>
                </div>
              ))}
              
              <div className="section-title mt20">Моя косметика</div>
              {invData.cosmetics.length === 0 && <div className="text-muted text-center">Нет косметики</div>}
              {invData.cosmetics.map(c => {
                const fieldMap = { 'color': 'name_color', 'frame': 'avatar_frame', 'emoji': 'emoji_status' };
                const field = fieldMap[c.type];
                const isEquipped = user[field] === c.value;
                return (
                  <div className="card row-sb" key={c.id} style={{margin:0}}>
                    <div><div className="fw7">{c.name}</div></div>
                    {isEquipped ? 
                      <button className="btn btn-ghost btn-sm" onClick={()=>equipCosmetic(field, 'default')}>Снять</button> : 
                      <button className="btn btn-primary btn-sm" onClick={()=>equipCosmetic(field, c.value)}>Надеть</button>
                    }
                  </div>
                )
              })}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function DirectChatScreen({ targetUid, targetName, currentUid, onBack, showToast }) {
  const [msgs, setMsgs] = useState([]);
  const [txt, setTxt] = useState('');
  const [meta, setMeta] = useState({ isBlocked: false, imBlocked: false });

  const load = useCallback(() => {
    get(`/api/chat/messages/${targetUid}`).then(d => { setMsgs(d.messages); setMeta({isBlocked: d.is_blocked, imBlocked: d.im_blocked}); }).catch(()=>{});
  }, [targetUid]);

  useEffect(() => { load(); const int = setInterval(load, 3000); return () => clearInterval(int); }, [load]);

  const send = async () => {
    if (!txt.trim() || meta.imBlocked) return;
    try { await post('/api/chat/send', { target_uid: targetUid, text: txt.trim() }); setTxt(''); load(); } 
    catch(e) { }
  };

  const toggleBlock = async () => {
    try {
      if (meta.isBlocked) await post('/api/chat/unblock', { target_uid: targetUid });
      else await post('/api/chat/block', { target_uid: targetUid });
      load();
    } catch(e) {}
  }

  return (
    <div className="screen" style={{zIndex: 300}}>
      <div className="hdr">
        <button className="back-btn" onClick={onBack}>‹ Назад</button>
        <div className="hdr-title">{targetName}</div>
        <button className="btn btn-ghost btn-sm" style={{color: meta.isBlocked ? 'var(--green)' : 'var(--red)', border: 'none'}} onClick={toggleBlock}>{meta.isBlocked ? 'Разблокировать' : 'Заблокировать'}</button>
      </div>
      
      <div className="content chat-area" style={{display: 'flex', flexDirection: 'column'}}>
        {meta.imBlocked && <div className="text-center text-red f12 fw7 mb16 bg-surface2 p12 rounded-lg" style={{borderRadius: 12}}>Пользователь ограничил вам доступ к сообщениям.</div>}
        {msgs.map(m => (
          <div key={m.id} className={`msg-wrap ${m.sender_id === currentUid ? 'me' : 'them'}`}>
            <div className={`msg-bubble ${m.sender_id === currentUid ? 'me' : 'them'}`}>{m.text}</div>
            <div className="msg-time">{new Date(m.created_at).toLocaleString('ru').slice(12, 17)}</div>
          </div>
        ))}
      </div>

      <div className="chat-input-wrap">
        <input className="chat-input" placeholder={meta.isBlocked ? "Вы заблокировали юзера" : "Сообщение..."} value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} disabled={meta.isBlocked || meta.imBlocked}/>
        <button className="btn btn-primary btn-sm" onClick={send} disabled={meta.isBlocked || meta.imBlocked}>➤</button>
      </div>
    </div>
  );
}


  
function App() {
  const [user, setUser] = useState(null); const [tasksData, setTasksData] = useState(null);
  const [mainTab, setMainTab] = useState('profile'); 
  const [subTab, setSubTab] = useState(null); 
  const [viewingUid, setViewingUid] = useState(null); 
  const [toasts, setToasts] = useState([]);
  const [directChatUid, setDirectChatUid] = useState(null);
  const [directChatName, setDirectChatName] = useState('');
  const [showOnboarding, setShowOnboarding] = useState(false);
  const showToast = useToast(setToasts);
  
  // ADMIN STATES
  const [adminTab, setAdminTab] = useState('dash'); const [tickets, setTickets] = useState([]); const [openConv, setOpenConv] = useState(null); const [dash, setDash] = useState(null); const [users, setUsers] = useState([]); const [searchQ, setSearchQ] = useState(''); const [stories, setStories] = useState([]); const [sponsors, setSponsors] = useState([]); const [adminsData, setAdminsData] = useState(null); const [cIdent, setCIdent] = useState(''); const [cField, setCField] = useState('name_color'); const [cVal, setCVal] = useState(''); const [newAdminId, setNewAdminId] = useState(''); const [broadcast, setBroadcast] = useState(''); const [sysMaint, setSysMaint] = useState(false); const [adminEditingUser, setAdminEditingUser] = useState(null);

  window.openDirectChat = (uid, name) => { setDirectChatUid(uid); setDirectChatName(name); setViewingUid(null); };

  async function init() {
    const tg = window.Telegram?.WebApp; if (tg) { tg.ready(); tg.expand(); }
    let initData = tg?.initData || ''; let refId = null;
    const sp = tg?.initDataUnsafe?.start_param; if (sp && sp.startsWith('ref_')) { try { refId = parseInt(sp.split('_')[1]); } catch {} }
    if (!initData) { initData = 'dev:' + (Math.floor(Math.random()*100000) + 100000); }
    _initData = initData;
    try { 
      const data = await post('/api/init', { init_data: initData, ref_id: refId }); setUser(data); 
      if (!data.is_onboarded) setShowOnboarding(true);
      setTasksData(await get('/api/tasks/status'));
    } catch(e) {}
  }
  async function refreshUser() { try { setUser(await get('/api/profile')); setTasksData(await get('/api/tasks/status')); } catch {} }
  useEffect(() => { init(); }, []);

  useEffect(() => {
    if(!user) return;
    let ws, retryTimer, retryCount = 0;
    function connectGlobal() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}/api/ws/global?init_data=${encodeURIComponent(_initData)}`);
      ws.onmessage = (e) => { try { const d = JSON.parse(e.data); if (d.action === 'refresh') refreshUser(); } catch(err) {} };
      ws.onclose = () => { retryCount++; retryTimer = setTimeout(connectGlobal, Math.min(1000 * Math.pow(2, retryCount), 30000)); };
      ws.onerror = () => ws.close();
    }
    connectGlobal();
    return () => { clearTimeout(retryTimer); if(ws) ws.close(); };
  }, [user?.id]);

  if (!user || !tasksData) return <div className="app"><div className="spinner mt40"/></div>;
  if (user.is_banned && !subTab) return <div className="app"><div className="screen"><div className="p20 text-center"><div className="text-red fw8 mb8" style={{fontSize:24}}>🚫 ВЫ ЗАБАНЕНЫ</div><div className="f12 text-muted mb20">{user.ban_reason}</div><button className="btn btn-primary" onClick={()=>setSubTab('support')}>Написать в поддержку</button></div></div></div>;
  if (user.maintenance && !user.is_admin) return <div className="app"><div className="screen" style={{justifyContent:'center', alignItems:'center', zIndex:999999}}><div className="text-amber fw8 mb8" style={{fontSize:24}}>🛠 ТЕХРАБОТЫ</div><div className="f13 text-muted text-center px20">В данный момент сервер обновляется. Пожалуйста, подождите немного!</div></div></div>;
  
  async function loadAdminTab(t) { if(t==='dash') { get('/api/admin/dashboard').then(setDash).catch(()=>{}); } if(t==='users') { get('/api/admin/users').then(setUsers).catch(()=>{}); } if(t==='tickets') { get('/api/admin/tickets').then(setTickets).catch(()=>{}); } if(t==='stories') { get('/api/admin/stories').then(setStories).catch(()=>{}); } if(t==='sponsors') { get('/api/admin/sponsors').then(setSponsors).catch(()=>{}); } if(t==='admins') { get('/api/admin/admins_list').then(setAdminsData).catch(()=>{}); } }

  return (
    <div className="app">
      <ToastContainer toasts={toasts}/>
      {user.riot_active && (<div className="riot-banner" onClick={async ()=>{ try{ await post('/api/riot/suppress'); showToast('✅ Бунт подавлен'); refreshUser(); }catch(e){showToast('❌ '+e.message);} }}><span>🚨 РАБЫ БУНТУЮТ!</span><span style={{fontSize: 12, background:'rgba(0,0,0,0.3)', padding:'4px 8px', borderRadius:8}}>ПОДАВИТЬ ›</span></div>)}

      {showOnboarding && (
          <div className="overlay" style={{zIndex: 999999}} onClick={() => {}}>
              <div className="modal" style={{textAlign: 'center', background: 'var(--bg1)', border: '2px solid var(--gold)'}}>
                  <div className="fw8 text-gold mb12" style={{fontSize: 28}}>⛓ Добро пожаловать!</div>
                  <div className="f13 text-muted mb16" style={{lineHeight: 1.6}}>
                      Покупай других игроков, отправляй их на работу и собирай прибыль. Стань самым богатым рабовладельцем!
                  </div>
                  <div className="gap12 mb20 text-left">
                      <div className="card row gap12" style={{margin:0, borderColor: 'var(--gold-dim)'}}>
                          <div style={{fontSize: 30}}>🛒</div><div><div className="fw7">1. Купи раба</div><div className="f11 text-muted">Вкладка "Рынок"</div></div>
                      </div>
                      <div className="card row gap12" style={{margin:0, borderColor: 'var(--gold-dim)'}}>
                          <div style={{fontSize: 30}}>💼</div><div><div className="fw7">2. Отправь работать</div><div className="f11 text-muted">Нажми ⚙️ на рабе в профиле</div></div>

                          <div style={{fontSize: 30}}>💰</div><div><div className="fw7">3. Собери прибыль</div><div className="f11 text-muted">Доход придет автоматически!</div></div>
                      </div>
                  </div>
                  <button className="btn btn-primary" style={{height: 56, fontSize: 18}} onClick={async () => { setShowOnboarding(false); try{await post('/api/onboarded');}catch(e){} }}>Начать игру 🚀</button>
              </div>
          </div>
      )}

      {!subTab && !directChatUid && !viewingUid && (
        <>

      )}

      {viewingUid && <UserProfileScreen uid={viewingUid} currentUserId={user.id} onBack={()=>setViewingUid(null)} showToast={showToast} onViewProfile={setViewingUid} currentUser={user}/>}
      {subTab==='shop' && !directChatUid && <ShopInventoryScreen user={user} onRefresh={refreshUser} showToast={showToast} onBack={() => setSubTab(null)}/>}
      {subTab==='settings' && !directChatUid && <SettingsScreen user={user} onRefresh={refreshUser} showToast={showToast} onBack={() => setSubTab(null)} onNavSub={setSubTab}/>}
      {subTab==='support' && !directChatUid && <SupportScreen user={user} onBack={() => setSubTab(user.is_banned ? null : 'settings')} showToast={showToast}/>}
      {subTab==='messages' && !directChatUid && <MessagesScreen user={user} onViewProfile={setViewingUid} onOpenChat={window.openDirectChat} onBack={() => setSubTab(null)} showToast={showToast}/>}
      {subTab==='history' && !directChatUid && <HistoryScreen user={user} onBack={() => setSubTab(null)} />}
      {directChatUid && <DirectChatScreen targetUid={directChatUid} targetName={directChatName} currentUid={user.id} onBack={() => setDirectChatUid(null)} />}

      {/* ADMIN PANEL FULL */}
      {user.is_admin && mainTab === 'profile' && !subTab && !directChatUid && !viewingUid && (<div style={{position: 'absolute', top: 60, right: 16, zIndex: 100}}><button className="btn btn-danger btn-sm" onClick={() => { setSubTab('admin'); loadAdminTab('dash'); }}>Админ Панель</button></div>)}
      {subTab==='admin' && user.is_admin && !openConv && (
        <div className="screen" style={{background: 'var(--bg)', zIndex: 1000}}>
          <div className="hdr"><button className="back-btn" onClick={() => setSubTab(null)}>‹ Назад</button><div className="hdr-title">Админ Панель</div><div style={{width:60}}></div></div>
          <div className="content">
            <div className="tabs-wrap" style={{marginBottom:16}}><select className="input" style={{border:'none', borderRadius:16, fontWeight:700, fontSize:15, padding:'16px', background:'var(--bg3)', boxShadow:'0 4px 15px rgba(0,0,0,0.3)'}} value={adminTab} onChange={e=>{setAdminTab(e.target.value); loadAdminTab(e.target.value);}}><option value="dash">📊 Дашборд</option><option value="users">👥 Юзеры</option><option value="tickets">💬 Тикеты</option><option value="stories">📸 Заявки Stories</option><option value="sponsors">📢 Спонсоры</option><option value="system">⚙️ Система</option>{user.is_super_admin && <option value="admins">👑 Супер Админ</option>}</select></div>
            <div style={{padding:'0 16px'}}>
              {adminTab==='dash' && dash && (<div className="gap8"><div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>{[['👥','Игроков', dash.total_users],['🆕','За сегодня', dash.new_today],['💰','RC в игре', parseFloat(dash.total_rc||0).toFixed(0)],['💬','Тикеты', dash.tickets],['📸','Сторис', dash.stories_pending]].map(([ico,lbl,val]) => <div className="admin-stat" key={lbl}><div style={{fontSize:28, marginBottom:8}}>{ico}</div><div className="fw8" style={{fontSize:24}}>{val}</div><div className="f12 text-muted mt4">{lbl}</div></div>)}</div><button className="btn btn-ghost mt12" onClick={()=>loadAdminTab('dash')}>🔄 Обновить данные</button></div>)}
              {adminTab==='users' && (<div className="gap12"><div className="card gap12" style={{borderColor:'var(--gold)'}}><div className="fw8 text-gold" style={{fontSize:16}}>🎨 Выдать косметику</div><input className="input" placeholder="ID / @username" value={cIdent} onChange={e=>setCIdent(e.target.value)}/><select className="input" value={cField} onChange={e=>{setCField(e.target.value); setCVal('');}}><option value="name_color">Цвет ника</option><option value="avatar_frame">Рамка аватара</option><option value="emoji_status">Эмодзи</option></select>{cField==='name_color' && <div className="row" style={{flexWrap:'wrap'}}>{[['default','Стандарт'],['ruby','Рубин'],['gold','Золото'],['neon','Неон'],['blue','Синий'],['purple','Фиолет']].map(([v,l])=><button key={v} className="btn btn-ghost btn-sm" style={{borderColor:cVal===v?'var(--gold)':''}} onClick={()=>setCVal(v)}>{l}</button>)}</div>}{cField==='avatar_frame' && <div className="row" style={{flexWrap:'wrap'}}>{[['none','Нет'],['gold','Золотая'],['fire','Огонь 🔥'],['diamond','Алмаз 💎'],['rainbow','Радуга 🌈']].map(([v,l])=><button key={v} className="btn btn-ghost btn-sm" style={{borderColor:cVal===v?'var(--gold)':''}} onClick={()=>setCVal(v)}>{l}</button>)}</div>}{cField==='emoji_status' && <div className="row" style={{flexWrap:'wrap'}}>{['','💎','👑','🔥','⚡','🌟','💀','🏆','🌸'].map((e,i)=><button key={i} className="btn btn-ghost btn-sm" style={{borderColor:cVal===e?'var(--gold)':''}} onClick={()=>setCVal(e)}>{e||'✕'}</button>)}</div>}<button className="btn btn-primary mt8" onClick={async ()=>{ try{ await post('/api/admin/users/cosmetic',{identifier:cIdent, field:cField, value:cVal}); showToast('✅ Выдано'); setCIdent(''); }catch(e){showToast('❌ '+e.message);} }}>🎁 Выдать</button></div><div className="row mt8"><input className="input" placeholder="Поиск юзера..." value={searchQ} onChange={e=>setSearchQ(e.target.value)} onKeyDown={e=>e.key==='Enter' && get('/api/admin/users?q='+searchQ).then(setUsers)}/><button className="btn btn-primary btn-sm" style={{height:48, width:48}} onClick={()=>get('/api/admin/users?q='+searchQ).then(setUsers)}>🔍</button></div><div className="gap8">{users.map(u => <div className="card row-sb" key={u.id} style={{margin:0}}><div><div className="fw7">{u.first_name}</div><div className="f12 text-muted">ID: {u.id} | UID: {u.uid}</div></div><button className="btn btn-ghost btn-sm" onClick={() => setAdminEditingUser(u)}>✏️</button></div>)}</div></div>)}
              {adminTab==='tickets' && (<div className="gap8">{tickets.length===0 && <div className="text-center text-muted p20">Нет тикетов</div>}{tickets.map(t => (<div className="card row-sb" key={t.user_id} onClick={()=>setOpenConv(t)} style={{cursor:'pointer', margin:0}}><div><div className="fw7">{t.first_name} {t.unread > 0 && <span className="text-red">({t.unread})</span>}</div><div className="f12 text-muted mt4">{t.last_msg?.substring(0,30)||'Фото...'}</div></div><div className="fw7 text-muted" style={{fontSize:20}}>›</div></div>))}</div>)}
              {adminTab==='stories' && (<div className="gap8">{stories.length===0 && <div className="text-center text-muted p20">Нет заявок</div>}{stories.map(s => (<div className="card row-sb" key={s.id} style={{margin:0}}><div><div className="fw7">@{s.username||s.first_name||s.user_id}</div><div className="f12 text-muted mt4">{new Date(s.created_at).toLocaleString('ru')}</div></div><div className="row"><button className="btn btn-green btn-sm" onClick={async ()=>{ try{ await post(`/api/admin/stories/approve?claim_id=${s.id}`,''); showToast('✅ Одобрено'); loadAdminTab('stories'); }catch(e){showToast('❌ '+e.message);} }}>✅</button><button className="btn btn-danger btn-sm" onClick={async ()=>{ if(!confirm('Отклонить заявку?'))return; try{ await post(`/api/admin/stories/reject?claim_id=${s.id}`,''); showToast('🗑 Отклонено'); loadAdminTab('stories'); }catch(e){showToast('❌ '+e.message);} }}>❌</button></div></div>))}</div>)}
              {adminTab==='sponsors' && (<div className="gap16"><div className="card gap8"><div className="fw8" style={{fontSize:16}}>Добавить Спонсора</div><div className="f12 text-muted mb8">Бот должен быть админом в канале!</div><input className="input" placeholder="ID Канала (-100123...)" id="spId"/><input className="input" placeholder="Название (Для кнопки)" id="spTitle"/><input className="input" placeholder="Ссылка (https://t.me/...)" id="spUrl"/><input className="input" type="number" placeholder="Награда RC" id="spRc" defaultValue="250"/><button className="btn btn-primary mt8" onClick={async ()=>{ const id=document.getElementById('spId').value, t=document.getElementById('spTitle').value, u=document.getElementById('spUrl').value, r=document.getElementById('spRc').value; if(!id||!t||!u||!r) return showToast('Заполните все поля'); try{ await post('/api/admin/sponsors/add',{channel_id:id,channel_title:t,channel_url:u,reward_rc:parseFloat(r),is_main:false}); showToast('✅ Добавлен'); loadAdminTab('sponsors'); }catch(e){showToast('❌ '+e.message);} }}>Добавить</button></div>{sponsors.map(s => (<div className="card row-sb" key={s.id} style={{margin:0}}><div><div className="fw7">{s.is_main ? '👑 Генеральный' : '📢 Обычный'}</div><div className="fw8 mt4" style={{fontSize:15}}>{s.channel_title}</div><div className="f12 text-muted mt4">{s.channel_id} • {s.reward_rc} RC</div></div><div className="gap6"><button className="btn btn-ghost btn-sm" style={{borderColor: s.is_main ? 'var(--gold)' : 'var(--border2)'}} onClick={async ()=>{ try{ await post('/api/admin/sponsors/toggle_main',{sponsor_id:s.id}); showToast('✅ Статус изменен'); loadAdminTab('sponsors'); }catch(e){showToast('❌ '+e.message);} }}>{s.is_main ? 'Сделать обычным' : 'Сделать генеральным'}</button><button className="btn btn-danger btn-sm" onClick={async ()=>{ if(!confirm('Удалить спонсора?'))return; try{ await post('/api/admin/sponsors/delete',{sponsor_id:s.id}); showToast('✅ Удален'); loadAdminTab('sponsors'); }catch(e){showToast('❌ '+e.message);} }}>🗑 Удалить</button></div></div>))}</div>)}
              {adminTab==='admins' && adminsData && (<div className="gap16"><div className="card gap8"><div className="fw8" style={{fontSize:16}}>Добавить Админа</div><input className="input" placeholder="Telegram ID пользователя" value={newAdminId} onChange={e=>setNewAdminId(e.target.value)}/><button className="btn btn-primary mt8" onClick={async ()=>{ try{ await post('/api/admin/admins_list/add',{user_id:parseInt(newAdminId)}); showToast('✅ Назначен'); loadAdminTab('admins'); }catch(e){showToast('❌ '+e.message);} }}>Назначить</button></div><div className="gap8">{adminsData.db_admins.map(a => (<div className="card row-sb" key={a.user_id} style={{margin:0}}><div><div className="fw7">{a.first_name||a.username||a.user_id}</div><div className="f12 text-muted mt4">ID: {a.user_id}</div></div><button className="btn btn-danger btn-sm" onClick={async ()=>{ try{ await post('/api/admin/admins_list/remove',{user_id:a.user_id}); showToast('✅ Снят'); loadAdminTab('admins'); }catch(e){showToast('❌ '+e.message);} }}>Снять</button></div>))}</div></div>)}
              {adminTab==='system' && (<div className="gap16"><div className="card gap8"><div className="fw8 text-amber" style={{fontSize:16}}>🛠 Технические работы</div><div className="f13 text-muted">Закрывает доступ всем игрокам кроме админов.</div><div className="row mt8"><button className={`btn ${sysMaint ? 'btn-danger' : 'btn-ghost'}`} onClick={async ()=>{ try{ await post('/api/admin/maintenance', { state:true }); setSysMaint(true); showToast('ВКЛЮЧЕНЫ'); }catch(e){} }}>ВКЛЮЧИТЬ</button><button className={`btn ${!sysMaint ? 'btn-green' : 'btn-ghost'}`} onClick={async ()=>{ try{ await post('/api/admin/maintenance', { state:false }); setSysMaint(false); showToast('ВЫКЛЮЧЕНЫ'); }catch(e){} }}>ВЫКЛЮЧИТЬ</button></div></div><div className="card gap8"><div className="fw8" style={{fontSize:16}}>📢 Рассылка всем</div><textarea className="input" rows={3} placeholder="Текст (HTML)..." value={broadcast} onChange={e=>setBroadcast(e.target.value)}/><button className="btn btn-primary mt8" onClick={async ()=>{ try{ const r = await post('/api/admin/broadcast',{text:broadcast}); showToast(`📤 Разослано ${r.count} чел`); setBroadcast(''); }catch(e){showToast('❌ '+e.message);} }}>Разослать</button></div><div className="card gap8"><div className="fw8 text-red" style={{fontSize:16}}>💀 Новый сезон</div><div className="f13 text-muted">Сброс балансов, рабов, цен. VIP и косметика остаются.</div><input className="input" type="password" id="s_pass" placeholder="Пароль"/><button className="btn btn-danger mt8" onClick={async ()=>{ if(!confirm('Точно начать новый сезон?'))return; try{ await post('/api/admin/season/start',{password:document.getElementById('s_pass').value}); showToast('🔥 Сезон начат'); }catch(e){showToast('❌ '+e.message);} }}>Начать сезон</button></div><div className="card gap8"><div className="fw8 text-red" style={{fontSize:16}}>💀 Полный Wipe</div><div className="f13 text-muted">Полное удаление базы данных. (Только для Супер-Админа)</div><button className="btn btn-danger mt8" onClick={async ()=>{ if(!confirm('УДАЛИТЬ ВСЮ БАЗУ ДАННЫХ? Безвозвратно.'))return; try{ await post('/api/admin/db/clear'); showToast('💀 Очищено'); }catch(e){showToast('❌ '+e.message);} }}>Очистить базу</button></div></div>)}
            </div>
          </div>
        </div>
      )}
      {adminEditingUser && (
        <div className="overlay" onClick={() => setAdminEditingUser(null)}><div className="modal" onClick={e => e.stopPropagation()}><div className="modal-handle"/><div className="modal-title">⚙️ Редактирование: {adminEditingUser.first_name}</div><div className="gap12"><div><div className="f12 text-muted mb4">Баланс RC</div><input className="input" type="number" defaultValue={adminEditingUser.balance} id="adm_bal"/></div><div><div className="f12 text-muted mb4">Цена (RC)</div><input className="input" type="number" defaultValue={adminEditingUser.current_price} id="adm_price"/></div><div><div className="f12 text-muted mb4">VIP Уровень (0-3)</div><input className="input" type="number" defaultValue={adminEditingUser.vip_level} id="adm_vip"/></div><div><div className="f12 text-muted mb4">Слоты рабов (-1 = по умолчанию)</div><input className="input" type="number" defaultValue={adminEditingUser.max_slaves_override !== null ? adminEditingUser.max_slaves_override : -1} id="adm_slots"/></div><div className="row mt8"><button className="btn btn-primary" onClick={async () => { const b = parseFloat(document.getElementById('adm_bal').value); const p = parseFloat(document.getElementById('adm_price').value); const v = parseInt(document.getElementById('adm_vip').value); const s = parseInt(document.getElementById('adm_slots').value); try { await post('/api/admin/users/edit', { user_id: adminEditingUser.id, balance: isNaN(b) ? null : b, price: isNaN(p) ? null : p, vip_level: isNaN(v) ? null : v, max_slaves_override: isNaN(s) || s < 0 ? -1 : s }); showToast('✅ Сохранено'); setAdminEditingUser(null); loadAdminTab('users'); } catch(e) { showToast('❌ ' + e.message); } }}>Сохранить</button><button className={`btn ${adminEditingUser.is_banned ? 'btn-green' : 'btn-danger'}`} onClick={async () => { try { await post('/api/admin/users/edit', { user_id: adminEditingUser.id, is_banned: !adminEditingUser.is_banned }); setAdminEditingUser(null); loadAdminTab('users'); } catch(e) { showToast('❌ ' + e.message); } }}>{adminEditingUser.is_banned ? 'Разбанить' : 'Выдать БАН'}</button></div></div></div></div>
      )}
      {subTab==='admin' && openConv && <AdminChatScreen conv={openConv} onBack={()=>{setOpenConv(null); get('/api/admin/tickets').then(setTickets).catch(()=>{}); }} showToast={showToast}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
