<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>⛓ Рабство</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

:root {
  /* Apple-style dark palette */
  --bg:        #000000;
  --bg2:       #0f0f0f;
  --bg3:       #1c1c1e;
  --bg4:       #2c2c2e;
  --border:    rgba(255,255,255,0.08);
  --border2:   rgba(255,255,255,0.14);
  --gold:      #FFD60A;
  --gold2:     #F0C000;
  --red:       #FF453A;
  --green:     #30D158;
  --blue:      #0A84FF;
  --purple:    #BF5AF2;
  --text:      #FFFFFF;
  --text2:     rgba(255,255,255,0.72);
  --text3:     rgba(255,255,255,0.40);
  --card:      rgba(28,28,30,0.9);
  --r:         16px;
  --r2:        12px;
  --font:      'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body, #root { height:100%; width:100%; overflow:hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.5;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}

/* ── SCROLLABLE ── */
.scroll, .content {
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.scroll::-webkit-scrollbar,
.content::-webkit-scrollbar { width: 0; }

/* ── LAYOUT ── */
.app    { display:flex; flex-direction:column; height:100vh; height:100dvh; }
.screen { flex:1; overflow:hidden; display:flex; flex-direction:column; }
.content { flex:1; overflow-y:auto; padding:0 0 16px; }

/* ── NAV ── */
.nav {
  display: flex; align-items: flex-start; justify-content: space-around;
  padding: 10px 4px max(12px, env(safe-area-inset-bottom));
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-top: 0.5px solid var(--border2);
  flex-shrink: 0;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: none; border: none; color: var(--text3); cursor: pointer;
  padding: 4px 12px; border-radius: 10px; transition: color .15s;
  font-family: var(--font); font-size: 10px; font-weight: 500;
  letter-spacing: 0.2px;
}
.nav-btn .ico { font-size: 22px; line-height: 1; }
.nav-btn.active { color: var(--gold); }
.nav-btn:active { opacity: 0.6; }

/* ── HEADER ── */
.hdr {
  padding: 20px 20px 12px;
  flex-shrink: 0;
}
.hdr-title {
  font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
  color: var(--text);
}
.hdr-sub { font-size: 13px; color: var(--text3); margin-top: 2px; font-weight: 400; }

/* ── CARDS ── */
.card {
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-radius: var(--r);
  padding: 16px;
}
.card-press { transition: opacity .12s; cursor: pointer; }
.card-press:active { opacity: 0.7; }

/* ── HERO PROFILE ── */
.hero {
  margin: 8px 16px 0;
  background: linear-gradient(145deg, #1c1c1e 0%, #2c2c2e 100%);
  border: 0.5px solid var(--border2);
  border-radius: 20px;
  padding: 20px;
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; top: -60px; right: -40px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(255,214,10,0.08) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none;
}
.hero-row { display: flex; align-items: center; gap: 16px; }
.avatar-wrap { position: relative; flex-shrink: 0; }
.avatar {
  width: 68px; height: 68px; border-radius: 50%;
  background: linear-gradient(135deg, #3a3a3c, #2c2c2e);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 700; color: var(--gold);
  font-family: var(--font); overflow: hidden;
  border: 2px solid rgba(255,214,10,0.3);
}
.avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.avatar-sm {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--bg4);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: var(--text3);
  overflow: hidden; flex-shrink: 0; border: 0.5px solid var(--border);
}
.avatar-sm img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.vip-badge {
  position: absolute; bottom: -2px; right: -2px;
  background: var(--bg); border-radius: 50%;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; border: 1px solid var(--border2);
}
.hero-name {
  font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hero-handle { font-size: 13px; color: var(--text3); margin-top: 1px; }
.hero-status { font-size: 13px; margin-top: 4px; }
.hero-stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px; margin-top: 16px;
}
.stat {
  background: rgba(255,255,255,0.05);
  border: 0.5px solid var(--border);
  border-radius: var(--r2); padding: 12px 8px; text-align: center;
}
.stat-val {
  font-size: 18px; font-weight: 700; color: var(--text);
  letter-spacing: -0.5px;
}
.stat-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; font-weight: 500; }

/* ── EFFECTS ── */
.effects-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.effect-chip {
  font-size: 12px; padding: 4px 10px; border-radius: 20px;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid var(--border2);
  color: var(--text2);
  display: flex; align-items: center; gap: 4px; font-weight: 500;
}
.effect-chip.gold { background: rgba(255,214,10,0.1); border-color: rgba(255,214,10,0.3); color: var(--gold); }
.effect-chip.green { background: rgba(48,209,88,0.1); border-color: rgba(48,209,88,0.3); color: var(--green); }
.effect-chip.red { background: rgba(255,69,58,0.1); border-color: rgba(255,69,58,0.3); color: var(--red); }

/* ── BUTTONS ── */
.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  border: none; border-radius: var(--r2); cursor: pointer;
  font-family: var(--font); font-weight: 600; letter-spacing: -0.1px;
  transition: opacity .12s; padding: 14px 20px; width: 100%;
  font-size: 15px;
}
.btn:active { opacity: 0.7; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn-primary { background: var(--gold); color: #000; }
.btn-danger   { background: var(--red); color: #fff; }
.btn-ghost    { background: rgba(255,255,255,0.08); color: var(--text); border: 0.5px solid var(--border2); }
.btn-green    { background: var(--green); color: #000; }
.btn-blue     { background: var(--blue); color: #fff; }
.btn-sm { padding: 9px 14px; font-size: 13px; border-radius: 10px; width: auto; }

/* ── SECTIONS ── */
.section { padding: 0 16px; margin-top: 16px; }
.section-title {
  font-size: 12px; font-weight: 600; color: var(--text3);
  letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px;
}

/* ── LIST ITEMS ── */
.list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 0.5px solid var(--border);
}
.list-item:last-child { border-bottom: none; }
.li-info { flex: 1; min-width: 0; }
.li-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-sub  { font-size: 12px; color: var(--text3); margin-top: 2px; }
.li-right { text-align: right; flex-shrink: 0; }
.li-price { font-size: 14px; font-weight: 700; color: var(--gold); }

/* ── SEARCH ── */
.input {
  width: 100%; background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--r2); color: var(--text); font-family: var(--font);
  font-size: 15px; padding: 13px 16px; outline: none; transition: border-color .15s;
}
.input:focus { border-color: var(--gold); }
.input::placeholder { color: var(--text3); }

/* ── PLAYER CARD ── */
.player-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--r); padding: 14px;
  cursor: pointer; transition: all .12s;
}
.player-card:active { opacity: 0.7; transform: scale(0.98); }
.pc-meta { flex: 1; min-width: 0; }
.pc-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pc-sub  { font-size: 12px; color: var(--text3); margin-top: 2px; }
.pc-price { font-size: 15px; font-weight: 700; color: var(--gold); }

/* ── TOP / RANK ── */
.rank-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px; border-bottom: 0.5px solid var(--border);
}
.rank-num {
  font-size: 13px; font-weight: 700; width: 28px;
  text-align: center; flex-shrink: 0; color: var(--text3);
}
.rank-meta { flex: 1; min-width: 0; }
.rank-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-sub  { font-size: 12px; color: var(--text3); }
.rank-val  { font-size: 15px; font-weight: 700; color: var(--gold); }

/* ── TABS ── */
.tabs {
  display: flex; background: var(--bg);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0; padding: 0 4px;
}
.tab {
  flex: 1; padding: 12px 6px; text-align: center; cursor: pointer;
  font-size: 12px; font-weight: 600; color: var(--text3);
  border-bottom: 2px solid transparent; border-top: none;
  border-left: none; border-right: none;
  background: none; transition: all .15s; letter-spacing: 0.3px;
}
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── SHOP ── */
.shop-item {
  background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--r); padding: 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.si-ico  { font-size: 30px; line-height: 1; }
.si-name { font-weight: 600; font-size: 14px; }
.si-desc { font-size: 12px; color: var(--text3); flex: 1; line-height: 1.4; }
.si-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 4px; }
.si-price { font-size: 13px; font-weight: 700; color: var(--gold); }

/* ── CHAT ── */
.msg-wrap { display: flex; flex-direction: column; margin-bottom: 6px; }
.msg-wrap.me  { align-items: flex-end; }
.msg-wrap.them { align-items: flex-start; }
.msg-bubble {
  max-width: 76%; padding: 10px 14px; border-radius: 18px;
  font-size: 14px; line-height: 1.5;
}
.msg-bubble.me   { background: var(--gold); color: #000; border-bottom-right-radius: 4px; }
.msg-bubble.them { background: var(--bg3); color: var(--text); border-bottom-left-radius: 4px; }
.msg-time { font-size: 10px; opacity: 0.5; margin-top: 3px; padding: 0 2px; }
.msg-sender { font-size: 11px; font-weight: 600; margin-bottom: 3px; color: var(--gold); }
.chat-area { display: flex; flex-direction: column; padding: 12px 16px; min-height: 100%; }
.chat-input-wrap {
  padding: 10px 16px max(10px, env(safe-area-inset-bottom));
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end;
}
.chat-input {
  flex: 1; background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: 20px; color: var(--text); font-family: var(--font);
  font-size: 15px; padding: 10px 16px; outline: none; resize: none;
  max-height: 80px; transition: border-color .15s;
}
.chat-input:focus { border-color: var(--gold); }

/* Ticket conversation list item */
.conv-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px; border-bottom: 0.5px solid var(--border);
  cursor: pointer; transition: background .1s;
}
.conv-item:active { background: rgba(255,255,255,0.04); }
.conv-meta { flex: 1; min-width: 0; }
.conv-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-last { font-size: 13px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.conv-right { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.conv-time  { font-size: 11px; color: var(--text3); }
.unread-dot {
  background: var(--gold); color: #000; border-radius: 10px;
  font-size: 11px; font-weight: 700; padding: 1px 6px; min-width: 18px;
  text-align: center;
}

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.72);
  z-index: 100; display: flex; align-items: flex-end;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--bg2); border-top-left-radius: 24px; border-top-right-radius: 24px;
  border-top: 0.5px solid var(--border2);
  padding: 20px 20px max(24px, env(safe-area-inset-bottom));
  width: 100%; max-height: 88vh; overflow-y: auto;
  animation: slideUp .28s cubic-bezier(.32,0,.67,0);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:36px; height:4px; border-radius:2px; background:var(--bg4); margin:0 auto 20px; }
.modal-title  { font-size:18px; font-weight:700; letter-spacing:-0.3px; margin-bottom:16px; }

/* ── ADMIN ── */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.admin-stat {
  background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--r); padding: 16px;
}
.as-val { font-size:22px; font-weight:700; color:var(--text); letter-spacing:-0.5px; }
.as-ico { font-size:20px; margin-bottom:6px; }
.as-lbl { font-size:12px; color:var(--text3); margin-top:2px; }

/* ── UTILS ── */
.gap6  { display:flex; flex-direction:column; gap:6px; }
.gap8  { display:flex; flex-direction:column; gap:8px; }
.gap12 { display:flex; flex-direction:column; gap:12px; }
.row   { display:flex; align-items:center; gap:8px; }
.row-sb { display:flex; align-items:center; justify-content:space-between; }
.mt4  { margin-top:4px; }
.mt8  { margin-top:8px; }
.mt12 { margin-top:12px; }
.mt16 { margin-top:16px; }
.mt20 { margin-top:20px; }
.f11  { font-size:11px; }
.f12  { font-size:12px; }
.f13  { font-size:13px; }
.fw6  { font-weight:600; }
.fw7  { font-weight:700; }
.text-gold   { color:var(--gold); }
.text-red    { color:var(--red); }
.text-green  { color:var(--green); }
.text-muted  { color:var(--text3); }
.text-2      { color:var(--text2); }
.text-center { text-align:center; }
.divider     { height:0.5px; background:var(--border); margin:14px 0; }

/* ── NAME COLORS ── */
.clr-ruby { color:#FF453A; }
.clr-gold { color:#FFD60A; }
.clr-neon { color:#30D158; }

/* ── ADMIN GRADIENT NAME (#9) ── */
.admin-gradient-name {
  background: linear-gradient(90deg, #FFD60A 0%, #FF9F0A 16%, #FF6B6B 33%, #BF5AF2 50%, #0A84FF 66%, #30D158 83%, #FFD60A 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: adminShimmer 2.5s linear infinite;
  font-weight: 700;
}
@keyframes adminShimmer {
  to { background-position: 200% center; }
}

/* ── BAN SCREEN (#10) ── */
.ban-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px; text-align: center;
}
.ban-icon { font-size: 72px; margin-bottom: 24px; }
.ban-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; color: var(--red); margin-bottom: 12px; }
.ban-sub { font-size: 15px; color: var(--text2); line-height: 1.6; max-width: 300px; margin-bottom: 36px; }

/* ── STORY PREVIEW CARD (#12) ── */
.story-card-wrap {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
}
.story-card {
  width: 240px; height: 400px;
  background: linear-gradient(160deg, #0a0a0a 0%, #1a0a2e 40%, #0d1a3a 100%);
  border-radius: 20px; border: 0.5px solid rgba(255,214,10,0.3);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px 20px; gap: 12px; position: relative; overflow: hidden;
  box-shadow: 0 0 40px rgba(255,214,10,0.08), 0 20px 60px rgba(0,0,0,0.6);
}
.story-card::before {
  content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%);
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,214,10,0.12) 0%, transparent 70%);
  border-radius: 50%;
}
.story-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(to top, rgba(255,214,10,0.05), transparent);
}
.story-logo { font-size: 13px; font-weight: 800; letter-spacing: 2px; color: var(--gold); opacity: 0.7; text-transform: uppercase; }
.story-avatar-ring {
  width: 90px; height: 90px; border-radius: 50%;
  border: 2.5px solid var(--gold);
  box-shadow: 0 0 20px rgba(255,214,10,0.3);
  overflow: hidden; display: flex; align-items: center; justify-content: center;
  background: var(--bg4); font-size: 32px; font-weight: 700; color: var(--gold);
}
.story-avatar-ring img { width: 100%; height: 100%; object-fit: cover; }
.story-user-name { font-size: 16px; font-weight: 700; color: #fff; text-align: center; }
.story-price-label { font-size: 11px; color: rgba(255,214,10,0.7); letter-spacing: 1px; text-transform: uppercase; }
.story-price-value { font-size: 28px; font-weight: 800; color: var(--gold); letter-spacing: -0.5px; }
.story-cta { font-size: 12px; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.4; }
.story-chain { font-size: 24px; }

/* ── PREMIUM DESIGN ENHANCEMENTS (#11) ── */
.hero {
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 0.5px 0 rgba(255,255,255,0.06);
}
.card {
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}
.btn-primary {
  box-shadow: 0 4px 16px rgba(255,214,10,0.25);
  letter-spacing: 0.1px;
}
.btn-primary:active { box-shadow: none; }
.shop-item {
  transition: border-color .15s;
}
.shop-item:hover { border-color: rgba(255,214,10,0.3); }
.rank-item:first-child { background: linear-gradient(90deg, rgba(255,214,10,0.04), transparent); }

/* ── PROTECTION BADGE ── */
.protection-badge {
  font-size: 10px; font-weight: 600; color: var(--blue);
  background: rgba(10,132,255,0.12); border: 0.5px solid rgba(10,132,255,0.3);
  border-radius: 6px; padding: 2px 6px; display: inline-flex; align-items: center; gap: 3px;
}

/* ── LOADING ── */
.spinner {
  width:32px; height:32px; border:2.5px solid var(--bg4);
  border-top-color:var(--gold); border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-screen {
  height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:16px;
  background:var(--bg);
}
.loading-logo { font-size:48px; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  background:rgba(28,28,30,0.96); border:0.5px solid var(--border2);
  backdrop-filter:blur(20px); border-radius:14px;
  padding:12px 22px; font-size:14px; font-weight:600;
  z-index:200; white-space:nowrap; max-width:88vw;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  animation:fadeUp .2s ease;
}
@keyframes fadeUp { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

/* ── JOB TABLE ── */
.job-tier {
  background:var(--bg4); border-radius:12px; padding:12px 14px; margin-bottom:8px;
}
.job-tier-head { font-weight:700; font-size:13px; margin-bottom:8px; }

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const BASE = '';
let _initData = '';
let _botUsername = 'YourBot';

function getHeaders() {
  return { 'Content-Type':'application/json', 'x-init-data': _initData };
}
async function api(method, path, body) {
  const opts = { method, headers: getHeaders() };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || `Error ${r.status}`);
  return data;
}
const get  = (path)       => api('GET',  path);
const post = (path, body) => api('POST', path, body);

// ── TOAST ──
function useToast() {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, ms=2800) => {
    setToast(msg);
    setTimeout(() => setToast(null), ms);
  }, []);
  return [toast, show];
}

// ── AVATAR ──
function Avatar({ user, size=44 }) {
  const [err, setErr] = useState(false);
  const name = user?.first_name || user?.username || '?';
  const initial = name[0]?.toUpperCase() || '?';
  const cls = size >= 60 ? 'avatar' : 'avatar-sm';
  const style = size !== 44 && size !== 68
    ? { width: size, height: size, fontSize: size * 0.38 } : {};
  if (user?.photo_url && !err) {
    return (
      <div className={cls} style={style}>
        <img src={user.photo_url} alt="" onError={() => setErr(true)} />
      </div>
    );
  }
  return <div className={cls} style={style}>{initial}</div>;
}

// ── PLAYER NAME ──
function PlayerName({ user, style }) {
  const isAdmin = user.is_admin || user.is_admin_flag;
  const clr   = user.name_color && user.name_color !== 'default' ? `clr-${user.name_color}` : '';
  const emoji = isAdmin ? '⚜️ ' : (user.emoji_status ? user.emoji_status + ' ' : '');
  const name  = user.custom_name
    ? `${user.custom_name} (${user.first_name || user.username || `#${user.id}`})`
    : (user.first_name || user.username || `#${user.id}`);

  if (isAdmin) {
    return (
      <span className="admin-gradient-name" style={style}>
        {emoji}{name}
        {user.vip_level >= 3 && ' 👑'}
        {user.vip_level === 2 && ' 🥈'}
        {user.vip_level === 1 && ' 🥉'}
      </span>
    );
  }
  return (
    <span className={clr} style={style}>
      {emoji}{name}
      {user.vip_level >= 3 && ' 👑'}
      {user.vip_level === 2 && ' 🥈'}
      {user.vip_level === 1 && ' 🥉'}
    </span>
  );
}

// ── STORIES TIMER ──
function useCountdown(targetIso) {
  const [secs, setSecs] = useState(0);
  useEffect(() => {
    if (!targetIso) { setSecs(0); return; }
    function tick() {
      const diff = Math.max(0, Math.round((new Date(targetIso) - Date.now()) / 1000));
      setSecs(diff);
    }
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [targetIso]);
  return secs;
}
function fmtCountdown(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

// ── JOB PROBABILITIES MODAL ──
function JobProbsModal({ jobs, vipLevel, onClose, onSend, slaveName }) {
  const common   = jobs.filter(j => j.drop_chance === 70);
  const rare     = jobs.filter(j => j.drop_chance === 25);
  const legendary = jobs.filter(j => j.drop_chance === 5);

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-title">💼 Отправить на работу</div>
        <div className="f13 text-muted" style={{marginBottom:16}}>
          Раб: <span className="fw6 text-2">{slaveName}</span>
        </div>

        <div className="job-tier">
          <div className="job-tier-head text-2">🟢 Обычные — 70% шанс</div>
          {common.map(j => (
            <div className="job-tier-item" key={j.id}>
              <div className="job-tier-emo">{j.emoji}</div>
              <div className="job-tier-info">
                <div className="job-tier-name">{j.title}</div>
                <div className="job-tier-rc">{j.income_per_hour} RC/ч</div>
              </div>
            </div>
          ))}
        </div>

        <div className="job-tier">
          <div className="job-tier-head" style={{color:'var(--blue)'}}>🔵 Редкие — 25% шанс</div>
          {rare.map(j => (
            <div className="job-tier-item" key={j.id}>
              <div className="job-tier-emo">{j.emoji}</div>
              <div className="job-tier-info">
                <div className="job-tier-name">{j.title}</div>
                <div className="job-tier-rc">{j.income_per_hour} RC/ч</div>
              </div>
            </div>
          ))}
        </div>

        <div className="job-tier">
          <div className="job-tier-head" style={{color:'var(--gold)'}}>
            🟡 Легендарные — 5% шанс {vipLevel < 3 && <span className="text-muted">(нужен 👑 VIP)</span>}
          </div>
          {legendary.map(j => (
            <div className="job-tier-item" key={j.id}>
              <div className="job-tier-emo">{j.emoji}</div>
              <div className="job-tier-info">
                <div className="job-tier-name">{j.title}</div>
                <div className="job-tier-rc">{j.income_per_hour} RC/ч — только для VIP 👑</div>
              </div>
            </div>
          ))}
        </div>

        <div className="f12 text-muted" style={{marginBottom:16,lineHeight:1.5}}>
          ℹ️ Работа выбирается случайно по шансам. Без VIP 👑 легендарные заменяются редкими.
        </div>

        <button className="btn btn-primary" onClick={onSend}>
          🎲 Отправить на работу
        </button>
        <button className="btn btn-ghost mt8" onClick={onClose}>Отмена</button>
      </div>
    </div>
  );
}

// ── PROFILE SCREEN ──────────────────────────────────────────────────────────
function ProfileScreen({ user, onRefresh, onViewProfile }) {
  const [toast, showToast] = useToast();
  const [renaming, setRenaming] = useState(null);
  const [newName, setNewName] = useState('');
  const [loading, setLoading] = useState(false);
  const [jobs, setJobs] = useState([]);
  const [sendWorkSlave, setSendWorkSlave] = useState(null);
  const [showStoriesPreview, setShowStoriesPreview] = useState(false);
  const [storiesShareData, setStoriesShareData] = useState(null);
  const storiesCountdown = useCountdown(user.story_cooldown_until);

  // FIX #12: use actual bot username
  const refLink = `https://t.me/${user.bot_username || _botUsername}?start=ref_${user.id}`;

  useEffect(() => {
    get('/api/jobs').then(j => setJobs(j)).catch(() => {});
  }, []);

  async function doSelfbuy() {
    if (!confirm(`Выкупить себя за ${user.price.toFixed(0)} RC?`)) return;
    setLoading(true);
    try {
      await post('/api/selfbuy');
      showToast('🎉 Вы на свободе!');
      onRefresh();
    } catch(e) { showToast('❌ ' + e.message); }
    setLoading(false);
  }

  async function doRename() {
    if (!newName.trim()) return;
    try {
      await post('/api/rename', { slave_id: renaming, new_name: newName.trim() });
      showToast('✅ Кличка установлена');
      setRenaming(null); setNewName('');
      onRefresh();
    } catch(e) { showToast('❌ ' + e.message); }
  }

  async function doSendWork(slaveId) {
    try {
      const r = await post('/api/slaves/send_to_work', { slave_id: slaveId });
      showToast(`✅ ${r.job.emoji} ${r.job.title}`);
      setSendWorkSlave(null);
      onRefresh();
    } catch(e) { showToast('❌ ' + e.message); }
  }

  async function claimStories() {
    if (user.story_cooldown_until && new Date(user.story_cooldown_until) > new Date()) return;
    try {
      const r = await post('/api/stories/claim');
      showToast('📸 ' + r.msg);
      setShowStoriesPreview(false);
      onRefresh();
    } catch(e) {
      const msg = e.message;
      if (msg.startsWith('Cooldown:')) {
        showToast('⏱ Ещё не доступно!');
      } else {
        showToast('❌ ' + msg);
      }
    }
  }

  // #12: open stories preview — fetch share data then show card
  async function openStoriesPreview() {
    if (user.story_cooldown_until && new Date(user.story_cooldown_until) > new Date()) return;
    try {
      const data = await get('/api/stories/share_data');
      setStoriesShareData(data);
      setShowStoriesPreview(true);
    } catch { setShowStoriesPreview(true); }
  }

  const workingSlave = sendWorkSlave
    ? user.slaves.find(s => s.id === sendWorkSlave)
    : null;

  return (
    <div className="screen">
      {toast && <div className="toast">{toast}</div>}

      <div className="hdr">
        <div className="hdr-title">⛓ Рабство</div>
        <div className="hdr-sub">Сезон 1 · Социальная стратегия</div>
      </div>
      <div className="content">

        {/* Hero */}
        <div className="hero">
          <div className="hero-row">
            <div className="avatar-wrap">
              <Avatar user={user} size={68}/>
              {user.vip_level > 0 && (
                <div className="vip-badge">
                  {user.vip_level===3?'👑':user.vip_level===2?'🥈':'🥉'}
                </div>
              )}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div className="hero-name"><PlayerName user={user}/></div>
              <div className="hero-handle">{user.username ? `@${user.username}` : `#${user.id}`}</div>
              <div className="hero-status">
                {user.owner
                  ? <span className="text-red">⛓ Раб — {user.owner.first_name || '@'+user.owner.username}</span>
                  : <span className="text-green">✅ Свободен</span>}
              </div>
            </div>
          </div>
          <div className="hero-stats">
            <div className="stat">
              <div className="stat-val">{user.balance.toFixed(0)}</div>
              <div className="stat-lbl">💰 Баланс RC</div>
            </div>
            <div className="stat">
              <div className="stat-val">{user.price.toFixed(0)}</div>
              <div className="stat-lbl">🏷 Моя цена</div>
            </div>
            <div className="stat">
              <div className="stat-val">{user.slaves_count}</div>
              <div className="stat-lbl">⛓ Рабов</div>
            </div>
            {user.total_income_per_hour > 0 && (
              <div className="stat" style={{gridColumn:'1/-1'}}>
                <div className="stat-val text-green">+{user.total_income_per_hour.toFixed(1)}</div>
                <div className="stat-lbl">📈 RC/ч от рабов</div>
              </div>
            )}
          </div>
          {(user.shield_active || user.stealth_active || user.booster_active || user.chains_active) && (
            <div className="effects-row">
              {user.shield_active  && <div className="effect-chip gold">🛡 Щит</div>}
              {user.stealth_active && <div className="effect-chip">👻 Стелс</div>}
              {user.booster_active && <div className="effect-chip green">🚀 Буст ×{user.booster_mult}</div>}
              {user.chains_active  && <div className="effect-chip red">⛓ Оковы</div>}
            </div>
          )}
        </div>

        {/* Self-buy */}
        {user.owner && (
          <div className="section">
            <button className="btn btn-danger" onClick={doSelfbuy} disabled={loading}>
              {loading ? '...' : `🔓 Выкупить себя (${user.price.toFixed(0)} RC)`}
            </button>
          </div>
        )}

        {/* Ref link */}
        <div className="section">
          <button className="btn btn-ghost"
            onClick={() => { navigator.clipboard?.writeText(refLink); showToast('🔗 Ссылка скопирована!'); }}>
            🔗 Пригласить друга (реферальная ссылка)
          </button>
        </div>

        {/* #12: Stories with preview card */}
        <div className="stories-card">
          <div className="stories-ico">📸</div>
          <div className="stories-title">Stories Бонус</div>
          <div className="stories-sub">Опубликуйте Story о нас — получите +250 RC и случайный предмет</div>
          {user.story_cooldown_until && storiesCountdown > 0 ? (
            <>
              <div className="stories-timer">{fmtCountdown(storiesCountdown)}</div>
              <div className="f12 text-muted mt4">до следующей возможности</div>
            </>
          ) : (
            <button className="btn btn-primary mt12" style={{borderRadius:12}} onClick={openStoriesPreview}>
              Получить бонус ✨
            </button>
          )}
        </div>

        {user.slaves.length > 0 && (
          <div className="section">
            <div className="section-title">Мои рабы ({user.slaves_count})</div>
            <div className="card">
              {user.slaves.map(s => {
                const protectedUntil = s.purchase_protection_until ? new Date(s.purchase_protection_until) : null;
                const isProtected = protectedUntil && protectedUntil > new Date();
                return (
                  <div className="list-item" key={s.id}>
                    <div onClick={() => onViewProfile(s.id)} style={{cursor:'pointer'}}>
                      <Avatar user={s} size={44}/>
                    </div>
                    <div className="li-info" style={{cursor:'pointer'}} onClick={() => onViewProfile(s.id)}>
                      <div className="li-name">
                        {s.custom_name
                          ? <><span className="text-gold">{s.custom_name}</span> <span className="text-muted f12">({s.first_name||s.username})</span></>
                          : (s.first_name || s.username || `#${s.id}`)}
                      </div>
                      <div className="li-sub">
                        {s.working
                          ? <><span>{s.job_emoji} {s.job_title}</span><span className="text-green"> · +{s.income_per_hour_effective.toFixed(1)} RC/ч</span></>
                          : <span>😴 Не работает</span>}
                      </div>
                      <div className="row mt4" style={{gap:6}}>
                        <span className="f11 text-muted">{s.price.toFixed(0)} RC</span>
                        {isProtected && <span className="protection-badge">🔒 защита</span>}
                      </div>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:5,alignItems:'flex-end'}}>
                      <button className="btn btn-primary btn-sm"
                        onClick={() => setSendWorkSlave(s.id)}>
                        💼
                      </button>
                      <button className="btn btn-ghost btn-sm"
                        onClick={() => { setRenaming(s.id); setNewName(s.custom_name||''); }}>
                        ✏️
                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="f12 text-muted mt8">
              💡 Нажмите 💼 чтобы отправить раба на работу. Зелёный доход — RC/ч с этого раба.
            </div>
          </div>
        )}
      </div>

      {/* FIX #2 + #5: send to work modal with probabilities */}
      {sendWorkSlave && workingSlave && jobs.length > 0 && (
        <JobProbsModal
          jobs={jobs}
          vipLevel={user.vip_level}
          slaveName={workingSlave.custom_name || workingSlave.first_name || workingSlave.username || `#${workingSlave.id}`}
          onClose={() => setSendWorkSlave(null)}
          onSend={() => doSendWork(sendWorkSlave)}
        />
      )}

      {/* #12: Stories Preview Modal */}
      {showStoriesPreview && (
        <div className="overlay" onClick={() => setShowStoriesPreview(false)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title" style={{textAlign:'center'}}>📸 Ваша Story</div>
            <div className="f12 text-muted" style={{textAlign:'center',marginBottom:20}}>
              Скриншотьте карточку, опубликуйте Story и получите бонус
            </div>
            <div className="story-card-wrap">
              <div className="story-card">
                <div className="story-logo">⛓ РАБСТВО · СЕЗОН 1</div>
                <div className="story-avatar-ring">
                  {storiesShareData?.photo_url
                    ? <img src={storiesShareData.photo_url} alt=""/>
                    : (user.first_name?.[0] || '?')}
                </div>
                <div className="story-user-name">{storiesShareData?.name || user.first_name || user.username}</div>
                <div className="story-price-label">моя стоимость</div>
                <div className="story-price-value">
                  {(storiesShareData?.price || user.price).toFixed(0)} RC
                </div>
                <div className="story-chain">⛓</div>
                <div className="story-cta">Купи меня в игре<br/>РАБСТВО в Telegram</div>
              </div>
            </div>
            <div className="gap8 mt16">
              <button className="btn btn-ghost"
                onClick={() => {
                  const txt = storiesShareData?.share_text || `💰 Моя цена в РАБСТВО: ${user.price.toFixed(0)} RC!`;
                  navigator.clipboard?.writeText(txt);
                  showToast('📋 Текст скопирован!');
                }}>
                📋 Скопировать текст для подписи
              </button>
              <button className="btn btn-primary" onClick={claimStories}>
                ✅ Подать заявку на бонус (+250 RC)
              </button>
              <button className="btn btn-ghost" onClick={() => setShowStoriesPreview(false)}>Отмена</button>
            </div>
          </div>
        </div>
      )}

      {/* Rename modal */}
      {renaming && (
        <div className="overlay" onClick={() => setRenaming(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">✏️ Дать кличку</div>
            <input className="input" placeholder="Кличка (до 32 символов)"
              value={newName} maxLength={32}
              onChange={e => setNewName(e.target.value)}
              onKeyDown={e => e.key==='Enter' && doRename()}
              autoFocus/>
            <div className="row mt12">
              <button className="btn btn-primary" onClick={doRename}>Сохранить</button>
              <button className="btn btn-ghost" onClick={() => setRenaming(null)}>Отмена</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── USER PROFILE VIEW (FIX #4) ──────────────────────────────────────────────
function UserProfileScreen({ uid, currentUserId, onBack, onBuy }) {
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);
  const [buying, setBuying] = useState(false);
  const [toast, showToast] = useToast();
  const [viewingSlaveId, setViewingSlaveId] = useState(null);

  useEffect(() => {
    setLoading(true);
    get(`/api/profile/${uid}`)
      .then(p => { setProfile(p); setLoading(false); })
      .catch(() => setLoading(false));
  }, [uid]);

  async function doBuy() {
    setBuying(true);
    try {
      await post('/api/buy', { target_id: uid });
      showToast('✅ Куплен!');
      onBuy();
      setTimeout(onBack, 1500);
    } catch(e) { showToast('❌ ' + e.message); }
    setBuying(false);
  }

  if (loading) return (
    <div className="screen">
      <div style={{display:'flex',justifyContent:'center',padding:60}}>
        <div className="spinner"/>
      </div>
    </div>
  );

  if (!profile) return (
    <div className="screen">
      <div className="section mt20 text-center text-muted">Профиль не найден</div>
    </div>
  );

  if (viewingSlaveId) {
    return (
      <UserProfileScreen
        uid={viewingSlaveId}
        currentUserId={currentUserId}
        onBack={() => setViewingSlaveId(null)}
        onBuy={onBuy}
      />
    );
  }

  return (
    <div className="screen">
      {toast && <div className="toast">{toast}</div>}
      <div className="hdr">
        <button className="back-btn" onClick={onBack}>
          ‹ Назад
        </button>
        <div className="hdr-title mt8">
          <PlayerName user={profile}/>
        </div>
        <div className="hdr-sub">{profile.username ? `@${profile.username}` : `ID: ${profile.id}`}</div>
      </div>
      <div className="content">
        <div className="hero">
          <div className="hero-row">
            <div className="avatar-wrap">
              <Avatar user={profile} size={68}/>
              {profile.vip_level > 0 && (
                <div className="vip-badge">
                  {profile.vip_level===3?'👑':profile.vip_level===2?'🥈':'🥉'}
                </div>
              )}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div className="hero-name"><PlayerName user={profile}/></div>
              <div className="hero-handle">{profile.username ? `@${profile.username}` : `#${profile.id}`}</div>
              <div className="hero-status">
                {profile.owner
                  ? <span className="text-red">⛓ Раб</span>
                  : <span className="text-green">✅ Свободен</span>}
              </div>
            </div>
          </div>
          <div className="hero-stats">
            <div className="stat">
              <div className="stat-val">{profile.price.toFixed(0)}</div>
              <div className="stat-lbl">🏷 Цена</div>
            </div>
            <div className="stat">
              <div className="stat-val">{profile.slaves_count}</div>

        {uid !== currentUserId && (

// ── SEARCH SCREEN ────────────────────────────────────────────────────────────
function SearchScreen({ user, onBuy, onViewProfile }) {
  const [q, setQ]             = useState('');
  const [minP, setMinP]       = useState('');
  const [maxP, setMaxP]       = useState('');
  const [results, setResults] = useState([]);
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState(null);
  const [toast, showToast]    = useToast();

  async function doSearch(random=false, newcomers=false) {
    setLoading(true);
    try {
      let url = '/api/search?';
      if (random)         url += 'random_pick=true';
      else if (newcomers) url += 'newcomers=true';
      else {
        if (q)    url += `q=${encodeURIComponent(q)}&`;
        if (minP) url += `min_price=${minP}&`;
        if (maxP) url += `max_price=${maxP}&`;
      }
      const data = await get(url);
      setResults(Array.isArray(data) ? data : [data].filter(Boolean));
    } catch(e) { showToast('❌ ' + e.message); }
    setLoading(false);
  }

  async function doBuy() {
    if (!selected) return;
    try {
      await post('/api/buy', { target_id: selected.id });
      showToast('✅ Куплен!');
      setSelected(null);
      doSearch();
      onBuy();
    } catch(e) { showToast('❌ ' + e.message); }
  }

  useEffect(() => { doSearch(false, true); }, []);

  return (
    <div className="screen">
      {toast && <div className="toast">{toast}</div>}
      <div className="hdr">
        <div className="hdr-title">🔍 Поиск</div>
        <div className="hdr-sub">Найди следующего раба</div>
      </div>
      <div className="content">
        <div className="section">
          <input className="input" placeholder="Поиск по имени или @username"
            value={q} onChange={e => setQ(e.target.value)}
            onKeyDown={e => e.key==='Enter' && doSearch()}/>
          <div className="row mt8">
            <input className="input" placeholder="Мин RC" type="number" style={{flex:1}}
              value={minP} onChange={e => setMinP(e.target.value)}/>
            <input className="input" placeholder="Макс RC" type="number" style={{flex:1}}
              value={maxP} onChange={e => setMaxP(e.target.value)}/>
          </div>
          <div className="row mt8">
            <button className="btn btn-primary" style={{flex:1}} onClick={() => doSearch()}>
              {loading ? <div className="spinner" style={{width:18,height:18,borderWidth:2}}/> : '🔍 Найти'}
            </button>
            <button className="btn btn-ghost" style={{flex:1}} onClick={() => doSearch(true)}>
              🎲 Случайная
            </button>
          </div>
          <button className="btn btn-ghost mt8" onClick={() => doSearch(false,true)}>
            🆕 Новые игроки
          </button>
        </div>

        <div className="section mt12">
          <div className="section-title">Результаты ({results.length})</div>
          <div className="gap8">
            {results.map(p => (
              <div className="player-card" key={p.id}>
                <div onClick={() => onViewProfile(p.id)} style={{cursor:'pointer'}}>
                  <Avatar user={p} size={44}/>
                </div>
                <div className="pc-meta" onClick={() => p.owner_id !== user.id && setSelected(p)} style={{cursor:'pointer'}}>
                  <div className="pc-name">
                    {p.is_admin_flag
                      ? <span className="admin-gradient-name">⚜️ {p.custom_name || p.first_name || p.username || `#${p.id}`}</span>
                      : (p.custom_name
                        ? <><span className="text-gold">{p.custom_name}</span> <span className="text-muted f12">({p.first_name||p.username})</span></>
                        : (p.first_name || p.username || `#${p.id}`))
                    }
                    {p.vip_level>=3&&' 👑'}{p.vip_level===2&&' 🥈'}{p.vip_level===1&&' 🥉'}
                  </div>
                  <div className="pc-sub">@{p.username||p.id}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                  <div className="pc-price">{parseFloat(p.current_price).toFixed(0)} RC</div>
                  {p.owner_id === user.id
                    ? <span className="f11 fw6" style={{padding:'5px 10px',background:'var(--bg4)',borderRadius:8,color:'var(--text3)'}}>⛓ Ваш</span>
                    : <button className="btn btn-primary btn-sm" onClick={() => setSelected(p)}>⛓ Купить</button>
                  }
                </div>
              </div>
            ))}
            {results.length===0 && !loading && (
              <div className="text-center text-muted" style={{padding:'32px 0'}}>
                Никого нет. Попробуй другой запрос.
              </div>
            )}
          </div>
        </div>
      </div>

      {selected && (
        <div className="overlay" onClick={() => setSelected(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">⛓ Купить игрока</div>
            <div className="row" style={{marginBottom:16}}>
              <Avatar user={selected} size={52}/>
              <div>
                <div className="fw7 f13">{selected.first_name || selected.username || `#${selected.id}`}</div>
                <div className="text-muted f12">@{selected.username || selected.id}</div>
              </div>
            </div>
            <div className="card" style={{marginBottom:16}}>
              <div className="row-sb">
                <span className="text-muted f13">Стоимость</span>
                <span className="fw7 text-gold">{parseFloat(selected.current_price).toFixed(0)} RC</span>
              </div>
              <div className="row-sb mt8">
                <span className="text-muted f13">Ваш баланс</span>
                <span className={`fw7 f13 ${user.balance >= parseFloat(selected.current_price) ? 'text-green' : 'text-red'}`}>
                  {user.balance.toFixed(0)} RC
                </span>
              </div>
              <div className="row-sb mt8">
                <span className="text-muted f13">Комиссия системы</span>
                <span className="text-muted f13">10%</span>
              </div>
              <div className="divider"/>
              <div className="f12 text-muted" style={{lineHeight:1.5}}>
                После покупки цена раба вырастет на 10–20%. Назначьте ему работу вручную кнопкой 💼.
              </div>
            </div>
            {user.balance < parseFloat(selected.current_price)
              ? <button className="btn btn-ghost" disabled>❌ Недостаточно RC</button>
              : <button className="btn btn-primary" onClick={doBuy}>⛓ Купить за {parseFloat(selected.current_price).toFixed(0)} RC</button>
            }
          </div>
        </div>
      )}
    </div>
  );
}

// ── SHOP SCREEN ──────────────────────────────────────────────────────────────
function ShopScreen({ user, onRefresh }) {
  const [shop, setShop]             = useState(null);
  const [tab, setTab]               = useState('items');
  const [selectedSlave, setSelectedSlave] = useState('');
  const [toast, showToast]          = useToast();
  const [promoCode, setPromoCode]   = useState('');
  const [loading, setLoading]       = useState({});
  const tg = window.Telegram?.WebApp;

  async function load() {
    try { setShop(await get('/api/shop')); } catch {}
  }
  useEffect(() => { load(); }, []);

  // FIX #9: proper Stars payment via invoice
  async function buyItem(itemType, cosmeticId=null) {
    const key = itemType + (cosmeticId||'');
    setLoading(l => ({...l, [key]: true}));
    try {
      const body = { item_type: itemType };
      if (cosmeticId)   body.cosmetic_id = cosmeticId;
      if (itemType === 'chains') {
        if (!selectedSlave) { showToast('Выберите раба для оков'); setLoading(l => ({...l, [key]: false})); return; }
        body.target_slave_id = parseInt(selectedSlave);
      }
      const r = await post('/api/shop/invoice', body);
      if (r.invoice_link && tg?.openInvoice) {
        tg.openInvoice(r.invoice_link, (status) => {
          if (status === 'paid') {
            showToast('✅ Оплачено! Предмет активируется.');
            onRefresh();
          } else if (status === 'cancelled') {
            showToast('Платёж отменён');
          } else {
            showToast('⚠️ Статус: ' + status);
          }
        });
      } else {
        showToast('⚠️ Не удалось открыть оплату');
      }
    } catch(e) { showToast('❌ ' + e.message); }
    setLoading(l => ({...l, [key]: false}));
  }

  // #6: buy with in-game RC
  async function buyItemRC(itemType, cosmeticId=null) {
    const key = 'rc_' + itemType + (cosmeticId||'');
    setLoading(l => ({...l, [key]: true}));
    try {
      const body = { item_type: itemType };
      if (cosmeticId) body.cosmetic_id = cosmeticId;
      if (itemType === 'chains') {
        if (!selectedSlave) { showToast('Выберите раба для оков'); setLoading(l => ({...l, [key]: false})); return; }
        body.target_slave_id = parseInt(selectedSlave);
      }
      const r = await post('/api/shop/buy_rc', body);
      showToast(`✅ Куплено за ${r.spent_rc} RC!`);
      onRefresh(); load();
    } catch(e) { showToast('❌ ' + e.message); }
    setLoading(l => ({...l, [key]: false}));
  }

  async function usePromo() {
    if (!promoCode.trim()) return;
    try {
      const r = await post('/api/promo', { code: promoCode.trim() });
      showToast(`🎁 +${r.reward} RC!`);
      setPromoCode(''); onRefresh();
    } catch(e) { showToast('❌ ' + e.message); }
  }

  const cosmByType = useMemo(() => shop ? {
    colors: shop.cosmetics.filter(c => c.type==='color'),
    frames: shop.cosmetics.filter(c => c.type==='frame'),
    emojis: shop.cosmetics.filter(c => c.type==='emoji'),
  } : {}, [shop]);

  // FIX #7: shop items that are "for self" vs "for slave"
  const selfItems  = shop?.items.filter(i => i.id !== 'chains') || [];
  const slaveItems = shop?.items.filter(i => i.id === 'chains') || [];

  return (
    <div className="screen">
      {toast && <div className="toast">{toast}</div>}
      <div className="hdr">
        <div className="hdr-title">🛒 Магазин</div>
        <div className="hdr-sub">Покупки за Telegram Stars ⭐</div>
      </div>
      <div className="tabs">
        {['items','cosmetics','promo'].map(t => (
          <button key={t} className={`tab${tab===t?' active':''}`} onClick={() => setTab(t)}>
            {t==='items'?'ДЛЯ СЕБЯ':t==='cosmetics'?'КОСМЕТИКА':'ПРОМОКОД'}
          </button>
        ))}
      </div>
      <div className="content">
        {!shop ? (
          <div style={{display:'flex',justifyContent:'center',padding:40}}>
            <div className="spinner"/>
          </div>
        ) : tab==='items' ? (
          <div className="section">
            <div className="section-title">Для вас</div>
            {selfItems.map(item => (
              <div className="shop-item mt8" key={item.id}>
                <div className="row-sb">
                  <div>
                    <div className="si-name">{item.name}</div>
                    <div className="si-desc mt4">{item.desc}</div>
                  </div>
                  <div className="f12" style={{fontSize:28}}>{item.name.split(' ')[0]}</div>
                </div>
                <div className="si-foot">
                  <div>
                    <div className="si-price">{item.price_stars} ⭐</div>
                    {item.price_rc > 0 && <div className="f11 text-muted mt4">или {item.price_rc.toLocaleString()} RC</div>}
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    {item.price_rc > 0 && (
                      <button className="btn btn-ghost btn-sm"
                        disabled={loading['rc_'+item.id]}
                        onClick={() => buyItemRC(item.id)}>
                        {loading['rc_'+item.id] ? '...' : `RC`}
                      </button>
                    )}
                    <button className="btn btn-primary btn-sm"
                      disabled={loading[item.id]}
                      onClick={() => buyItem(item.id)}>
                      {loading[item.id] ? '...' : '⭐'}
                    </button>
                  </div>
                </div>
              </div>
            ))}

            {/* chains are separate for slaves */}
            {user.slaves.length > 0 && (
              <>
                <div className="section-title mt20">Для рабов</div>
                <div className="f12 text-muted" style={{marginBottom:10}}>
                  Выберите раба, на которого надеть оковы:

                <select className="input" value={selectedSlave} onChange={e => setSelectedSlave(e.target.value)} style={{marginBottom:10}}>
                  <option value="">— Выберите раба —</option>
                  {user.slaves.map(s => (

            </div>
            <input className="input" placeholder="ПРОМОКОД" value={promoCode}
              onChange={e => setPromoCode(e.target.value.toUpperCase())}
              onKeyDown={e => e.key==='Enter' && usePromo()}/>
            <button className="btn btn-primary mt8" onClick={usePromo}>
              🎁 Применить
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── SUPPORT SCREEN ───────────────────────────────────────────────────────────
function SupportScreen({ user }) {
  const [msgs, setMsgs] = useState([]);
  const [text, setText] = useState('');
  const [toast, showToast] = useToast();
  const bottomRef = useRef(null);

  async function load() {
    try { setMsgs(await get('/api/support/history')); } catch {}
  }
  useEffect(() => { load(); }, []);
  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs]);

  async function send() {
    if (!text.trim()) return;
    try {
      await post('/api/support', { message: text.trim() });
      setText(''); load();
    } catch(e) { showToast('❌ ' + e.message); }
  }

  return (
    <div className="screen">
      {toast && <div className="toast">{toast}</div>}
      <div className="hdr">
        <div className="hdr-title">💬 Поддержка</div>
        <div className="hdr-sub">Отвечаем в течение 24 часов</div>
      </div>
      <div className="content" style={{padding:0}}>
        <div className="chat-area">
          {msgs.length===0 && (
            <div className="text-center text-muted" style={{padding:'40px 0'}}>
              Напишите нам — мы поможем!
            </div>
          )}
          {msgs.map(m => (
            <div key={m.id} className={`msg-wrap ${m.is_from_admin ? 'them' : 'me'}`}>
              {m.is_from_admin && <div className="msg-sender">Поддержка</div>}
              <div className={`msg-bubble ${m.is_from_admin ? 'them' : 'me'}`}>
                {m.message}
              </div>
              <div className="msg-time">
                {new Date(m.created_at).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}
              </div>
            </div>
          ))}
          <div ref={bottomRef}/>
        </div>
      </div>
      <div className="chat-input-wrap">
        <textarea className="chat-input" placeholder="Сообщение..."
          value={text} onChange={e => setText(e.target.value)} rows={1}
          onKeyDown={e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }}/>
        <button className="btn btn-primary btn-sm" onClick={send} disabled={!text.trim()}>
          ➤
        </button>
      </div>
    </div>
  );
}

function AdminScreen({ user }) {

  const [editPrice, setEditPrice] = useState('');

  const [promoMax, setPromoMax] = useState('1');

  // #7: cosmetic grant state

  const [cosmeticField, setCosmeticField] = useState('name_color');
  const [cosmeticValue, setCosmeticValue] = useState('');
  const [toast, showToast]      = useToast();
  const convBottomRef            = useRef(null);

  async function loadDash()    { try { setDash(await get('/api/admin/dashboard')); } catch {} }
  async function loadUsers(q='') { try { setUsers(await get(`/api/admin/users${q?`?q=${q}`:''}`)); } catch {} }
  async function loadConvs()   { try { setConvs(await get('/api/admin/tickets')); } catch {} }
  async function loadStories() { try { setStories(await get('/api/admin/stories')); } catch {} }

  useEffect(() => { loadDash(); }, []);

  function switchTab(t) {
    setTab(t); setOpenConv(null);
    if(t==='users')   loadUsers();
    if(t==='tickets') loadConvs();
    if(t==='stories') loadStories();
  }

  async function openChat(conv) {
    setOpenConv(conv);
    try {
      const msgs = await get(`/api/admin/tickets/${conv.user_id}`);
      setConvMsgs(msgs);
      // Refresh to update unread counts
      loadConvs();
    } catch {}
  }

  useEffect(() => { convBottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [convMsgs]);

  async function doReply() {
    if(!replyText.trim()||!openConv) return;
    try {
      await post('/api/admin/tickets/reply', { ticket_user_id: openConv.user_id, message: replyText });
      setReplyText('');
      const msgs = await get(`/api/admin/tickets/${openConv.user_id}`);
      setConvMsgs(msgs);
    } catch(e) { showToast('❌ '+e.message); }

  async function saveUser() {
    try {
      await post('/api/admin/users/edit', {

        balance: editBal   ? parseFloat(editBal)   : undefined,
        price:   editPrice ? parseFloat(editPrice) : undefined,

// ── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [user, setUser]   = useState(null);
  const [tab, setTab]     = useState('profile');
  const [error, setError] = useState(null);
  const [viewingUid, setViewingUid] = useState(null);  // FIX #4
  const [toast, showToast] = useToast();

  async function init() {
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    let initData = tg?.initData || '';
    let refId    = null;
    let photoUrl = tg?.initDataUnsafe?.user?.photo_url || null;

    const sp = tg?.initDataUnsafe?.start_param;
    if (sp && sp.startsWith('ref_')) {
      try { refId = parseInt(sp.split('_')[1]); } catch {}
    }

    if (!initData) {
      initData = 'dev:' + (Math.floor(Math.random()*100000) + 100000);
      console.warn('[DEV] fake initData:', initData);
    }
    _initData = initData;

    // Get bot username from config
    try {
      const cfg = await get('/api/config');
      _botUsername = cfg.bot_username || _botUsername;
    } catch {}

    try {
      const data = await post('/api/init', { init_data: initData, ref_id: refId, photo_url: photoUrl });
      setUser(data);
      if (data.bot_username) _botUsername = data.bot_username;
    } catch(e) {
      setError(e.message);
    }
  }

  async function refreshUser() {
    try { setUser(await get('/api/profile')); } catch {}
  }

  useEffect(() => { init(); }, []);

  if (error) return (
    <div className="loading-screen">
      <div style={{fontSize:40}}>❌</div>
      <div style={{color:'var(--red)',fontWeight:700}}>{error}</div>
      <button className="btn btn-ghost" style={{width:140}} onClick={() => {setError(null);init();}}>Повтор</button>
    </div>
  );

  if (!user) return (
    <div className="loading-screen">
      <div className="loading-logo">⛓</div>
      <div className="spinner"/>
      <div className="text-muted f13">Загружаем...</div>
    </div>
  );

  // FIX #4: viewing another user's profile
  if (viewingUid && viewingUid !== user.id) {
    return (
      <div className="app">
        <UserProfileScreen
          uid={viewingUid}
          currentUserId={user.id}
          onBack={() => setViewingUid(null)}
          onBuy={refreshUser}
        />
        <nav className="nav">
          <button className="nav-btn" onClick={() => setViewingUid(null)}>
            <span className="ico">‹</span>
            Назад
          </button>
        </nav>
      </div>
    );
  }

  const tabs = [
    { id:'profile', ico:'👤', label:'Профиль' },
    { id:'search',  ico:'🔍', label:'Поиск'   },
    { id:'top',     ico:'🏆', label:'Топ'     },
    { id:'shop',    ico:'🛒', label:'Магазин' },
    { id:'support', ico:'💬', label:'Помощь'  },
    ...(user.is_admin ? [{ id:'admin', ico:'⚙️', label:'Админ' }] : []),
  ];

  function handleViewProfile(uid) {
    if (uid === user.id) { setTab('profile'); return; }
    setViewingUid(uid);
  }

  return (
    <div className="app">
      {toast && <div className="toast">{toast}</div>}

      {tab==='profile' && <ProfileScreen user={user} onRefresh={refreshUser} onViewProfile={handleViewProfile}/>}
      {tab==='search'  && <SearchScreen  user={user} onBuy={refreshUser} onViewProfile={handleViewProfile}/>}
      {tab==='top'     && <TopScreen onViewProfile={handleViewProfile}/>}
      {tab==='shop'    && <ShopScreen user={user} onRefresh={refreshUser}/>}
      {tab==='support' && <SupportScreen user={user}/>}
      {tab==='admin'   && user.is_admin && <AdminScreen/>}

      <nav className="nav">
        {tabs.map(t => (
          <button key={t.id} className={`nav-btn${tab===t.id?' active':''}`}
            onClick={() => { setViewingUid(null); setTab(t.id); }}>
            <span className="ico">{t.ico}</span>
            {t.label}
          </button>
        ))}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
