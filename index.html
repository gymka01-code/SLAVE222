<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>⛓ Рабство</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

:root {
  /* Ultra-premium dark palette */
  --bg:        #050505;
  --bg2:       #0a0a0a;
  --bg3:       #141414;
  --bg4:       #1e1e1e;
  --border:    rgba(255,255,255,0.06);
  --border2:   rgba(255,255,255,0.10);
  --gold:      #E8C547;
  --gold2:     #C9A82C;
  --gold-glow: rgba(232,197,71,0.18);
  --red:       #E84040;
  --green:     #27C264;
  --blue:      #1A7FE8;
  --purple:    #9B52E8;
  --text:      #F0EDE8;
  --text2:     rgba(240,237,232,0.68);
  --text3:     rgba(240,237,232,0.36);
  --card:      rgba(20,20,20,0.95);
  --r:         18px;
  --r2:        13px;
  --font:      'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-display: 'Inter', sans-serif;
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body, #root { height:100%; width:100%; overflow:hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.5;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ── SCROLLABLE ── */
.scroll, .content {
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.scroll::-webkit-scrollbar,
.content::-webkit-scrollbar { width: 0; }

/* ── LAYOUT ── */
.app    { display:flex; flex-direction:column; height:100vh; height:100dvh; }
.screen { flex:1; overflow:hidden; display:flex; flex-direction:column; }
.content { flex:1; overflow-y:auto; padding:0 0 16px; }

/* ── NAV ── */
.nav {
  display: flex; align-items: flex-start; justify-content: space-around;
  padding: 10px 4px max(14px, env(safe-area-inset-bottom));
  background: rgba(5,5,5,0.92);
  backdrop-filter: blur(32px) saturate(200%);
  -webkit-backdrop-filter: blur(32px) saturate(200%);
  border-top: 0.5px solid rgba(232,197,71,0.12);
  flex-shrink: 0;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: none; border: none; color: var(--text3); cursor: pointer;
  padding: 4px 12px; border-radius: 12px; transition: color .18s, transform .18s;
  font-family: var(--font); font-size: 10px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
}
.nav-btn .ico { font-size: 22px; line-height: 1; }
.nav-btn.active { color: var(--gold); }
.nav-btn:active { opacity: 0.6; transform: scale(0.93); }

/* ── HEADER ── */
.hdr {
  padding: 20px 20px 12px;
  flex-shrink: 0;
}
.hdr-title {
  font-size: 28px; font-weight: 800; letter-spacing: -0.5px;
  color: var(--text); font-family: var(--font-display);
}
.hdr-sub { font-size: 12px; color: var(--text3); margin-top: 2px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }

/* ── CARDS ── */
.card {
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-radius: var(--r);
  padding: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5), inset 0 0.5px 0 rgba(255,255,255,0.05);
}
.card-press { transition: opacity .12s, transform .12s; cursor: pointer; }
.card-press:active { opacity: 0.7; transform: scale(0.98); }

/* ── HERO PROFILE ── */
.hero {
  margin: 8px 16px 0;
  background: linear-gradient(145deg, #141414 0%, #1a1a1a 100%);
  border: 0.5px solid rgba(232,197,71,0.15);
  border-radius: 22px;
  padding: 22px;
  position: relative; overflow: hidden;
  box-shadow: 0 12px 48px rgba(0,0,0,0.6), inset 0 0.5px 0 rgba(255,255,255,0.06), 0 0 0 0.5px rgba(232,197,71,0.06);
}
.hero::before {
  content: ''; position: absolute; top: -80px; right: -60px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(232,197,71,0.06) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none;
}
.hero::after {
  content: ''; position: absolute; bottom: -40px; left: -20px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, rgba(232,197,71,0.03) 0%, transparent 70%);
  border-radius: 50%; pointer-events: none;
}
.hero-row { display: flex; align-items: center; gap: 16px; }
.avatar-wrap { position: relative; flex-shrink: 0; }
.avatar {
  width: 68px; height: 68px; border-radius: 50%;
  background: linear-gradient(135deg, #1e1e1e, #141414);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; font-weight: 700; color: var(--gold);
  font-family: var(--font-display); overflow: hidden;
  border: 1.5px solid rgba(232,197,71,0.35);
  box-shadow: 0 0 20px rgba(232,197,71,0.12), 0 4px 16px rgba(0,0,0,0.6);
}
.avatar img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.avatar-sm {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--bg4);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: var(--text3);
  overflow: hidden; flex-shrink: 0; border: 0.5px solid var(--border2);
}
.avatar-sm img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
.vip-badge {
  position: absolute; bottom: -2px; right: -2px;
  background: var(--bg); border-radius: 50%;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; border: 1px solid rgba(232,197,71,0.2);
}
.hero-name {
  font-size: 19px; font-weight: 800; letter-spacing: -0.3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hero-handle { font-size: 12px; color: var(--text3); margin-top: 1px; letter-spacing: 0.3px; }
.hero-status { font-size: 13px; margin-top: 4px; font-weight: 500; }
.hero-stats {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px; margin-top: 18px;
}
.stat {
  background: rgba(255,255,255,0.03);
  border: 0.5px solid rgba(255,255,255,0.06);
  border-radius: var(--r2); padding: 13px 8px; text-align: center;
  box-shadow: inset 0 0.5px 0 rgba(255,255,255,0.04);
}
.stat-val {
  font-size: 19px; font-weight: 800; color: var(--text);
  letter-spacing: -0.5px; font-family: var(--font-display);
}
.stat-lbl { font-size: 10px; color: var(--text3); margin-top: 2px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; }

/* ── EFFECTS ── */
.effects-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.effect-chip {
  font-size: 12px; padding: 4px 10px; border-radius: 20px;
  background: rgba(255,255,255,0.06);
  border: 0.5px solid var(--border2);
  color: var(--text2);
  display: flex; align-items: center; gap: 4px; font-weight: 600;
}
.effect-chip.gold { background: rgba(255,214,10,0.1); border-color: rgba(255,214,10,0.3); color: var(--gold); }
.effect-chip.green { background: rgba(48,209,88,0.1); border-color: rgba(48,209,88,0.3); color: var(--green); }
.effect-chip.red { background: rgba(255,69,58,0.1); border-color: rgba(255,69,58,0.3); color: var(--red); }

/* ── BUTTONS ── */
.btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  border: none; border-radius: var(--r2); cursor: pointer;
  font-family: var(--font); font-weight: 600; letter-spacing: 0.2px;
  transition: opacity .15s, transform .15s, box-shadow .15s; padding: 14px 20px; width: 100%;
  font-size: 15px;
}
.btn:active { opacity: 0.75; transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.btn-primary { background: var(--gold); color: #000; box-shadow: 0 4px 20px rgba(232,197,71,0.3); }
.btn-primary:active { box-shadow: 0 2px 8px rgba(232,197,71,0.15); }
.btn-danger   { background: var(--red); color: #fff; box-shadow: 0 4px 16px rgba(232,64,64,0.25); }
.btn-ghost    { background: rgba(255,255,255,0.06); color: var(--text); border: 0.5px solid var(--border2); }
.btn-ghost:hover { background: rgba(255,255,255,0.09); }
.btn-green    { background: var(--green); color: #000; }
.btn-blue     { background: var(--blue); color: #fff; }
.btn-sm { padding: 9px 16px; font-size: 13px; border-radius: 10px; width: auto; }

/* ── SECTIONS ── */
.section { padding: 0 16px; margin-top: 16px; }
.section-title {
  font-size: 11px; font-weight: 700; color: var(--text3);
  letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 10px;
}

/* ── LIST ITEMS ── */
.list-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 0.5px solid var(--border);
}
.list-item:last-child { border-bottom: none; }
.li-info { flex: 1; min-width: 0; }
.li-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.li-sub  { font-size: 12px; color: var(--text3); margin-top: 2px; }
.li-right { text-align: right; flex-shrink: 0; }
.li-price { font-size: 14px; font-weight: 700; color: var(--gold); }

/* ── SEARCH ── */
.input {
  width: 100%; background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--r2); color: var(--text); font-family: var(--font);
  font-size: 15px; padding: 13px 16px; outline: none; transition: border-color .15s;
}
.input:focus { border-color: var(--gold); }
.input::placeholder { color: var(--text3); }

/* ── PLAYER CARD ── */
.player-card {
  display: flex; align-items: center; gap: 12px;
  background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--r); padding: 14px;
  cursor: pointer; transition: all .12s;
}
.player-card:active { opacity: 0.7; transform: scale(0.98); }
.pc-meta { flex: 1; min-width: 0; }
.pc-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pc-sub  { font-size: 12px; color: var(--text3); margin-top: 2px; }
.pc-price { font-size: 15px; font-weight: 700; color: var(--gold); }

/* ── TOP / RANK ── */
.rank-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 20px; border-bottom: 0.5px solid var(--border);
}
.rank-num {
  font-size: 13px; font-weight: 700; width: 28px;
  text-align: center; flex-shrink: 0; color: var(--text3);
}
.rank-meta { flex: 1; min-width: 0; }
.rank-name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.rank-sub  { font-size: 12px; color: var(--text3); }
.rank-val  { font-size: 15px; font-weight: 700; color: var(--gold); }

/* ── TABS ── */
.tabs {
  display: flex; background: var(--bg);
  border-bottom: 0.5px solid rgba(232,197,71,0.1);
  flex-shrink: 0; padding: 0 4px;
}
.tab {
  flex: 1; padding: 12px 6px; text-align: center; cursor: pointer;
  font-size: 11px; font-weight: 700; color: var(--text3);
  border-bottom: 2px solid transparent; border-top: none;
  border-left: none; border-right: none;
  background: none; transition: all .15s; letter-spacing: 0.5px; text-transform: uppercase;
}
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* ── SHOP ── */
.shop-item {
  background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--r); padding: 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.si-ico  { font-size: 30px; line-height: 1; }
.si-name { font-weight: 600; font-size: 14px; }
.si-desc { font-size: 12px; color: var(--text3); flex: 1; line-height: 1.4; }
.si-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 4px; }
.si-price { font-size: 13px; font-weight: 700; color: var(--gold); }

/* ── CHAT ── */
.msg-wrap { display: flex; flex-direction: column; margin-bottom: 6px; }
.msg-wrap.me  { align-items: flex-end; }
.msg-wrap.them { align-items: flex-start; }
.msg-bubble {
  max-width: 76%; padding: 10px 14px; border-radius: 18px;
  font-size: 14px; line-height: 1.5;
}
.msg-bubble.me   { background: var(--gold); color: #000; border-bottom-right-radius: 4px; }
.msg-bubble.them { background: var(--bg3); color: var(--text); border-bottom-left-radius: 4px; }
.msg-time { font-size: 10px; opacity: 0.5; margin-top: 3px; padding: 0 2px; }
.msg-sender { font-size: 11px; font-weight: 600; margin-bottom: 3px; color: var(--gold); }
.chat-area { display: flex; flex-direction: column; padding: 12px 16px; min-height: 100%; }
.chat-input-wrap {
  padding: 10px 16px max(10px, env(safe-area-inset-bottom));
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  border-top: 0.5px solid var(--border);
  display: flex; gap: 8px; align-items: flex-end;
}
.chat-input {
  flex: 1; background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: 20px; color: var(--text); font-family: var(--font);
  font-size: 15px; padding: 10px 16px; outline: none; resize: none;
  max-height: 80px; transition: border-color .15s;
}
.chat-input:focus { border-color: var(--gold); }

/* Ticket conversation list item */
.conv-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px; border-bottom: 0.5px solid var(--border);
  cursor: pointer; transition: background .1s;
}
.conv-item:active { background: rgba(255,255,255,0.04); }
.conv-meta { flex: 1; min-width: 0; }
.conv-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-last { font-size: 13px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.conv-right { text-align: right; flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.conv-time  { font-size: 11px; color: var(--text3); }
.unread-dot {
  background: var(--gold); color: #000; border-radius: 10px;
  font-size: 11px; font-weight: 700; padding: 1px 6px; min-width: 18px;
  text-align: center;
}

/* ── MODAL ── */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  z-index: 100; display: flex; align-items: flex-end;
  backdrop-filter: blur(8px);
}
.modal {
  background: var(--bg2); border-top-left-radius: 28px; border-top-right-radius: 28px;
  border-top: 0.5px solid rgba(232,197,71,0.12);
  padding: 20px 20px max(24px, env(safe-area-inset-bottom));
  width: 100%; max-height: 88vh; overflow-y: auto;
  animation: slideUp .3s cubic-bezier(.32,0,.15,1);
  box-shadow: 0 -16px 64px rgba(0,0,0,0.7);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { width:40px; height:3px; border-radius:2px; background:var(--bg4); margin:0 auto 20px; opacity:0.6; }
.modal-title  { font-size:19px; font-weight:800; letter-spacing:-0.3px; margin-bottom:16px; font-family:var(--font-display); }

/* ── ADMIN ── */
.stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.admin-stat {
  background: var(--bg3); border: 0.5px solid var(--border2);
  border-radius: var(--r); padding: 16px;
}
.as-val { font-size:22px; font-weight:800; color:var(--text); letter-spacing:-0.5px; }
.as-ico { font-size:20px; margin-bottom:6px; }
.as-lbl { font-size:12px; color:var(--text3); margin-top:2px; }

/* ── UTILS ── */
.gap6  { display:flex; flex-direction:column; gap:6px; }
.gap8  { display:flex; flex-direction:column; gap:8px; }
.gap12 { display:flex; flex-direction:column; gap:12px; }
.row   { display:flex; align-items:center; gap:8px; }
.row-sb { display:flex; align-items:center; justify-content:space-between; }
.mt4  { margin-top:4px; }
.mt8  { margin-top:8px; }
.mt12 { margin-top:12px; }
.mt16 { margin-top:16px; }
.mt20 { margin-top:20px; }
.f11  { font-size:11px; }
.f12  { font-size:12px; }
.f13  { font-size:13px; }
.fw6  { font-weight:600; }
.fw7  { font-weight:700; }
.text-gold   { color:var(--gold); }
.text-red    { color:var(--red); }
.text-green  { color:var(--green); }
.text-muted  { color:var(--text3); }
.text-2      { color:var(--text2); }
.text-center { text-align:center; }
.divider     { height:0.5px; background:var(--border); margin:14px 0; }

/* ── NAME COLORS ── */
.clr-ruby { color:#FF453A; }
.clr-gold { color:#FFD60A; }
.clr-neon { color:#30D158; }

/* ── ADMIN GRADIENT NAME ── */
.admin-gradient-name {
  background: linear-gradient(90deg, #FFD60A 0%, #FF9F0A 16%, #FF6B6B 33%, #BF5AF2 50%, #0A84FF 66%, #30D158 83%, #FFD60A 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: adminShimmer 2.5s linear infinite;
  font-weight: 800;
}
@keyframes adminShimmer { to { background-position: 200% center; } }

/* ── BAN SCREEN ── */
.ban-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: #000;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px; text-align: center;
  animation: banReveal .5s ease;
}
@keyframes banReveal { from{opacity:0} to{opacity:1} }
.ban-icon { font-size: 80px; margin-bottom: 24px; filter: grayscale(0.3); position: relative; z-index: 1; }
.ban-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; color: var(--red); margin-bottom: 12px; font-family: var(--font-display); position: relative; z-index: 1; }
.ban-sub { font-size: 15px; color: var(--text2); line-height: 1.7; max-width: 300px; margin-bottom: 40px; position: relative; z-index: 1; }
.ban-reason-box { background: rgba(232,64,64,0.08); border: 0.5px solid rgba(232,64,64,0.25); border-radius: 14px; padding: 14px 18px; margin-bottom: 32px; font-size: 13px; color: var(--text2); line-height: 1.5; max-width: 280px; position: relative; z-index: 1; }
.ban-support-btn { background: var(--red); color: #fff; border: none; border-radius: 16px; padding: 16px 32px; font-family: var(--font); font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 8px 32px rgba(232,64,64,0.4); position: relative; z-index: 1; transition: transform .15s, box-shadow .15s; }
.ban-support-btn:active { transform: scale(0.96); box-shadow: 0 4px 16px rgba(232,64,64,0.3); }

/* ── SPONSOR BLOCKER ── */
.sponsor-block {
  position: fixed; inset: 0; background: var(--bg); z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px; text-align: center;
}
.sponsor-icon { font-size: 64px; margin-bottom: 16px; }
.sponsor-title { font-size: 24px; font-weight: 800; margin-bottom: 12px; }
.sponsor-sub { font-size: 15px; color: var(--text2); margin-bottom: 32px; line-height: 1.5; }

/* ── STORIES CTA CARD ── */
.stories-card {
  margin: 12px 16px;
  background: linear-gradient(135deg, #111111, #181818);
  border: 0.5px solid rgba(232,197,71,0.2);
  border-radius: 22px; padding: 22px;
  position: relative; overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 0.5px 0 rgba(255,255,255,0.05);
}
.stories-card::before {
  content:''; position:absolute; bottom:-30px; right:-30px;
  width:130px; height:130px;
  background: radial-gradient(circle, rgba(232,197,71,0.08) 0%, transparent 70%);
  border-radius:50%;
}
.stories-ico { font-size:32px; margin-bottom:8px; }
.stories-title { font-size:17px; font-weight:800; font-family:var(--font-display); }
.stories-sub { font-size:13px; color:var(--text3); margin-top:4px; line-height:1.5; }
.stories-timer { font-size:24px; font-weight:800; color:var(--gold); margin-top:8px; font-family:var(--font-display); letter-spacing:-0.5px; }

/* ── PROTECTION BADGE ── */
.protection-badge {
  font-size: 10px; font-weight: 600; color: var(--blue);
  background: rgba(10,132,255,0.12); border: 0.5px solid rgba(10,132,255,0.3);

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const BASE = '';
let _initData = '';
let _botUsername = 'YourBot';

function getHeaders() {
  return { 'Content-Type':'application/json', 'x-init-data': _initData };
}
async function api(method, path, body) {
  const opts = { method, headers: getHeaders() };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || `Error ${r.status}`);
  return data;
}
const get  = (path)       => api('GET',  path);
const post = (path, body) => api('POST', path, body);

// ── TOAST ──
function useToast() {
  const [toast, setToast] = useState(null);
  const show = useCallback((msg, ms=2800) => {
    setToast(msg);
    setTimeout(() => setToast(null), ms);
  }, []);
  return [toast, show];
}

// ── AVATAR ──
function Avatar({ user, size=44 }) {
  const [err, setErr] = useState(false);
  const name = user?.first_name || user?.username || '?';
  const initial = name[0]?.toUpperCase() || '?';
  const cls = size >= 60 ? 'avatar' : 'avatar-sm';
  const style = size !== 44 && size !== 68 ? { width: size, height: size, fontSize: size * 0.38 } : {};
  if (user?.photo_url && !err) {
    return <div className={cls} style={style}><img src={user.photo_url} alt="" onError={() => setErr(true)} /></div>;
  }
  return <div className={cls} style={style}>{initial}</div>;
}

// ── PLAYER NAME ──
function PlayerName({ user, style }) {
  const isAdmin = user.is_admin || user.is_admin_flag;
  const clr   = user.name_color && user.name_color !== 'default' ? `clr-${user.name_color}` : '';
  const emoji = isAdmin ? '⚜️ ' : (user.emoji_status ? user.emoji_status + ' ' : '');
  const name  = user.custom_name ? `${user.custom_name} (${user.first_name || user.username || `#${user.id}`})` : (user.first_name || user.username || `#${user.id}`);

  if (isAdmin) {
    return (
      <span className="admin-gradient-name" style={style}>
        {emoji}{name}{user.vip_level >= 3 && ' 👑'}{user.vip_level === 2 && ' 🥈'}{user.vip_level === 1 && ' 🥉'}
      </span>
    );
  }
  return (
    <span className={clr} style={style}>
      {emoji}{name}{user.vip_level >= 3 && ' 👑'}{user.vip_level === 2 && ' 🥈'}{user.vip_level === 1 && ' 🥉'}
    </span>
  );
}

// ── STORIES TIMER ──
function useCountdown(targetIso) {
  const [secs, setSecs] = useState(0);
  useEffect(() => {
    if (!targetIso) { setSecs(0); return; }
    function tick() {
      const diff = Math.max(0, Math.round((new Date(targetIso) - Date.now()) / 1000));
      setSecs(diff);
    }
    tick();
    const id = setInterval(tick, 1000);
    return () => clearInterval(id);
  }, [targetIso]);
  return secs;
}
function fmtCountdown(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

// ── STORIES NATIVE GENERATOR ──
async function generateAndShareStory(user, showToast, onRefresh) {
  const tg = window.Telegram?.WebApp;
  if (!tg || !tg.shareToStory) {
    showToast('❌ Ваша версия Telegram не поддерживает Stories');
    return;
  }

  const canvas = document.createElement('canvas');
  canvas.width = 1080; canvas.height = 1920;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, 1080, 1920);
  const grad = ctx.createRadialGradient(540, 500, 100, 540, 500, 600);
  grad.addColorStop(0, 'rgba(232,197,71,0.15)'); grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 1080, 1920);

  // Text Elements (No external images to avoid CORS taint)
  ctx.textAlign = 'center';
  
  ctx.fillStyle = '#E8C547';
  ctx.font = '800 40px Inter'; ctx.fillText('⛓ РАБСТВО · СЕЗОН 1', 540, 300);

  // Avatar placeholder ring
  ctx.beginPath(); ctx.arc(540, 600, 150, 0, Math.PI * 2);
  ctx.lineWidth = 10; ctx.strokeStyle = '#E8C547'; ctx.stroke();
  ctx.fillStyle = '#1e1e1e'; ctx.fill();
  ctx.fillStyle = '#E8C547'; ctx.font = '800 120px Inter';
  ctx.fillText((user.first_name || user.username || '?')[0].toUpperCase(), 540, 640);

  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 70px Inter'; ctx.fillText(user.first_name || user.username || 'Игрок', 540, 950);

  ctx.fillStyle = 'rgba(232,197,71,0.7)';
  ctx.font = '600 35px Inter'; ctx.letterSpacing = '4px'; ctx.fillText('МОЯ СТОИМОСТЬ', 540, 1100);
  
  ctx.fillStyle = '#E8C547';
  ctx.font = '800 120px Inter'; ctx.letterSpacing = '0px'; ctx.fillText(`${user.price.toFixed(0)} RC`, 540, 1220);

  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '500 40px Inter'; ctx.fillText('Купи меня в игре РАБСТВО в Telegram', 540, 1700);

  try {
    const b64 = canvas.toDataURL('image/png');
    showToast('⏳ Подготовка Story...');
    const r = await post('/api/stories/upload', { b64_data: b64 });
    
    // Call Telegram native Story sharing
    tg.shareToStory(r.url, {
      text: `💰 Моя цена в РАБСТВО: ${user.price.toFixed(0)} RC!\nКупи меня по ссылке ниже 👇`,
      widget_link: { url: `https://t.me/${_botUsername}?start=ref_${user.id}`, name: "Играть" }
    });
    
    // Auto-claim bonus after triggering share
    setTimeout(async () => {
      try {
        const claimRes = await post('/api/stories/claim');
        showToast('📸 ' + claimRes.msg);
        onRefresh();
      } catch(e) { console.log('Claim err', e); }
    }, 3000);

  } catch(e) { showToast('❌ Ошибка генерации: ' + e.message); }
}

// ── JOB PROBABILITIES MODAL ──
function JobProbsModal({ jobs, vipLevel, onClose, onSend, slaveName }) {
  const common   = jobs.filter(j => j.drop_chance === 70);
  const rare     = jobs.filter(j => j.drop_chance === 25);
  const legendary = jobs.filter(j => j.drop_chance === 5);

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-handle"/>
        <div className="modal-title">💼 Отправить на работу</div>
        <div className="f13 text-muted" style={{marginBottom:16}}>Раб: <span className="fw6 text-2">{slaveName}</span></div>

        <div className="job-tier">
          <div className="job-tier-head text-2">🟢 Обычные — 70% шанс</div>
          {common.map(j => (
            <div className="job-tier-item" key={j.id}>
              <div className="job-tier-emo">{j.emoji}</div>
              <div className="job-tier-info">
                <div className="job-tier-name">{j.title}</div>
                <div className="job-tier-rc">{j.income_per_hour} RC/ч</div>
              </div>
            </div>
          ))}
        </div>

        <div className="job-tier">
          <div className="job-tier-head" style={{color:'var(--blue)'}}>🔵 Редкие — 25% шанс</div>
          {rare.map(j => (
            <div className="job-tier-item" key={j.id}>
              <div className="job-tier-emo">{j.emoji}</div>
              <div className="job-tier-info">
                <div className="job-tier-name">{j.title}</div>
                <div className="job-tier-rc">{j.income_per_hour} RC/ч</div>
              </div>
            </div>
          ))}
        </div>

        <div className="job-tier">
          <div className="job-tier-head" style={{color:'var(--gold)'}}>
            🟡 Легендарные — 5% шанс {vipLevel < 3 && <span className="text-muted">(нужен 👑 VIP)</span>}
          </div>
          {legendary.map(j => (
            <div className="job-tier-item" key={j.id}>
              <div className="job-tier-emo">{j.emoji}</div>
              <div className="job-tier-info">
                <div className="job-tier-name">{j.title}</div>
                <div className="job-tier-rc">{j.income_per_hour} RC/ч — только для VIP 👑</div>
              </div>
            </div>
          ))}
        </div>
        <button className="btn btn-primary mt16" onClick={onSend}>🎲 Отправить на работу</button>
        <button className="btn btn-ghost mt8" onClick={onClose}>Отмена</button>
      </div>
    </div>
  );
}

// ── ADMIN GHOST TOGGLE ──
function AdminGhostToggle({ userId, initialHidden, onToast }) {
  const [hidden, setHidden] = useState(initialHidden || false);
  const [loading, setLoading] = useState(false);

  async function toggle() {
    setLoading(true);
    try {
      const newVal = !hidden;
      await post('/api/admin/toggle_hidden', { hidden: newVal });
      setHidden(newVal);
      onToast(newVal ? '👻 Вы скрыты из рейтингов и поиска' : '👁 Вы снова видимы');
    } catch(e) { onToast('❌ ' + e.message); }
    setLoading(false);
  }

  return (
    <button onClick={toggle} disabled={loading}
      style={{
        background: hidden ? 'rgba(232,197,71,0.15)' : 'rgba(255,255,255,0.06)',
        border: `0.5px solid ${hidden ? 'rgba(232,197,71,0.4)' : 'rgba(255,255,255,0.1)'}`,
        borderRadius: 12, padding: '8px 16px', cursor: 'pointer',
        color: hidden ? 'var(--gold)' : 'var(--text3)',
        fontSize: 13, fontWeight: 600, fontFamily: 'var(--font)',
        transition: 'all .2s', minWidth: 80, textAlign: 'center', opacity: loading ? 0.5 : 1,
      }}>
      {loading ? '...' : hidden ? '🟡 Скрыт' : '⚫ Виден'}
    </button>
  );
}

// ── PROFILE SCREEN ──
function ProfileScreen({ user, sponsors, onRefresh, onViewProfile }) {
  const [toast, showToast] = useToast();
  const [renaming, setRenaming] = useState(null);
  const [newName, setNewName] = useState('');
  const [loading, setLoading] = useState(false);
  const [jobs, setJobs] = useState([]);
  const [sendWorkSlave, setSendWorkSlave] = useState(null);
  const storiesCountdown = useCountdown(user.story_cooldown_until);

  const refLink = `https://t.me/${user.bot_username || _botUsername}?start=ref_${user.id}`;

  useEffect(() => { get('/api/jobs').then(j => setJobs(j)).catch(() => {}); }, []);

  async function doSelfbuy() {
    if (!confirm(`Выкупить себя за ${user.price.toFixed(0)} RC?`)) return;
    setLoading(true);
    try { await post('/api/selfbuy'); showToast('🎉 Вы на свободе!'); onRefresh(); }
    catch(e) { showToast('❌ ' + e.message); }
    setLoading(false);
  }

  async function doRename() {
    if (!newName.trim()) return;
    try { await post('/api/rename', { slave_id: renaming, new_name: newName.trim() }); showToast('✅ Кличка установлена'); setRenaming(null); setNewName(''); onRefresh(); }
    catch(e) { showToast('❌ ' + e.message); }
  }

  async function doSendWork(slaveId) {
    try { const r = await post('/api/slaves/send_to_work', { slave_id: slaveId }); showToast(`✅ ${r.job.emoji} ${r.job.title}`); setSendWorkSlave(null); onRefresh(); }
    catch(e) { showToast('❌ ' + e.message); }
  }

  async function checkSponsor(sponsorId) {
    try { const r = await post('/api/sponsors/check', { sponsor_id: sponsorId }); showToast(`✅ Подписка подтверждена! +${r.reward} RC`); onRefresh(); }
    catch(e) { showToast('❌ ' + e.message); }
  }

  const workingSlave = sendWorkSlave ? user.slaves.find(s => s.id === sendWorkSlave) : null;

  return (
    <div className="screen">
      {toast && <div className="toast">{toast}</div>}
      <div className="hdr">
        <div className="hdr-title">⛓ Рабство</div>
        <div className="hdr-sub">Сезон 1 · Социальная стратегия</div>
      </div>
      <div className="content">

        {/* Hero */}
        <div className="hero">
          <div className="hero-row">
            <div className="avatar-wrap">
              <Avatar user={user} size={68}/>
              {user.vip_level > 0 && <div className="vip-badge">{user.vip_level===3?'👑':user.vip_level===2?'🥈':'🥉'}</div>}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div className="hero-name"><PlayerName user={user}/></div>
              <div className="hero-handle">{user.username ? `@${user.username}` : `#${user.id}`}</div>
              <div className="hero-status">
                {user.owner ? <span className="text-red">⛓ Раб — {user.owner.first_name || '@'+user.owner.username}</span> : <span className="text-green">✅ Свободен</span>}
              </div>
            </div>
          </div>
          <div className="hero-stats">
            <div className="stat"><div className="stat-val">{user.balance.toFixed(0)}</div><div className="stat-lbl">💰 Баланс RC</div></div>
            <div className="stat"><div className="stat-val">{user.price.toFixed(0)}</div><div className="stat-lbl">🏷 Моя цена</div></div>
            <div className="stat"><div className="stat-val">{user.slaves_count}</div><div className="stat-lbl">⛓ Рабов</div></div>
            {user.total_income_per_hour > 0 && (
              <div className="stat" style={{gridColumn:'1/-1'}}>
                <div className="stat-val text-green">+{user.total_income_per_hour.toFixed(1)}</div>
                <div className="stat-lbl">📈 RC/ч от рабов</div>
              </div>
            )}
          </div>
          {(user.shield_active || user.stealth_active || user.booster_active || user.chains_active) && (
            <div className="effects-row">
              {user.shield_active  && <div className="effect-chip gold">🛡 Щит</div>}
              {user.stealth_active && <div className="effect-chip">👻 Стелс</div>}
              {user.booster_active && <div className="effect-chip green">🚀 Буст ×{user.booster_mult}</div>}
              {user.chains_active  && <div className="effect-chip red">⛓ Оковы</div>}
            </div>
          )}
        </div>

        {user.owner && (
          <div className="section">
            <button className="btn btn-danger" onClick={doSelfbuy} disabled={loading}>{loading ? '...' : `🔓 Выкупить себя (${user.price.toFixed(0)} RC)`}</button>
          </div>
        )}

        <div className="section">
          <button className="btn btn-ghost" onClick={() => { navigator.clipboard?.writeText(refLink); showToast('🔗 Ссылка скопирована!'); }}>
            🔗 Пригласить друга (реферальная ссылка)
          </button>
        </div>

        {user.is_admin && (
          <div className="section">
            <div className="card" style={{padding:'14px 16px'}}>
              <div className="row-sb">
                <div><div className="fw7" style={{fontSize:14}}>👻 Режим призрака</div><div className="text-muted f12 mt4">Скрыть себя из рейтингов и поиска</div></div>
                <AdminGhostToggle userId={user.id} initialHidden={user.admin_hidden} onToast={showToast}/>
              </div>
            </div>
          </div>
        )}

        {/* Stories Bonus */}
        <div className="stories-card">
          <div className="stories-ico">📸</div>
          <div className="stories-title">Stories Бонус</div>
          <div className="stories-sub">Опубликуй Story с нашей карточкой — получи +250 RC</div>
          {user.story_cooldown_until && storiesCountdown > 0 ? (
            <><div className="stories-timer">{fmtCountdown(storiesCountdown)}</div><div className="f12 text-muted mt4">до следующей возможности</div></>
          ) : (
            <button className="btn btn-primary mt12" style={{borderRadius:14}} onClick={() => generateAndShareStory(user, showToast, onRefresh)}>
              ✨ Опубликовать Story
            </button>
          )}
        </div>

        {/* Sponsor Tasks */}
        {sponsors && sponsors.length > 0 && (
          <div className="section">
            <div className="section-title">Бонусы за подписку</div>
            <div className="gap8">
              {sponsors.map(s => (
                <div className="card row-sb" key={s.id} style={{padding:'12px 16px'}}>
                  <div>
                    <div style={{fontWeight:600}}>{s.channel_title}</div>
                    <div className="text-muted" style={{fontSize:12}}>Награда: {s.reward_rc} RC</div>
                  </div>
                  {s.claimed ? (
                    <span className="text-green fw6" style={{fontSize:13}}>✅ Получено</span>
                  ) : (
                    <div className="row">
                      <button className="btn btn-ghost btn-sm" onClick={() => window.Telegram.WebApp.openTelegramLink(s.channel_url)}>Подписаться</button>
                      <button className="btn btn-primary btn-sm" onClick={() => checkSponsor(s.id)}>Проверить</button>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        )}

        {user.slaves.length > 0 && (

              {user.slaves.map(s => {
                const isProtected = s.purchase_protection_until && new Date(s.purchase_protection_until) > new Date();
                return (
                  <div className="list-item" key={s.id}>
                    <div onClick={() => onViewProfile(s.id)} style={{cursor:'pointer'}}><Avatar user={s} size={44}/></div>
                    <div className="li-info" style={{cursor:'pointer'}} onClick={() => onViewProfile(s.id)}>
                      <div className="li-name">{s.custom_name ? <><span className="text-gold">{s.custom_name}</span> <span className="text-muted f12">({s.first_name||s.username})</span></> : (s.first_name || s.username || `#${s.id}`)}</div>
                      <div className="li-sub">{s.working ? <><span>{s.job_emoji} {s.job_title}</span><span className="text-green"> · +{s.income_per_hour_effective.toFixed(1)} RC/ч</span></> : <span>😴 Не работает</span>}</div>
                      <div className="row mt4" style={{gap:6}}><span className="f11 text-muted">{s.price.toFixed(0)} RC</span>{isProtected && <span className="protection-badge">🔒 защита</span>}</div>
                    </div>
                    <div style={{display:'flex',flexDirection:'column',gap:5,alignItems:'flex-end'}}>
                      <button className="btn btn-primary btn-sm" onClick={() => setSendWorkSlave(s.id)}>💼</button>
                      <button className="btn btn-ghost btn-sm" onClick={() => { setRenaming(s.id); setNewName(s.custom_name||''); }}>✏️</button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {sendWorkSlave && workingSlave && jobs.length > 0 && (
        <JobProbsModal jobs={jobs} vipLevel={user.vip_level} slaveName={workingSlave.custom_name || workingSlave.first_name || workingSlave.username || `#${workingSlave.id}`} onClose={() => setSendWorkSlave(null)} onSend={() => doSendWork(sendWorkSlave)} />
      )}

      {renaming && (
        <div className="overlay" onClick={() => setRenaming(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">✏️ Дать кличку</div>
            <input className="input" placeholder="Кличка (до 32 символов)" value={newName} maxLength={32} onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key==='Enter' && doRename()} autoFocus/>
            <div className="row mt12">
              <button className="btn btn-primary" onClick={doRename}>Сохранить</button>
              <button className="btn btn-ghost" onClick={() => setRenaming(null)}>Отмена</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── USER PROFILE VIEW ──
function UserProfileScreen({ uid, currentUserId, onBack, onBuy }) {
  const [profile, setProfile] = useState(null);
  const [loading, setLoading] = useState(true);
  const [buying, setBuying] = useState(false);
  const [toast, showToast] = useToast();
  const [viewingSlaveId, setViewingSlaveId] = useState(null);

  useEffect(() => { setLoading(true); get(`/api/profile/${uid}`).then(p => { setProfile(p); setLoading(false); }).catch(() => setLoading(false)); }, [uid]);

  async function doBuy() {
    setBuying(true);
    try { await post('/api/buy', { target_id: uid }); showToast('✅ Куплен!'); onBuy(); setTimeout(onBack, 1500); }
    catch(e) { showToast('❌ ' + e.message); }
    setBuying(false);
  }

  if (loading) return <div className="screen"><div style={{display:'flex',justifyContent:'center',padding:60}}><div className="spinner"/></div></div>;
  if (!profile) return <div className="screen"><div className="section mt20 text-center text-muted">Профиль не найден</div></div>;
  if (viewingSlaveId) return <UserProfileScreen uid={viewingSlaveId} currentUserId={currentUserId} onBack={() => setViewingSlaveId(null)} onBuy={onBuy} />;

  return (
    <div className="screen">
      {toast && <div className="toast">{toast}</div>}
      <div className="hdr">

function SearchScreen({ user, onBuy, onViewProfile }) {
  const [q, setQ] = useState(''); const [minP, setMinP] = useState(''); const [maxP, setMaxP] = useState('');
  const [results, setResults] = useState([]); const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState(null); const [toast, showToast] = useToast();

  async function doSearch(random=false, newcomers=false) {
    setLoading(true);
    try {
      let url = '/api/search?';
      if (random) url += 'random_pick=true';
      else if (newcomers) url += 'newcomers=true';
      else { if (q) url += `q=${encodeURIComponent(q)}&`; if (minP) url += `min_price=${minP}&`; if (maxP) url += `max_price=${maxP}&`; }
      const data = await get(url); setResults(Array.isArray(data) ? data : [data].filter(Boolean));
    } catch(e) { showToast('❌ ' + e.message); }
    setLoading(false);
  }

  async function doBuy() {
    if (!selected) return;
    try { await post('/api/buy', { target_id: selected.id }); showToast('✅ Куплен!'); setSelected(null); doSearch(); onBuy(); }
    catch(e) { showToast('❌ ' + e.message); }
  }

  useEffect(() => { doSearch(false, true); }, []);

  return (
    <div className="screen">
      {toast && <div className="toast">{toast}</div>}
      <div className="hdr"><div className="hdr-title">🔍 Поиск</div><div className="hdr-sub">Найди следующего раба</div></div>
      <div className="content">
        <div className="section">
          <input className="input" placeholder="Поиск по имени или @username" value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key==='Enter' && doSearch()}/>
          <div className="row mt8"><input className="input" placeholder="Мин RC" type="number" style={{flex:1}} value={minP} onChange={e => setMinP(e.target.value)}/><input className="input" placeholder="Макс RC" type="number" style={{flex:1}} value={maxP} onChange={e => setMaxP(e.target.value)}/></div>
          <div className="row mt8"><button className="btn btn-primary" style={{flex:1}} onClick={() => doSearch()}>{loading ? <div className="spinner" style={{width:18,height:18,borderWidth:2}}/> : '🔍 Найти'}</button><button className="btn btn-ghost" style={{flex:1}} onClick={() => doSearch(true)}>🎲 Случайная</button></div>
          <button className="btn btn-ghost mt8" onClick={() => doSearch(false,true)}>🆕 Новые игроки</button>
        </div>

        <div className="section mt12">
          <div className="section-title">Результаты ({results.length})</div>
          <div className="gap8">
            {results.map(p => (
              <div className="player-card" key={p.id}>
                <div onClick={() => onViewProfile(p.id)} style={{cursor:'pointer'}}><Avatar user={p} size={44}/></div>
                <div className="pc-meta" onClick={() => p.owner_id !== user.id && setSelected(p)} style={{cursor:'pointer'}}>
                  <div className="pc-name">{p.is_admin_flag ? <span className="admin-gradient-name">⚜️ {p.custom_name || p.first_name || p.username || `#${p.id}`}</span> : (p.custom_name ? <><span className="text-gold">{p.custom_name}</span> <span className="text-muted f12">({p.first_name||p.username})</span></> : (p.first_name || p.username || `#${p.id}`))} {p.vip_level>=3&&' 👑'}{p.vip_level===2&&' 🥈'}{p.vip_level===1&&' 🥉'}</div>
                  <div className="pc-sub">@{p.username||p.id}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6}}>
                  <div className="pc-price">{parseFloat(p.current_price).toFixed(0)} RC</div>
                  {p.owner_id === user.id ? <span className="f11 fw6" style={{padding:'5px 10px',background:'var(--bg4)',borderRadius:8,color:'var(--text3)'}}>⛓ Ваш</span> : <button className="btn btn-primary btn-sm" onClick={() => setSelected(p)}>⛓ Купить</button>}
                </div>
              </div>
            ))}
            {results.length===0 && !loading && <div className="text-center text-muted" style={{padding:'32px 0'}}>Никого нет. Попробуй другой запрос.</div>}
          </div>
        </div>
      </div>

      {selected && (
        <div className="overlay" onClick={() => setSelected(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">⛓ Купить игрока</div>
            <div className="row" style={{marginBottom:16}}><Avatar user={selected} size={52}/><div><div className="fw7 f13">{selected.first_name || selected.username || `#${selected.id}`}</div><div className="text-muted f12">@{selected.username || selected.id}</div></div></div>
            <div className="card" style={{marginBottom:16}}>
              <div className="row-sb"><span className="text-muted f13">Стоимость</span><span className="fw7 text-gold">{parseFloat(selected.current_price).toFixed(0)} RC</span></div>
              <div className="row-sb mt8"><span className="text-muted f13">Ваш баланс</span><span className={`fw7 f13 ${user.balance >= parseFloat(selected.current_price) ? 'text-green' : 'text-red'}`}>{user.balance.toFixed(0)} RC</span></div>
              <div className="row-sb mt8"><span className="text-muted f13">Комиссия системы</span><span className="text-muted f13">10%</span></div>
            </div>
            {user.balance < parseFloat(selected.current_price) ? <button className="btn btn-ghost" disabled>❌ Недостаточно RC</button> : <button className="btn btn-primary" onClick={doBuy}>⛓ Купить за {parseFloat(selected.current_price).toFixed(0)} RC</button>}
          </div>
        </div>
      )}
    </div>
  );
}

function ShopScreen({ user, onRefresh }) {
  const [shop, setShop] = useState(null);
  const [tab, setTab] = useState('items');
  const [selectedSlave, setSelectedSlave] = useState('');
  const [toast, showToast] = useToast();
  const [promoCode, setPromoCode] = useState('');
  const [loading, setLoading] = useState({});
  const tg = window.Telegram?.WebApp;

  async function load() { try { setShop(await get('/api/shop')); } catch {} }
  useEffect(() => { load(); }, []);

  async function buyItemStars(itemType, cosmeticId=null) {
    const key = itemType + (cosmeticId||'');
    setLoading(l => ({...l, [key]: true}));
    try {
      const body = { item_type: itemType };
      if (cosmeticId) body.cosmetic_id = cosmeticId;
      if (itemType === 'chains') {
        if (!selectedSlave) { showToast('Выберите раба для оков'); setLoading(l => ({...l, [key]: false})); return; }
        body.target_slave_id = parseInt(selectedSlave);
      }
      const r = await post('/api/shop/invoice', body);
      if (r.invoice_link && tg?.openInvoice) {
        tg.openInvoice(r.invoice_link, (status) => {
          if (status === 'paid') { showToast('✅ Успешно! Предмет активирован.'); onRefresh(); }
          else if (status === 'cancelled') { showToast('Платёж отменён'); }
          else { showToast('⚠️ Статус: ' + status); }
        });
      }
    } catch(e) { showToast('❌ ' + e.message); }
    setLoading(l => ({...l, [key]: false}));
  }

  async function buyItemRC(itemType) {
    const key = 'rc_' + itemType;
    setLoading(l => ({...l, [key]: true}));
    try {
      const body = { item_type: itemType };
      if (itemType === 'chains') {
        if (!selectedSlave) { showToast('Выберите раба для оков'); setLoading(l => ({...l, [key]: false})); return; }
        body.target_slave_id = parseInt(selectedSlave);
      }
      const r = await post('/api/shop/buy_rc', body);
      showToast(`✅ Куплено за ${r.spent_rc} RC!`); onRefresh(); load();
    } catch(e) { showToast('❌ ' + e.message); }
    setLoading(l => ({...l, [key]: false}));
  }

  async function usePromo() {
    if (!promoCode.trim()) return;
    try { const r = await post('/api/promo', { code: promoCode.trim() }); showToast(`🎁 +${r.reward} RC!`); setPromoCode(''); onRefresh(); }
    catch(e) { showToast('❌ ' + e.message); }
  }

  const cosmByType = useMemo(() => shop ? {
    colors: shop.cosmetics.filter(c => c.type==='color'),
    frames: shop.cosmetics.filter(c => c.type==='frame'),
    emojis: shop.cosmetics.filter(c => c.type==='emoji'),
  } : {}, [shop]);

  const selfItems  = shop?.items.filter(i => i.id !== 'chains') || [];
  const slaveItems = shop?.items.filter(i => i.id === 'chains') || [];

  return (
    <div className="screen">
      {toast && <div className="toast">{toast}</div>}
      <div className="hdr"><div className="hdr-title">🛒 Магазин</div><div className="hdr-sub">Telegram Stars ⭐ & RC</div></div>
      <div className="tabs">
        {['items','cosmetics','promo'].map(t => <button key={t} className={`tab${tab===t?' active':''}`} onClick={() => setTab(t)}>{t==='items'?'ДЛЯ СЕБЯ':t==='cosmetics'?'КОСМЕТИКА (⭐)':'ПРОМОКОД'}</button>)}
      </div>
      <div className="content">
        {!shop ? <div style={{display:'flex',justifyContent:'center',padding:40}}><div className="spinner"/></div> : tab==='items' ? (
          <div className="section">
            <div className="section-title">Для вас</div>
            {selfItems.map(item => (
              <div className="shop-item mt8" key={item.id}>
                <div className="row-sb"><div><div className="si-name">{item.name}</div><div className="si-desc mt4">{item.desc}</div></div><div className="f12" style={{fontSize:28}}>{item.name.split(' ')[0]}</div></div>
                <div className="si-foot">
                  <div><div className="si-price">{item.price_stars} ⭐</div>{item.price_rc > 0 && <div className="f11 text-muted mt4">или {item.price_rc.toLocaleString()} RC</div>}</div>
                  <div style={{display:'flex',gap:6}}>
                    {item.price_rc > 0 && <button className="btn btn-ghost btn-sm" disabled={loading['rc_'+item.id]} onClick={() => buyItemRC(item.id)}>{loading['rc_'+item.id] ? '...' : `RC`}</button>}
                    <button className="btn btn-primary btn-sm" disabled={loading[item.id]} onClick={() => buyItemStars(item.id)}>{loading[item.id] ? '...' : '⭐'}</button>
                  </div>
                </div>
              </div>
            ))}
            {user.slaves.length > 0 && (
              <>
                <div className="section-title mt20">Для рабов</div>
                <select className="input" value={selectedSlave} onChange={e => setSelectedSlave(e.target.value)} style={{marginBottom:10}}><option value="">— Выберите раба —</option>{user.slaves.map(s => <option key={s.id} value={s.id}>{s.custom_name||s.first_name||s.username||s.id}</option>)}</select>
                {slaveItems.map(item => (
                  <div className="shop-item" key={item.id}>
                    <div className="row-sb"><div><div className="si-name">{item.name}</div><div className="si-desc mt4">{item.desc}</div></div><div style={{fontSize:28}}>{item.name.split(' ')[0]}</div></div>
                    <div className="si-foot">
                      <div><div className="si-price">{item.price_stars} ⭐</div>{item.price_rc > 0 && <div className="f11 text-muted mt4">или {item.price_rc.toLocaleString()} RC</div>}</div>
                      <div style={{display:'flex',gap:6}}>
                        {item.price_rc > 0 && <button className="btn btn-ghost btn-sm" disabled={loading['rc_chains']} onClick={() => buyItemRC('chains')}>{loading['rc_chains'] ? '...' : 'RC'}</button>}
                        <button className="btn btn-primary btn-sm" disabled={loading['chains']} onClick={() => buyItemStars('chains')}>{loading['chains'] ? '...' : '⭐'}</button>
                      </div>
                    </div>
                  </div>
                ))}
              </>
            )}
          </div>
        ) : tab==='cosmetics' ? (
          <div className="section">
            <div className="f12 text-muted" style={{marginBottom:14,lineHeight:1.5}}>🎨 Косметика навсегда сохраняется между сезонами. Покупка только за Telegram Stars ⭐</div>
            <div className="section-title">🎨 Цвет имени</div>
            <div className="gap8" style={{marginBottom:20}}>{cosmByType.colors?.map(c => <div className="shop-item" key={c.id}><div className="row-sb"><div className={`si-name ${c.css_class}`}>Aa — {c.name}</div>{c.owned ? <span className="f12 text-green fw6">✓ Есть</span> : <button className="btn btn-primary btn-sm" onClick={() => buyItemStars('cosmetic',c.id)}>{c.price_stars} ⭐</button>}</div></div>)}</div>
            <div className="section-title">🖼 Рамка аватара</div>
            <div className="gap8" style={{marginBottom:20}}>{cosmByType.frames?.map(c => <div className="shop-item" key={c.id}><div className="row-sb"><div className="si-name">{c.name}</div>{c.owned ? <span className="f12 text-green fw6">✓ Есть</span> : <button className="btn btn-primary btn-sm" onClick={() => buyItemStars('cosmetic',c.id)}>{c.price_stars} ⭐</button>}</div></div>)}</div>
            <div className="section-title">😀 Эмодзи-статус</div>
            <div className="gap8">{cosmByType.emojis?.map(c => <div className="shop-item" key={c.id}><div className="row-sb"><div className="row"><span style={{fontSize:22}}>{c.value}</span><div className="si-name">{c.name}</div></div>{c.owned ? <span className="f12 text-green fw6">✓ Есть</span> : <button className="btn btn-primary btn-sm" onClick={() => buyItemStars('cosmetic',c.id)}>{c.price_stars} ⭐</button>}</div></div>)}</div>
          </div>
        ) : (
          <div className="section">
            <div className="section-title">Промокод</div>
            <input className="input" placeholder="ПРОМОКОД" value={promoCode} onChange={e => setPromoCode(e.target.value.toUpperCase())} onKeyDown={e => e.key==='Enter' && usePromo()}/>
            <button className="btn btn-primary mt8" onClick={usePromo}>🎁 Применить</button>
          </div>
        )}
      </div>
    </div>
  );
}

  async function loadUsers(q='') { try { setUsers(await get(`/api/admin/users${q?`?q=${q}`:''}`)); } catch {} }
  async function loadConvs()   { try { setConvs(await get('/api/admin/tickets')); } catch {} }
  async function loadStories() { try { setStories(await get('/api/admin/stories')); } catch {} }
  async function loadSponsors() { try { setSponsors(await get('/api/admin/sponsors')); } catch {} }
  async function loadAdmins() { try { setAdminsData(await get('/api/admin/admins_list')); } catch {} }

  useEffect(() => { loadDash(); }, []);

  function switchTab(t) {
    setTab(t); setOpenConv(null);
    if(t==='users') loadUsers(); if(t==='tickets') loadConvs(); if(t==='stories') loadStories();
    if(t==='sponsors') loadSponsors(); if(t==='admins') loadAdmins();
  }

  async function openChat(conv) {
    setOpenConv(conv);
    try { const msgs = await get(`/api/admin/tickets/${conv.user_id}`); setConvMsgs(msgs); loadConvs(); } catch {}
  }
  useEffect(() => { convBottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [convMsgs]);

  async function doReply() {
    if(!replyText.trim()||!openConv) return;
    try { await post('/api/admin/tickets/reply', { ticket_user_id: openConv.user_id, message: replyText }); setReplyText(''); setConvMsgs(await get(`/api/admin/tickets/${openConv.user_id}`)); }
    catch(e) { showToast('❌ '+e.message); }
  }

  async function saveUser() {
    try { await post('/api/admin/users/edit', { user_id: editUser.id, balance: editBal ? parseFloat(editBal) : undefined, price: editPrice ? parseFloat(editPrice) : undefined }); showToast('✅ Сохранено'); setEditUser(null); loadUsers(); }
    catch(e) { showToast('❌ '+e.message); }
  }
  async function banUser(uid, banned) { try { await post('/api/admin/users/edit',{user_id:uid,is_banned:banned}); showToast('✅'); loadUsers(); } catch(e) { showToast('❌ '+e.message); } }
  async function freeUser(uid) { try { await post('/api/admin/users/edit',{user_id:uid,free_slave:true}); showToast('✅ Освобождён'); loadUsers(); } catch(e) { showToast('❌ '+e.message); } }
  async function approveStory(id) { try { const r = await post(`/api/admin/stories/approve?claim_id=${id}`, ''); showToast(`✅ Одобрено! Предмет: ${r.item}`); loadStories(); } catch(e) { showToast('❌ '+e.message); } }
  async function doBroadcast() { if(!broadcast.trim()) return; try { const r = await post('/api/admin/broadcast',{text:broadcast}); showToast(`📤 Разослано ${r.count} игрокам`); setBroadcast(''); } catch(e) { showToast('❌ '+e.message); } }
  async function doSeasonStart() { if(!seasonPass) return; if(!confirm('⚠️ Начать новый сезон? Весь прогресс будет сброшен!')) return; try { await post('/api/admin/season/start',{password:seasonPass}); showToast('🔥 Сезон начат!'); } catch(e) { showToast('❌ '+e.message); } }
  async function doClearDb() { if(!confirm('💀 ПОЛНОЕ УНИЧТОЖЕНИЕ БАЗЫ ДАННЫХ! Последнее предупреждение!')) return; try { await post('/api/admin/db/clear'); showToast('💀 База уничтожена'); loadDash(); } catch(e) { showToast('❌ '+e.message); } }
  async function createPromo() { if(!promoCode||!promoRc) return; try { await post('/api/admin/promo/create',{code:promoCode.toUpperCase(),reward_rc:parseFloat(promoRc),max_uses:parseInt(promoMax)}); showToast('✅ Промокод создан'); setPromoCode(''); setPromoRc(''); setPromoMax('1'); } catch(e) { showToast('❌ '+e.message); } }
  async function grantCosmetic() { if (!cIdent.trim()) return; try { await post('/api/admin/users/cosmetic', { identifier: cIdent.trim(), field: cField, value: cVal }); showToast('✅ Косметика выдана!'); setCIdent(''); setCVal(''); } catch(e) { showToast('❌ '+e.message); } }
  
  async function addSponsor(isMain) { try { await post('/api/admin/sponsors/add', { channel_id: spId, channel_title: spTitle, channel_url: spUrl, reward_rc: parseFloat(spRc), is_main: isMain }); showToast('✅ Добавлен'); loadSponsors(); } catch(e) { showToast('❌ ' + e.message); } }
  async function deleteSponsor(id) { try { await post('/api/admin/sponsors/delete', { sponsor_id: id }); showToast('✅ Удален'); loadSponsors(); } catch(e) { showToast('❌ ' + e.message); } }
  async function addAdmin() { try { await post('/api/admin/admins_list/add', { user_id: parseInt(newAdminId) }); showToast('✅ Админ добавлен'); loadAdmins(); } catch(e) { showToast('❌ ' + e.message); } }
  async function removeAdmin(uid) { try { await post('/api/admin/admins_list/remove', { user_id: uid }); showToast('✅ Удален'); loadAdmins(); } catch(e) { showToast('❌ ' + e.message); } }

  return (
    <div className="screen">
      {toast && <div className="toast">{toast}</div>}
      <div className="hdr"><div className="hdr-title">⚙️ Панель</div><div className="hdr-sub">Только для администраторов</div></div>
      <div className="tabs" style={{overflowX:'auto'}}>
        {['dash','users','tickets','stories','sponsors','system'].map(t => <button key={t} className={`tab${tab===t?' active':''}`} onClick={() => switchTab(t)} style={{whiteSpace:'nowrap',minWidth:70}}>{t==='dash'?'📊 ДАШ':t==='users'?'👥 ЮЗЕРЫ':t==='tickets'?'💬 ТИКЕТЫ':t==='stories'?'📸 СТОРИС':t==='sponsors'?'📢 СПОНСОРЫ':'⚙️ СИСТЕМА'}</button>)}
        {user.is_super_admin && <button className={`tab${tab==='admins'?' active':''}`} onClick={() => switchTab('admins')} style={{whiteSpace:'nowrap',minWidth:70}}>👑 АДМИНЫ</button>}
      </div>
      <div className="content">
        {tab==='dash' && dash && (
          <div className="section">
            <div className="stat-grid">
              {[['👥','Всего игроков', dash.total_users],['🆕','Новых сегодня', dash.new_today],['💰','RC в игре', parseFloat(dash.total_rc||0).toFixed(0)],['💬','Новых тикетов', dash.tickets],['📸','Сторис ждут', dash.stories_pending]].map(([ico,lbl,val]) => <div className="admin-stat" key={lbl}><div className="as-ico">{ico}</div><div className="as-val">{val}</div><div className="as-lbl">{lbl}</div></div>)}
            </div>
            <button className="btn btn-ghost mt12" onClick={loadDash}>🔄 Обновить</button>
          </div>
        )}

        {tab==='users' && (
          <div className="section gap12">
            <div className="card" style={{background:'rgba(232,197,71,0.04)',border:'1px solid rgba(232,197,71,0.15)'}}>
              <div className="section-title" style={{color:'var(--gold)'}}>🎨 Выдать косметику</div>
              <div className="gap8">
                <input className="input" placeholder="Ник / @username / ID" value={cIdent} onChange={e => setCIdent(e.target.value)}/>
                <select className="input" value={cField} onChange={e => { setCField(e.target.value); setCVal(''); }}>
                  <option value="name_color">🎨 Цвет ника</option><option value="avatar_frame">🖼 Рамка аватара</option><option value="emoji_status">😀 Эмодзи</option>
                </select>
                {cField === 'name_color' && <div className="row" style={{gap:6,flexWrap:'wrap'}}>{[['default','Стандарт','var(--text)'],['ruby','Рубин','var(--red)'],['gold','Золото','var(--gold)'],['neon','Неон','var(--green)'],['blue','Синий','var(--blue)'],['purple','Фиолет','var(--purple)']].map(([v,l,c]) => <button key={v} onClick={() => setCVal(v)} style={{background: cVal===v ? c : 'rgba(255,255,255,0.06)', color: cVal===v ? '#000' : c, border:`1px solid ${c}`, borderRadius:10, padding:'7px 12px', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'var(--font)', opacity: cVal===v ? 1 : 0.7}}>{l}</button>)}</div>}
                {cField === 'avatar_frame' && <div className="row" style={{gap:6,flexWrap:'wrap'}}>{[['none','Нет'],['gold','Золотая'],['fire','Огонь 🔥'],['diamond','Алмаз 💎'],['rainbow','Радуга 🌈']].map(([v,l]) => <button key={v} onClick={() => setCVal(v)} style={{background: cVal===v ? 'var(--gold)' : 'rgba(255,255,255,0.06)', color: cVal===v ? '#000' : 'var(--text2)', border:'1px solid var(--border2)', borderRadius:10, padding:'7px 12px', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'var(--font)'}}>{l}</button>)}</div>}
                {cField === 'emoji_status' && <div className="row" style={{gap:8,flexWrap:'wrap'}}>{['','💎','👑','🔥','⚡','🌟','💀','🏆','🎖','🦁','🐺','🌙'].map((e,i) => <button key={i} onClick={() => setCVal(e)} style={{background: cVal===e ? 'var(--gold)' : 'rgba(255,255,255,0.06)', border:'1px solid var(--border2)', borderRadius:10, padding:'8px 12px', fontSize:16, cursor:'pointer', outline: cVal===e ? '2px solid var(--gold)' : 'none'}}>{e || '✕'}</button>)}</div>}
                <button className="btn btn-primary" onClick={grantCosmetic} disabled={!cIdent.trim() || !cVal && cField!=='emoji_status'}>🎁 Выдать</button>
              </div>
            </div>
            <div className="divider"/>
            <div className="row" style={{marginBottom:4}}><input className="input" placeholder="Поиск по нику/ID" value={searchQ} onChange={e => setSearchQ(e.target.value)} onKeyDown={e => e.key==='Enter' && loadUsers(searchQ)} style={{flex:1}}/><button className="btn btn-primary btn-sm" onClick={() => loadUsers(searchQ)}>🔍</button></div>
            <div className="gap8">
              {users.map(u => (
                <div className="card" key={u.id}>
                  <div className="row-sb"><div><div className="fw7">{u.first_name||u.username||u.id}</div><div className="text-muted f12">@{u.username||'—'} · #{u.id}</div></div><div style={{textAlign:'right'}}><div className="text-gold fw7">{parseFloat(u.balance).toFixed(0)} RC</div><div className="text-muted f12">Цена: {parseFloat(u.current_price).toFixed(0)}</div></div></div>
                  {u.owner_id && <div className="text-muted f12 mt8">Владелец: #{u.owner_id}</div>}
                  <div className="row mt8" style={{flexWrap:'wrap',gap:6}}><button className="btn btn-ghost btn-sm" onClick={() => {setEditUser(u);setEditBal(u.balance);setEditPrice(u.current_price);}}>✏️ Ред.</button><button className="btn btn-ghost btn-sm" onClick={() => freeUser(u.id)}>🔓 Освобод.</button><button className={`btn btn-sm ${u.is_banned?'btn-green':'btn-danger'}`} onClick={() => banUser(u.id, !u.is_banned)}>{u.is_banned?'✅ Разбан':'🚫 Бан'}</button></div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==='tickets' && !openConv && (
          <div>
            {conversations.length === 0 && <div className="text-center text-muted" style={{padding:40}}>Тикетов нет</div>}
            {conversations.map(conv => (
              <div className="conv-item" key={conv.user_id} onClick={() => openChat(conv)}>
                <Avatar user={{first_name: conv.first_name, username: conv.username, photo_url: conv.photo_url}} size={44}/>
                <div className="conv-meta"><div className="conv-name">{conv.first_name || conv.username || `#${conv.user_id}`}</div><div className="conv-last">{conv.last_is_admin && <span style={{color:'var(--gold)'}}>Вы: </span>}{conv.last_msg || '...'}</div></div>
                <div className="conv-right"><div className="conv-time">{new Date(conv.last_at).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}</div>{parseInt(conv.unread) > 0 && <div className="unread-dot">{conv.unread}</div>}</div>
              </div>
            ))}
          </div>
        )}
        {tab==='tickets' && openConv && (
          <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
            <div style={{padding:'12px 16px',borderBottom:'1px solid var(--border)',flexShrink:0}}><button className="back-btn" onClick={() => { setOpenConv(null); loadConvs(); }}>‹ Назад</button><div className="fw7 f13 mt4">{openConv.first_name || openConv.username || `#${openConv.user_id}`}</div><div className="text-muted f12">@{openConv.username || openConv.user_id}</div></div>
            <div style={{flex:1,overflowY:'auto',padding:'12px 16px'}}>{convMsgs.map(m => (<div key={m.id} className={`msg-wrap ${m.is_from_admin ? 'me' : 'them'}`}>{!m.is_from_admin && <div className="msg-sender">{openConv.first_name||openConv.username}</div>}<div className={`msg-bubble ${m.is_from_admin ? 'me' : 'them'}`}>{m.message}</div><div className="msg-time">{new Date(m.created_at).toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'})}</div></div>))}<div ref={convBottomRef}/></div>
          </div>
        )}

        {tab==='stories' && (
          <div className="section">
            {stories.map(s => (<div className="card gap8" key={s.id} style={{marginBottom:10}}><div className="fw7">@{s.username||s.first_name||s.user_id}</div><div className="text-muted f12">{new Date(s.created_at).toLocaleString('ru')}</div><button className="btn btn-green" onClick={() => approveStory(s.id)}>✅ Одобрить (+250 RC + предмет)</button></div>))}
            {stories.length===0 && <div className="text-center text-muted" style={{padding:40}}>Нет заявок</div>}
          </div>
        )}

        {tab==='sponsors' && (
          <div className="section gap12">
            <div className="card gap8">
              <div className="section-title">Добавить спонсора</div>
              <div className="f12 text-muted">Для проверки подписки бот должен быть Администратором в указанном канале. Укажите ID канала (например -100123...) или юзернейм (@channel).</div>
              <input className="input" placeholder="ID Канала / @username" value={spId} onChange={e=>setSpId(e.target.value)}/>
              <input className="input" placeholder="Название (для кнопки)" value={spTitle} onChange={e=>setSpTitle(e.target.value)}/>
              <input className="input" placeholder="Ссылка (https://t.me/...)" value={spUrl} onChange={e=>setSpUrl(e.target.value)}/>
              <input className="input" placeholder="Награда RC" type="number" value={spRc} onChange={e=>setSpRc(e.target.value)}/>
              <div className="row mt8"><button className="btn btn-ghost" style={{flex:1}} onClick={()=>addSponsor(false)}>Обычный</button><button className="btn btn-primary" style={{flex:1}} onClick={()=>addSponsor(true)}>Сделать Главным (Обяз.)</button></div>
            </div>
            {sponsors.map(s => (
              <div className="card row-sb" key={s.id}>
                <div><div style={{fontWeight:700}}>{s.is_main && '👑 '} {s.channel_title}</div><div className="text-muted" style={{fontSize:12}}>{s.channel_id} • {s.reward_rc} RC</div></div>
                <button className="btn btn-danger btn-sm" onClick={()=>deleteSponsor(s.id)}>Удалить</button>
              </div>
            ))}
          </div>
        )}

        {tab==='admins' && adminsData && (
          <div className="section gap12">
            <div className="card gap8">
              <div className="section-title">Добавить Админа</div>
              <input className="input" placeholder="ID Пользователя Telegram" value={newAdminId} onChange={e=>setNewAdminId(e.target.value)}/>
              <button className="btn btn-primary" onClick={addAdmin}>Назначить администратором</button>
            </div>
            <div className="section-title mt16">Список Админов</div>
            <div className="gap8">
              {adminsData.db_admins.map(a => (
                <div className="card row-sb" key={a.user_id}>
                  <div><div style={{fontWeight:600}}>{a.first_name||a.username||a.user_id}</div><div className="text-muted" style={{fontSize:12}}>ID: {a.user_id}</div></div>
                  <button className="btn btn-danger btn-sm" onClick={()=>removeAdmin(a.user_id)}>Снять</button>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==='system' && (
          <div className="section gap12">
            <div><div className="section-title">📢 Рассылка</div><textarea className="input" rows={3} placeholder="Текст рассылки (HTML)..." value={broadcast} onChange={e => setBroadcast(e.target.value)} style={{resize:'none',marginBottom:8}}/><button className="btn btn-primary" onClick={doBroadcast}>📤 Разослать всем</button></div><div className="divider"/>
            <div><div className="section-title">🎫 Создать промокод</div><div className="gap8"><input className="input" placeholder="КОД" value={promoCode} onChange={e => setPromoCode(e.target.value.toUpperCase())}/><input className="input" placeholder="Награда RC" type="number" value={promoRc} onChange={e => setPromoRc(e.target.value)}/><input className="input" placeholder="Кол-во использований" type="number" value={promoMax} onChange={e => setPromoMax(e.target.value)}/><button className="btn btn-primary" onClick={createPromo}>✅ Создать</button></div></div><div className="divider"/>
            <div><div className="section-title">🌟 Новый сезон</div><input className="input" type="password" placeholder="Пароль сезона" value={seasonPass} onChange={e => setSeasonPass(e.target.value)} style={{marginBottom:8}}/><button className="btn btn-danger" onClick={doSeasonStart}>🔥 Начать новый сезон</button></div><div className="divider"/>
            <div><div className="section-title" style={{color:'var(--red)'}}>💀 Опасная зона</div><button className="btn btn-danger" onClick={doClearDb}>💀 Полностью очистить базу данных</button></div>
          </div>
        )}
      </div>

      {tab==='tickets' && openConv && (
        <div className="chat-input-wrap"><textarea className="chat-input" placeholder="Ответ пользователю..." value={replyText} onChange={e => setReplyText(e.target.value)} rows={1} onKeyDown={e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doReply();} }}/><button className="btn btn-primary btn-sm" onClick={doReply} disabled={!replyText.trim()}>➤</button></div>
      )}

      {editUser && (
        <div className="overlay" onClick={() => setEditUser(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"/>
            <div className="modal-title">✏️ @{editUser.username||editUser.id}</div>
            <div className="gap8"><div><div className="text-muted f12" style={{marginBottom:4}}>Баланс RC</div><input className="input" type="number" value={editBal} onChange={e => setEditBal(e.target.value)}/></div><div><div className="text-muted f12" style={{marginBottom:4}}>Цена</div><input className="input" type="number" value={editPrice} onChange={e => setEditPrice(e.target.value)}/></div><button className="btn btn-primary" onClick={saveUser}>💾 Сохранить</button></div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── APP ROOT ──
function App() {
  const [user, setUser]   = useState(null);
  const [sponsorsData, setSponsorsData] = useState(null);
  const [tab, setTab]     = useState('profile');
  const [error, setError] = useState(null);
  const [viewingUid, setViewingUid] = useState(null);
  const [banSupportMode, setBanSupportMode] = useState(false);
  const [toast, showToast] = useToast();

  async function init() {
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    let initData = tg?.initData || '';
    let refId    = null;
    let photoUrl = tg?.initDataUnsafe?.user?.photo_url || null;

    const sp = tg?.initDataUnsafe?.start_param;
    if (sp && sp.startsWith('ref_')) { try { refId = parseInt(sp.split('_')[1]); } catch {} }

    if (!initData) {
      initData = 'dev:' + (Math.floor(Math.random()*100000) + 100000);
      console.warn('[DEV] fake initData:', initData);
    }
    _initData = initData;

    try {
      const cfg = await get('/api/config');
      _botUsername = cfg.bot_username || _botUsername;
      const data = await post('/api/init', { init_data: initData, ref_id: refId, photo_url: photoUrl });
      setUser(data);
      if (data.bot_username) _botUsername = data.bot_username;
      
      const spData = await get('/api/sponsors/status');
      setSponsorsData(spData);
    } catch(e) { setError(e.message); }
  }

  async function refreshUser() {
    try { setUser(await get('/api/profile')); setSponsorsData(await get('/api/sponsors/status')); } catch {}
  }

  useEffect(() => { init(); }, []);

  if (error) return <div className="loading-screen"><div style={{fontSize:40}}>❌</div><div style={{color:'var(--red)',fontWeight:700}}>{error}</div><button className="btn btn-ghost" style={{width:140}} onClick={() => {setError(null);init();}}>Повтор</button></div>;
  if (!user || !sponsorsData) return <div className="loading-screen"><div className="loading-logo">⛓</div><div className="spinner"/><div className="text-muted f13">Загружаем...</div></div>;

  if (user.is_banned) {
    if (banSupportMode) return <div className="app"><SupportScreen user={user}/><nav className="nav"><button className="nav-btn active" style={{color:'var(--red)'}}><span className="ico">💬</span>Поддержка</button></nav></div>;
    return <div className="ban-screen"><div className="ban-icon">🚫</div><div className="ban-title">Доступ ограничен</div><div className="ban-sub">Ваш аккаунт заблокирован администрацией.</div>{user.ban_reason && <div className="ban-reason-box"><div style={{fontSize:11,color:'var(--text3)',marginBottom:4,letterSpacing:'1px',textTransform:'uppercase'}}>Причина</div>{user.ban_reason}</div>}<button className="ban-support-btn" onClick={() => setBanSupportMode(true)}>💬 Написать в поддержку</button></div>;
  }

  // ── SPONSOR BLOCKER (MAIN SPONSOR) ──
  if (sponsorsData.main_sponsor && !sponsorsData.main_subscribed) {
    return (
      <div className="sponsor-block">
        <div className="sponsor-icon">📢</div>
        <div className="sponsor-title">Доступ ограничен</div>
        <div className="sponsor-sub">Для участия в игре необходимо быть подписанным на канал нашего спонсора.</div>
        <button className="btn btn-primary" style={{marginBottom:12, width:'200px'}} onClick={() => window.Telegram.WebApp.openTelegramLink(sponsorsData.main_sponsor.channel_url)}>
          Подписаться
        </button>
        <button className="btn btn-ghost" style={{width:'200px'}} onClick={() => init()}>Проверить</button>
      </div>
    );
  }

  if (viewingUid && viewingUid !== user.id) {
    return <div className="app"><UserProfileScreen uid={viewingUid} currentUserId={user.id} onBack={() => setViewingUid(null)} onBuy={refreshUser}/><nav className="nav"><button className="nav-btn" onClick={() => setViewingUid(null)}><span className="ico">‹</span>Назад</button></nav></div>;
  }

  const tabs = [
    { id:'profile', ico:'👤', label:'Профиль' },
    { id:'search',  ico:'🔍', label:'Поиск'   },
    { id:'top',     ico:'🏆', label:'Топ'     },
    { id:'shop',    ico:'🛒', label:'Магазин' },
    { id:'support', ico:'💬', label:'Помощь'  },
    ...(user.is_admin ? [{ id:'admin', ico:'⚙️', label:'Админ' }] : []),
  ];

  function handleViewProfile(uid) { if (uid === user.id) { setTab('profile'); return; } setViewingUid(uid); }

  return (
    <div className="app">
      {toast && <div className="toast">{toast}</div>}

      {tab==='profile' && <ProfileScreen user={user} sponsors={sponsorsData.tasks} onRefresh={refreshUser} onViewProfile={handleViewProfile}/>}
      {tab==='search'  && <SearchScreen  user={user} onBuy={refreshUser} onViewProfile={handleViewProfile}/>}
      {tab==='top'     && <TopScreen onViewProfile={handleViewProfile}/>}
      {tab==='shop'    && <ShopScreen user={user} onRefresh={refreshUser}/>}
      {tab==='support' && <SupportScreen user={user}/>}
      {tab==='admin'   && user.is_admin && <AdminScreen user={user}/>}

      <nav className="nav">
        {tabs.map(t => <button key={t.id} className={`nav-btn${tab===t.id?' active':''}`} onClick={() => { setViewingUid(null); setTab(t.id); }}><span className="ico">{t.ico}</span>{t.label}</button>)}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
