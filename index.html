/* Mining Game */

/* 7 Day Login Tracker */
.login-track { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0; scrollbar-width: none; margin-top: 16px; }
.login-track::-webkit-scrollbar { display: none; }
.login-day { flex: 1; min-width: 50px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; padding: 10px 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: 0.2s; }
.login-day.active { background: var(--gold-dim); border-color: rgba(232,197,71,0.4); transform: translateY(-2px); }
.login-day.past { opacity: 0.6; }
.login-day.past::after { content: '✓'; position: absolute; font-size: 16px; font-weight: 800; color: var(--green); }

</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const BASE = ''; let _initData = ''; let _botUsername = 'YourBot';
function getHeaders() { return { 'Content-Type':'application/json', 'x-init-data': _initData }; }
async function api(method, path, body) {
  const opts = { method, headers: getHeaders() };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || `Error ${r.status}`);
  return data;
}
const get = (path) => api('GET', path); const post = (path, body) => api('POST', path, body);

let toastIdCount = 0;
function ToastContainer({ toasts }) { return <div className="toast-container">{toasts.map(t => <div key={t.id} className="toast">{t.msg}</div>)}</div>; }
function useToast(setToasts) { return useCallback((msg) => { const id = ++toastIdCount; setToasts(p => [...p, {id, msg}]); setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3000); }, [setToasts]); }

function compressImage(file, callback) {
  const reader = new FileReader(); reader.readAsDataURL(file);
  reader.onload = event => {
    const img = new Image(); img.src = event.target.result;
    img.onload = () => {
      const canvas = document.createElement('canvas'); const MAX_WIDTH = 800;
      let width = img.width; let height = img.height;
      if (width > MAX_WIDTH) { height = Math.round(height * (MAX_WIDTH / width)); width = MAX_WIDTH; }
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
      callback(canvas.toDataURL('image/jpeg', 0.7));
    }
  }
}

function Avatar({ user, size=44 }) {
  const [err, setErr] = useState(false);
  const initial = (user?.first_name || user?.username || '?')[0].toUpperCase();
  const cls = size >= 60 ? 'avatar' : 'avatar-sm';
  const frameClass = user?.avatar_frame && user.avatar_frame !== 'none' ? `frame-${user.avatar_frame}` : '';
  const style = size !== 44 && size !== 68 ? { width: size, height: size, fontSize: size * 0.4 } : {};
  return <div className={`${cls} ${frameClass}`} style={style}>{user?.photo_url && !err ? <img src={user.photo_url} alt="" onError={()=>setErr(true)} /> : initial}</div>;
}

function PlayerName({ user, style }) {
  const isAdmin = user.is_admin || user.is_admin_flag;
  const clr = user.name_color && user.name_color !== 'default' ? `clr-${user.name_color}` : '';
  const emoji = isAdmin ? '⚜️ ' : (user.emoji_status ? user.emoji_status + ' ' : '');
  const name = user.custom_name ? `${user.custom_name} (${user.first_name || user.username || `#${user.id}`})` : (user.first_name || user.username || `#${user.id}`);
  if (isAdmin) return <span className="admin-gradient-name" style={style}>{emoji}{name}{user.vip_level >= 3 && ' 👑'}{user.vip_level === 2 && ' 🥈'}{user.vip_level === 1 && ' 🥉'}</span>;
  return <span className={clr} style={style}>{emoji}{name}{user.vip_level >= 3 && ' 👑'}{user.vip_level === 2 && ' 🥈'}{user.vip_level === 1 && ' 🥉'}</span>;
}

function useCountdown(targetIso) {
  const [secs, setSecs] = useState(0);
  useEffect(() => {
    if (!targetIso) { setSecs(0); return; }
    function tick() { const diff = Math.max(0, Math.round((new Date(targetIso) - Date.now()) / 1000)); setSecs(diff); }
    tick(); const id = setInterval(tick, 1000); return () => clearInterval(id);
  }, [targetIso]);
  return secs;
}
function fmtCountdown(s) { const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`; }

async function generateAndShareStory(user, showToast, onSetPending) {
  const tg = window.Telegram?.WebApp;
  if (!tg || !tg.shareToStory) { showToast('❌ Ваш Telegram не поддерживает публикацию Stories'); return; }
  const canvas = document.createElement('canvas'); canvas.width = 1080; canvas.height = 1920; const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0a0a0a'; ctx.fillRect(0, 0, 1080, 1920);
  const grad = ctx.createRadialGradient(540, 500, 100, 540, 500, 600); grad.addColorStop(0, 'rgba(232,197,71,0.15)'); grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, 1080, 1920);
  ctx.textAlign = 'center'; ctx.fillStyle = '#E8C547'; ctx.font = '800 45px Inter'; ctx.fillText('⛓ РАБСТВО · СЕЗОН 1', 540, 300);
  ctx.beginPath(); ctx.arc(540, 600, 160, 0, Math.PI * 2); ctx.lineWidth = 12; ctx.strokeStyle = '#E8C547'; ctx.stroke(); ctx.fillStyle = '#1e1e1e'; ctx.fill();
  ctx.fillStyle = '#E8C547'; ctx.font = '800 130px Inter'; ctx.fillText('⛓️', 540, 645);
  ctx.fillStyle = '#FFFFFF'; ctx.font = 'bold 75px Inter'; ctx.fillText(user.first_name || user.username || 'Игрок', 540, 950);
  ctx.fillStyle = 'rgba(232,197,71,0.7)'; ctx.font = '600 35px Inter'; ctx.letterSpacing = '4px'; ctx.fillText('МОЯ СТОИМОСТЬ', 540, 1100);
  ctx.fillStyle = '#E8C547'; ctx.font = '800 130px Inter'; ctx.letterSpacing = '0px'; ctx.fillText(`${user.price.toFixed(0)} RC`, 540, 1220);
  ctx.fillStyle = '#E8C547'; ctx.roundRect(240, 1420, 600, 100, 28); ctx.fill(); ctx.fillStyle = '#000000'; ctx.font = '800 38px Inter'; ctx.fillText('🔗 ИГРАТЬ ПО ССЫЛКЕ', 540, 1485);
  ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.font = '600 48px Inter'; ctx.fillText('Проверь, у кого ты в рабстве!', 540, 1720);
  try {
    showToast('⏳ Подготовка Story...'); const b64 = canvas.toDataURL('image/png'); const r = await post('/api/stories/upload', { b64_data: b64 });
    const refLink = `https://t.me/${_botUsername}?start=ref_${user.id}`;
    tg.shareToStory(r.url, { text: `💰 Моя цена в РАБСТВО: ${user.price.toFixed(0)} RC!\nПроверь у кого ты в рабстве 👇\n\n${refLink}`, widget_link: { url: refLink, name: "Играть" } });
    setTimeout(() => onSetPending(true), 2500);
  } catch(e) { showToast('❌ Ошибка генерации: ' + e.message); }
}

function AdminGhostToggle({ userId, initialHidden, onToast }) {
  const [hidden, setHidden] = useState(initialHidden || false); const [loading, setLoading] = useState(false);
  async function toggle() { setLoading(true); try { const newVal = !hidden; await post('/api/admin/toggle_hidden', { hidden: newVal }); setHidden(newVal); onToast(newVal ? '👻 Скрыт' : '👁 Видим'); } catch(e) { onToast('❌ ' + e.message); } setLoading(false); }
  return <button onClick={toggle} disabled={loading} className="btn btn-ghost btn-sm" style={{borderColor: hidden ? 'var(--gold)' : 'var(--border2)', color: hidden ? 'var(--gold)' : 'var(--text-2)'}}>{loading ? '...' : hidden ? '🟡 Скрыт' : '⚫ Виден'}</button>;
}

// === МОДАЛКИ ДЛЯ ИГР ===
function RobberyGameModal({ targetId, onClose, onFinish }) {
  const [timeLeft, setTimeLeft] = useState(10);
  const [score, setScore] = useState(0);
  const [items, setItems] = useState([]);
  
  useEffect(() => {
    const tId = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
    const iId = setInterval(() => {
      const isBomb = Math.random() < 0.25;
      const newItem = { id: Date.now() + Math.random(), type: isBomb ? 'bomb' : 'coin', x: Math.floor(Math.random() * 80) + 10, dur: isBomb ? 1.5 : (Math.random() * 1 + 1.5) };
      setItems(p => [...p, newItem]);
      setTimeout(() => setItems(p => p.filter(i => i.id !== newItem.id)), newItem.dur * 1000);
    }, 400);
    return () => { clearInterval(tId); clearInterval(iId); };
  }, []);

  useEffect(() => { if (timeLeft <= 0) onFinish("success", score); }, [timeLeft, score, onFinish]);

  const tap = (e, item) => {
    e.stopPropagation(); setItems(p => p.filter(i => i.id !== item.id));
    if (item.type === 'bomb') onFinish("caught", 0);
    else setScore(p => p + 10);
  };

  return (
    <div className="overlay">
      <div className="modal" style={{textAlign:'center'}}>
        <div className="modal-title">🥷 Ограбление!</div>
        <div className="f13 text-muted mb8">Лови монеты (RC)! Не трогай копов (полиция)!</div>
        <div className="row-sb mb8"><div className="fw8 text-gold">Собрано: {score} RC</div><div className="fw8 text-red">⏳ {timeLeft}с</div></div>
        <div className="robbery-area">{items.map(item => (<div key={item.id} className="robbery-item" style={{left: `${item.x}%`, animationDuration: `${item.dur}s`}} onPointerDown={(e) => tap(e, item)}>{item.type === 'coin' ? '💰' : '👮'}</div>))}</div>
      </div>
    </div>
  );
}

function RiotModal({ onClose, onSuppress }) {
  const [clicks, setClicks] = useState(0); const target = 150;
  const handleTap = () => { if (clicks + 1 >= target) onSuppress(); else setClicks(c => c + 1); };
  return (
    <div className="overlay">
      <div className="modal" style={{textAlign:'center', background: 'radial-gradient(circle at top, #3a0000, var(--bg2))'}}>
        <div style={{fontSize: 60, marginBottom: 16}}>🚨</div>
        <div className="modal-title text-red">РАБЫ БУНТУЮТ!</div>
        <div className="f13 text-muted mb16">Жмите как можно быстрее, чтобы подавить восстание, иначе они разграбят вашу казну!</div>
        <div className="energy-bar-wrap mb16" style={{height: 24, borderRadius: 12}}><div className="energy-bar-fill" style={{width: `${(clicks/target)*100}%`, background: 'var(--red)'}}></div></div>
        <div className="fw8 mb20">{clicks} / {target} тапов</div>
        <button className="btn btn-danger" style={{height: 80, fontSize: 24}} onPointerDown={handleTap}>👊 ПОДАВИТЬ</button>
      </div>
    </div>
  );
}

// === ЭКРАНЫ ===

function GamesScreen({ user, onRefresh, showToast }) {
  const [tab, setTab] = useState('mine');
  
  const [localEnergy, setLocalEnergy] = useState(user.energy);
  const [unsyncedClicks, setUnsyncedClicks] = useState(0);
  const [floats, setFloats] = useState([]);
  
  useEffect(() => {
    if (tab !== 'mine') return;
    const int = setInterval(() => setLocalEnergy(e => Math.min(user.max_energy, e + 1)), 1000);
    return () => clearInterval(int);
  }, [tab, user.max_energy]);

  useEffect(() => {
    if (tab !== 'mine') return;
    const sync = async () => {
      if (unsyncedClicks > 0) {
        const clicks = unsyncedClicks; setUnsyncedClicks(0);
        try { const r = await post('/api/mine/sync', { clicks }); if (r.energy !== undefined) setLocalEnergy(r.energy); onRefresh(); } catch(e) {}
      }
    };
    const int = setInterval(sync, 3000);
    return () => { sync(); clearInterval(int); };
  }, [unsyncedClicks, tab]);

  const handleMineTap = (e) => {
    if (localEnergy <= 0) return;
    setLocalEnergy(e => e - 1); setUnsyncedClicks(c => c + 1);
    const rect = e.currentTarget.getBoundingClientRect(); const x = e.clientX - rect.left; const y = e.clientY - rect.top;
    const id = Date.now() + Math.random();
    setFloats(p => [...p, { id, x, y }]);
    setTimeout(() => setFloats(p => p.filter(f => f.id !== id)), 800);
  };

  const buyUpgrade = async (type) => { try { await post('/api/mine/upgrade', { type }); showToast('✅ Улучшено!'); onRefresh(); } catch(e) { showToast('❌ ' + e.message); } };

  const [arenaSlave, setArenaSlave] = useState(''); const [arenaBet, setArenaBet] = useState(''); const [arenaLog, setArenaLog] = useState(null); const [fighting, setFighting] = useState(false);
  const startFight = async () => {
    if (!arenaSlave || !arenaBet) return;
    setFighting(true); setArenaLog(null);
    try { const r = await post('/api/arena/fight', { slave_id: parseInt(arenaSlave), bet: parseFloat(arenaBet) }); setArenaLog(r); onRefresh(); } catch(e) { showToast('❌ ' + e.message); }
    setFighting(false);
  };

  return (
    <div className="content" style={{padding:0}}>
      <div className="tabs-wrap"><div className="tabs"><button className={`tab${tab==='mine'?' active':''}`} onClick={() => setTab('mine')}>⛏ Каменоломня</button><button className={`tab${tab==='arena'?' active':''}`} onClick={() => setTab('arena')}>⚔️ Арена</button></div></div>
      
      {tab === 'mine' && (
        <div style={{padding: 16}}>
          <div className="text-center mb16">
            <div className="fw8" style={{fontSize: 24}}>{user.balance.toFixed(1)} RC</div>
            {user.owner && <div className="f12 text-red mt4">⛓ 20% добычи уходит вашему хозяину</div>}
            {!user.owner && <div className="f12 text-green mt4">✅ Вы свободны. 100% добычи ваши.</div>}
          </div>
          <div className="mine-rock" onPointerDown={handleMineTap}>🪨{floats.map(f => (<div key={f.id} className="floating-number" style={{left: f.x, top: f.y}}>+{user.click_power}</div>))}</div>
          <div className="mt20"><div className="row-sb mb8"><span className="fw7 f12 text-muted">Энергия</span><span className="fw8 f13">{localEnergy} / {user.max_energy}</span></div><div className="energy-bar-wrap"><div className="energy-bar-fill" style={{width: `${(localEnergy/user.max_energy)*100}%`}}></div></div></div>
          <div className="section-title mt20">Прокачка кирки</div>
          <div className="card row-sb" style={{margin:0, marginBottom:8}}><div><div className="fw7">Мощь тапа (ур. {user.click_power})</div><div className="f12 text-muted mt4">+1 RC за клик</div></div><button className="btn btn-primary btn-sm" onClick={() => buyUpgrade('power')}>{(user.click_power * 1000).toFixed(0)} RC</button></div>
          <div className="card row-sb" style={{margin:0}}><div><div className="fw7">Запас энергии ({user.max_energy})</div><div className="f12 text-muted mt4">+500 макс. энергии</div></div><button className="btn btn-primary btn-sm" onClick={() => buyUpgrade('energy')}>{(user.max_energy * 1.5).toFixed(0)} RC</button></div>
        </div>
      )}
      
      {tab === 'arena' && (
        <div style={{padding: 16}}>
          <div className="card" style={{background: 'linear-gradient(135deg, #1e0000, #111)', borderColor: 'var(--red)'}}><div className="fw8 text-red" style={{fontSize:18, marginBottom:8}}>⚔️ Подпольные Бои</div><div className="f12 text-muted" style={{lineHeight:1.5}}>Выставляйте своих рабов на бой против других игроков. Шанс победы зависит от цены раба. Победитель забирает банк (ставка х1.9). Проигравший получает травму на 4 часа.</div></div>
          {user.slaves.length === 0 ? (<div className="text-center text-muted mt20">У вас нет рабов для отправки на Арену.</div>) : (
            <div className="mt16 gap12">
              <select className="input" value={arenaSlave} onChange={e => setArenaSlave(e.target.value)}>
                <option value="">— Выберите бойца —</option>
                {user.slaves.map(s => {
                  const label = `${s.custom_name||s.first_name||s.id} (${s.price.toFixed(0)} RC)`;
                  if (s.is_injured) return <option key={s.id} disabled>🤕 {label} - Травмирован</option>;
                  if (s.job_id) return <option key={s.id} disabled>💼 {label} - На работе</option>;
                  return <option key={s.id} value={s.id}>⚔️ {label}</option>;
                })}
              </select>
              <input className="input" type="number" placeholder="Ставка (RC)" value={arenaBet} onChange={e => setArenaBet(e.target.value)} />
              <button className="btn btn-danger mt8" onClick={startFight} disabled={fighting || !arenaSlave || !arenaBet}>{fighting ? '🥊 Бой идет...' : '🥊 Начать бой'}</button>
              {arenaLog && (<div className="card mt16" style={{borderColor: arenaLog.is_win ? 'var(--green)' : 'var(--red)'}}><div className="fw8" style={{fontSize:16, color: arenaLog.is_win ? 'var(--green)' : 'var(--red)'}}>{arenaLog.is_win ? '🏆 ПОБЕДА!' : '💀 ПОРАЖЕНИЕ'}</div><div className="f13 mt8" style={{lineHeight:1.5}}>{arenaLog.log}</div></div>)}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function TasksScreen({ tasksData, onRefresh, showToast }) {
  const [tab, setTab] = useState('daily'); const [claiming, setClaiming] = useState(false);
  const daily = tasksData?.daily || []; const sponsors = tasksData?.sponsors || []; const loginBonus = tasksData?.login_bonus;
  async function claimTask(taskId) { setClaiming(true); try { const r = await post('/api/tasks/claim_daily', { task_id: taskId }); showToast(`🎁 Вы получили +${r.reward} RC!`); onRefresh(); } catch(e) { showToast('❌ ' + e.message); } setClaiming(false); }
  async function claimLoginBonus() { setClaiming(true); try { const r = await post('/api/tasks/claim_login'); showToast(`🎁 Награда за день ${r.day}: +${r.reward} RC!`); onRefresh(); } catch(e) { showToast('❌ ' + e.message); } setClaiming(false); }
  return (
    <div className="content" style={{padding:0}}><div className="tabs-wrap"><div className="tabs"><button className={`tab${tab==='daily'?' active':''}`} onClick={() => setTab('daily')}>Ежедневные</button><button className={`tab${tab==='sponsors'?' active':''}`} onClick={() => setTab('sponsors')}>Спонсоры</button></div></div>
      <div style={{padding:'16px'}}>
        {tab === 'daily' && (<div>
          {loginBonus && (<div className="card" style={{padding:'16px', background:'linear-gradient(145deg, #111 0%, #1a1a1a 100%)', borderColor:'rgba(232,197,71,0.2)'}}><div className="row-sb mb12"><div className="fw8" style={{fontSize:16}}>📅 Награды за вход</div>{loginBonus.can_claim ? <button className="btn btn-primary btn-sm" disabled={claiming} onClick={claimLoginBonus}>Забрать</button> : <span className="text-muted f12 fw6">Получено ✓</span>}</div><div className="f12 text-muted">Заходите каждый день, чтобы забрать главную награду!</div><div className="login-track">{loginBonus.rewards.map((rew, idx) => { const dayNum = idx + 1; const isActive = dayNum === loginBonus.current_day; const isPast = dayNum < loginBonus.current_day || (!loginBonus.can_claim && isActive); return (<div key={idx} className={`login-day ${isActive && loginBonus.can_claim ? 'active' : ''} ${isPast ? 'past' : ''}`}><div className="ld-day">День {dayNum}</div><div className="ld-val">{rew >= 1000 ? (rew/1000).toFixed(1).replace('.0','')+'k' : rew}</div></div>); })}</div></div>)}
          <div className="f12 text-muted text-center mb16 mt16">Выполняйте задания каждый день и получайте RC.</div>
          {daily.map(t => { const perc = Math.min(100, (t.current_progress / t.target) * 100); return (<div className="task-card" key={t.id}><div className="task-header"><div className="task-icon">{t.action==='buy_slave'?'🛒':t.action==='send_work'?'💼':t.action==='collect'?'💰':'⭐'}</div><div className="task-info"><div className="task-title">{t.title}</div><div className="task-reward">+{t.reward} RC</div></div>{t.is_claimed ? <span className="text-green fw8 f13" style={{padding:'8px'}}>✅</span> : t.is_completed ? <button className="btn btn-primary btn-sm" disabled={claiming} onClick={()=>claimTask(t.id)}>Забрать</button> : null}</div>{!t.is_claimed && (<div><div className="task-progress-wrap"><div className="task-progress-bar" style={{width:`${perc}%`}}/></div><div className="task-progress-text">{t.current_progress} / {t.target}</div></div>)}</div>); })}
        </div>)}
        {tab === 'sponsors' && (<div><div className="f12 text-muted text-center mb16">Подпишитесь на каналы наших спонсоров и получайте щедрые награды!</div>{sponsors.length > 0 ? sponsors.map(s => (<div className="card row-sb" key={s.id} style={{ margin: 0, marginBottom: 12 }}><div><div className="fw7">{s.channel_title}</div><div className="f12 text-gold fw6 mt4">Награда: +{s.reward_rc} RC</div></div>{s.claimed ? <span className="text-green fw7 f13">✅ Выполнено</span> : <div className="row"><button className="btn btn-ghost btn-sm" onClick={() => window.Telegram.WebApp.openTelegramLink(s.channel_url)}>Перейти</button><button className="btn btn-primary btn-sm" onClick={async ()=>{ try{ await post('/api/sponsors/check',{sponsor_id:s.id}); showToast('✅ Награда получена!'); onRefresh();}catch(e){showToast('❌ '+e.message);} }}>Проверить</button></div>}</div>)) : (<div className="text-center text-muted p20">Нет доступных заданий.</div>)}</div>)}
      </div>
    </div>
  );
}

function JobProbsModal({ jobs, vipLevel, slaveName, slavePrice, onClose, onSend }) {
  const common = jobs.filter(j => j.drop_chance === 70); const rare = jobs.filter(j => j.drop_chance === 25); const legendary = jobs.filter(j => j.drop_chance === 5);
  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-handle"/><div className="modal-title">💼 Отправить на работу (2 часа)</div><div className="f13 text-muted" style={{marginBottom:16}}>Раб: <span className="fw6 text-gold">{slaveName}</span></div>

        <div className="card" style={{padding:'12px', margin:0, marginBottom:8}}><div className="fw7 mb8" style={{color:'var(--blue)'}}>🔵 Редкие — 25% шанс</div>{rare.map(j => <div className="row mt4" key={j.id}><div style={{fontSize:20}}>{j.emoji}</div><div><div className="fw6">{j.title}</div><div className="f11 text-muted">{j.min_yield}-{j.max_yield}% от цены (≈ {Math.round(slavePrice*j.min_yield/100)}-{Math.round(slavePrice*j.max_yield/100)} RC)</div></div></div>)}</div>
        <div className="card" style={{padding:'12px', margin:0, marginBottom:8}}><div className="fw7 mb8" style={{color:'var(--gold)'}}>🟡 Легендарные — 5% шанс {vipLevel < 3 && <span className="text-muted">(нужен 👑 VIP)</span>}</div>{legendary.map(j => <div className="row mt4" key={j.id}><div style={{fontSize:20}}>{j.emoji}</div><div><div className="fw6">{j.title}</div><div className="f11 text-muted">{j.min_yield}-{j.max_yield}% от цены (≈ {Math.round(slavePrice*j.min_yield/100)}-{Math.round(slavePrice*j.max_yield/100)} RC)</div></div></div>)}</div>
        <button className="btn btn-primary mt16" onClick={onSend}>🎲 Отправить на работу (2 часа)</button><button className="btn btn-ghost mt8" onClick={onClose}>Отмена</button>

function ProfileScreen({ user, onRefresh, onViewProfile, showToast }) {
  const [sendWorkSlave, setSendWorkSlave] = useState(null); const [jobs, setJobs] = useState([]); const [storyPendingModal, setStoryPendingModal] = useState(false); const [renaming, setRenaming] = useState(null); const [newName, setNewName] = useState(''); const [loadingSelf, setLoadingSelf] = useState(false); const storiesCountdown = useCountdown(user.story_cooldown_until);
  useEffect(() => { get('/api/jobs').then(setJobs).catch(()=>{}); }, []);
  async function doSendWork(slaveId) { try { const r = await post('/api/slaves/send_to_work', { slave_id: slaveId }); showToast(`✅ ${r.job.emoji} ${r.job.title}`); setSendWorkSlave(null); onRefresh(); } catch(e) { showToast('❌ ' + e.message); setSendWorkSlave(null); } }
  async function doRename() { if (!newName.trim()) return; try { await post('/api/rename', { slave_id: renaming, new_name: newName.trim() }); showToast('✅ Кличка установлена'); setRenaming(null); setNewName(''); onRefresh(); } catch(e) { showToast('❌ ' + e.message); } }
  async function claimStory() { try { const r = await post('/api/stories/claim'); showToast('📸 ' + r.msg); setStoryPendingModal(false); onRefresh(); } catch(e) { showToast('❌ ' + e.message); setStoryPendingModal(false); } }
  async function doSelfbuy() { if (!confirm(`Выкупить себя за ${(user.price * 1.5).toFixed(0)} RC? (50% уйдет владельцу, 50% сгорит)`)) return; setLoadingSelf(true); try { await post('/api/selfbuy'); showToast('🎉 Вы на свободе!'); onRefresh(); } catch(e) { showToast('❌ ' + e.message); } setLoadingSelf(false); }
  const workingSlave = sendWorkSlave ? user.slaves.find(s => s.id === sendWorkSlave) : null; const refLink = `https://t.me/${user.bot_username || _botUsername}?start=ref_${user.id}`; const ev = user.current_event || {};

    <div className="content">
      {ev.type !== 'normal' && (<div className={`event-banner ${ev.type}`}><div style={{fontSize: 24}}>{ev.type === 'crisis' ? '📉' : '📈'}</div><div className="event-info"><div className={`event-title ${ev.type === 'crisis' ? 'text-red' : 'text-green'}`}>{ev.name}</div><div className="event-desc">{ev.desc}</div></div></div>)}
      <div className="hero" style={{marginTop: ev.type !== 'normal' ? 4 : 16}}>
        <div className="hero-row"><div className="avatar-wrap"><Avatar user={user} size={68}/>{user.vip_level > 0 && <div className="vip-badge">{user.vip_level===3?'👑':user.vip_level===2?'🥈':'🥉'}</div>}</div><div style={{flex:1,minWidth:0}}><div className="hero-name"><PlayerName user={user}/></div><div className="hero-handle">@{user.username || user.id}</div><div className="hero-status">{user.owner ? (<span className="text-red">⛓ Раб — <span style={{textDecoration:'underline', cursor:'pointer'}} onClick={() => onViewProfile(user.owner.id)}>{user.owner.first_name || 'Владелец'}</span></span>) : (<span className="text-green">✅ Свободен</span>)}</div></div></div>
        <div className="hero-stats"><div className="stat"><div className="stat-val">{user.balance.toFixed(0)}</div><div className="stat-lbl">💰 Баланс RC</div></div><div className="stat"><div className="stat-val">{user.price.toFixed(0)}</div><div className="stat-lbl">🏷 Моя цена</div></div><div className="stat"><div className="stat-val">{user.slaves_count}<span className="text-muted f12">/{user.max_slaves}</span></div><div className="stat-lbl">⛓ Рабов</div></div></div>
        {(user.shield_active || user.stealth_active || user.booster_active || user.chains_active) && (<div className="effects-row" style={{marginTop: 16, borderTop:'1px solid var(--border)', paddingTop:12}}>{user.shield_active  && <div className="effect-chip gold">🛡 Щит</div>}{user.stealth_active && <div className="effect-chip">👻 Стелс</div>}{user.booster_active && <div className="effect-chip green">🚀 Буст ×{user.booster_mult}</div>}{user.chains_active  && <div className="effect-chip red">⛓ Оковы</div>}</div>)}
      </div>
      <div className="section gap8" style={{marginTop:0}}><button className="btn btn-ghost" onClick={() => { navigator.clipboard?.writeText(refLink); showToast('🔗 Ссылка скопирована! 5% с дохода реферала — ваши.'); }}>🔗 Пригласить друга (5% бонус)</button>{user.owner && <button className="btn btn-danger" onClick={doSelfbuy} disabled={loadingSelf}>{loadingSelf ? '...' : `🔓 Выкупить себя (${(user.price * 1.5).toFixed(0)} RC)`}</button>}</div>
      {user.is_admin && (<div className="section"><div className="card row-sb" style={{padding:'12px 16px', margin:0}}><div><div className="fw7" style={{fontSize:13}}>👻 Режим призрака</div><div className="text-muted f11 mt4">Скрыть себя из рейтингов и поиска</div></div><AdminGhostToggle userId={user.id} initialHidden={user.admin_hidden} onToast={showToast}/></div></div>)}
      <div className="stories-card"><div className="stories-ico">📸</div><div className="stories-title">Stories Бонус</div><div className="stories-sub">Опубликуй Story с карточкой — получи +250 RC</div>{user.story_cooldown_until && storiesCountdown > 0 ? (<><div className="stories-timer">{fmtCountdown(storiesCountdown)}</div><div className="f12 text-muted mt4">до следующей возможности</div></>) : (<button className="btn btn-primary mt16" onClick={() => generateAndShareStory(user, showToast, setStoryPendingModal)}>✨ Выложить Story</button>)}</div>
      
      {user.slaves.length > 0 && (
        <div className="section"><div className="section-title">Мои рабы ({user.slaves_count}/{user.max_slaves})</div><div className="card" style={{padding:0, margin:0}}>
          {user.slaves.map((s, idx) => { 
            const isProtected = s.purchase_protection_until && new Date(s.purchase_protection_until) > new Date(); 
            const [timeLeft, setTimeLeft] = useState(0);
            useEffect(() => {
              if (!s.job_finishes_at) { setTimeLeft(0); return; }
              const interval = setInterval(() => { const t = Math.max(0, Math.floor((new Date(s.job_finishes_at) - Date.now()) / 1000)); setTimeLeft(t); if (t === 0) { clearInterval(interval); onRefresh(); } }, 1000);
              return () => clearInterval(interval);
            }, [s.job_finishes_at]);
            
            return (
              <div className="list-item" key={s.id} style={{padding:'12px 16px', borderBottom: idx===user.slaves.length-1?'none':'1px solid var(--border)'}}>
                <div onClick={() => onViewProfile(s.id)} style={{cursor:'pointer'}}><Avatar user={s} size={44}/></div>
                <div className="li-info" onClick={() => onViewProfile(s.id)} style={{cursor:'pointer'}}>
                  <div className="li-name">{s.custom_name ? <span className="text-gold">{s.custom_name} <span className="text-muted f11">({s.first_name||s.username})</span></span> : (s.first_name || s.username || `#${s.id}`)}</div>
                  <div className="li-sub mt4">
                    {s.is_injured ? <span className="text-red fw6">🤕 Травмирован на Арене</span> : 
                     s.job_finishes_at && timeLeft > 0 ? <><div className="text-green fw6">{s.job_emoji} {s.job_title} <span className="text-muted ml4">({fmtCountdown(timeLeft)})</span></div><div className="f11 text-gold mt4">Прибыль: ~{Math.round(s.price * s.min_yield_perc / 100)}-{Math.round(s.price * s.max_yield_perc / 100)} RC</div></> : <span>😴 Отдыхает</span>}
                  </div>
                  <div className="row mt4" style={{gap:6}}><span className="f12 fw7 text-muted">{s.price.toFixed(0)} RC</span>{isProtected && <span className="protection-badge">🔒 защита</span>}</div>
                </div>
                <div className="gap6">
                  <button className="btn btn-primary btn-sm" style={{padding:'8px 12px', opacity: s.job_finishes_at && timeLeft > 0 || s.is_injured ? 0.5 : 1}} onClick={(e) => { e.stopPropagation(); if(!s.job_finishes_at || timeLeft === 0 && !s.is_injured) setSendWorkSlave(s.id); }}>💼</button>
                  <button className="btn btn-ghost btn-sm" style={{padding:'8px 12px'}} onClick={(e) => { e.stopPropagation(); setRenaming(s.id); setNewName(s.custom_name||''); }}>✏️</button>
                </div>
              </div>
            );
          })}
        </div></div>
      )}
      {sendWorkSlave && workingSlave && jobs.length > 0 && <JobProbsModal jobs={jobs} vipLevel={user.vip_level} slaveName={workingSlave.custom_name || workingSlave.first_name} slavePrice={workingSlave.price} onClose={() => setSendWorkSlave(null)} onSend={() => doSendWork(sendWorkSlave)} />}
      {storyPendingModal && (<div className="overlay" onClick={()=>setStoryPendingModal(false)}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-title">📸 Вы опубликовали Story?</div><button className="btn btn-primary" onClick={claimStory}>✅ Да, я выложил</button></div></div>)}
      {renaming && (<div className="overlay" onClick={() => setRenaming(null)}><div className="modal" onClick={e => e.stopPropagation()}><div className="modal-title">✏️ Дать кличку</div><input className="input" placeholder="Кличка (до 32 символов)" value={newName} maxLength={32} onChange={e => setNewName(e.target.value)} /><button className="btn btn-primary mt16" onClick={doRename}>Сохранить</button></div></div>)}
    </div>
  );
}

function UserProfileScreen({ uid, currentUserId, onBack, onBuy, showToast, onViewProfile, currentUser }) {
  const [profile, setProfile] = useState(null); const [loading, setLoading] = useState(true); const [buying, setBuying] = useState(false); const [robbing, setRobbing] = useState(false);

  async function doBuy() { setBuying(true); try { await post('/api/buy', { target_id: uid }); showToast('✅ Куплен!'); onBuy(); setTimeout(onBack, 1000); } catch(e) { showToast('❌ ' + e.message); } setBuying(false); }
  async function finishRobbery(status, score) { setRobbing(false); try { const r = await post('/api/robbery/resolve', { target_id: uid, status, amount: score }); showToast(r.msg); onBuy(); get(`/api/profile/${uid}`).then(setProfile); } catch(e) { showToast('❌ ' + e.message); } }

  if (!profile) return <div className="screen"><div className="section mt20 text-center text-muted">Профиль не найден</div></div>;

  return (
    <div className="screen">
      <div className="hdr"><button className="back-btn" onClick={onBack}>‹ Назад</button></div>
      <div className="content">
        <div className="hero" style={{marginTop:16}}><div className="hero-row"><div className="avatar-wrap"><Avatar user={profile} size={68}/>{profile.vip_level > 0 && <div className="vip-badge">{profile.vip_level===3?'👑':profile.vip_level===2?'🥈':'🥉'}</div>}</div><div style={{flex:1,minWidth:0}}><div className="hero-name"><PlayerName user={profile}/></div><div className="hero-handle">ID: {profile.id}</div><div className="hero-status">{profile.owner ? (<span className="text-red">⛓ Раб — <span style={{textDecoration:'underline', cursor:'pointer'}} onClick={() => onViewProfile(profile.owner.id)}>{profile.owner.first_name || 'Владелец'}</span></span>) : (<span className="text-green">✅ Свободен</span>)}</div></div></div><div className="hero-stats"><div className="stat"><div className="stat-val">{profile.price.toFixed(0)}</div><div className="stat-lbl">🏷 Цена</div></div><div className="stat"><div className="stat-val">{profile.slaves_count}<span className="text-muted f12">/{profile.max_slaves}</span></div><div className="stat-lbl">⛓ Рабов</div></div><div className="stat"><div className="stat-val">{profile.vip_level || '—'}</div><div className="stat-lbl">⭐ VIP</div></div></div></div>
        {uid !== currentUserId && (

            <button className="btn btn-ghost" onClick={() => window.openDirectChat(uid, profile.first_name || 'Игрок')}>✉️ Написать в ЛС</button>
            {!profile.shield_active && profile.owner_id !== currentUserId && (<button className="btn" style={{background:'var(--surface2)', border:'1px solid var(--red)', color:'var(--red)'}} onClick={() => { if(currentUser.robberies_left <= 0) showToast('Лимит ограблений исчерпан!'); else setRobbing(true); }}>🥷 Ограбить (Осталось: {currentUser.robberies_left})</button>)}
          </div>
        )}
        {profile.slaves.length > 0 && (<div className="section"><div className="section-title">Рабы ({profile.slaves_count})</div><div className="card" style={{padding:0}}>{profile.slaves.map((s, idx) => (<div className="list-item" key={s.id} style={{padding:'12px 16px', borderBottom: idx===profile.slaves.length-1?'none':'1px solid var(--border)', cursor:'pointer'}} onClick={() => onViewProfile(s.id)}><Avatar user={s} size={44}/><div className="li-info"><div className="li-name">{s.custom_name || s.first_name || s.username || `#${s.id}`}</div><div className="li-sub mt4">{s.job_emoji} {s.job_title || 'Нет работы'}</div></div><div className="li-price">{s.price.toFixed(0)} RC</div></div>))}</div></div>)}
      </div>
      {robbing && <RobberyGameModal targetId={uid} onClose={() => setRobbing(false)} onFinish={finishRobbery} />}
    </div>
  );
}

function SearchScreen({ user, onBuy, onViewProfile, showToast }) {
  const [q, setQ] = useState(''); const [minP, setMinP] = useState(''); const [maxP, setMaxP] = useState(''); const [results, setResults] = useState([]); const [loading, setLoading] = useState(false); const [selected, setSelected] = useState(null);
  async function doSearch(random=false, newcomers=false) { setLoading(true); try { let url = '/api/search?'; if (random) url += 'random_pick=true'; else if (newcomers) url += 'newcomers=true'; else { if (q) url += `q=${encodeURIComponent(q)}&`; if (minP) url += `min_price=${minP}&`; if (maxP) url += `max_price=${maxP}&`; } const data = await get(url); setResults(Array.isArray(data) ? data : [data].filter(Boolean)); } catch(e) { showToast('❌ ' + e.message); } setLoading(false); }
  async function doBuy() { if (!selected) return; try { await post('/api/buy', { target_id: selected.id }); showToast('✅ Куплен!'); setSelected(null); doSearch(); onBuy(); } catch(e) { showToast('❌ ' + e.message); } }
  useEffect(() => { doSearch(false, true); }, []);
  const boomEvent = user.current_event?.type === 'boom'; const tax = boomEvent ? 15 : 20;

  return (
    <div className="content">
      <div className="section" style={{ display: 'flex', flexDirection: 'column', gap: '12px' }}>
        <input className="input" placeholder="Поиск по имени или ID" value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key==='Enter' && doSearch()}/>
        <div className="row" style={{ gap: '12px' }}><input className="input" placeholder="Мин RC" type="number" style={{flex:1}} value={minP} onChange={e => setMinP(e.target.value)}/><input className="input" placeholder="Макс RC" type="number" style={{flex:1}} value={maxP} onChange={e => setMaxP(e.target.value)}/></div>
        <div className="row" style={{ gap: '12px' }}><button className="btn btn-primary" style={{flex:1}} onClick={() => doSearch()}>{loading ? <div className="spinner" style={{width:18,height:18,borderWidth:2,margin:'auto'}}/> : '🔍 Найти'}</button><button className="btn btn-ghost" style={{flex:1}} onClick={() => doSearch(true)}>🎲 Случайные</button></div>
        <button className="btn btn-ghost" onClick={() => doSearch(false,true)}>🆕 Новые игроки</button>
      </div>
      <div className="section mt20"><div className="section-title">Результаты ({results.length})</div><div className="gap12">{results.map(p => (<div className="player-card" key={p.id}><div onClick={() => onViewProfile(p.id)} style={{cursor:'pointer'}}><Avatar user={p} size={48}/></div><div className="pc-meta" onClick={() => p.owner_id !== user.id && setSelected(p)} style={{cursor:'pointer'}}><div className="pc-name"><PlayerName user={p}/></div><div className="pc-sub">ID: {p.id}</div></div><div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}><div className="pc-price">{parseFloat(p.current_price).toFixed(0)} RC</div>{p.owner_id === user.id ? <span className="f11 fw7" style={{padding:'6px 12px',background:'var(--surface3)',borderRadius:8,color:'var(--text-3)'}}>⛓ Ваш</span> : <button className="btn btn-primary btn-sm" onClick={() => setSelected(p)}>⛓ Купить</button>}</div></div>))}{results.length===0 && !loading && <div className="text-center text-muted" style={{padding:'40px 0'}}>Никого не найдено.</div>}</div></div>
      {selected && (<div className="overlay" onClick={() => setSelected(null)}><div className="modal" onClick={e => e.stopPropagation()}><div className="modal-handle"/><div className="modal-title">⛓ Купить игрока</div><div className="row mb16"><Avatar user={selected} size={56}/><div><div className="fw8 f13">{selected.first_name || selected.username || `#${selected.id}`}</div><div className="text-muted f12">@{selected.username || selected.id}</div></div></div><div className="card mb20" style={{margin:0}}><div className="row-sb"><span className="text-muted f13">Текущая цена</span><span className="fw8 text-gold">{parseFloat(selected.current_price).toFixed(0)} RC</span></div><div className="row-sb mt12"><span className="text-muted f13">Ваш баланс</span><span className={`fw8 f13 ${user.balance >= parseFloat(selected.current_price) ? 'text-green' : 'text-red'}`}>{user.balance.toFixed(0)} RC</span></div><div className="row-sb mt12"><span className="text-muted f13">Налог системы</span><span className="text-red f13">10%</span></div><div className="row-sb mt12"><span className="text-muted f13">Цена после покупки</span><span className="text-muted f13">+{tax}%</span></div></div><div className="mt16">{user.balance < parseFloat(selected.current_price) ? <button className="btn btn-ghost" disabled>❌ Недостаточно RC</button> : <button className="btn btn-primary" onClick={doBuy}>⛓ Купить за {parseFloat(selected.current_price).toFixed(0)} RC</button>}</div></div></div>)}
    </div>
  );
}

function TopScreen({ onViewProfile }) {
  const [tab, setTab] = useState('forbes'); const [rows, setRows] = useState([]); const [loading, setLoading] = useState(false);

  );
}

function ShopScreen({ user, onRefresh, showToast }) {

ина..." value={text} onChange={e => setText(e.target.value)} rows={1} onKeyDown={e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }}/><button className="btn btn-primary btn-sm" style={{borderRadius:20, width:44, height:44, padding:0}} onClick={send} disabled={!text.trim()}>➤</button></div></div></div>

function App() {
  const [user, setUser] = useState(null); const [tasksData, setTasksData] = useState(null); const [tab, setTab] = useState('profile'); const [error, setError] = useState(null); const [viewingUid, setViewingUid] = useState(null); const [banSupportMode, setBanSupportMode] = useState(false); const [menuOpen, setMenuOpen] = useState(false); const [toasts, setToasts] = useState([]); const [maintenanceMode, setMaintenanceMode] = useState(false);
  const [adminTab, setAdminTab] = useState('dash'); const [tickets, setTickets] = useState([]); const [openConv, setOpenConv] = useState(null); const [dash, setDash] = useState(null); const [users, setUsers] = useState([]); const [searchQ, setSearchQ] = useState(''); const [stories, setStories] = useState([]); const [sponsors, setSponsors] = useState([]); const [adminsData, setAdminsData] = useState(null); const [cIdent, setCIdent] = useState(''); const [cField, setCField] = useState('name_color'); const [cVal, setCVal] = useState(''); const [spId, setSpId] = useState(''); const [spTitle, setSpTitle] = useState(''); const [spUrl, setSpUrl] = useState(''); const [spRc, setSpRc] = useState('250'); const [newAdminId, setNewAdminId] = useState(''); const [broadcast, setBroadcast] = useState(''); const [seasonPass, setSeasonPass] = useState(''); const [promoCode, setPromoCode] = useState(''); const [promoRc, setPromoRc] = useState(''); const [promoMax, setPromoMax] = useState('1'); const [sysMaint, setSysMaint] = useState(false);
  const showToast = useToast(setToasts);
  
  const [directChatUid, setDirectChatUid] = useState(null);

  const [suppressingRiot, setSuppressingRiot] = useState(false);

    setDirectChatUid(uid);

    const sp = tg?.initDataUnsafe?.start_param; if (sp && sp.startsWith('ref_')) { try { refId = parseInt(sp.split('_')[1]); } catch {} }
    if (!initData) { initData = 'dev:' + (Math.floor(Math.random()*100000) + 100000); }
    _initData = initData;
    try { 
      const cfg = await get('/api/config'); _botUsername = cfg.bot_username || _botUsername; 
      const data = await post('/api/init', { init_data: initData, ref_id: refId, photo_url: photoUrl }); 
      setUser(data); setMaintenanceMode(data.maintenance || false); setSysMaint(data.maintenance || false); if (data.bot_username) _botUsername = data.bot_username; 
      const tData = await get('/api/tasks/status'); setTasksData(tData); 
    } catch(e) { setError(e.message); }
  }
  async function refreshUser() { try { const u = await get('/api/profile'); setUser(u); setMaintenanceMode(u.maintenance || false); setTasksData(await get('/api/tasks/status')); } catch {} }
  useEffect(() => { init(); }, []);

  const handleSuppressRiot = async () => {
    try { const r = await post('/api/riot/suppress'); showToast(r.msg); setSuppressingRiot(false); refreshUser(); } 
    catch(e) { showToast('❌ ' + e.message); setSuppressingRiot(false); }

  if (tasksData.missing_main_sponsors && tasksData.missing_main_sponsors.length > 0) {

        <div className="overlay-icon">📢</div>
        <div className="overlay-title">Доступ ограничен</div>
        <div className="overlay-desc">Для участия в игре необходимо подписаться на все наши генеральные каналы.</div>
        <div className="gap12" style={{width:'100%', maxWidth:'300px', marginBottom:16}}>
          {tasksData.missing_main_sponsors.map((s, idx) => (<button key={idx} className="btn btn-primary" onClick={() => window.Telegram.WebApp.openTelegramLink(s.channel_url)}>{s.channel_title}</button>))}
        </div>
        <button className="btn btn-ghost" style={{width:'100%', maxWidth:'300px'}} onClick={() => init()}>Проверить подписку</button>
      </div>
    );
  }

  if (viewingUid && viewingUid !== user.id) return <div className="app"><UserProfileScreen uid={viewingUid} currentUserId={user.id} onBack={() => setViewingUid(null)} onBuy={refreshUser} showToast={showToast} onViewProfile={setViewingUid} currentUser={user}/></div>;

  const handleNav = (t) => { setTab(t); setMenuOpen(false); setDirectChatUid(null); if(t==='admin') { setAdminTab('dash'); loadAdminTab('dash'); } }
  async function loadAdminTab(t) { if(t==='dash') { get('/api/admin/dashboard').then(setDash).catch(()=>{}); } if(t==='users') { get('/api/admin/users').then(setUsers).catch(()=>{}); } if(t==='tickets') { get('/api/admin/tickets').then(setTickets).catch(()=>{}); } if(t==='stories') { get('/api/admin/stories').then(setStories).catch(()=>{}); } if(t==='sponsors') { get('/api/admin/sponsors').then(setSponsors).catch(()=>{}); } if(t==='admins') { get('/api/admin/admins_list').then(setAdminsData).catch(()=>{}); } }
  async function toggleMaint(state) { try { await post('/api/admin/maintenance', { state }); setSysMaint(state); showToast(`Тех. работы ${state ? 'ВКЛЮЧЕНЫ' : 'ВЫКЛЮЧЕНЫ'}`); } catch(e) { showToast('❌ Ошибка', 'error'); } }
  const adminTitles = { 'dash':'📊 Дашборд', 'users':'👥 Юзеры', 'tickets':'💬 Тикеты', 'stories':'📸 Заявки Stories', 'sponsors':'📢 Спонсоры', 'system':'⚙️ Система', 'admins':'👑 Супер Админ' };

  return (
    <div className="app">
      <ToastContainer toasts={toasts}/>
      
      {user.riot_active && !suppressingRiot && (<div className="riot-banner" onClick={() => setSuppressingRiot(true)}><span>🚨 ВАШИ РАБЫ БУНТУЮТ!</span><span style={{fontSize: 12, background:'rgba(0,0,0,0.3)', padding:'4px 8px', borderRadius:8}}>ПОДАВИТЬ ›</span></div>)}
      {suppressingRiot && <RiotModal onSuppress={handleSuppressRiot} />}

      <div className="hdr"><div><div className="hdr-title">⛓ РАБСТВО</div><div className="hdr-sub">Социальная стратегия</div></div><button className="burger-btn" onClick={()=>setMenuOpen(true)}>☰</button></div>
      {menuOpen && (<div className="sidebar-overlay" onClick={()=>setMenuOpen(false)}><div className="sidebar" onClick={e=>e.stopPropagation()}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}><div className="fw8" style={{fontSize:22}}>Меню</div><button className="file-btn" onClick={()=>setMenuOpen(false)}>✕</button></div><button className={`menu-btn ${tab==='profile'?'active':''}`} onClick={()=>handleNav('profile')}><span className="menu-ico">👤</span> Мой профиль</button><button className={`menu-btn ${tab==='search'?'active':''}`} onClick={()=>handleNav('search')}><span className="menu-ico">🔍</span> Поиск рабов</button><button className={`menu-btn ${tab==='games'?'active':''}`} onClick={()=>handleNav('games')}><span className="menu-ico">🎮</span> Мини-игры</button><button className={`menu-btn ${tab==='tasks'?'active':''}`} onClick={()=>handleNav('tasks')}><span className="menu-ico">📋</span> Задания</button><button className={`menu-btn ${tab==='messages'?'active':''}`} onClick={()=>handleNav('messages')}><span className="menu-ico">✉️</span> Сообщения</button><button className={`menu-btn ${tab==='top'?'active':''}`} onClick={()=>handleNav('top')}><span className="menu-ico">🏆</span> Рейтинги</button><button className={`menu-btn ${tab==='shop'?'active':''}`} onClick={()=>handleNav('shop')}><span className="menu-ico">🛒</span> Магазин</button><button className={`menu-btn ${tab==='support'?'active':''}`} onClick={()=>handleNav('support')}><span className="menu-ico">💬</span> Поддержка</button>{user.is_admin && <div className="divider" style={{margin:'8px 0'}}/>}{user.is_admin && <button className={`menu-btn ${tab==='admin'?'active':''}`} onClick={()=>handleNav('admin')}><span className="menu-ico">⚙️</span> Панель Админа</button>}</div></div>)}
      
      {tab==='profile' && <ProfileScreen user={user} onRefresh={refreshUser} onViewProfile={(uid)=>setViewingUid(uid)} showToast={showToast}/>}
      {tab==='search'  && <SearchScreen user={user} onBuy={refreshUser} onViewProfile={(uid)=>setViewingUid(uid)} showToast={showToast}/>}
      {tab==='games'   && <GamesScreen user={user} onRefresh={refreshUser} showToast={showToast}/>}
      {tab==='tasks'   && <TasksScreen tasksData={tasksData} onRefresh={refreshUser} showToast={showToast}/>}
      {tab==='top'     && <TopScreen onViewProfile={(uid)=>setViewingUid(uid)}/>}
      {tab==='shop'    && <ShopScreen user={user} onRefresh={refreshUser} showToast={showToast}/>}
      {tab==='support' && <SupportScreen user={user} showToast={showToast}/>}
      
      {tab==='messages' && !directChatUid && <MessagesScreen onViewProfile={(uid)=>setViewingUid(uid)} onOpenChat={window.openDirectChat} />}
      {directChatUid && <DirectChatScreen targetUid={directChatUid} targetName={directChatName} currentUid={user.id} onBack={() => setDirectChatUid(null)} />}

      {tab==='admin' && user.is_admin && !openConv && (
        <div className="content">
          <div className="tabs-wrap" style={{marginBottom:16}}><select className="input" style={{border:'none', borderRadius:16, fontWeight:700, fontSize:15, padding:'16px', background:'var(--bg3)', boxShadow:'0 4px 15px rgba(0,0,0,0.3)'}} value={adminTab} onChange={e=>{setAdminTab(e.target.value); loadAdminTab(e.target.value);}}>{Object.entries(adminTitles).map(([k,v]) => { if(k==='admins' && !user.is_super_admin) return null; return <option key={k} value={k}>{v}</option>; })}</select></div>
          <div style={{padding:'0 16px'}}>
            {adminTab==='dash' && dash && (<div className="gap8"><div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:12}}>{[['👥','Игроков', dash.total_users],['🆕','За сегодня', dash.new_today],['💰','RC в игре', parseFloat(dash.total_rc||0).toFixed(0)],['💬','Тикеты', dash.tickets],['📸','Сторис', dash.stories_pending]].map(([ico,lbl,val]) => <div className="admin-stat" key={lbl}><div style={{fontSize:28, marginBottom:8}}>{ico}</div><div className="fw8" style={{fontSize:24}}>{val}</div><div className="f12 text-muted mt4">{lbl}</div></div>)}</div><button className="btn btn-ghost mt12" onClick={()=>loadAdminTab('dash')}>🔄 Обновить данные</button></div>)}
            {adminTab==='users' && (<div className="gap12"><div className="card gap12" style={{borderColor:'var(--gold)'}}><div className="fw8 text-gold" style={{fontSize:16}}>🎨 Выдать косметику</div><input className="input" placeholder="ID / @username" value={cIdent} onChange={e=>setCIdent(e.target.value)}/><select className="input" value={cField} onChange={e=>{setCField(e.target.value); setCVal('');}}><option value="name_color">Цвет ника</option><option value="avatar_frame">Рамка аватара</option><option value="emoji_status">Эмодзи</option></select>{cField==='name_color' && <div className="row" style={{flexWrap:'wrap'}}>{[['default','Стандарт'],['ruby','Рубин'],['gold','Золото'],['neon','Неон'],['blue','Синий'],['purple','Фиолет']].map(([v,l])=><button key={v} className="btn btn-ghost btn-sm" style={{borderColor:cVal===v?'var(--gold)':''}} onClick={()=>setCVal(v)}>{l}</button>)}</div>}{cField==='avatar_frame' && <div className="row" style={{flexWrap:'wrap'}}>{[['none','Нет'],['gold','Золотая'],['fire','Огонь 🔥'],['diamond','Алмаз 💎'],['rainbow','Радуга 🌈']].map(([v,l])=><button key={v} className="btn btn-ghost btn-sm" style={{borderColor:cVal===v?'var(--gold)':''}} onClick={()=>setCVal(v)}>{l}</button>)}</div>}{cField==='emoji_status' && <div className="row" style={{flexWrap:'wrap'}}>{['','💎','👑','🔥','⚡','🌟','💀','🏆'].map((e,i)=><button key={i} className="btn btn-ghost btn-sm" style={{borderColor:cVal===e?'var(--gold)':''}} onClick={()=>setCVal(e)}>{e||'✕'}</button>)}</div>}<button className="btn btn-primary mt8" onClick={async ()=>{ try{ await post('/api/admin/users/cosmetic',{identifier:cIdent, field:cField, value:cVal}); showToast('✅ Выдано'); setCIdent(''); }catch(e){showToast('❌ '+e.message);} }}>🎁 Выдать</button></div><div className="row mt8"><input className="input" placeholder="Поиск юзера..." value={searchQ} onChange={e=>setSearchQ(e.target.value)} onKeyDown={e=>e.key==='Enter' && get('/api/admin/users?q='+searchQ).then(setUsers)}/><button className="btn btn-primary btn-sm" style={{height:48, width:48}} onClick={()=>get('/api/admin/users?q='+searchQ).then(setUsers)}>🔍</button></div><div className="gap8">{users.map(u => <div className="card row-sb" key={u.id} style={{margin:0}}><div><div className="fw7">{u.first_name}</div><div className="f12 text-muted">ID: {u.id}</div></div><button className="btn btn-ghost btn-sm" onClick={() => setAdminEditingUser(u)}>✏️ Изменить</button></div>)}</div></div>)}
            {adminTab==='tickets' && (<div className="gap8">{tickets.length===0 && <div className="text-center text-muted p20">Нет тикетов</div>}{tickets.map(t => (<div className="card row-sb" key={t.user_id} onClick={()=>setOpenConv(t)} style={{cursor:'pointer', margin:0}}><div><div className="fw7">{t.first_name} {t.unread > 0 && <span className="text-red">({t.unread})</span>}</div><div className="f12 text-muted mt4">{t.last_msg?.substring(0,30)||'Фото...'}</div></div><div className="fw7 text-muted" style={{fontSize:20}}>›</div></div>))}</div>)}
            {adminTab==='stories' && (<div className="gap8">{stories.length===0 && <div className="text-center text-muted p20">Нет заявок</div>}{stories.map(s => (<div className="card row-sb" key={s.id} style={{margin:0}}><div><div className="fw7">@{s.username||s.first_name||s.user_id}</div><div className="f12 text-muted mt4">{new Date(s.created_at).toLocaleString('ru')}</div></div><button className="btn btn-green btn-sm" onClick={async ()=>{ try{ await post(`/api/admin/stories/approve?claim_id=${s.id}`,''); showToast('✅ Одобрено'); loadAdminTab('stories'); }catch(e){showToast('❌ '+e.message);} }}>✅ Одобрить</button></div>))}</div>)}
            {adminTab==='sponsors' && (<div className="gap16"><div className="card gap8"><div className="fw8" style={{fontSize:16}}>Добавить Спонсора</div><div className="f12 text-muted mb8">Бот должен быть админом в канале!</div><input className="input" placeholder="ID Канала (-100123...)" value={spId} onChange={e=>setSpId(e.target.value)}/><input className="input" placeholder="Название (Для кнопки)" value={spTitle} onChange={e=>setSpTitle(e.target.value)}/><input className="input" placeholder="Ссылка (https://t.me/...)" value={spUrl} onChange={e=>setSpUrl(e.target.value)}/><input className="input" type="number" placeholder="Награда RC" value={spRc} onChange={e=>setSpRc(e.target.value)}/><button className="btn btn-primary mt8" onClick={async ()=>{ if(!spId||!spTitle||!spUrl||!spRc) return showToast('Заполните все поля'); try{ await post('/api/admin/sponsors/add',{channel_id:spId,channel_title:spTitle,channel_url:spUrl,reward_rc:parseFloat(spRc),is_main:false}); showToast('✅ Добавлен'); loadAdminTab('sponsors'); setSpId(''); setSpTitle(''); setSpUrl(''); setSpRc('250'); }catch(e){showToast('❌ '+e.message);} }}>Добавить</button></div>{sponsors.map(s => (<div className="card row-sb" key={s.id} style={{margin:0}}><div><div className="fw7">{s.is_main ? '👑 Генеральный' : '📢 Обычный'}</div><div className="fw8 mt4" style={{fontSize:15}}>{s.channel_title}</div><div className="f12 text-muted mt4">{s.channel_id} • {s.reward_rc} RC</div></div><div className="gap6"><button className="btn btn-ghost btn-sm" style={{borderColor: s.is_main ? 'var(--gold)' : 'var(--border2)'}} onClick={async ()=>{ try{ await post('/api/admin/sponsors/toggle_main',{sponsor_id:s.id}); showToast('✅ Статус изменен'); loadAdminTab('sponsors'); }catch(e){showToast('❌ '+e.message);} }}>{s.is_main ? 'Сделать обычным' : 'Сделать генеральным'}</button><button className="btn btn-danger btn-sm" onClick={async ()=>{ if(!confirm('Удалить спонсора?'))return; try{ await post('/api/admin/sponsors/delete',{sponsor_id:s.id}); showToast('✅ Удален'); loadAdminTab('sponsors'); }catch(e){showToast('❌ '+e.message);} }}>🗑 Удалить</button></div></div>))}</div>)}
            {adminTab==='admins' && adminsData && (<div className="gap16"><div className="card gap8"><div className="fw8" style={{fontSize:16}}>Добавить Админа</div><input className="input" placeholder="Telegram ID пользователя" value={newAdminId} onChange={e=>setNewAdminId(e.target.value)}/><button className="btn btn-primary mt8" onClick={async ()=>{ try{ await post('/api/admin/admins_list/add',{user_id:parseInt(newAdminId)}); showToast('✅ Назначен'); loadAdminTab('admins'); }catch(e){showToast('❌ '+e.message);} }}>Назначить</button></div><div className="gap8">{adminsData.db_admins.map(a => (<div className="card row-sb" key={a.user_id} style={{margin:0}}><div><div className="fw7">{a.first_name||a.username||a.user_id}</div><div className="f12 text-muted mt4">ID: {a.user_id}</div></div><button className="btn btn-danger btn-sm" onClick={async ()=>{ try{ await post('/api/admin/admins_list/remove',{user_id:a.user_id}); showToast('✅ Снят'); loadAdminTab('admins'); }catch(e){showToast('❌ '+e.message);} }}>Снять</button></div>))}</div></div>)}
            {adminTab==='system' && (<div className="gap16"><div className="card gap8"><div className="fw8 text-amber" style={{fontSize:16}}>🛠 Технические работы</div><div className="f13 text-muted">Закрывает доступ всем игрокам кроме админов.</div><div className="row mt8"><button className={`btn ${sysMaint ? 'btn-danger' : 'btn-ghost'}`} onClick={() => toggleMaint(true)}>ВКЛЮЧИТЬ</button><button className={`btn ${!sysMaint ? 'btn-green' : 'btn-ghost'}`} onClick={() => toggleMaint(false)}>ВЫКЛЮЧИТЬ</button></div></div><div className="card gap8"><div className="fw8" style={{fontSize:16}}>📢 Рассылка всем</div><textarea className="input" rows={3} placeholder="Текст (HTML)..." value={broadcast} onChange={e=>setBroadcast(e.target.value)}/><button className="btn btn-primary mt8" onClick={async ()=>{ try{ const r = await post('/api/admin/broadcast',{text:broadcast}); showToast(`📤 Разослано ${r.count} чел`); setBroadcast(''); }catch(e){showToast('❌ '+e.message);} }}>Разослать</button></div><div className="card gap8"><div className="fw8" style={{fontSize:16}}>🎫 Создать промокод</div><input className="input" placeholder="КОД" value={promoCode} onChange={e=>setPromoCode(e.target.value.toUpperCase())}/><input className="input" type="number" placeholder="Награда RC" value={promoRc} onChange={e=>setPromoRc(e.target.value)}/><input className="input" type="number" placeholder="Кол-во использований" value={promoMax} onChange={e=>setPromoMax(e.target.value)}/><button className="btn btn-primary mt8" onClick={async ()=>{ if(!promoCode||!promoRc)return; try{ await post('/api/admin/promo/create',{code:promoCode,reward_rc:parseFloat(promoRc),max_uses:parseInt(promoMax)}); showToast('✅ Создан'); setPromoCode(''); setPromoRc(''); }catch(e){showToast('❌ '+e.message);} }}>Создать код</button></div><div className="card gap8"><div className="fw8 text-red" style={{fontSize:16}}>💀 Новый сезон</div><div className="f13 text-muted">Сброс балансов, рабов, цен. VIP и косметика остаются. Топ будет обнулен.</div><input className="input" type="password" placeholder="Пароль" value={seasonPass} onChange={e=>setSeasonPass(e.target.value)}/><button className="btn btn-danger mt8" onClick={async ()=>{ if(!confirm('Точно начать новый сезон?'))return; try{ await post('/api/admin/season/start',{password:seasonPass}); showToast('🔥 Сезон начат'); setSeasonPass(''); }catch(e){showToast('❌ '+e.message);} }}>Начать сезон</button></div><div className="card gap8"><div className="fw8 text-red" style={{fontSize:16}}>💀 Полный Wipe</div><div className="f13 text-muted">Полное удаление базы данных. Топ будет обнулен.</div><button className="btn btn-danger mt8" onClick={async ()=>{ if(!confirm('УДАЛИТЬ ВСЮ БАЗУ ДАННЫХ? Безвозвратно.'))return; try{ await post('/api/admin/db/clear'); showToast('💀 Очищено'); }catch(e){showToast('❌ '+e.message);} }}>Очистить базу</button></div></div>)}
          </div>
        </div>
      )}
      
      {adminEditingUser && (
        <div className="overlay" onClick={() => setAdminEditingUser(null)}>
          <div className="modal" onClick={e => e.stopPropagation()}>
            <div className="modal-handle"/><div className="modal-title">⚙️ Редактирование: {adminEditingUser.first_name}</div>
            <div className="gap12">
               <div><div className="f12 text-muted mb4">Баланс RC</div><input className="input" type="number" defaultValue={adminEditingUser.balance} id="adm_bal"/></div>
               <div><div className="f12 text-muted mb4">Цена (RC)</div><input className="input" type="number" defaultValue={adminEditingUser.current_price} id="adm_price"/></div>
               <div><div className="f12 text-muted mb4">VIP Уровень (0-3)</div><input className="input" type="number" defaultValue={adminEditingUser.vip_level} id="adm_vip"/></div>
               <div><div className="f12 text-muted mb4">Слоты рабов (-1 = по умолчанию)</div><input className="input" type="number" defaultValue={adminEditingUser.max_slaves_override !== null ? adminEditingUser.max_slaves_override : -1} id="adm_slots"/></div>
               <div className="row mt8">
                  <button className="btn btn-primary" onClick={async () => {
                    const b = parseFloat(document.getElementById('adm_bal').value); const p = parseFloat(document.getElementById('adm_price').value); const v = parseInt(document.getElementById('adm_vip').value); const s = parseInt(document.getElementById('adm_slots').value);
                    try { await post('/api/admin/users/edit', { user_id: adminEditingUser.id, balance: isNaN(b) ? null : b, price: isNaN(p) ? null : p, vip_level: isNaN(v) ? null : v, max_slaves_override: isNaN(s) || s < 0 ? -1 : s }); showToast('✅ Сохранено'); setAdminEditingUser(null); loadAdminTab('users'); } catch(e) { showToast('❌ ' + e.message); }
                  }}>Сохранить</button>
                  <button className={`btn ${adminEditingUser.is_banned ? 'btn-green' : 'btn-danger'}`} onClick={async () => {
                    try { await post('/api/admin/users/edit', { user_id: adminEditingUser.id, is_banned: !adminEditingUser.is_banned }); setAdminEditingUser(null); loadAdminTab('users'); } catch(e) { showToast('❌ ' + e.message); }
                  }}>{adminEditingUser.is_banned ? 'Разбанить' : 'Выдать БАН'}</button>
               </div>
            </div>
          </div>
        </div>
      )}

      {tab==='admin' && openConv && <AdminChatScreen conv={openConv} onBack={()=>{setOpenConv(null); get('/api/admin/tickets').then(setTickets).catch(()=>{}); }} showToast={showToast}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
