<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;
const BASE = ''; let _initData = ''; let _botUsername = 'YourBot';
function getHeaders() { return { 'Content-Type':'application/json', 'x-init-data': _initData }; }
async function api(method, path, body) {
  const opts = { method, headers: getHeaders() };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE + path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.detail || `Error ${r.status}`);
  return data;
}
const get = (path) => api('GET', path); const post = (path, body) => api('POST', path, body);

let toastIdCount = 0;
function ToastContainer({ toasts }) { return <div className="toast-container">{toasts.map(t => <div key={t.id} className="toast">{t.msg}</div>)}</div>; }
function useToast(setToasts) { return useCallback((msg) => { const id = ++toastIdCount; setToasts(p => [...p, {id, msg}]); setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 3000); }, [setToasts]); }

function Avatar({ user, size=44 }) {
  const [err, setErr] = useState(false);
  const initial = (user?.first_name || user?.name || user?.username || '?')[0].toUpperCase();
  const cls = size >= 60 ? 'avatar' : 'avatar-sm';
  const frameClass = user?.avatar_frame && user.avatar_frame !== 'none' ? `frame-${user.avatar_frame}` : '';
  const style = size !== 44 && size !== 68 ? { width: size, height: size, fontSize: size * 0.4 } : {};
  return <div className={`${cls} ${frameClass}`} style={style}>{user?.photo_url && !err ? <img src={user.photo_url} alt="" onError={()=>setErr(true)} /> : initial}</div>;
}

function PlayerName({ user, style }) {
  const isAdmin = user.is_admin || user.is_admin_flag;
  const clr = user.name_color && user.name_color !== 'default' ? `clr-${user.name_color}` : '';
  const emoji = isAdmin ? '⚜️ ' : (user.emoji_status ? user.emoji_status + ' ' : '');
  const name = user.custom_name ? `${user.custom_name} (${user.first_name || user.username || `#${user.uid||user.id}`})` : (user.first_name || user.username || `#${user.uid||user.id}`);
  if (isAdmin) return <span className="admin-gradient-name" style={style}>{emoji}{name}{user.vip_level >= 3 && ' 👑'}{user.vip_level === 2 && ' 🥈'}{user.vip_level === 1 && ' 🥉'}</span>;
  return <span className={clr} style={style}>{emoji}{name}{user.vip_level >= 3 && ' 👑'}{user.vip_level === 2 && ' 🥈'}{user.vip_level === 1 && ' 🥉'}</span>;
}

function useCountdown(targetIso) {
  const [secs, setSecs] = useState(0);
  useEffect(() => {
    if (!targetIso) { setSecs(0); return; }
    function tick() { const diff = Math.max(0, Math.round((new Date(targetIso) - Date.now()) / 1000)); setSecs(diff); }
    tick(); const id = setInterval(tick, 1000); return () => clearInterval(id);
  }, [targetIso]);
  return secs;
}
function fmtCountdown(s) { const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60; return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`; }

async function generateAndShareStory(user, showToast, onSetPending) {
  const tg = window.Telegram?.WebApp;
  if (!tg || !tg.shareToStory) { showToast('❌ Ваш Telegram не поддерживает публикацию Stories'); return; }

function EscapeGameComp({ user, onRefresh, showToast }) {
  const [state, setState] = useState({ status: 'waiting', mult: 1.00, timeLeft: 10, history: [], bets: {}, startTime: 0 });
  const [betAmount, setBetAmount] = useState(''); const [autoCashout, setAutoCashout] = useState(''); 
  const wsRef = useRef(null); const reqRef = useRef(null); const multRef = useRef(1.00);
  const multElRef = useRef(null); const runnerElRef = useRef(null); const pathElRef = useRef(null); const areaElRef = useRef(null);

  const animate = useCallback(() => {
    if (state.status === 'running' && state.startTime > 0) {
      const elapsed = (Date.now() - state.startTime) / 1000;
      if (elapsed > 0) {
        const currentMult = Math.max(1.0, Math.exp(0.08 * elapsed));
        multRef.current = currentMult;
        const multEl = multElRef.current; if (multEl) multEl.innerText = `x${currentMult.toFixed(2)}`;
        const runnerEl = runnerElRef.current;
        if (runnerEl) { const x = Math.min(90, (currentMult - 1) * 15); const y = Math.min(80, Math.pow(currentMult - 1, 1.2) * 5); runnerEl.style.left = `${x}%`; runnerEl.style.bottom = `${20 + y}%`; }
        const pathEl = pathElRef.current; const areaEl = areaElRef.current;
        if (pathEl && areaEl) { const w = areaEl.clientWidth; const h = areaEl.clientHeight; const px = Math.min(w * 0.9, (currentMult - 1) * 0.15 * w); const py = h - 20 - Math.min(h * 0.8, Math.pow(currentMult - 1, 1.2) * 0.05 * h); pathEl.setAttribute('d', `M 0 ${h-20} Q ${px*0.5} ${h-20} ${px} ${py}`); }
      }
    }
    reqRef.current = requestAnimationFrame(animate);
  }, [state.status, state.startTime]);

  useEffect(() => { reqRef.current = requestAnimationFrame(animate); return () => cancelAnimationFrame(reqRef.current); }, [animate]);

  useEffect(() => {
    let retryCount = 0;
    let ws;
    let retryTimer;

    function connect() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}/api/escape/ws?init_data=${encodeURIComponent(_initData)}`);
      ws.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data);
          if (d.type === 'state') { setState(p => ({...p, status: d.status, timeLeft: d.time_left, history: d.history, bets: d.bets, startTime: d.start_time * 1000 || 0})); if (d.status !== 'running') { multRef.current = 1.0; } }
          else if (d.type === 'start') { setState(p => ({...p, status: 'running', startTime: d.start_time * 1000})); }
          else if (d.type === 'tick') { setState(p => ({...p, bets: d.bets})); }
          else if (d.type === 'crash') { setState(p => ({...p, status: 'crashed', history: d.history, bets: d.bets})); multRef.current = d.mult; }
          else if (d.type === 'bets_update') { setState(p => ({...p, bets: d.bets})); }
        } catch(err) {}
      };
      ws.onclose = () => {
        retryCount++;
        const delay = Math.min(1000 * Math.pow(2, retryCount), 30000);
        retryTimer = setTimeout(connect, delay);
      };
      ws.onerror = () => ws.close();
    }
    connect();
    wsRef.current = { close: () => { clearTimeout(retryTimer); if(ws) ws.close(); } };
    return () => { clearTimeout(retryTimer); if(ws) ws.close(); };
  }, []);

  const doEscBet = async () => { 
    if (!betAmount || isNaN(betAmount)) return; 
    let payload = { amount: parseFloat(betAmount) };
    if (autoCashout && !isNaN(autoCashout)) { let ac = parseFloat(autoCashout); if (ac > 1.0) payload.auto_cashout = ac; else { showToast('Автовывод должен быть > 1.0'); return; } }
    try { await post('/api/escape/bet', payload); setBetAmount(''); showToast('✅ Ставка принята!'); } catch(e) { showToast('❌ ' + e.message); } 
  };
  const doEscCashout = async () => { try { const r = await post('/api/escape/cashout'); showToast(`✅ Вывели ${r.win.toFixed(0)} RC!`); } catch(e) { showToast('❌ ' + e.message); } };
  const myBet = state.bets[user.id];

  return (
    <div style={{padding: 16}}>
      <div style={{display:'flex', gap:8, overflowX:'auto', padding:'4px 0', marginBottom:16, scrollbarWidth:'none'}}>{state.history.map((h, i) => <div key={i} style={{padding:'4px 10px', borderRadius:8, fontSize:12, fontWeight:700, background: h>=2.0?'var(--green-dim)':'var(--surface2)', color:h>=2.0?'var(--green)':'var(--text-2)', border:`1px solid ${h>=2.0?'rgba(34,197,94,0.3)':'var(--border2)'}`, flexShrink:0}}>x{h.toFixed(2)}</div>)}{state.history.length === 0 && <div className="text-muted f12">Нет истории...</div>}</div>
      <div id="esc-area" className="escape-graph-area" ref={areaElRef}>
        {state.status === 'waiting' && <div className="f13 text-muted" style={{position:'absolute', top:20}}>Следующий побег через {state.timeLeft.toFixed(1)}с</div>}
        <svg className="escape-line" xmlns="http://www.w3.org/2000/svg"><path ref={pathElRef} id="esc-path" d="" fill="none" stroke="var(--gold)" strokeWidth="4" strokeLinecap="round" style={{filter: 'drop-shadow(0 0 8px var(--gold))'}} /></svg>
        <div ref={multElRef} id="esc-mult" className={`escape-mult ${state.status === 'crashed' ? 'crashed' : ''}`}>{state.status === 'crashed' ? `ПОЙМАН!` : state.status === 'waiting' ? 'x1.00' : null}</div>
        {(state.status === 'running' || state.status === 'waiting') && (<div ref={runnerElRef} id="esc-runner" className="escape-runner" style={{left: '0%', bottom: '20%'}}>🏃‍♂️</div>)}
        <div className="escape-ground"></div>
      </div>
      <div className="card" style={{margin:0, padding:16, boxShadow:'0 10px 30px rgba(0,0,0,0.3)'}}>
        <div className="row mb8" style={{opacity: myBet ? 0.6 : 1, pointerEvents: myBet ? 'none' : 'auto'}}>
            <input className="input" type="number" placeholder="Ставка RC" value={betAmount} onChange={e => setBetAmount(e.target.value)} disabled={myBet != null} />
            <input className="input" type="number" placeholder="Автовывод x" value={autoCashout} onChange={e => setAutoCashout(e.target.value)} disabled={myBet != null} step="0.01" />
        </div>
        <div className="row mb16"><button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={() => setBetAmount('10')} disabled={myBet != null}>+10</button><button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={() => setBetAmount('50')} disabled={myBet != null}>+50</button><button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={() => setBetAmount(Math.floor(user.balance/2).toString())} disabled={myBet != null}>1/2</button><button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={() => setBetAmount(Math.floor(user.balance).toString())} disabled={myBet != null}>MAX</button></div>
        <div>{state.status === 'waiting' && !myBet && (<button className="btn btn-primary" onClick={doEscBet} style={{height:56, fontSize:18}}>🚀 ПОСТАВИТЬ</button>)}{state.status === 'waiting' && myBet && (<button className="btn btn-ghost" disabled style={{height:56, fontSize:18}}>✅ ОЖИДАЕМ ({myBet.amount} RC)</button>)}{state.status === 'running' && myBet && !myBet.cashed_out && (<button className="btn btn-green" onClick={doEscCashout} style={{height:56, fontSize:18, animation:'pulseGreen 1.5s infinite'}}>💰 ЗАБРАТЬ</button>)}{state.status === 'running' && myBet && myBet.cashed_out && (<button className="btn btn-ghost" disabled style={{height:56, fontSize:18, color:'var(--green)', borderColor:'rgba(34,197,94,0.3)'}}>🏆 ВЫВЕЛИ: {myBet.win.toFixed(0)} RC!</button>)}{state.status === 'running' && !myBet && (<button className="btn btn-ghost" disabled style={{height:56, fontSize:18}}>🏃‍♂️ ИДЕТ ПОБЕГ...</button>)}{state.status === 'crashed' && (<button className="btn btn-ghost" disabled style={{height:56, fontSize:18, color:'var(--red)', borderColor:'rgba(239,68,68,0.3)'}}>💥 РАУНД ЗАВЕРШЕН</button>)}</div>
      </div>
      <div className="mt16 gap8 max-h-[200px] overflow-y-auto">{Object.values(state.bets).map((b, i) => (<div key={i} className="card row-sb" style={{margin:0, padding:'8px 12px'}}><div className="row"><Avatar user={{photo_url: b.avatar, first_name: b.name}} size={24}/><div className="fw6">{b.name.substring(0, 10)}</div></div><div style={{textAlign:'right'}}><div className="fw7">{b.amount} RC {b.auto_cashout ? <span className="f11 text-muted"> (Авто x{b.auto_cashout})</span> : null}</div>{b.cashed_out ? <div className="f11 text-green">Вывел {b.win.toFixed(0)} (x{b.mult.toFixed(2)})</div> : state.status === 'crashed' ? <div className="f11 text-red">Пойман</div> : <div className="f11 text-muted">В побеге...</div>}</div></div>))}</div>
    </div>
  );
}

          onRefresh();
      } 
      else if(action === 'heal') { if(!confirm('Вылечить раба за 500 RC?')) return; await post('/api/slaves/heal', { slave_id: slave.id }); showToast('✅ Здоров!'); onRefresh(); } 
      else if(action === 'release') { if(!confirm('Точно отпустить раба? Вы не получите RC.')) return; await post('/api/slaves/release', { slave_id: slave.id }); showToast('🕊️ Свободен!'); onRefresh(); } 
      else if(action === 'rename') { if(!renameText.trim()) return showToast('Введите кличку'); await post('/api/rename', { slave_id: slave.id, new_name: renameText.trim() }); showToast('✅ Сохранено'); onRefresh(); }
      setActionModal(null); setRenameText('');
    } catch(e) { showToast('❌ ' + e.message); }
  };

  const refLink = `https://t.me/${user.bot_username || _botUsername}?start=ref_${user.uid}`; 
  const copyRef = () => { navigator.clipboard.writeText(refLink); showToast('📋 Скопировано!'); };

  return (
    <div className="screen" style={{zIndex: 1}}>
      <div className="hdr">
        <div><div className="hdr-title">⛓ РАБСТВО</div><div className="hdr-sub">Социальная стратегия</div></div>
        <div className="row">
          <button className="btn btn-ghost btn-sm" style={{padding:'8px 12px'}} onClick={() => onNavSub('messages')}>✉️ {user.unread_messages > 0 && <span className="text-red fw8 ml4">{user.unread_messages}</span>}</button>
          <button className="btn btn-ghost btn-sm" style={{padding:'8px 12px'}} onClick={() => onNavSub('settings')}>⚙️</button>
        </div>
      </div>
      <div className="content">
        {user.current_event?.type !== 'normal' && (<div className="card" style={{margin:'12px 16px', borderColor: user.current_event?.type==='crisis'?'var(--red)':'var(--green)'}}><div className="fw8">{user.current_event.name}</div><div className="f12 text-muted">{user.current_event.desc}</div></div>)}
        <TaxBanner user={user} onRefresh={onRefresh} showToast={showToast} />

        <div className="hero" style={{marginTop: 16}}>
          <div className="hero-row">
            <div className="avatar-wrap"><Avatar user={user} size={68}/>{user.vip_level > 0 && <div className="vip-badge">{user.vip_level===3?'👑':user.vip_level===2?'🥈':'🥉'}</div>}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="hero-name"><PlayerName user={user}/></div>
              <div className="f12 text-muted mt4">UID: {user.uid} {user.username ? `| @${user.username}` : ''}</div>
              <div className="f13 fw6 mt4">{user.owner ? <span className="text-red">⛓ Раб — <span style={{textDecoration:'underline'}} onClick={()=>onViewProfile(user.owner.id)}>{user.owner.first_name||'Владелец'}</span></span> : <span className="text-green">✅ Свободен</span>}</div>
            </div>
          </div>
          {user.syndicate_id && <div className="mt12 f12 text-muted fw6" style={{textAlign:'center', background:'var(--surface2)', padding:4, borderRadius:8}}>🛡 Клан: {user.syndicate_name}</div>}
          <div className="row mt16 pt16" style={{borderTop:'1px solid var(--border)'}}>
            <div style={{flex:1, textAlign:'center'}}><div className="fw8" style={{fontSize:18}}>{user.balance.toFixed(0)}</div><div className="f11 text-muted text-uppercase mt4">RC</div></div>
            <div style={{width:1, height:24, background:'var(--border2)'}} />
            <div style={{flex:1, textAlign:'center'}}><div className="fw8" style={{fontSize:18}}>{user.price.toFixed(0)}</div><div className="f11 text-muted text-uppercase mt4">Цена</div></div>
            <div style={{width:1, height:24, background:'var(--border2)'}} />
            <div style={{flex:1, textAlign:'center'}}><div className="fw8" style={{fontSize:18}}>{user.slaves_count}<span className="f12 text-muted">/{user.max_slaves}</span></div><div className="f11 text-muted text-uppercase mt4">Рабов</div></div>
          </div>
          {(user.shield_active || user.stealth_active || user.booster_active || user.chains_active) && (<div className="row mt12 pt12" style={{borderTop:'1px solid var(--border)', flexWrap:'wrap'}}>{user.shield_active && <span className="protection-badge" style={{color:'var(--gold)', background:'var(--gold-dim)', borderColor:'rgba(232,197,71,0.3)'}}>🛡 Щит</span>}{user.stealth_active && <span className="protection-badge" style={{color:'var(--text)', background:'var(--surface2)', borderColor:'var(--border2)'}}>👻 Стелс</span>}{user.booster_active && <span className="protection-badge" style={{color:'var(--green)', background:'var(--green-dim)', borderColor:'rgba(34,197,94,0.3)'}}>🚀 Буст ×{user.booster_mult}</span>}{user.chains_active && <span className="protection-badge" style={{color:'var(--red)', background:'var(--red-dim)', borderColor:'rgba(239,68,68,0.3)'}}>⛓ Оковы</span>}</div>)}
        </div>
        
        {/* Виджет дохода */}
        <div className="mx16 mb16 row-sb" style={{background: 'var(--surface2)', border: '1px solid var(--border2)', borderRadius: 12, padding: '12px 16px'}}>
           <div><div className="fw7 text-gold">Пассивный доход</div><div className="f11 text-muted mt4">от работающих рабов</div></div>
           <div className="fw8" style={{fontSize: 20}}>~{user.rc_per_hour.toFixed(0)} <span className="f12 text-muted">RC/ч</span></div>
        </div>

        <div className="row mx16 gap8">
            <button className="btn" style={{flex:1, background: 'linear-gradient(135deg, #E8C547 0%, #F3D250 100%)', color: '#000', fontSize: 14}} onClick={() => onNavSub('shop')}>🛒 Магазин и Склад</button>
            <button className="btn btn-ghost" style={{flex:1, fontSize: 14}} onClick={() => onNavSub('history')}>📜 История</button>
        </div>

        {/* Реферальный блок */}
        <div className="card mt16 mx16" style={{borderColor: 'var(--gold)', background: 'linear-gradient(145deg, #111, #1a1a1a)'}}>
            <div className="fw8 mb8" style={{fontSize: 16}}>🤝 Реферальная сеть</div>
            <div className="f12 text-muted mb12">Приглашай друзей и получай 5% с их дохода в специальный кошелек. Лимит 100k RC. Вывод за 30 Stars.</div>
            <div className="row"><button className="btn btn-ghost btn-sm" onClick={copyRef}>📋 Скопировать ссылку</button><button className="btn btn-primary btn-sm" onClick={() => window.Telegram.WebApp.openTelegramLink(`https://t.me/share/url?text=${encodeURIComponent("⛓ Залетай в РАБСТВО!\nПокупай людей и строй империю! 👇")}&url=${encodeURIComponent(refLink)}`)}>📤 Поделиться</button></div>
            <div className="mt16 pt16" style={{borderTop: '1px solid var(--border)'}}>
                <div className="row-sb mb8"><span className="fw7 f12">Накоплено RC</span><span className="fw8 text-gold">{user.ref_wallet.toFixed(0)} / 100k</span></div>
                <div className="task-progress-wrap mb12" style={{height: 10}}><div className="task-progress-bar" style={{width: `${(user.ref_wallet/100000)*100}%`}}></div></div>
                {user.ref_wallet > 0 ? (
                    <button className="btn btn-primary btn-sm" style={{width: '100%'}} onClick={async ()=>{ try{ const r = await post('/api/shop/invoice', {item_type: 'ref_withdraw'}); window.Telegram.WebApp.openInvoice(r.invoice_link, (status) => { if(status==='paid'){ showToast('✅ Выведено!'); onRefresh();} }); }catch(e){showToast('❌ '+e.message);} }}>Вывести на баланс (30 ⭐️)</button>
                ) : (
                    <button className="btn btn-ghost btn-sm" disabled style={{width: '100%'}}>Нет средств для вывода</button>
                )}
            </div>
        </div>

        {user.vip_level > 0 && (
          <div className="section mt16"><div className="card row-sb" style={{margin:0, background:'linear-gradient(135deg, #1a1a1a, #000)', borderColor:'var(--gold)'}}><div><div className="fw7 text-gold">Ежедневный VIP Буст</div><div className="f11 text-muted mt4">{user.vip_level===1?'1.5x на 4 часа':user.vip_level===2?'2x на 4 часа':'2x на 4 часа + 1.25x пассивно'}</div></div><button className="btn btn-primary btn-sm" onClick={async ()=>{ try{ const r = await post('/api/vip/claim_boost'); showToast(`✅ ${r.msg}`); onRefresh(); }catch(e){showToast('❌ '+e.message);} }}>В инвентарь</button></div></div>
        )}

        <div className="card mt16 mx16" style={{margin:'16px 16px', background:'linear-gradient(135deg, #111, #1a1a1a)', borderColor:'rgba(232,197,71,0.2)'}}><div className="fw8 mb8" style={{fontSize:16}}>📸 Stories Бонус</div><div className="f12 text-muted mb12">Опубликуй Story с карточкой — получи +250 RC</div>{user.story_cooldown_until && storiesCountdown > 0 ? (<div className="row-sb"><span className="fw8 text-gold">{fmtCountdown(storiesCountdown)}</span><span className="f12 text-muted">до следующего раза</span></div>) : (<button className="btn btn-primary btn-sm" style={{width:'100%'}} onClick={() => generateAndShareStory(user, showToast, setStoryPendingModal)}>✨ Выложить Story</button>)}</div>

        {user.slaves.length > 0 && (
          <div className="section"><div className="section-title">Рабы ({user.slaves_count}/{user.max_slaves})</div><div className="card" style={{padding:0, margin:0}}>
            {user.slaves.map((s, idx) => { 
              const optJob = optimisticJobs[s.id];
              const ptl = s.purchase_protection_until ? Math.max(0, Math.floor((new Date(s.purchase_protection_until) - Date.now())/1000)) : 0;
              const rtl = s.rented_until ? Math.max(0, Math.floor((new Date(s.rented_until) - Date.now())/1000)) : 0;
              
              let jobEmoji = s.job_emoji; let jobTitle = s.job_title; let tl = s.job_finishes_at ? Math.max(0, Math.floor((new Date(s.job_finishes_at) - Date.now())/1000)) : 0;
              if (optJob && optJob.finish > Date.now()) { jobEmoji = optJob.emoji; jobTitle = optJob.title; tl = Math.max(0, Math.floor((optJob.finish - Date.now())/1000)); }

              return (
                <div className="list-item" key={s.id} style={{padding:'12px 16px', borderBottom: idx===user.slaves.length-1?'none':'1px solid var(--border)'}}>
                  <div onClick={()=>onViewProfile(s.id)} style={{cursor:'pointer'}}><Avatar user={s} size={44}/></div>
                  <div className="li-info" onClick={()=>onViewProfile(s.id)} style={{cursor:'pointer'}}>
                    <div className="li-name">{s.custom_name ? <span className="text-gold">{s.custom_name} <span className="text-muted f11">({s.first_name||s.username})</span></span> : (s.first_name || s.username || `#${s.uid||s.id}`)}</div>
                    <div className="li-sub mt4">{s.is_injured ? <span className="text-red fw6">🤕 Травма</span> : tl > 0 ? <span className="text-green fw6">{jobEmoji} {jobTitle} ({fmtCountdown(tl)})</span> : <span>😴 Отдыхает</span>}</div>
                    <div className="row mt4"><span className="f12 fw7 text-muted">{s.price.toFixed(0)} RC</span>{ptl > 0 && <span className="protection-badge">🔒 {fmtCountdown(ptl)}</span>}{s.is_rented && rtl > 0 && <span className="protection-badge" style={{background:'var(--blue-dim)', color:'var(--blue)', borderColor:'rgba(59,130,246,0.3)'}}>⏳ Аренда {fmtCountdown(rtl)}</span>}</div>
                    <div className="f11 text-gold mt4">Доходность: {(s.price * (s.min_yield_perc/100)).toFixed(0)} - {(s.price * (s.max_yield_perc/100)).toFixed(0)} RC</div></div>
                  <button className="btn btn-ghost btn-sm" onClick={(e) => { e.stopPropagation(); setActionModal({type:'slave', item:s}); }}>⚙️</button>
                </div>
              );
            })}
          </div></div>
        )}

        {actionModal?.type === 'slave' && (
          <div className="overlay" onClick={()=>setActionModal(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div className="modal-handle"/>
              <div className="modal-title text-center">⚙️ Управление рабом</div>
              <div className="text-center mb16 fw7 text-gold">{actionModal.item.custom_name || actionModal.item.first_name || actionModal.item.username}</div>
              
              {actionModal.item.is_rented ? (
                  <div className="gap8">
                      <div className="text-center text-muted f13 mb16">Этот раб у вас во временной аренде. Вы не можете переименовать его или сдать/отпустить.</div>
                      {actionModal.item.is_injured ? (
                          <button className="btn btn-danger" onClick={()=>handleAction('heal', actionModal.item)}>💊 Вылечить (500 RC)</button>
                      ) : (
                          <button className="btn btn-primary" onClick={()=>handleAction('work', actionModal.item)}>💼 Отправить на работу (2ч)</button>
                      )}
                  </div>
              ) : (
                  <>
                      <div className="gap8 mb16">
                        {actionModal.item.is_injured ? (
                          <button className="btn btn-danger" onClick={()=>handleAction('heal', actionModal.item)}>💊 Вылечить (500 RC)</button>
                        ) : (
                          <button className="btn btn-primary" onClick={()=>handleAction('work', actionModal.item)}>💼 Отправить на работу (2ч)</button>
                        )}
                        <div className="row mt8">
                          <input className="input" placeholder="Новая кличка..." value={renameText} onChange={e=>setRenameText(e.target.value)} maxLength={32}/>
                          <button className="btn btn-ghost" style={{width:'auto'}} onClick={()=>handleAction('rename', actionModal.item)}>✏️</button>
                        </div>
                        <button className="btn btn-danger mt8" onClick={()=>handleAction('release', actionModal.item)}>🗑 Отпустить на свободу (Бесплатно)</button>
                      </div>

                      <div className="card gap8" style={{margin:0, borderColor:'var(--blue)', background: 'var(--surface2)'}}>
                          <div className="fw7 text-blue">Сдать в аренду</div>
                          <div className="f11 text-muted mb4">Игрок получит раба на время. Вы не сможете его использовать, но вас не смогут перекупить в этот период.</div>
                          <div className="row">
                              <input className="input" type="number" id="rent_price" placeholder="Цена RC (50-50000)" style={{flex:2}}/>
                              <select className="input" id="rent_hours" style={{flex:1}}><option value="2">2 ч</option><option value="4">4 ч</option><option value="8">8 ч</option><option value="12">12 ч</option><option value="24">24 ч</option></select>
                          </div>
                          <button className="btn btn-ghost mt4" style={{color:'var(--blue)', borderColor:'var(--blue)'}} onClick={async () => {
                              const p = parseFloat(document.getElementById('rent_price').value);
                              const h = parseInt(document.getElementById('rent_hours').value);
                              if(isNaN(p) || p<50 || p>50000) return showToast('Цена должна быть от 50 до 50000 RC');
                              try { await post('/api/rent/list', {slave_id: actionModal.item.id, price: p, hours: h}); showToast('✅ Выставлен на биржу аренды!'); setActionModal(null); onRefresh(); } catch(e){ showToast('❌ '+e.message); }
                          }}>Выставить на биржу</button>
                      </div>
                  </>
              )}
            </div>
          </div>
        )}

        {storyPendingModal && (<div className="overlay" onClick={()=>setStoryPendingModal(false)}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-title">📸 Вы опубликовали Story?</div><button className="btn btn-primary" onClick={async ()=>{ try{ const r=await post('/api/stories/claim'); showToast('📸 '+r.msg); setStoryPendingModal(false); }catch(e){showToast('❌ '+e.message); setStoryPendingModal(false);} }}>✅ Да, я выложил</button></div></div>)}
      </div>
    </div>
  );
}

function MarketScreen({ user, onBuy, onViewProfile, showToast }) {
  const [tab, setTab] = useState('buy'); // buy, rent
  const [q, setQ] = useState(''); const [minP, setMinP] = useState(''); const [maxP, setMaxP] = useState(''); 
  const [results, setResults] = useState([]); const [rentResults, setRentResults] = useState([]);
  const [loading, setLoading] = useState(false); const [selected, setSelected] = useState(null); const [rentSelected, setRentSelected] = useState(null);
  
  async function doSearch(random=false, newcomers=false) { setLoading(true); try { let url = '/api/search?'; if (random) url += 'random_pick=true'; else if (newcomers) url += 'newcomers=true'; else { if (q) url += `q=${encodeURIComponent(q)}&`; if (minP) url += `min_price=${minP}&`; if (maxP) url += `max_price=${maxP}&`; } const data = await get(url); setResults(Array.isArray(data) ? data : [data].filter(Boolean)); } catch(e) { showToast('❌ ' + e.message); } setLoading(false); }
  async function loadRent() { setLoading(true); try { setRentResults(await get('/api/rent/market')); } catch(e){} setLoading(false); }

  async function doBuy() { if (!selected) return; try { await post('/api/buy', { target_id: selected.id }); showToast('✅ Куплен!'); setSelected(null); doSearch(); onBuy(); } catch(e) { showToast('❌ ' + e.message); } }
  async function doRent() { if (!rentSelected) return; try { await post('/api/rent/buy', { slave_id: rentSelected.id }); showToast('✅ Успешно арендован!'); setRentSelected(null); loadRent(); onBuy(); } catch(e) { showToast('❌ ' + e.message); } }
  
  useEffect(() => { if (tab === 'buy') doSearch(false, true); else loadRent(); }, [tab]);
  
  return (
    <div className="screen">
      <div className="hdr"><div className="hdr-title">🛒 Рынок рабов</div></div>
      <div className="content p0">
        <div className="tabs-wrap"><div className="tabs"><button className={`tab${tab==='buy'?' active':''}`} onClick={()=>setTab('buy')}>Покупка</button><button className={`tab${tab==='rent'?' active':''}`} onClick={()=>setTab('rent')}>Биржа Аренды</button></div></div>
        
        {tab === 'buy' && (
            <>
                <div className="section gap12">
                  <input className="input" placeholder="Поиск по имени или UID" value={q} onChange={e => setQ(e.target.value)} onKeyDown={e => e.key==='Enter' && doSearch()}/>
                  <div className="row gap12"><input className="input" placeholder="Мин RC" type="number" style={{flex:1}} value={minP} onChange={e => setMinP(e.target.value)}/><input className="input" placeholder="Макс RC" type="number" style={{flex:1}} value={maxP} onChange={e => setMaxP(e.target.value)}/></div>
                  <div className="row gap12"><button className="btn btn-primary" style={{flex:1}} onClick={() => doSearch()}>{loading ? <div className="spinner" style={{width:18,height:18,borderWidth:2}}/> : '🔍 Найти'}</button><button className="btn btn-ghost" style={{flex:1}} onClick={() => doSearch(true)}>🎲 Случайные</button></div>
                </div>
                <div className="section mt20"><div className="section-title">Результаты ({results.length})</div><div className="gap12">{results.map(p => (<div className="player-card" key={p.id}><div onClick={() => onViewProfile(p.id)} style={{cursor:'pointer'}}><Avatar user={p} size={48}/></div><div className="pc-meta" onClick={() => p.owner_id !== user.id && !p.rented_by && setSelected(p)} style={{cursor:'pointer'}}><div className="pc-name"><PlayerName user={p}/></div><div className="pc-sub">UID: {p.uid}</div>{p.rented_by && <div className="f10 text-blue mt4 fw7">В аренде (нельзя купить)</div>}</div><div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}><div className="fw8 text-gold">{parseFloat(p.current_price).toFixed(0)} RC</div>{p.owner_id === user.id ? <span className="f11 fw7 text-muted">⛓ Ваш</span> : p.rented_by ? <span className="f11 fw7 text-muted">Недоступен</span> : <button className="btn btn-primary btn-sm" onClick={() => setSelected(p)}>Купить</button>}</div></div>))}{results.length===0 && !loading && <div className="text-center text-muted p20">Никого не найдено.</div>}</div></div>
            </>
        )}

        {tab === 'rent' && (
            <div className="section mt16 gap12">
                <div className="f12 text-muted text-center mb12">Арендуйте рабов на время за фиксированную цену. Они будут работать на вас!</div>
                {loading ? <div className="spinner mt20"/> : rentResults.map(p => (
                    <div className="player-card" key={p.id} style={{borderColor:'var(--blue)'}}>
                        <div onClick={() => onViewProfile(p.id)} style={{cursor:'pointer'}}><Avatar user={p} size={48}/></div>
                        <div className="pc-meta">
                            <div className="pc-name"><PlayerName user={p}/></div>
                            <div className="f11 mt4 text-muted">Цена выкупа: {parseFloat(p.current_price).toFixed(0)} RC</div>
                            <div className="f11 fw7 text-blue mt4">Аренда на {p.rent_duration} ч.</div>
                        </div>
                        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
                            <div className="fw8 text-gold">{parseFloat(p.rent_price).toFixed(0)} RC</div>
                            <button className="btn btn-ghost btn-sm" style={{color:'var(--blue)', borderColor:'rgba(59,130,246,0.3)'}} onClick={() => setRentSelected(p)}>Арендовать</button>
                        </div>
                    </div>
                ))}
                {rentResults.length===0 && !loading && <div className="text-center text-muted p20">На бирже аренды пусто.</div>}
            </div>
        )}
        
        {selected && (<div className="overlay" onClick={() => setSelected(null)}><div className="modal" onClick={e => e.stopPropagation()}><div className="modal-handle"/><div className="modal-title text-center">⛓ Покупка игрока</div><div className="row mb16"><Avatar user={selected} size={56}/><div><div className="fw8 f13">{selected.first_name || selected.username}</div><div className="text-muted f12">UID: {selected.uid}</div></div></div><div className="card mb20" style={{margin:0}}><div className="row-sb"><span className="text-muted f13">Цена</span><span className="fw8 text-gold">{parseFloat(selected.current_price).toFixed(0)} RC</span></div><div className="row-sb mt12"><span className="text-muted f13">Ваш баланс</span><span className={`fw8 f13 ${user.balance >= parseFloat(selected.current_price) ? 'text-green' : 'text-red'}`}>{user.balance.toFixed(0)} RC</span></div></div><div className="mt16">{user.balance < parseFloat(selected.current_price) ? <button className="btn btn-ghost" disabled>❌ Недостаточно RC</button> : <button className="btn btn-primary" onClick={doBuy}>Купить за {parseFloat(selected.current_price).toFixed(0)} RC</button>}</div></div></div>)}
        
        {rentSelected && (<div className="overlay" onClick={() => setRentSelected(null)}><div className="modal" onClick={e => e.stopPropagation()}><div className="modal-handle"/><div className="modal-title text-center">⏳ Аренда игрока</div><div className="row mb16"><Avatar user={rentSelected} size={56}/><div><div className="fw8 f13">{rentSelected.first_name || rentSelected.username}</div><div className="text-muted f12">UID: {rentSelected.uid}</div></div></div><div className="card mb20" style={{margin:0, borderColor:'var(--blue)'}}><div className="row-sb"><span className="text-muted f13">Цена аренды</span><span className="fw8 text-gold">{parseFloat(rentSelected.rent_price).toFixed(0)} RC</span></div><div className="row-sb mt12"><span className="text-muted f13">Время аренды</span><span className="fw8 text-blue">{rentSelected.rent_duration} часов</span></div><div className="row-sb mt12"><span className="text-muted f13">Ваш баланс</span><span className={`fw8 f13 ${user.balance >= parseFloat(rentSelected.rent_price) ? 'text-green' : 'text-red'}`}>{user.balance.toFixed(0)} RC</span></div></div><div className="mt16">{user.balance < parseFloat(rentSelected.rent_price) ? <button className="btn btn-ghost" disabled>❌ Недостаточно RC</button> : <button className="btn btn-primary" onClick={doRent} style={{background:'linear-gradient(135deg, #3b82f6, #2563eb)', color:'#fff'}}>Арендовать за {parseFloat(rentSelected.rent_price).toFixed(0)} RC</button>}</div></div></div>)}
      </div>
    </div>
  );
}

function SyndicatesScreen({ user, onRefresh, showToast, onViewProfile }) {
  const [tab, setTab] = useState('list'); 
  const [clans, setClans] = useState([]); const [myClan, setMyClan] = useState(null); 
  const [loading, setLoading] = useState(false); const [actionModal, setActionModal] = useState(null); 
  const [chatMsgs, setChatMsgs] = useState([]); const [chatTxt, setChatTxt] = useState('');
  const [showTreasury, setShowTreasury] = useState(false); const [treasuryData, setTreasuryData] = useState({ history: [], top: [] }); const [treasuryTab, setTreasuryTab] = useState('history');
  const [warTargets, setWarTargets] = useState([]); const [territories, setTerritories] = useState([]);

  useEffect(() => { loadAll(); }, [user.syndicate_id]);
  async function loadAll() {
      setLoading(true);
      try {
          if (user.syndicate_id) { 
              setTab('my'); 
              setMyClan(await get('/api/syndicates/my')); 
              get('/api/syndicates/chat/history').then(setChatMsgs);
              get('/api/syndicates/wars/targets').then(setWarTargets);
              get('/api/syndicates/territories').then(setTerritories);
          } 
          else { setTab('list'); setClans(await get('/api/syndicates')); }
      } catch(e) {}
      setLoading(false);
  }

  useEffect(() => {
    if(!user.syndicate_id) return;
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const ws = new WebSocket(`${protocol}//${window.location.host}/api/syndicates/chat/ws?init_data=${encodeURIComponent(_initData)}`);
    ws.onmessage = (e) => { try { 
        const d = JSON.parse(e.data); 
        if (d.type === 'new_message') setChatMsgs(p => [d.message, ...p]);
        else if (d.type === 'action' && d.action === 'refresh_chat') get('/api/syndicates/chat/history').then(setChatMsgs);
    } catch(err) {} };
    return () => ws.close();
  }, [user.syndicate_id]);

  const [sName, setSName] = useState(''); const [sDesc, setSDesc] = useState(''); const [sJoin, setSJoin] = useState('open'); const [sPrice, setSPrice] = useState(0); const [sVip, setSVip] = useState(0); const [sSlaves, setSSlaves] = useState(0);
  useEffect(() => { if(myClan && tab==='settings') { setSName(myClan.clan.name); setSDesc(myClan.clan.description); setSJoin(myClan.clan.join_type||'open'); setSPrice(myClan.clan.min_price||0); setSVip(myClan.clan.min_vip||0); setSSlaves(myClan.clan.min_slaves||0); } }, [myClan, tab]);

  async function saveSettings() { try { await post('/api/syndicates/settings', { name: sName, description: sDesc, join_type: sJoin, min_price: parseFloat(sPrice), min_vip: parseInt(sVip), min_slaves: parseInt(sSlaves) }); showToast('✅ Настройки сохранены'); loadAll(); } catch(e) { showToast('❌ ' + e.message); } }
  async function doDonate(amt) { try { await post('/api/syndicates/donate', { amount: parseFloat(amt) }); showToast('💰 Взнос сделан!'); onRefresh(); loadAll(); } catch(e) { showToast('❌ ' + e.message); } }
  async function doSendChat() { if(!chatTxt.trim()) return; try { await post('/api/syndicates/chat/send', { text: chatTxt }); setChatTxt(''); } catch(e){} }
  async function handleMemberAction(action, uid) { try { if(action==='kick'){ if(!confirm('Кикнуть?')) return; await post('/api/syndicates/members/kick', { user_id: uid }); } else if(action==='promote'){ await post('/api/syndicates/members/promote', { user_id: uid }); } setActionModal(null); loadAll(); showToast('✅ Готово'); } catch(e) { showToast('❌ ' + e.message); } }
  
  async function doGathering() { if(!confirm('Списать 5% баланса у всех участников в общак? Доступно раз в 3 дня.')) return; try { const r = await post('/api/syndicates/gathering'); showToast(`✅ Собрано ${r.gathered.toFixed(0)} RC!`); loadAll(); } catch(e) { showToast('❌ ' + e.message); } }

  if (!user.syndicate_id) {
    return (
      <div className="screen">
        <div className="hdr"><div className="hdr-title">🛡 Кланы</div></div>
        <div className="content" style={{padding:0}}>
          <div className="tabs-wrap"><div className="tabs"><button className={`tab${tab==='list'?' active':''}`} onClick={()=>setTab('list')}>Список</button><button className={`tab${tab==='top'?' active':''}`} onClick={()=>setTab('top')}>🏆 Топ Кланов</button></div></div>
          
          <div className="p16 gap12">
            {clans.map((c, idx) => (
              <div className="card" key={c.id} style={{margin:0}}>
                <div className="row-sb mb8"><div className="fw8" style={{fontSize:18}}>{tab==='top'?`#${idx+1} `:''}{c.name}</div><div className="f12 fw7 text-gold">Ур. {c.level}</div></div>
                <div className="f12 text-muted mb12">{c.description || 'Нет описания'}</div>
                <div className="f11 text-muted mb12">Вход: {c.join_type==='open'?'Открытый':'По заявкам'} | От {c.min_price} RC | VIP {c.min_vip}</div>
                <div className="row-sb mb8"><div className="fw7 text-gold">{parseFloat(c.treasury).toFixed(0)} RC Общак</div><div className="fw6 text-blue">🗺 {c.terr_count || 0} Терр.</div></div>
                <button className="btn btn-primary btn-sm" style={{width:'100%'}} onClick={async ()=>{ try{ await post('/api/syndicates/join',{syndicate_id:c.id}); showToast('✅ Заявка подана'); }catch(e){showToast('❌ '+e.message);}} }>Вступить</button>
              </div>
            ))}
            {tab === 'list' && (
                <div className="card mt16 gap8" style={{borderColor: 'var(--gold)'}}>
                   <div className="fw8 text-gold">Создать свой клан (20,000 RC)</div>
                   <input className="input" placeholder="Название" id="c_name"/>
                   <input className="input" placeholder="Описание" id="c_desc"/>
                   <button className="btn btn-primary" onClick={async ()=>{ try{ await post('/api/syndicates/create',{name:document.getElementById('c_name').value, description:document.getElementById('c_desc').value}); onRefresh(); }catch(e){showToast('❌ '+e.message);} }}>Создать</button>
                </div>
            )}
          </div>
        </div>
      </div>
    )
  }

  if (!myClan) return <div className="screen"><div className="spinner mt40"/></div>;

  const upgradeCosts = {1: 100000, 2: 500000, 3: 1000000};
  const currentUpgradeCost = upgradeCosts[myClan.clan.level];

  return (
    <div className="screen">
      <div className="hdr">
        <div className="hdr-title">{myClan.clan.name} <span className="f11 text-gold" style={{background:'var(--surface2)', padding:'2px 8px', borderRadius:8}}>Ур. {myClan.clan.level}</span></div>
        <button className="btn btn-ghost btn-sm" onClick={async ()=>{ if(confirm('Выйти из клана?')){ await post('/api/syndicates/leave'); onRefresh(); } }}>Выйти</button>
      </div>
      <div className="content" style={{padding:0}}>
        <div className="tabs-wrap"><div className="tabs"><button className={`tab${tab==='my'?' active':''}`} onClick={()=>setTab('my')}>🏠 База</button><button className={`tab${tab==='chat'?' active':''}`} onClick={()=>setTab('chat')}>💬 Чат</button><button className={`tab${tab==='wars'?' active':''}`} onClick={()=>setTab('wars')}>⚔️ Войны</button><button className={`tab${tab==='map'?' active':''}`} onClick={()=>setTab('map')}>🗺 Карта</button><button className={`tab${tab==='upgrade'?' active':''}`} onClick={()=>setTab('upgrade')}>🚀 Прокачка</button>{['don','deputy'].includes(user.syndicate_role) && <button className={`tab${tab==='settings'?' active':''}`} onClick={()=>setTab('settings')}>⚙️</button>}</div></div>

        {tab === 'my' && <div className="p16 gap16">
          <div className="card gap8" style={{margin:0, borderColor:'var(--gold)'}}>
             <div className="f12 text-muted text-center text-uppercase">Общак Клана</div>
             <div className="fw8 text-gold text-center" style={{fontSize:28}}>{parseFloat(myClan.clan.treasury).toFixed(0)} RC</div>
             {myClan.rank && <div className="f12 text-gold text-center fw8 mt4">🏆 Место в топе: #{myClan.rank}</div>}
             <div className="row mt8">
               <input className="input" id="don_amt" type="number" placeholder="Сумма..."/>
               <button className="btn btn-primary" style={{width:'auto'}} onClick={()=>doDonate(document.getElementById('don_amt').value)}>Вкинуть</button>
             </div>
             <div className="row mt8">
                 <button className="btn btn-ghost btn-sm" style={{flex:1}} onClick={async () => { const data = await get('/api/syndicates/treasury'); setTreasuryData(data); setShowTreasury(true); }}>📊 История Казны</button>
                 {user.syndicate_role === 'don' && <button className="btn btn-danger btn-sm" style={{flex:1}} onClick={doGathering}>🚨 Общий Сбор</button>}
             </div>
          </div>

          {myClan.clan.achievements && myClan.clan.achievements.length > 0 && (
              <div className="card p12 m0 bg-surface2 row" style={{overflowX:'auto', scrollbarWidth:'none'}}>
                  {myClan.clan.achievements.map((a, i) => <div key={i} className="f11 fw7 text-gold bg-bg px12 py6" style={{borderRadius: 12, border: '1px solid var(--gold-dim)', whiteSpace:'nowrap'}}>{a}</div>)}
              </div>
          )}

          <div className="section-title">Состав ({myClan.members.length})</div>
          <div className="card p0 m0">
             {myClan.members.map((m, idx) => (
                <div className="list-item" key={m.id} style={{padding:'12px 16px', borderBottom: idx===myClan.members.length-1?'none':'1px solid var(--border)'}}>
                   <Avatar user={m} size={40}/>
                   <div className="li-info">
                     <div className="li-name">{m.first_name||m.username||m.id}</div>
                     <div className="f11 mt4 fw8" style={{color: m.syndicate_role==='don'?'var(--red)':m.syndicate_role==='deputy'?'var(--blue)':'var(--text-3)'}}>{m.syndicate_role==='don'?'Дон':m.syndicate_role==='deputy'?'Зам':'Участник'}</div>
                   </div>
                   {user.syndicate_role !== 'member' && m.id !== user.id && <button className="btn btn-ghost btn-sm" onClick={()=>setActionModal({type:'member', item:m})}>⚙️</button>}
                </div>
             ))}
          </div>
          
          {myClan.requests.length > 0 && <div className="mt16"><div className="section-title text-gold">Заявки ({myClan.requests.length})</div><div className="gap8">
             {myClan.requests.map(r => (
               <div className="card row-sb" key={r.req_id} style={{margin:0, padding:'12px'}}>
                 <div className="row"><Avatar user={r} size={36}/><div><div className="fw7 f13">{r.first_name||r.username}</div><div className="f11 text-gold">{parseFloat(r.balance).toFixed(0)} RC</div></div></div>
                 <div className="row"><button className="btn btn-green btn-sm" onClick={async ()=>{ await post('/api/syndicates/requests/resolve', {request_id:r.req_id, action:'accept'}); loadAll(); }}>✓</button><button className="btn btn-danger btn-sm" onClick={async ()=>{ await post('/api/syndicates/requests/resolve', {request_id:r.req_id, action:'reject'}); loadAll(); }}>✕</button></div>
               </div>
             ))}
          </div></div>}
        </div>}

        {tab === 'chat' && <div style={{display:'flex', flexDirection:'column', height:'calc(100vh - 130px)', position: 'relative'}}>
          {chatMsgs.find(m => m.is_pinned) && (
              <div className="px16 py8 bg-surface2 border-b border-border2 row-sb" style={{borderBottom:'1px solid var(--border)'}}>
                  <div style={{flex:1, minWidth:0}}><div className="f10 text-gold fw7 mb4">📌 Закрепленное сообщение</div><div className="f12 text-muted" style={{whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{chatMsgs.find(m => m.is_pinned).text}</div></div>
                  {['don','deputy'].includes(user.syndicate_role) && <button className="btn btn-ghost btn-sm ml8" onClick={async ()=>{ try{ await post('/api/syndicates/chat/pin', {message_id: 0}); }catch(e){} }}>✕</button>}
              </div>
          )}
          <div className="content chat-area" style={{flex:1, overflowY:'auto', display:'flex', flexDirection:'column-reverse'}}>
             {chatMsgs.map((m, i) => {
                 const reacts = m.reactions ? (typeof m.reactions === 'string' ? JSON.parse(m.reactions) : m.reactions) : {};
                 const hasReacts = Object.keys(reacts).length > 0;
                 return (
                   <div key={m.id} className={`msg-wrap ${m.user_id===user.id ? 'me':'them'}`} style={{marginBottom: 12}}>
                     {m.user_id!==user.id && <div className="f11 text-muted ml4 mb4">{m.first_name} <span style={{color:m.syndicate_role==='don'?'var(--red)':m.syndicate_role==='deputy'?'var(--blue)':''}}>{m.syndicate_role==='don'?'[Дон]':m.syndicate_role==='deputy'?'[Зам]':''}</span></div>}
                     <div className={`msg-bubble ${m.user_id===user.id ? 'me':'them'}`}>
                         {m.text}
                         {hasReacts && <div className="mt8 row gap4" style={{flexWrap:'wrap'}}>
                             {Object.entries(reacts).map(([emoji, uids]) => uids.length > 0 ? <div key={emoji} className="f10 px8 py4 bg-bg2 rounded-full border border-border2" style={{borderRadius: 12}} onClick={()=>post('/api/syndicates/chat/react', {message_id: m.id, reaction: emoji})}>{emoji} {uids.length}</div> : null)}
                         </div>}
                     </div>
                     <div className="msg-time row">
                         {new Date(m.created_at).toLocaleString('ru').slice(0,-3)}
                         <div className="row ml8 gap8">
                             <span style={{cursor:'pointer'}} onClick={()=>post('/api/syndicates/chat/react', {message_id: m.id, reaction: '👍'})}>👍</span>
                             <span style={{cursor:'pointer'}} onClick={()=>post('/api/syndicates/chat/react', {message_id: m.id, reaction: '🔥'})}>🔥</span>
                             <span style={{cursor:'pointer'}} onClick={()=>post('/api/syndicates/chat/react', {message_id: m.id, reaction: '🤡'})}>🤡</span>
                             {['don','deputy'].includes(user.syndicate_role) && <span style={{cursor:'pointer'}} onClick={()=>post('/api/syndicates/chat/pin', {message_id: m.id})}>📌</span>}
                         </div>
                     </div>
                   </div>
                 )
             })}
          </div>
          <div className="chat-input-wrap"><input className="chat-input" placeholder="В чат..." value={chatTxt} onChange={e=>setChatTxt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSendChat()}/><button className="btn btn-primary btn-sm" onClick={doSendChat}>➤</button></div>
        </div>}

        {tab === 'map' && (
            <div className="p16 gap12">
                <div className="card row-sb" style={{margin:0, borderColor:'var(--blue)', background:'rgba(59,130,246,0.1)'}}>
                    <div><div className="fw8 text-blue mb4">Карта Территорий</div><div className="f12 text-muted">Захватывайте территории через войны, чтобы получать бонус к доходу клана!</div></div>
                </div>
                {territories.map(t => (
                    <div className="card row-sb" key={t.id} style={{margin:0, borderColor: t.owner_id === user.syndicate_id ? 'var(--green)' : 'var(--border)'}}>
                        <div>
                            <div className="fw8" style={{fontSize: 16}}>{t.name}</div>
                            <div className="f12 text-green fw7 mt4">+{t.income_bonus}% к доходу</div>
                            <div className="f12 text-muted mt4">Владелец: {t.owner_name ? <span className={t.owner_id === user.syndicate_id ? 'text-green' : 'text-red'}>{t.owner_name} (Ур.{t.owner_level})</span> : 'Ничья'}</div>
                        </div>
                        {['don','deputy'].includes(user.syndicate_role) && t.owner_id !== user.syndicate_id && t.owner_id && (
                            <button className="btn btn-danger btn-sm" onClick={async ()=>{ if(!confirm(`Напасть на ${t.owner_name} за территорию ${t.name}?`)) return; try{ await post('/api/syndicates/wars/declare', {target_id: t.owner_id, territory_id: t.id}); showToast('⚔️ Вызов отправлен!'); loadAll(); }catch(e){showToast('❌ '+e.message);} }}>Захватить</button>
                        )}
                        {['don','deputy'].includes(user.syndicate_role) && !t.owner_id && (
                            <div className="f11 text-muted">Нужен ИИ бот</div>
                        )}
                    </div>
                ))}
            </div>
        )}

        {tab === 'upgrade' && (
            <div className="p16 gap12">
               <div className="card text-center">
                 <div className="fw8 text-gold" style={{fontSize: 20}}>Уровень {myClan.clan.level}</div>
                 <div className="f13 text-muted mt12 text-left" style={{lineHeight: 1.6}}>
                    <div><b>Ур. 1:</b> До 5 участников.</div>
                    <div className={myClan.clan.level >= 2 ? "text-green" : ""}><b>Ур. 2:</b> До 10 участников. +5% к доходу с работ.</div>
                    <div className={myClan.clan.level >= 3 ? "text-green" : ""}><b>Ур. 3:</b> До 20 участников. Скидка 10% на покупку рабов.</div>
                    <div className={myClan.clan.level >= 4 ? "text-green" : ""}><b>Ур. 4:</b> До 30 участников. Иммунитет к бунтам рабов!</div>
                 </div>
                 {user.syndicate_role === 'don' && myClan.clan.level < 4 && (
                     <button className="btn btn-primary mt20" onClick={async () => {
                         if(!confirm(`Улучшить клан за ${currentUpgradeCost} RC? Это спишется из Общака.`)) return;
                         try { await post('/api/syndicates/upgrade'); showToast('✅ Клан улучшен!'); loadAll(); onRefresh(); } catch(e){showToast('❌ '+e.message);}
                     }}>🚀 Улучшить за {currentUpgradeCost >= 1000000 ? (currentUpgradeCost/1000000)+'M' : (currentUpgradeCost/1000)+'k'} RC</button>
                 )}
               </div>
            </div>
        )}

        {tab === 'wars' && (
            <div className="p16 gap12">
                {/* Входящие вызовы */}
                {myClan.wars.pending.filter(w => w.defender_id === user.syndicate_id).map(w => (
                    <div className="card" key={w.id} style={{borderColor: 'var(--red)', background: 'rgba(239,68,68,0.1)'}}>
                       <div className="fw8 text-red mb8">⚔️ Вам бросили вызов!</div>
                       <div className="f13 mb12">Клан <b>{w.attacker_name}</b> хочет начать войну кошельков на 24 часа. Победитель заберет фонд врага{w.terr_name ? ` и территорию ${w.terr_name}` : ''}!</div>
                       {['don','deputy'].includes(user.syndicate_role) && (
                           <div className="row">
                               <button className="btn btn-danger" onClick={async ()=>{ try{ await post('/api/syndicates/wars/resolve', {war_id: w.id, action: 'accept'}); showToast('🔥 Война началась!'); loadAll(); }catch(e){showToast('❌ '+e.message);} }}>Принять</button>
                               <button className="btn btn-ghost" onClick={async ()=>{ try{ await post('/api/syndicates/wars/resolve', {war_id: w.id, action: 'reject'}); showToast('Отклонено'); loadAll(); }catch(e){showToast('❌ '+e.message);} }}>Отказаться</button>
                           </div>
                       )}
                    </div>
                ))}
                
                {/* Исходящие вызовы */}
                {myClan.wars.pending.filter(w => w.attacker_id === user.syndicate_id).map(w => (
                    <div className="card" key={w.id}>
                       <div className="fw8 text-gold mb8">⏳ Ожидание ответа...</div>
                       <div className="f12 text-muted">Вы бросили вызов клану <b>{w.defender_name}</b>{w.terr_name ? ` за территорию ${w.terr_name}` : ''}. Ждем их решения (до 12 часов).</div>
                    </div>
                ))}

                {/* Активные войны */}
                {myClan.wars.active.map(w => {
                    const myFund = w.attacker_id === user.syndicate_id ? w.fund_attacker : w.fund_defender;
                    const enemyFund = w.attacker_id === user.syndicate_id ? w.fund_defender : w.fund_attacker;
                    const enemyName = w.attacker_id === user.syndicate_id ? w.defender_name : w.attacker_name;
                    return (
                        <div className="card" key={w.id} style={{borderColor: 'var(--gold)', boxShadow: '0 0 15px rgba(232,197,71,0.2)'}}>
                           <div className="fw8 text-gold text-center mb4">🔥 Война с {enemyName}</div>

                           <div className="task-progress-wrap mb12" style={{height: 12}}>

                               {['don','deputy'].includes(user.syndicate_role) && <button className="btn btn-danger btn-sm" onClick={async ()=>{ if(!confirm(`Объявить обычную войну клану ${t.name}?`)) return; try{ await post('/api/syndicates/wars/declare', {target_id: t.id}); showToast('⚔️ Вызов отправлен!'); loadAll(); }catch(e){showToast('❌ '+e.message);} }}>Напасть</button>}
                            </div>
                        ))}
                    </>
                )}
            </div>
        )}

        {tab === 'settings' && <div className="p16 gap12">
           <div className="card gap8" style={{margin:0}}>

              <input className="input" placeholder="Название (Смена 5000 RC)" value={sName} onChange={e=>setSName(e.target.value)}/>
              <textarea className="input" placeholder="Описание" value={sDesc} onChange={e=>setSDesc(e.target.value)} rows={3}/>
              <div className="row mt8"><div className="f12 text-muted" style={{flex:1}}>Тип входа</div><select className="input" style={{flex:2}} value={sJoin} onChange={e=>setSJoin(e.target.value)}><option value="open">Открытый</option><option value="closed">Закрытый</option></select></div>
              <div className="row"><div className="f12 text-muted" style={{flex:1}}>Мин. Цена (RC)</div><input className="input" type="number" style={{flex:2}} value={sPrice} onChange={e=>setSPrice(e.target.value)}/></div>
              <div className="row"><div className="f12 text-muted" style={{flex:1}}>Мин. VIP</div><input className="input" type="number" style={{flex:2}} value={sVip} onChange={e=>setSVip(e.target.value)}/></div>
              <div className="row"><div className="f12 text-muted" style={{flex:1}}>Мин. Рабов</div><input className="input" type="number" style={{flex:2}} value={sSlaves} onChange={e=>setSSlaves(e.target.value)}/></div>
              <button className="btn btn-primary mt16" onClick={saveSettings}>Сохранить</button>
           </div>
        </div>}

        {actionModal?.type === 'member' && (
          <div className="overlay" onClick={()=>setActionModal(null)}><div className="modal" onClick={e=>e.stopPropagation()}><div className="modal-handle"/><div className="modal-title text-center">⚙️ Управление: {actionModal.item.first_name}</div>
            <div className="gap8 mt16">
               {user.syndicate_role === 'don' && <button className="btn btn-primary" onClick={()=>handleMemberAction('promote', actionModal.item.id)}>{actionModal.item.syndicate_role==='deputy'?'Понизить до участника':'Сделать Замом'}</button>}

               <div className="tabs mb12"><button className={`tab ${treasuryTab==='history'?'active':''}`} onClick={()=>setTreasuryTab('history')}>История</button><button className={`tab ${treasuryTab==='top'?'active':''}`} onClick={()=>setTreasuryTab('top')}>Топ Донатеров</button></div>
               <div className="gap8 max-h-[300px] overflow-y-auto">
                   {treasuryTab === 'history' && treasuryData.history.length === 0 && <div className="text-muted text-center mt16">Нет истории</div>}
                   {treasuryTab === 'history' && treasuryData.history.map((h, i) => <div className="row-sb bg-surface2 p12" style={{borderRadius: 12, background: 'var(--surface2)'}} key={i}><div><div className="fw7">{h.first_name || h.username}</div><div className="f11 text-muted mt4">{new Date(h.created_at).toLocaleString('ru').slice(0, -3)}</div></div><div className="fw8 text-green">+{h.amount} RC</div></div>)}
                   {treasuryTab === 'top' && treasuryData.top.length === 0 && <div className="text-muted text-center mt16">Нет донатеров</div>}
                   {treasuryTab === 'top' && treasuryData.top.map((t, i) => <div className="row-sb bg-surface2 p12" style={{borderRadius: 12, background: 'var(--surface2)'}} key={i}><div className="row"><div className="fw8 text-gold" style={{width: 24}}>{i+1}</div><div className="fw7">{t.first_name || t.username}</div></div><div className="fw8 text-gold">{t.total} RC</div></div>)}
               </div>
            </div></div>
        )}

    </div>

}

function GamesScreen({ user, tasksData, onRefresh, showToast }) {
  const [tab, setTab] = useState('tasks');
  const [localEnergy, setLocalEnergy] = useState(parseFloat(user.energy) || 0); const [unsyncedClicks, setUnsyncedClicks] = useState(0); const [floats, setFloats] = useState([]);
  const [promoCode, setPromoCode] = useState('');
  const [robberyData, setRobberyData] = useState(null);
  const [arenaData, setArenaData] = useState(null);
  
  useEffect(() => { if (tab !== 'mine') return; const regenPerSec = user.max_energy / 7200; const int = setInterval(() => setLocalEnergy(e => Math.min(user.max_energy, e + regenPerSec)), 1000); return () => clearInterval(int); }, [tab, user.max_energy]);
  useEffect(() => { if (tab !== 'mine') return; const sync = async () => { if (unsyncedClicks > 0) { const clicks = unsyncedClicks; setUnsyncedClicks(0); try { await post('/api/mine/sync', { clicks }); onRefresh(); } catch(e) {} } }; const int = setInterval(sync, 3000); return () => { sync(); clearInterval(int); }; }, [unsyncedClicks, tab]);
  useEffect(() => { if (tab === 'arena') get('/api/arena/status').then(setArenaData).catch(()=>{}); }, [tab]);
  
  const handleMineTap = (e) => { if (Math.floor(localEnergy) <= 0) return; setLocalEnergy(e => e - 1); setUnsyncedClicks(c => c + 1); const rect = e.currentTarget.getBoundingClientRect(); const x = e.clientX - rect.left; const y = e.clientY - rect.top; const id = Date.now() + Math.random(); setFloats(p => [...p, { id, x, y }]); setTimeout(() => setFloats(p => p.filter(f => f.id !== id)), 800); };
  const buyUpgrade = async (type) => { try { await post('/api/mine/upgrade', { type }); showToast('✅ Улучшено!'); onRefresh(); } catch(e) { showToast('❌ ' + e.message); } };

  const displayBalance = user.balance + (unsyncedClicks * (user.click_power * 0.5));

  const doPromo = async () => {
    if (!promoCode.trim()) return;
    try { const r = await post('/api/promo', { code: promoCode.trim().toUpperCase() }); showToast(`🎁 ${r.msg || 'Промокод активирован!'}`); setPromoCode(''); onRefresh(); }
    catch(e) { showToast('❌ ' + e.message); }
  };

  const doRobbery = async (targetId) => {
    try { const r = await post('/api/robbery/resolve', { target_id: targetId }); showToast(`✅ ${r.msg || 'Ограбление успешно!'}`); onRefresh(); setRobberyData(null); }
    catch(e) { showToast('❌ ' + e.message); }
  };

  const loadRobbery = async () => { try { setRobberyData(await get('/api/robbery/targets')); } catch(e) { showToast('❌ ' + e.message); } };

  const doArenaFight = async () => {
    try { const r = await post('/api/arena/fight'); showToast(`⚔️ ${r.msg || 'Бой завершен!'}`); onRefresh(); get('/api/arena/status').then(setArenaData).catch(()=>{}); }
    catch(e) { showToast('❌ ' + e.message); }
  };

  const doSelfbuy = async () => {
    if (!confirm('Выкупить себя у хозяина? Это стоит ' + user.price.toFixed(0) + ' RC.')) return;
    try { const r = await post('/api/selfbuy'); showToast(`✅ ${r.msg || 'Вы выкупили себя!'}`); onRefresh(); }
    catch(e) { showToast('❌ ' + e.message); }
  };

  return (
    <div className="screen">
      <div className="hdr"><div className="hdr-title">🎮 Активности</div></div>
      <div className="content p0">
        <div className="tabs-wrap"><div className="tabs">
          <button className={`tab${tab==='tasks'?' active':''}`} onClick={() => setTab('tasks')}>📋 Задания</button>
          <button className={`tab${tab==='mine'?' active':''}`} onClick={() => setTab('mine')}>⛏ Шахта</button>
          <button className={`tab${tab==='arena'?' active':''}`} onClick={() => setTab('arena')}>⚔️ Арена</button>
          <button className={`tab${tab==='robbery'?' active':''}`} onClick={() => { setTab('robbery'); if(!robberyData) loadRobbery(); }}>🔫 Грабёж</button>
          <button className={`tab${tab==='escape'?' active':''}`} onClick={() => setTab('escape')}>🏃 Побег</button>
          <button className={`tab${tab==='more'?' active':''}`} onClick={() => setTab('more')}>⋯ Ещё</button>
        </div></div>
        
        {tab === 'tasks' && <TasksComp tasksData={tasksData} onRefresh={onRefresh} showToast={showToast} />}

        {tab === 'mine' && (
          <div className="p16">
            <div className="text-center mb16"><div className="fw8" style={{fontSize: 24}}>{displayBalance.toFixed(1)} RC</div>{user.owner && <div className="f12 text-red mt4">⛓ 20% добычи уходит вашему хозяину</div>}{!user.owner && <div className="f12 text-green mt4">✅ Вы свободны. 100% добычи ваши.</div>}</div>
            <div className="mine-rock" onPointerDown={handleMineTap}>🪨{floats.map(f => (<div key={f.id} className="floating-number" style={{left: f.x, top: f.y}}>+{(user.click_power * 0.5).toFixed(1)}</div>))}</div>
            <div className="mt20"><div className="row-sb mb8"><span className="fw7 f12 text-muted">Энергия</span><span className="fw8 f13">{Math.floor(localEnergy)} / {user.max_energy}</span></div><div className="energy-bar-wrap"><div className="energy-bar-fill" style={{width: `${(localEnergy/user.max_energy)*100}%`}}></div></div></div>
            <div className="section-title mt20">Прокачка кирки</div>
            <div className="card row-sb" style={{margin:0, marginBottom:8}}><div><div className="fw7">Мощь тапа (ур. {user.click_power})</div><div className="f12 text-muted mt4">+0.5 RC за клик</div></div><button className="btn btn-primary btn-sm" onClick={() => buyUpgrade('power')}>{(user.click_power * 3000).toFixed(0)} RC</button></div>
            <div className="card row-sb" style={{margin:0}}><div><div className="fw7">Запас энергии ({user.max_energy})</div><div className="f12 text-muted mt4">+100 макс. энергии</div></div><button className="btn btn-primary btn-sm" onClick={() => buyUpgrade('energy')}>1500 RC</button></div>
          </div>
        )}

        {tab === 'arena' && (
          <div className="p16 gap12">
            <div className="card" style={{margin:0, background:'linear-gradient(135deg, #1a0a0a, #0a0a1a)', borderColor:'var(--red)'}}>
              <div className="fw8 text-red" style={{fontSize:20}}>⚔️ Арена Боёв</div>
              <div className="f12 text-muted mt8 mb16">Сражайтесь с другими рабами. Победа приносит RC и опыт. Доступно несколько боёв в день.</div>
              {arenaData ? (
                <>
                  <div className="row-sb mb12">
                    <span className="f13 fw7 text-muted">Боёв сегодня:</span>
                    <span className="fw8 text-gold">{arenaData.fights_today || 0} / {arenaData.max_fights || 5}</span>
                  </div>
                  <div className="row-sb mb16">
                    <span className="f13 fw7 text-muted">Побед:</span>
                    <span className="fw8 text-green">{arenaData.wins || 0}</span>
                  </div>
                  {arenaData.fights_today >= (arenaData.max_fights || 5) ? (
                    <button className="btn btn-ghost" disabled>⏳ Лимит на сегодня исчерпан</button>
                  ) : (
                    <button className="btn btn-danger" style={{height:56, fontSize:18}} onClick={doArenaFight}>⚔️ СРАЖАТЬСЯ!</button>
                  )}
                </>
              ) : (
                <div className="spinner mt20"/>
              )}
            </div>
          </div>
        )}

        {tab === 'robbery' && (
          <div className="p16 gap12">
            <div className="card" style={{margin:0, background:'linear-gradient(135deg, #0a1a0a, #1a0a0a)', borderColor:'var(--gold)'}}>
              <div className="fw8 text-gold" style={{fontSize:20}}>🔫 Ограбление</div>
              <div className="f12 text-muted mt8 mb16">Ограбьте другого игрока и украдите часть его RC! Доступно 3 раза в день. Риск — взаимный.</div>
              <div className="row-sb mb16">
                <span className="f13 fw7 text-muted">Ограблений сегодня:</span>
                <span className="fw8 text-gold">{user.robberies_count || 0} / 3</span>
              </div>
              {user.robberies_count >= 3 ? (
                <button className="btn btn-ghost" disabled>⏳ Лимит на сегодня исчерпан</button>
              ) : (
                <button className="btn btn-primary" onClick={loadRobbery}>🎲 Найти жертву</button>
              )}
            </div>
            {robberyData && robberyData.targets && robberyData.targets.length > 0 && (
              <div className="gap8">
                <div className="section-title">Выберите цель:</div>
                {robberyData.targets.map(t => (
                  <div className="player-card" key={t.id}>
                    <Avatar user={t} size={44}/>
                    <div className="pc-meta">
                      <div className="pc-name"><PlayerName user={t}/></div>
                      <div className="pc-sub">Баланс: {parseFloat(t.balance||0).toFixed(0)} RC</div>
                    </div>
                    <button className="btn btn-danger btn-sm" onClick={() => doRobbery(t.id)}>Ограбить</button>
                  </div>
                ))}
              </div>
            )}
            {robberyData && (!robberyData.targets || robberyData.targets.length === 0) && (
              <div className="text-center text-muted p20">Нет подходящих целей. Попробуйте позже.</div>
            )}
          </div>
        )}
        
        {tab === 'escape' && <EscapeGameComp user={user} onRefresh={onRefresh} showToast={showToast} />}

        {tab === 'more' && (
          <div className="p16 gap12">
            {/* Самовыкуп */}
            {user.owner && (
              <div className="card" style={{margin:0, borderColor:'var(--green)', background:'rgba(34,197,94,0.08)'}}>
                <div className="fw8 text-green" style={{fontSize:18}}>🕊️ Самовыкуп</div>
                <div className="f12 text-muted mt8 mb16">Вы можете выкупить себя из рабства, заплатив свою текущую цену.</div>
                <div className="row-sb mb16">
                  <span className="f13 fw7 text-muted">Стоимость выкупа:</span>
                  <span className="fw8 text-gold">{user.price.toFixed(0)} RC</span>
                </div>
                <div className="row-sb mb16">
                  <span className="f13 fw7 text-muted">Ваш баланс:</span>
                  <span className={`fw8 ${user.balance >= user.price ? 'text-green' : 'text-red'}`}>{user.balance.toFixed(0)} RC</span>
                </div>
                {user.balance < user.price ? (
                  <button className="btn btn-ghost" disabled>❌ Недостаточно RC ({(user.price - user.balance).toFixed(0)} не хватает)</button>
                ) : (
                  <button className="btn btn-green" style={{height:52}} onClick={doSelfbuy}>🕊️ Выкупить себя за {user.price.toFixed(0)} RC</button>
                )}
              </div>
            )}
            {!user.owner && (
              <div className="card" style={{margin:0, borderColor:'var(--border)'}}>
                <div className="fw8" style={{fontSize:16}}>🕊️ Самовыкуп</div>
                <div className="f12 text-muted mt8">Вы уже свободны! Самовыкуп недоступен.</div>
              </div>
            )}

            {/* Промокоды */}
            <div className="card" style={{margin:0, borderColor:'var(--gold)', background:'linear-gradient(135deg, #111, #1a1a1a)'}}>
              <div className="fw8 text-gold" style={{fontSize:18}}>🎟️ Промокод</div>
              <div className="f12 text-muted mt8 mb16">Введите промокод, чтобы получить бонус RC или особый предмет.</div>
              <div className="row">
                <input className="input" placeholder="Введите промокод..." value={promoCode} onChange={e=>setPromoCode(e.target.value.toUpperCase())} onKeyDown={e=>e.key==='Enter'&&doPromo()}/>
                <button className="btn btn-primary btn-sm" style={{width:'auto', padding:'12px 20px'}} onClick={doPromo}>Применить</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  )
}

function TopScreen({ onViewProfile, showToast, user }) {
  const [tab, setTab] = useState('forbes'); const [rows, setRows] = useState([]); const [loading, setLoading] = useState(false);
  async function load(cat) { setTab(cat); setLoading(true); try { setRows(await get(`/api/top?cat=${cat}`)); } catch {} setLoading(false); }
  useEffect(() => { load('forbes'); }, []);
  const tabInfo = { forbes: { label:'💰 ФОРБС', suffix:' RC' }, owners: { label:'👑 ХОЗЯЕВА', suffix:' раб.' }, legends: { label:'⚡ ЛЕГЕНДЫ', suffix:' RC' }, clans: { label:'🛡 КЛАНЫ', suffix:' Очков' } };
  
  async function doWar(targetId) {
     if(!confirm('Объявить войну клану? Это начнет гонку кошельков на 24ч!')) return;
     try { await post('/api/syndicates/wars/declare', { target_id: targetId }); showToast('⚔️ Вызов брошен!'); } catch(e){ showToast('❌ '+e.message); }
  }

  return (
    <div className="screen">
      <div className="hdr"><div className="hdr-title">🏆 Рейтинги</div></div>
      <div className="content" style={{padding:0}}>
        <div className="tabs-wrap"><div className="tabs">{Object.entries(tabInfo).map(([key, info]) => <button key={key} className={`tab${tab===key?' active':''}`} onClick={() => load(key)}>{info.label}</button>)}</div></div>
        {loading ? <div className="spinner mt40"/> : (<div className="p16"><div className="card p0 m0">{rows.map((r, i) => { 
            const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':null; 
            return (
              <div className="list-item p16" key={r.id} style={{cursor:'pointer', borderBottom: i === rows.length-1 ? 'none' : '1px solid var(--border)'}} onClick={() => {if(tab!=='clans') onViewProfile(r.id)}}>
                <div className="fw8 text-muted" style={{width:28, textAlign:'center', color:i<3?['#FFD700','#C0C0C0','#CD7F32'][i]:undefined}}>{medal || i+1}</div>
                {tab!=='clans' && <Avatar user={r} size={40}/>}
                <div className="li-info">
                  {tab==='clans' ? <div className="fw8" style={{fontSize:16}}>{r.first_name}</div> : <div className="pc-name"><PlayerName user={r}/></div>}
                  {tab==='clans' ? <div className="f12 text-gold mt4">Территорий: {r.terr_count}</div> : <div className="f11 text-muted mt4">#{r.uid}</div>}
                </div>
                {tab==='clans' && ['don','deputy'].includes(user?.syndicate_role) && r.id !== user?.syndicate_id ? <button className="btn btn-danger btn-sm mr8" onClick={(e)=>{e.stopPropagation(); doWar(r.id);}}>⚔️ Напасть</button> : null}
                <div className="fw8 text-gold">{parseFloat(r.value||0).toFixed(0)} <span className="f10 text-muted">{tabInfo[tab].suffix}</span></div>
              </div>
            ); 
        })}</div></div>)}
      </div>
    </div>
  );
}

function AdminChatScreen({ conv, onBack, showToast }) {
  const [msgs, setMsgs] = useState([]); const [txt, setTxt] = useState('');
  useEffect(() => { load(); const id=setInterval(load, 5000); return ()=>clearInterval(id); }, []);
  async function load() { try { setMsgs((await get(`/api/admin/chat/${conv.user_id}`)).messages); }catch(e){} }
  async function send() { if(!txt.trim()) return; try { await post('/api/admin/chat/send', {target_uid: conv.user_id, text: txt.trim()}); setTxt(''); load(); }catch(e){} }
  return (
    <div className="screen" style={{zIndex:300}}>
      <div className="hdr"><button className="back-btn" onClick={onBack}>‹ Назад</button><div className="hdr-title">Тикет: {conv.first_name}</div><button className="btn btn-danger btn-sm" onClick={async ()=>{ try{ await post(`/api/admin/chat/ticket/${conv.user_id}/close`); onBack(); }catch(e){} }}>Закрыть</button></div>
      <div className="content chat-area">
        {msgs.map(m => (<div key={m.id} className={`msg-wrap ${m.is_from_admin?'me':'them'}`}><div className={`msg-bubble ${m.is_from_admin?'me':'them'}`}>{m.message}</div></div>))}
      </div>
      <div className="chat-input-wrap"><input className="chat-input" value={txt} onChange={e=>setTxt(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/><button className="btn btn-primary btn-sm" onClick={send}>➤</button></div>
    </div>
  )
}

function ShopInventoryScreen({ user, onRefresh, showToast, onBack }) {
  const [tab, setTab] = useState('shop'); 
  const [shopData, setShopData] = useState({ items: [], cosmetics: [] });
  const [invData, setInvData] = useState({ items: [], cosmetics: [] });
  const [loading, setLoading] = useState(false);

  useEffect(() => { loadData(); }, [tab]);

  async function loadData() {
    setLoading(true);
    try {
      if (tab === 'shop') setShopData(await get('/api/shop'));
      else setInvData(await get('/api/inventory'));
    } catch(e) { showToast('❌ ' + e.message); }
    setLoading(false);
  }

  async function buyItem(itemType, isCosmetic = false, cosmeticId = null) {
    try {
      if (isCosmetic) {
        const r = await post('/api/shop/invoice', { item_type: 'cosmetic', cosmetic_id: cosmeticId });
        window.Telegram.WebApp.openInvoice(r.invoice_link, (status) => {
          if (status === 'paid') { showToast('✅ Куплено!'); loadData(); onRefresh(); }
        });
      } else {
        await post('/api/shop/buy_rc', { item_type: itemType });
        showToast('✅ Куплено за RC!'); loadData(); onRefresh();
      }
    } catch (e) { showToast('❌ ' + e.message); }
  }

  async function useItem(itemId) {
    try {
      await post('/api/inventory/use', { item_id: itemId });
      showToast('✅ Предмет активирован!'); loadData(); onRefresh();
    } catch (e) { showToast('❌ ' + e.message); }
  }

  async function equipCosmetic(field, value) {
    try {
      await post('/api/inventory/equip_cosmetic', { field, value });
      showToast('✅ Косметика надета!'); onRefresh();
    } catch (e) { showToast('❌ ' + e.message); }
  }

  return (
    <div className="screen" style={{zIndex: 200}}>
      <div className="hdr">
        <button className="back-btn" onClick={onBack}>‹ Назад</button>
