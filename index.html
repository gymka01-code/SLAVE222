<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рабство - Telegram Game</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color, #18181b); color: var(--tg-theme-text-color, #ffffff); }
        .card { background-color: var(--tg-theme-secondary-bg-color, #27272a); }
        .btn-primary { background-color: var(--tg-theme-button-color, #3b82f6); color: var(--tg-theme-button-text-color, #fff); }
    </style>
</head>
<body class="pb-20 font-sans antialiased">

    <!-- Header -->
    <header class="p-4 card shadow-md flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <div id="avatar" class="w-10 h-10 rounded-full bg-gray-600 flex items-center justify-center font-bold">?</div>
            <div>
                <h1 id="username" class="font-bold text-lg">Загрузка...</h1>
                <p id="status" class="text-xs text-gray-400">Подключение...</p>
            </div>
        </div>
        <div class="text-right">
            <div class="font-bold text-yellow-400"><span id="balance">0</span> RC</div>
            <div class="text-xs text-gray-400">Цена: <span id="price">0</span> RC</div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="p-4" id="view-profile">
        <h2 class="font-bold text-xl mb-3">Мои рабы</h2>
        <div id="slaves-list" class="space-y-3">
            <!-- Сюда JS рендерит рабов -->
        </div>
    </main>

    <!-- Admin Content Area (Hidden by default) -->
    <main class="p-4 hidden" id="view-admin">
        <h2 class="font-bold text-xl text-red-500 mb-3">Панель Админа</h2>
        <div class="card p-4 rounded-lg">
            <p class="text-sm mb-3">Управление сезонами:</p>
            <input type="password" id="admin-pass" placeholder="Пароль" class="w-full p-2 rounded mb-3 bg-gray-800 text-white outline-none">
            <button onclick="resetSeason()" class="w-full bg-red-600 text-white p-2 rounded font-bold">ВНИМАНИЕ: Начать новый сезон</button>
        </div>
    </main>

    <!-- Navigation Bar -->
    <nav class="fixed bottom-0 w-full card flex justify-around p-3 border-t border-gray-700 pb-safe">
        <button onclick="switchTab('profile')" class="flex flex-col items-center text-blue-400">👤<span class="text-xs">Профиль</span></button>
        <button onclick="switchTab('search')" class="flex flex-col items-center text-gray-400">🔍<span class="text-xs">Поиск</span></button>
        <button onclick="switchTab('top')" class="flex flex-col items-center text-gray-400">🏆<span class="text-xs">Топ</span></button>
        <button onclick="switchTab('admin')" id="admin-tab" class="hidden flex flex-col items-center text-red-400">⚙️<span class="text-xs">Админ</span></button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Для теста вне телеграма берем id=123456789
        const userId = tg.initDataUnsafe?.user?.id || 123456789; 
        
        async function loadProfile() {
            try {
                const res = await fetch(`/api/me?user_id=${userId}`);
                const data = await res.json();
                
                document.getElementById('username').innerText = data.username;
                document.getElementById('avatar').innerText = data.username.charAt(0).toUpperCase();
                document.getElementById('balance').innerText = Math.floor(data.balance);
                document.getElementById('price').innerText = Math.floor(data.price);
                document.getElementById('status').innerText = data.owner_name ? `Раб игрока @${data.owner_name}` : `Свободен`;

                if (data.is_admin) {
                    document.getElementById('admin-tab').classList.remove('hidden');
                }

                const slavesList = document.getElementById('slaves-list');
                slavesList.innerHTML = '';
                if(data.slaves.length === 0) {
                    slavesList.innerHTML = '<p class="text-gray-500 text-center py-4">У вас пока нет рабов</p>';
                } else {
                    data.slaves.forEach(s => {
                        slavesList.innerHTML += `
                            <div class="card p-3 rounded-lg flex justify-between items-center">
                                <div>
                                    <div class="font-bold">@${s.username}</div>
                                    <div class="text-xs text-blue-300">Работа: ${s.job || 'Бездельник'}</div>
                                </div>
                                <div class="text-right">
                                    <div class="text-sm font-bold text-yellow-400">${Math.floor(s.price)} RC</div>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (e) {
                tg.showAlert("Ошибка связи с сервером");
            }
        }

        async function resetSeason() {
            const pass = document.getElementById('admin-pass').value;
            if(!pass) return tg.showAlert("Введите пароль");
            
            const res = await fetch('/api/admin/season_reset', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({admin_id: userId, password: pass})
            });
            const data = await res.json();
            if(data.success) {
                tg.showAlert("Сезон успешно сброшен!");
                loadProfile();
            } else {
                tg.showAlert("Ошибка: " + data.detail);
            }
        }

        function switchTab(tab) {
            document.getElementById('view-profile').classList.add('hidden');
            document.getElementById('view-admin').classList.add('hidden');
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            
            if(tab === 'profile') loadProfile();
        }

        // Init
        loadProfile();
    </script>
</body>
</html>
